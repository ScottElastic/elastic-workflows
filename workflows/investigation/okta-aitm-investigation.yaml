  # ================================================================
  # PHASE 7: FINAL AI SYNTHESIS
  # ================================================================
  - name: ai_final_synthesis
    type: kibana.request
    with:
      method: POST
      path: /api/agent_builder/converse
      headers:
        kbn-xsrf: "true"
      body:
        conversation_id: "{{ steps.ai_triage.output.conversation_id }}"
        input: |
          Final synthesis for this Okta AiTM session cookie replay investigation.
          Using ALL data below, provide a closing assessment.

          TRIAGE REPORT:
          {{ steps.ai_triage.output.response.message }}

          DASHBOARD:
          {{ steps.ai_build_dashboard.output.response.message }}

          Produce:

          1. Final Verdict - Is this an AiTM session hijack? Confidence High/Medium/Low. Consider IP changes, suspicious user agents, timing of replay, apps accessed.

          2. Blast Radius - What was accessed during the compromised session? Okta apps accessed via SSO, AWS resources (if CloudTrail hits), network resources (if firewall hits), other users targeted from same attacker IPs.

          3. Response Actions - Prioritized: Immediate (terminate ALL Okta sessions, reset password, require MFA re-enrollment), Short-term (revoke OAuth tokens/API keys, review inbox rules, check for persistence), Investigation (contact user about phishing, check email security logs for lures), Containment (block attacker IPs at perimeter via Palo Alto, add to threat intel), Long-term (enable Okta ThreatInsight, implement risk-based sign-on policies, add session binding policies).

          4. Gaps - What data sources are missing? What should we hunt for next? Consider email security (phishing lure), EDR (endpoint compromise), DLP (data exfiltration), DNS (C2 communication).

          5. Severity Recommendation - Should this case stay HIGH or escalate to CRITICAL? Base on apps accessed, account changes made, lateral movement observed, data exposure risk.
    timeout: 10m
    on-failure:
      retry:
        max-attempts: 2

  - name: post_synthesis_to_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases/{{ steps.create_investigation_case.output.id }}/comments"
      headers:
        kbn-xsrf: "true"
      body:
        type: user
        owner: securitySolution
        comment: |
          # Phase 5: Final Synthesis & Recommendations

          {{ steps.ai_final_synthesis.output.response.message }}

          ---
          [Open AI Assistant]({{ consts.kibana_base_url }}/app/security/ai-assistant) to continue this investigation.

  # ── Final log ────────────────────────────────────────────────────
  - name: log_complete
    type: console
    with:
      message: |
        Okta AiTM Investigation complete.
        Case ID: {{ steps.create_investigation_case.output.id }}
        User: {{ event.alerts[0].okta.actor.alternate_id | default: "N/A" }}
        Session: {{ event.alerts[0].okta.authentication_context.root_session_id | default: "N/A" }}
        View case: {{ consts.kibana_base_url }}/app/security/cases/{{ steps.create_investigation_case.output.id }}
