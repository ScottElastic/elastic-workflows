# ─────────────────────────────────────────────────────────────────────
name: "Active Directory — Disable Account Dispatch"
description: >
  Fan-out dispatcher that locks a user across AD LDAP, Azure AD, and AWS IAM
  by invoking each provider-specific child workflow in turn. Required input:
  the target user identifier. Optional Kibana case id receives a consolidated
  status comment. Side effect: each downstream call disables the account in
  the corresponding directory — operator must wire the child workflow IDs
  via the Workflows API consts below.
enabled: true
tags:
  - "splunk-soar"
  - "identity"
  - "account-lock"
  - "dispatch"
  - "active-directory"
  - "translated"

triggers:
  - type: manual

inputs:
  - name: user
    type: string
    required: true
    description: "User identifier to disable. Forwarded to each downstream account-locking workflow."
  - name: kibana_case_id
    type: string
    required: false
    description: "Optional Kibana case to comment on with the consolidated report."

consts:
  # Endpoints for the downstream locking workflows. In Phantom this was
  # resolved via `community/dispatch_input_playbooks`; in Elastic, call
  # the Workflows API directly (or replace with `kibana.request` once a
  # native sub-workflow primitive exists).
  # NOTE for operator: wire each downstream workflow's slug/id below to the
  # actual deployed workflow IDs in your Kibana environment, then point
  # workflows_api_base at your Kibana host.
  workflows_api_base: "https://CHANGEME-kibana.example.com/api/workflows"
  workflows_api_auth_header: "ApiKey CHANGEME_API_KEY"

steps:
  - name: dispatch_ad_ldap_lock
    type: http
    with:
      url: "{{ consts.workflows_api_base }}/ad-ldap-account-locking/_execute"
      method: POST
      headers:
        Authorization: "{{ consts.workflows_api_auth_header }}"
        kbn-xsrf: "true"
        Content-Type: "application/json"
      body:
        inputs:
          user: "{{ inputs.user }}"
    # Dispatch is best-effort across providers — continue so a failure in
    # one directory doesn't block locks in the others. Each downstream
    # workflow is itself destructive and will fail loud internally.
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"
      continue: true

  - name: dispatch_azure_ad_lock
    type: http
    with:
      url: "{{ consts.workflows_api_base }}/azure-ad-account-locking/_execute"
      method: POST
      headers:
        Authorization: "{{ consts.workflows_api_auth_header }}"
        kbn-xsrf: "true"
        Content-Type: "application/json"
      body:
        inputs:
          user: "{{ inputs.user }}"
    # Dispatch is best-effort across providers — continue so a failure in
    # one directory doesn't block locks in the others. Each downstream
    # workflow is itself destructive and will fail loud internally.
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"
      continue: true

  - name: dispatch_aws_iam_lock
    type: http
    with:
      url: "{{ consts.workflows_api_base }}/aws-iam-account-locking/_execute"
      method: POST
      headers:
        Authorization: "{{ consts.workflows_api_auth_header }}"
        kbn-xsrf: "true"
        Content-Type: "application/json"
      body:
        inputs:
          user: "{{ inputs.user }}"
    # Dispatch is best-effort across providers — continue so a failure in
    # one directory doesn't block locks in the others. Each downstream
    # workflow is itself destructive and will fail loud internally.
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"
      continue: true

  - name: normalize_observables
    type: data.set
    with:
      observable_value: "{{ inputs.user | split: '@' | first }}"
      observable_type: "Disable Account"
      observables:
        - source: "ad_ldap"
          status: "{{ steps.dispatch_ad_ldap_lock.output.status | default: 'unknown' }}"
          message: "{{ steps.dispatch_ad_ldap_lock.output.message | default: '' }}"
        - source: "azure_ad"
          status: "{{ steps.dispatch_azure_ad_lock.output.status | default: 'unknown' }}"
          message: "{{ steps.dispatch_azure_ad_lock.output.message | default: '' }}"
        - source: "aws_iam"
          status: "{{ steps.dispatch_aws_iam_lock.output.status | default: 'unknown' }}"
          message: "{{ steps.dispatch_aws_iam_lock.output.message | default: '' }}"

  - name: log_merge_report
    type: console
    with:
      message: |
        AD Disable Account Report for {{ inputs.user }}
        AD LDAP : status={{ steps.dispatch_ad_ldap_lock.output.status | default: 'unknown' }}
        Azure AD: status={{ steps.dispatch_azure_ad_lock.output.status | default: 'unknown' }}
        AWS IAM : status={{ steps.dispatch_aws_iam_lock.output.status | default: 'unknown' }}

  - name: attach_to_case
    type: if
    condition: "{{ inputs.kibana_case_id | size }} > 0"
    steps:
      - name: comment_on_case
        type: kibana.request
        with:
          method: POST
          path: "/api/cases/{{ inputs.kibana_case_id }}/comments"
          body:
            type: "user"
            comment: "Account disable dispatch completed for {{ inputs.user }}. ad_ldap={{ steps.dispatch_ad_ldap_lock.output.status | default: 'unknown' }}, azure_ad={{ steps.dispatch_azure_ad_lock.output.status | default: 'unknown' }}, aws_iam={{ steps.dispatch_aws_iam_lock.output.status | default: 'unknown' }}"
            owner: "cases"

