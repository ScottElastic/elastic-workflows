# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "Active Directory — Reset Password"
description: >
  Rotates the AD password for a potentially compromised user. Requires the
  username and a boolean `approve` gate (defaults to false — the workflow
  is a no-op without explicit approval). Generates a strong random
  password via the configured GenAI connector, applies it through the AD
  LDAP proxy, and records the outcome on the optional Kibana case. The
  new password is not surfaced to the case for security; operators must
  retrieve it from the AD response payload.
enabled: true
tags: ["splunk-soar", "identity", "password-reset", "active-directory", "translated"]

triggers:
  - type: manual

inputs:
  - name: compromised_user
    type: string
    required: true
    description: "AD username whose password should be rotated."
  - name: approve
    type: boolean
    required: false
    default: false
    description: "Set to true to proceed with the reset. Stand-in for the SOAR analyst prompt."
  - name: kibana_case_id
    type: string
    required: false
    description: "Optional Kibana case to record the outcome on."

consts:
  ad_endpoint: "https://CHANGEME-ldap-proxy.internal/api/set-password"
  ad_auth_header: "Bearer CHANGEME_TOKEN"
  # Password generator parameters: 20 mixed-case characters with digits
  # and a small set of special characters.
  password_length: 20

steps:
  - name: gate_on_approval
    type: if
    condition: "{{ inputs.approve }} == true"
    steps:
      # The source generates a password by interleaving lowercase, uppercase,
      # digit, and symbol characters then shuffling. In Elastic, ask the
      # configured LLM to mint a strong random password.
      - name: generate_password
        type: ai.prompt
        connector-id: "CHANGEME-genai-connector"
        with:
          prompt: |
            Mint one random password meeting all constraints below.
            Constraints:
            - length exactly {{ consts.password_length }}
            - must contain at least one lowercase letter, one uppercase
              letter, one digit, and one of the characters !@#$%^&*(
            - no whitespace, no quote characters, no surrounding text
            Output format: respond with ONLY a single JSON object on one
            line of the form {"password":"<value>"} — no prose, no code
            fences, no explanation.

      # TODO: replace stub with a native Active Directory connector when one
      # ships. Equivalent Phantom action: "set password" on the
      # `active directory` asset.
      - name: reset_ad_password
        type: http
        with:
          url: "{{ consts.ad_endpoint }}"
          method: POST
          headers:
            Authorization: "{{ consts.ad_auth_header }}"
            Content-Type: "application/json"
          body:
            username: "{{ inputs.compromised_user }}"
            new_password: "{{ steps.generate_password.output.password }}"
        # Destructive action — retry on transient failure but do NOT
        # continue silently. If the reset truly fails the case should
        # surface a hard error to the analyst.
        on-failure:
          continue: true
          retry:
            max-attempts: 3
            delay: "5s"

      - name: record_reset
        type: console
        with:
          message: "Password reset issued for {{ inputs.compromised_user }}."

      - name: comment_reset_case
        type: if
        condition: "{{ inputs.kibana_case_id | size }} > 0"
        steps:
          - name: post_reset_comment
            type: kibana.request
            with:
              method: POST
              path: "/api/cases/{{ inputs.kibana_case_id }}/comments"
              body:
                type: "user"
                comment: "Reset AD password for {{ inputs.compromised_user }} after analyst approval."
                owner: "cases"

    else:
      - name: record_decline
        type: console
        with:
          message: "Analyst declined the password reset for {{ inputs.compromised_user }}."

      - name: comment_decline_case
        type: if
        condition: "{{ inputs.kibana_case_id | size }} > 0"
        steps:
          - name: post_decline_comment
            type: kibana.request
            with:
              method: POST
              path: "/api/cases/{{ inputs.kibana_case_id }}/comments"
              body:
                type: "user"
                comment: "Analyst declined automated password reset for {{ inputs.compromised_user }}."
                owner: "cases"

  - name: create_security_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "Workflow: Active Directory — Reset Password"
        description: |
          Automated case created by the **Active Directory — Reset Password** workflow.

          Review the workflow execution and attached comments for full investigation details.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "medium"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags: ["automated", "workflow"]
    on-failure:
      continue: true
