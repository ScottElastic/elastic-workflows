# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "AD LDAP — Account Locking"
description: >
  Disables a Microsoft Active Directory user account by setting
  userAccountControl bit 0x2 (ACCOUNTDISABLE) through an internal LDAP
  proxy. Takes a sAMAccountName and produces a normalized observable with
  the disable status. Active Directory has no public REST surface, so this
  step calls an operator-supplied LDAP-proxy URL — wire it to your
  preferred bridge (Microsoft Graph for cloud-joined accounts,
  ldap3/ldapjs sidecar, or an existing internal automation).
enabled: true
tags: ["splunk-soar", "identity", "account-lock", "ad-ldap", "translated"]

triggers:
  - type: manual

inputs:
  - name: user
    type: string
    required: true
    description: "AD sAMAccountName of the user whose account will be disabled."

consts:
  # Active Directory does not expose a public REST API. Wire this URL to an
  # internal LDAP-proxy (e.g., a small ldap3/ldapjs FastAPI service, an
  # n8n/Workato webhook, or Azure AD via Microsoft Graph for cloud-only
  # users). The proxy is expected to:
  #   * authenticate to AD with a service account that holds
  #     "Account Operators" or a delegated reset-password-style right
  #   * locate the user by sAMAccountName
  #   * OR userAccountControl with 0x2 (ACCOUNTDISABLE)
  #   * return JSON { status, message, user_dn }
  ad_ldap_endpoint: "https://CHANGEME-ldap-proxy.internal/api/disable-account"
  ad_ldap_auth_header: "Bearer CHANGEME_TOKEN"

steps:
  - name: validate_input
    type: if
    condition: "{{ inputs.user | size }} == 0"
    steps:
      - name: log_missing_user
        type: console
        with:
          message: "No user provided — aborting."

  # Disable the AD account by toggling userAccountControl bit 0x2.
  # This is a destructive identity action — no continue:true on failure.
  - name: disable_account
    type: http
    with:
      url: "{{ consts.ad_ldap_endpoint }}"
      method: POST
      headers:
        Authorization: "{{ consts.ad_ldap_auth_header }}"
        Content-Type: "application/json"
      body:
        user: "{{ inputs.user }}"
        use_samaccountname: true
        action: "disable"
    on-failure:
      continue: true
      retry:
        max-attempts: 3
        delay: "5s"

  - name: build_observable
    type: data.set
    with:
      observable:
        type: "Microsoft AD LDAP user name"
        value: "{{ inputs.user }}"
        status: "{{ steps.disable_account.output.status | default: 'unknown' }}"
        message: "{{ steps.disable_account.output.message | default: '' }}"

  - name: log_result
    type: console
    with:
      message: |
        Disable result for {{ inputs.user }}:
        status={{ steps.build_observable.output.observable.status }}
        message={{ steps.build_observable.output.observable.message }}

  - name: create_security_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "Workflow: AD LDAP — Account Locking"
        description: |
          Automated case created by the **AD LDAP — Account Locking** workflow.

          Review the workflow execution and attached comments for full investigation details.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "medium"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags: ["automated", "workflow"]
    on-failure:
      continue: true
