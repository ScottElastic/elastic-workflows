# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "AD LDAP — Account Unlocking"
description: >
  Re-enables a Microsoft Active Directory user account by clearing the
  ACCOUNTDISABLE (0x2) bit on userAccountControl through an internal LDAP
  proxy. Takes a sAMAccountName and returns a normalized observable
  containing the enable status and resolved DN. AD has no public REST
  surface — operators must wire the proxy URL below to their LDAP bridge
  or Microsoft Graph (for cloud-joined accounts).
enabled: true
tags: ["splunk-soar", "identity", "account-unlock", "ad-ldap", "translated"]

triggers:
  - type: manual

inputs:
  - name: user
    type: string
    required: true
    description: "AD sAMAccountName of the user to re-enable."

consts:
  # Active Directory does not expose a public REST API. Wire this URL to an
  # internal LDAP-proxy (ldap3/ldapjs sidecar, an existing automation
  # webhook, or Microsoft Graph for cloud-only users). The proxy is
  # expected to:
  #   * authenticate to AD with sufficient rights
  #   * locate the user by sAMAccountName
  #   * clear userAccountControl bit 0x2 (ACCOUNTDISABLE)
  #   * return JSON { status, message, user_dn }
  ad_ldap_endpoint: "https://CHANGEME-ldap-proxy.internal/api/enable-account"
  ad_ldap_auth_header: "Bearer CHANGEME_TOKEN"

steps:
  - name: validate_input
    type: if
    condition: "{{ inputs.user | size }} == 0"
    steps:
      - name: log_missing_user
        type: console
        with:
          message: "No user provided — aborting."

  # Re-enabling an account is also a sensitive identity action — retry,
  # but fail loud rather than silently swallow errors.
  - name: enable_account
    type: http
    with:
      url: "{{ consts.ad_ldap_endpoint }}"
      method: POST
      headers:
        Authorization: "{{ consts.ad_ldap_auth_header }}"
        Content-Type: "application/json"
      body:
        user: "{{ inputs.user }}"
        use_samaccountname: true
        action: "enable"
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"

  - name: build_observable
    type: data.set
    with:
      observable:
        type: "Microsoft AD LDAP user name"
        value: "{{ inputs.user }}"
        status: "{{ steps.enable_account.output.status | default: 'unknown' }}"
        message: "{{ steps.enable_account.output.message | default: '' }}"
        user_dn: "{{ steps.enable_account.output.user_dn | default: '' }}"

  - name: log_result
    type: console
    with:
      message: |
        Enable result for {{ inputs.user }}:
        status={{ steps.build_observable.output.observable.status }}
        message={{ steps.build_observable.output.observable.message }}

  - name: create_security_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "Workflow: AD LDAP — Account Unlocking"
        description: |
          Automated case created by the **AD LDAP — Account Unlocking** workflow.

          Review the workflow execution and attached comments for full investigation details.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "medium"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags: ["automated", "workflow"]
    on-failure:
      continue: true
