# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "Alert De-escalation — Test Machines"
description: >
  Acknowledges alerts originating from known test machines. Checks the
  source IP against two Elasticsearch lists (test and non-test); a match
  on the test list silently acknowledges the alert. An unknown IP uses
  the `is_test_machine` boolean (stand-in for the analyst prompt) to add
  the IP to the appropriate list and conditionally acknowledge. Side
  effect: the two lookup indices are updated for future runs.
enabled: true
tags: ["splunk-soar", "triage", "de-escalation", "translated"]

triggers:
  - type: alert
  - type: manual

inputs:
  - name: source_address
    type: string
    required: false
    description: "Source IP to evaluate. Defaults to event.alerts[0].source.ip."
  - name: alert_id
    type: string
    required: false
    description: "Alert document id whose severity should be lowered."
  - name: is_test_machine
    type: boolean
    required: false
    description: "Stand-in for the analyst prompt: true marks the IP as a test machine."

consts:
  # Indices that back the original Phantom custom lists. Each document is
  # { ip: "x.x.x.x" }; presence in the index implies membership.
  test_machine_ip_index: "soar-test-machine-ips"
  non_test_machine_ip_index: "soar-non-test-machine-ips"

steps:
  - name: derive_source_address
    type: data.set
    with:
      source_ip: "{{ inputs.source_address | default: event.alerts[0].source.ip | default: '' }}"

  - name: guard_empty_source
    type: if
    condition: "{{ steps.derive_source_address.output.source_ip | size }} == 0"
    steps:
      - name: log_empty_source
        type: console
        with:
          message: "No sourceAddress available — exiting."

  - name: lookup_test_machine
    type: elasticsearch.search
    with:
      index: "{{ consts.test_machine_ip_index }}"
      size: 1
      query:
        term:
          ip: "{{ steps.derive_source_address.output.source_ip }}"

  - name: classify
    type: if
    condition: "{{ steps.lookup_test_machine.output.hits.total.value }} > 0"
    steps:
      - name: deescalate_known_test_ip
        type: console
        with:
          message: "SetAlertsStatus → acknowledged (logged; kibana.SetAlertsStatus not available in this release)"

      - name: log_known_test
        type: console
        with:
          message: "{{ steps.derive_source_address.output.source_ip }} matched test_machine_ips — de-escalated."
    else:
      - name: lookup_non_test
        type: elasticsearch.search
        with:
          index: "{{ consts.non_test_machine_ip_index }}"
          size: 1
          query:
            term:
              ip: "{{ steps.derive_source_address.output.source_ip }}"

      - name: unknown_ip_handling
        type: if
        condition: "{{ steps.lookup_non_test.output.hits.total.value }} == 0"
        steps:
          - name: branch_on_analyst_response
            type: if
            condition: "{{ inputs.is_test_machine }} == true"
            steps:
              - name: add_to_test_machine_list
                type: http
                with:
                  url: "{{ consts.elasticsearch_base | default: 'https://CHANGEME-es.elastic-cloud.com' }}/{{ consts.test_machine_ip_index }}/_doc"
                  method: POST
                  headers:
                    Content-Type: "application/json"
                    Authorization: "{{ consts.elasticsearch_auth | default: 'ApiKey CHANGEME_ES_KEY' }}"
                  body: "{{ item | json }}"
                on-failure:
                  continue: true

              - name: deescalate_new_test_ip
                type: console
                with:
                  message: "SetAlertsStatus → acknowledged (logged; kibana.SetAlertsStatus not available in this release)"

              - name: log_new_test
                type: console
                with:
                  message: "{{ steps.derive_source_address.output.source_ip }} added to test_machine_ips and alert de-escalated."
            else:
              - name: add_to_non_test_list
                type: http
                with:
                  url: "{{ consts.elasticsearch_base | default: 'https://CHANGEME-es.elastic-cloud.com' }}/{{ consts.non_test_machine_ip_index }}/_doc"
                  method: POST
                  headers:
                    Content-Type: "application/json"
                    Authorization: "{{ consts.elasticsearch_auth | default: 'ApiKey CHANGEME_ES_KEY' }}"
                  body: "{{ item | json }}"
                on-failure:
                  continue: true

              - name: log_recorded_non_test
                type: console
                with:
                  message: "{{ steps.derive_source_address.output.source_ip }} recorded as non-test; no de-escalation performed."
