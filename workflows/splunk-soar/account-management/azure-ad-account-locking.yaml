# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "Azure AD — Account Locking"
description: >
  Disables an Entra ID (Azure AD) user account by issuing a Microsoft Graph
  PATCH /users/{id} that flips accountEnabled to false. Input may be a UPN
  or object id. Side effect: the user will be unable to sign in or refresh
  tokens until re-enabled; existing sessions remain valid until tokens
  expire (use Graph revokeSignInSessions to invalidate immediately).
enabled: true
tags: ["splunk-soar", "identity", "account-lock", "azure-ad", "entra-id", "translated"]

triggers:
  - type: manual

inputs:
  - name: user
    type: string
    required: true
    description: "Azure AD user id, UPN, or object id of the account to disable."

consts:
  # Microsoft Graph v1.0. Bearer token obtained via OAuth2 client-credentials
  # against https://login.microsoftonline.com/{tenant}/oauth2/v2.0/token with
  # scope https://graph.microsoft.com/.default. Required app permission:
  # User.EnableDisableAccount.All (+ User.Read.All).
  azure_graph_base: "https://graph.microsoft.com/v1.0"
  azure_graph_auth_header: "Bearer CHANGEME_TOKEN"

steps:
  - name: validate_input
    type: if
    condition: "{{ inputs.user | size }} == 0"
    steps:
      - name: log_missing_user
        type: console
        with:
          message: "No user provided — aborting."

  # Microsoft Graph: PATCH /users/{id | userPrincipalName}
  # https://learn.microsoft.com/en-us/graph/api/user-update
  # Returns 204 No Content on success.
  - name: disable_user
    type: http
    with:
      url: "{{ consts.azure_graph_base }}/users/{{ inputs.user }}"
      method: PATCH
      headers:
        Authorization: "{{ consts.azure_graph_auth_header }}"
        Content-Type: "application/json"
      body:
        accountEnabled: false
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"

  - name: build_observable
    type: data.set
    with:
      observable:
        type: "Azure AD Account"
        value: "{{ inputs.user }}"
        action: "disabled"
        status: "{{ steps.disable_user.output.status | default: 'unknown' }}"
        http_code: "{{ steps.disable_user.output.code | default: '' }}"
        message: "{{ steps.disable_user.output.message | default: '' }}"

  - name: log_result
    type: console
    with:
      message: |
        Disable result for {{ inputs.user }}:
        status={{ steps.build_observable.output.observable.status }}
        http_code={{ steps.build_observable.output.observable.http_code }}
        message={{ steps.build_observable.output.observable.message }}

  - name: create_security_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "Workflow: Azure AD — Account Locking"
        description: |
          Automated case created by the **Azure AD — Account Locking** workflow.

          Review the workflow execution and attached comments for full investigation details.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "medium"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags: ["automated", "workflow"]
    on-failure:
      continue: true
