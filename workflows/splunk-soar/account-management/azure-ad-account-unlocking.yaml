# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "Azure AD — Account Unlocking"
description: >
  Re-enables an Entra ID (Azure AD) user account by issuing a Microsoft
  Graph PATCH /users/{id} that flips accountEnabled to true. Input may be
  a UPN or object id. Does not reset password, MFA factors, or risk state
  — only lifts the accountEnabled gate set during a prior lock action.
enabled: true
tags: ["splunk-soar", "identity", "account-unlock", "azure-ad", "entra-id", "translated"]

triggers:
  - type: manual

inputs:
  - name: user
    type: string
    required: true
    description: "Azure AD user id, UPN, or object id of the account to re-enable."

consts:
  # Same Graph configuration as the locking workflow. App permission
  # User.EnableDisableAccount.All is required.
  azure_graph_base: "https://graph.microsoft.com/v1.0"
  azure_graph_auth_header: "Bearer CHANGEME_TOKEN"

steps:
  - name: validate_input
    type: if
    condition: "{{ inputs.user | size }} == 0"
    steps:
      - name: log_missing_user
        type: console
        with:
          message: "No user provided — aborting."

  # Microsoft Graph: PATCH /users/{id | userPrincipalName}
  # https://learn.microsoft.com/en-us/graph/api/user-update
  # Returns 204 No Content on success.
  - name: enable_user
    type: http
    with:
      url: "{{ consts.azure_graph_base }}/users/{{ inputs.user }}"
      method: PATCH
      headers:
        Authorization: "{{ consts.azure_graph_auth_header }}"
        Content-Type: "application/json"
      body:
        accountEnabled: true
    on-failure:
      continue: true
      retry:
        max-attempts: 3
        delay: "5s"

  - name: build_observable
    type: data.set
    with:
      observable:
        type: "Azure AD Account"
        value: "{{ inputs.user }}"
        action: "enabled"
        status: "{{ steps.enable_user.output.status | default: 'unknown' }}"
        http_code: "{{ steps.enable_user.output.code | default: '' }}"
        message: "{{ steps.enable_user.output.message | default: '' }}"

  - name: log_result
    type: console
    with:
      message: |
        Enable result for {{ inputs.user }}:
        status={{ steps.build_observable.output.observable.status }}
        http_code={{ steps.build_observable.output.observable.http_code }}
        message={{ steps.build_observable.output.observable.message }}

  - name: create_security_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "Workflow: Azure AD — Account Unlocking"
        description: |
          Automated case created by the **Azure AD — Account Unlocking** workflow.

          Review the workflow execution and attached comments for full investigation details.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "medium"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags: ["automated", "workflow"]
    on-failure:
      continue: true
