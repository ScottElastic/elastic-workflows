# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "Azure AD — New User Census"
description: >
  Enumerates Entra ID (Azure AD) users created in the trailing lookback
  window (one week by default) via Microsoft Graph, enriches each with the
  full user profile, and indexes the consolidated records into
  Elasticsearch. Runs daily on its own schedule; lookback_days controls
  the window. Uses Graph $filter on createdDateTime (advanced query — must
  include ConsistencyLevel: eventual and $count=true headers).
enabled: true
tags: ["splunk-soar", "identity", "hygiene", "azure-ad", "entra-id", "census", "translated"]

triggers:
  - type: scheduled
    with:
      every: "1d"
  - type: manual

inputs:
  - name: lookback_days
    type: number
    required: false
    default: 7
    description: "How many trailing days of new users to gather."

consts:
  # Microsoft Graph v1.0. Bearer token obtained via OAuth2 client-credentials
  # with scope https://graph.microsoft.com/.default. Required app
  # permission: User.Read.All (Directory.Read.All also works).
  graph_base: "https://graph.microsoft.com/v1.0"
  graph_auth_header: "Bearer CHANGEME_GRAPH_TOKEN"
  new_user_index: "soar-azure-new-users"

steps:
  # Compute an ISO-8601 cutoff for the Graph $filter expression. Kept as
  # an ai.prompt for resilience to operator clock skew; could be replaced
  # with a deterministic data.set if a `now` helper is available.
  - name: compute_cutoff
    type: ai.prompt
    connector-id: "CHANGEME-genai-connector"
    with:
      prompt: |
        Compute the UTC timestamp exactly {{ inputs.lookback_days }} days
        before now and return it in this exact format (no quotes, no prose):
        YYYY-MM-DDTHH:MM:SSZ
        Example output: 2026-05-23T14:00:00Z

  # Microsoft Graph: GET /users with advanced filter on createdDateTime.
  # https://learn.microsoft.com/en-us/graph/api/user-list
  # Advanced query parameters require both ConsistencyLevel: eventual AND
  # $count=true. Response shape: { value: [user, ...], "@odata.nextLink": ... }.
  # Pagination is not handled here — for tenants with many new users, fetch
  # @odata.nextLink in a follow-up call.
  - name: list_new_users
    type: http
    with:
      url: "{{ consts.graph_base }}/users"
      method: GET
      headers:
        Authorization: "{{ consts.graph_auth_header }}"
        ConsistencyLevel: "eventual"
        Accept: "application/json"
      query:
        "$count": "true"
        "$filter": "createdDateTime ge {{ steps.compute_cutoff.output | strip }}"
        "$select": "id,userPrincipalName,displayName,mail,jobTitle,department,officeLocation,createdDateTime,accountEnabled"
        "$orderby": "createdDateTime desc"
        "$top": "999"
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"
      continue: true

  - name: review_each_new_user
    type: foreach
    foreach: "${{ steps.list_new_users.output.value | default: [] }}"
    steps:
      - name: build_user_record
        type: data.set
        with:
          user_record:
            id: "{{ item.id }}"
            userPrincipalName: "{{ item.userPrincipalName }}"
            displayName: "{{ item.displayName | default: '' }}"
            mail: "{{ item.mail | default: '' }}"
            jobTitle: "{{ item.jobTitle | default: '' }}"
            department: "{{ item.department | default: '' }}"
            officeLocation: "{{ item.officeLocation | default: '' }}"
            createdDateTime: "{{ item.createdDateTime }}"
            accountEnabled: "{{ item.accountEnabled | default: true }}"

      - name: log_note
        type: console
        with:
          message: |
            New user census:
            upn={{ steps.build_user_record.output.user_record.userPrincipalName }}
            displayName={{ steps.build_user_record.output.user_record.displayName }}
            mail={{ steps.build_user_record.output.user_record.mail }}
            jobTitle={{ steps.build_user_record.output.user_record.jobTitle }}
            department={{ steps.build_user_record.output.user_record.department }}
            createdDateTime={{ steps.build_user_record.output.user_record.createdDateTime }}

      # Persist artifact to Elasticsearch (Phantom "add artifact" equivalent).
      - name: save_user_artifact
        type: elasticsearch.index
        with:
          index: "{{ consts.new_user_index }}"
          document:
            name: "New Azure User"
            label: "user"
            cef_name: "userPrincipalName"
            cef_value: "{{ item.userPrincipalName }}"
            contains: "azure user principal name"
            user_record: ${{ steps.build_user_record.output.user_record }}

  - name: log_summary
    type: console
    with:
      message: |
        Azure AD new user census complete. Found {{ steps.list_new_users.output.value | size | default: 0 }} users created in the trailing {{ inputs.lookback_days }} day(s).
