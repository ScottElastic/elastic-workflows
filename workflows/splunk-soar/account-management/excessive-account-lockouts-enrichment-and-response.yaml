# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "Excessive Account Lockouts — Enrichment & Response"
description: >
  Responds to a Splunk ES "Detect Excessive Account Lockouts From Endpoint"
  notable. Runs seven Splunk searches via the REST API (auth, notable,
  risk, identity, and Windows-rights queries) to characterise the host,
  pulls live state from the affected Windows machine over a WinRM proxy,
  and on operator approval issues a remote shutdown. Required inputs:
  destination address (or alert.destination.ip), signature, and a Splunk
  notable event_id for comment-back. Side effect on approval: powers off
  the target host.
enabled: true
tags:
  - "splunk-soar"
  - "identity"
  - "lockouts"
  - "enrichment"
  - "containment"
  - "translated"

triggers:
  - type: alert
  - type: manual

inputs:
  - name: destination_address
    type: string
    required: false
    description: "Endpoint causing the lockouts. Defaults to event.alerts[0].destination.ip."
  - name: signature
    type: string
    required: false
    description: "Detection signature on the originating alert. Defaults to event.alerts[0].rule.name."
  - name: approve_shutdown
    type: boolean
    required: false
    default: false
    description: "Set to true to actually issue the WinRM shutdown — stand-in for the analyst prompt."
  - name: kibana_case_id
    type: string
    required: false
    description: "Optional case id to record progress on."
  - name: splunk_event_id
    type: string
    required: false
    description: "Splunk notable event id, used when posting back to Splunk."

consts:
  # Splunk REST API. /services/search/jobs with exec_mode=oneshot runs the
  # SPL synchronously and returns results in the response body, avoiding
  # a search-id poll. /services/notable_update mutates ES notable events.
  splunk_host: "CHANGEME-splunk.example.com:8089"
  splunk_search_endpoint: "https://CHANGEME-splunk.example.com:8089/services/search/jobs"
  splunk_event_endpoint: "https://CHANGEME-splunk.example.com:8089/services/notable_update"
  splunk_auth_header: "Bearer CHANGEME_SPLUNK_TOKEN"
  # WinRM proxy that bridges to the affected Windows host.
  winrm_endpoint: "https://CHANGEME-winrm-proxy.internal/api"
  winrm_auth_header: "Bearer CHANGEME_WINRM_TOKEN"
  expected_signature: "A user account was locked out"

steps:
  - name: derive_destination
    type: data.set
    with:
      dest: "{{ inputs.destination_address | default: event.alerts[0].destination.ip | default: '' }}"
      signature: "{{ inputs.signature | default: event.alerts[0].kibana.alert.rule.name | default: '' }}"

  - name: gate_on_signature
    type: if
    condition: "{{ steps.derive_destination.output.signature }} == {{ consts.expected_signature }}"
    steps:
      # Splunk context queries. Each one mirrors a `phantom.act("run query")`
      # block from the source playbook. We capture the SPL inline.
      - name: query_endpoint_auth_logs
        type: http
        with:
          url: "{{ consts.splunk_search_endpoint }}"
          method: POST
          headers:
            X-Api-Key: "{{ consts.mock_api_key }}"
            Authorization: "{{ consts.splunk_auth_header }}"
            Content-Type: "application/x-www-form-urlencoded"
          body: "search=%7C+tstats+count+from+datamodel%3DAuthentication+where+Authentication.dest%3D{{ steps.derive_destination.output.dest }}+earliest%3D-15m+by+_time%2C+Authentication.dest%2C+Authentication.user%2C+Authentication.app%2C+Authentication.action&exec_mode=oneshot&output_mode=json"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
            on-status: [429, 502, 503, 504]
          continue: true

      - name: query_notable_history
        type: http
        with:
          url: "{{ consts.splunk_search_endpoint }}"
          method: POST
          headers:
            X-Api-Key: "{{ consts.mock_api_key }}"
            Authorization: "{{ consts.splunk_auth_header }}"
            Content-Type: "application/x-www-form-urlencoded"
          body: "search=search+%60notable%60+dest%3D{{ steps.derive_destination.output.dest }}+%7C+table+_time%2C+rule_name%2C+owner%2C+priority%2C+severity%2C+status_description%2C+event_id&exec_mode=oneshot&output_mode=json"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
            on-status: [429, 502, 503, 504]
          continue: true

      - name: query_notable_info
        type: http
        with:
          url: "{{ consts.splunk_search_endpoint }}"
          method: POST
          headers:
            X-Api-Key: "{{ consts.mock_api_key }}"
            Authorization: "{{ consts.splunk_auth_header }}"
            Content-Type: "application/x-www-form-urlencoded"
          body: "search=search+%60notable_by_id({{ steps.query_notable_history.output.results[0].event_id | default: '' }})%60+%7C+table+time%2C+rule_name%2C+dest%2C+dest_asset_id%2C+dest_owner%2C+priority%2C+severity%2C+owner%2C+status_description&exec_mode=oneshot&output_mode=json"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
            on-status: [429, 502, 503, 504]
          continue: true

      - name: query_endpoint_risk
        type: http
        with:
          url: "{{ consts.splunk_search_endpoint }}"
          method: POST
          headers:
            X-Api-Key: "{{ consts.mock_api_key }}"
            Authorization: "{{ consts.splunk_auth_header }}"
            Content-Type: "application/x-www-form-urlencoded"
          body: "search=%7C+from+datamodel%3ARisk.All_Risk+%7C+search+risk_object_type%3Dsystem+risk_object%3D{{ steps.derive_destination.output.dest }}+%7C+stats+count+sum(risk_score)+as+risk_score+values(search_name)+min(_time)+as+firstTime+max(_time)+as+lastTime+by+risk_object&exec_mode=oneshot&output_mode=json"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
            on-status: [429, 502, 503, 504]
          continue: true

      - name: query_user_identity_info
        type: http
        with:
          url: "{{ consts.splunk_search_endpoint }}"
          method: POST
          headers:
            X-Api-Key: "{{ consts.mock_api_key }}"
            Authorization: "{{ consts.splunk_auth_header }}"
            Content-Type: "application/x-www-form-urlencoded"
          body: "search=%7C+%60identities%60+%7C+search+identity+IN+({{ steps.query_endpoint_auth_logs.output.results | map: 'user' | join: ',' }})+%7C+table+_time%2C+identity%2C+first%2C+last%2C+email%2C+category%2C+watchlist&exec_mode=oneshot&output_mode=json"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
            on-status: [429, 502, 503, 504]
          continue: true

      - name: query_user_risk
        type: http
        with:
          url: "{{ consts.splunk_search_endpoint }}"
          method: POST
          headers:
            X-Api-Key: "{{ consts.mock_api_key }}"
            Authorization: "{{ consts.splunk_auth_header }}"
            Content-Type: "application/x-www-form-urlencoded"
          body: "search=%7C+from+datamodel%3ARisk.All_Risk+%7C+search+risk_object_type%3Duser+risk_object+IN+({{ steps.query_endpoint_auth_logs.output.results | map: 'user' | join: ',' }})+earliest%3D-15m+%7C+stats+count+sum(risk_score)+as+risk_score+by+risk_object&exec_mode=oneshot&output_mode=json"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
            on-status: [429, 502, 503, 504]
          continue: true

      - name: query_endpoint_rights
        type: http
        with:
          url: "{{ consts.splunk_search_endpoint }}"
          method: POST
          headers:
            X-Api-Key: "{{ consts.mock_api_key }}"
            Authorization: "{{ consts.splunk_auth_header }}"
            Content-Type: "application/x-www-form-urlencoded"
          body: "search=search+index%3Dwineventlog+(EventCode%3D4718+OR+EventCode%3D4717)+dest%3D{{ steps.derive_destination.output.dest }}+%7C+rename+user+as+Account_Modified+%7C+table+_time%2C+dest%2C+Account_Modified%2C+Access_Right%2C+signature&exec_mode=oneshot&output_mode=json"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
            on-status: [429, 502, 503, 504]
          continue: true

      - name: query_user_rights
        type: http
        with:
          url: "{{ consts.splunk_search_endpoint }}"
          method: POST
          headers:
            X-Api-Key: "{{ consts.mock_api_key }}"
            Authorization: "{{ consts.splunk_auth_header }}"
            Content-Type: "application/x-www-form-urlencoded"
          body: "search=search+index%3Dwineventlog+(EventCode%3D4718+OR+EventCode%3D4717)+user%3D*+%7C+rename+user+as+Account_Modified+%7C+table+_time%2C+dest%2C+Account_Modified%2C+Access_Right%2C+signature&exec_mode=oneshot&output_mode=json"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
            on-status: [429, 502, 503, 504]
          continue: true

      - name: log_splunk_phase_complete
        type: console
        with:
          message: "Splunk enrichment searches finished; pivoting to WinRM investigation against {{ steps.derive_destination.output.dest }}."

      # WinRM live-investigation calls (mirroring the four parallel branches
      # of the source playbook).
      - name: list_sessions
        type: http
        with:
          url: "{{ consts.winrm_endpoint }}/list-sessions"
          method: POST
          headers:
            X-Api-Key: "{{ consts.mock_api_key }}"
            Authorization: "{{ consts.winrm_auth_header }}"
            Content-Type: "application/json"
          body:
            ip_hostname: "{{ steps.derive_destination.output.dest }}"
        on-failure:
          retry:
            max-attempts: 2
            delay: "3s"
          continue: true

      - name: list_connections
        type: http
        with:
          url: "{{ consts.winrm_endpoint }}/list-connections"
          method: POST
          headers:
            X-Api-Key: "{{ consts.mock_api_key }}"
            Authorization: "{{ consts.winrm_auth_header }}"
            Content-Type: "application/json"
          body:
            ip_hostname: "{{ steps.derive_destination.output.dest }}"
        on-failure:
          retry:
            max-attempts: 2
            delay: "3s"
          continue: true

      - name: list_logged_on_users
        type: http
        with:
          url: "{{ consts.winrm_endpoint }}/run-script"
          method: POST
          headers:
            X-Api-Key: "{{ consts.mock_api_key }}"
            Authorization: "{{ consts.winrm_auth_header }}"
            Content-Type: "application/json"
          body:
            ip_hostname: "{{ steps.derive_destination.output.dest }}"
            script_str: "Get-CimInstance Win32_LoggedOnUser | Select-Object -ExpandProperty Antecedent | Get-Unique | Select-Object Name, Domain | ConvertTo-JSON"
        on-failure:
          retry:
            max-attempts: 2
            delay: "3s"
          continue: true

      - name: list_processes
        type: http
        with:
          url: "{{ consts.winrm_endpoint }}/list-processes"
          method: POST
          headers:
            X-Api-Key: "{{ consts.mock_api_key }}"
            Authorization: "{{ consts.winrm_auth_header }}"
            Content-Type: "application/json"
          body:
            ip_hostname: "{{ steps.derive_destination.output.dest }}"
        on-failure:
          retry:
            max-attempts: 2
            delay: "3s"
          continue: true

      - name: log_prompt_pending
        type: console
        with:
          message: "Waiting for analyst decision on shutting down {{ steps.derive_destination.output.dest }}."

      # Phantom prompt → boolean input gate.
      - name: shutdown_branch
        type: if
        condition: "{{ inputs.approve_shutdown }} == true"
        steps:
          - name: shutdown_system
            type: http
            with:
              url: "{{ consts.winrm_endpoint }}/shutdown-system"
              method: POST
              headers:
                X-Api-Key: "{{ consts.mock_api_key }}"
                Authorization: "{{ consts.winrm_auth_header }}"
                Content-Type: "application/json"
              body:
                ip_hostname: "{{ steps.derive_destination.output.dest }}"
                comment: "Remote shutdown issued by Elastic workflow excessive-account-lockouts-enrichment-and-response."
            on-failure:
              retry:
                max-attempts: 2
                delay: "5s"
              continue: true

          - name: shutdown_comment_splunk
            type: http
            with:
              url: "{{ consts.splunk_event_endpoint }}"
              method: POST
              headers:
                X-Api-Key: "{{ consts.mock_api_key }}"
                Authorization: "{{ consts.splunk_auth_header }}"
                Content-Type: "application/x-www-form-urlencoded"
              body: "ruleUIDs={{ inputs.splunk_event_id | default: steps.query_notable_history.output.results[0].event_id | default: '' }}&comment=Elastic+workflow+shut+down+the+affected+Windows+machine+with+analyst+approval.&status=in_progress&output_mode=json"
            on-failure:
              retry:
                max-attempts: 3
                delay: "5s"
                on-status: [429, 502, 503, 504]
              continue: true
        else:
          - name: log_no_shutdown
            type: console
            with:
              message: "Analyst declined the shutdown — endpoint left in place."

          - name: no_shutdown_comment_splunk
            type: http
            with:
              url: "{{ consts.splunk_event_endpoint }}"
              method: POST
              headers:
                X-Api-Key: "{{ consts.mock_api_key }}"
                Authorization: "{{ consts.splunk_auth_header }}"
                Content-Type: "application/x-www-form-urlencoded"
              body: "ruleUIDs={{ inputs.splunk_event_id | default: steps.query_notable_history.output.results[0].event_id | default: '' }}&comment=Analyst+declined+shutdown+%E2%80%94+no+action+taken.&output_mode=json"
            on-failure:
              retry:
                max-attempts: 3
                delay: "5s"
                on-status: [429, 502, 503, 504]
              continue: true

      - name: attach_to_case
        type: if
        condition: "{{ inputs.kibana_case_id | size }} > 0"
        steps:
          - name: post_case_summary
            type: kibana.request
            with:
              method: POST
              path: "/api/cases/{{ inputs.kibana_case_id }}/comments"
              body:
                type: "user"
                comment: "Excessive lockouts enrichment for {{ steps.derive_destination.output.dest }} completed. Splunk searches captured authentication, identity, risk, and rights-change context. WinRM gathered sessions, connections, logged-on users, and processes. Shutdown approved: {{ inputs.approve_shutdown }}."
                owner: "cases"

    else:
      - name: log_signature_mismatch
        type: console
        with:
          message: "Alert signature does not match {{ consts.expected_signature }} — exiting."

  - name: create_security_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "Workflow: Excessive Account Lockouts — Enrichment & Response"
        description: |
          Automated case created by the **Excessive Account Lockouts — Enrichment & Response** workflow.

          Review the workflow execution and attached comments for full investigation details.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "medium"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags: ["automated", "workflow"]
    on-failure:
      continue: true
