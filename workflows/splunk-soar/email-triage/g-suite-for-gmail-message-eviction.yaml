# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "GSuite Gmail — Message Eviction"
description: >
  Permanently removes Gmail messages from one or more mailboxes using the
  Gmail API DELETE endpoint. Takes paired arrays of message_id (Gmail's
  internal id, NOT the RFC-822 Message-ID header) and email (mailbox), and
  hard-deletes each pair — bypassing the Trash folder entirely. Maps to
  D3FEND EmailRemoval. Side effect: deletion is irreversible; pair with a
  search step first if you only have the Internet Message-ID.
enabled: true
tags: ["splunk-soar", "email-triage", "email-removal", "gmail", "gsuite", "translated"]

triggers:
  - type: manual

inputs:
  - name: message_id
    type: array
    required: true
    description: "Gmail internal message IDs (per messages.list/get) to delete."
  - name: email
    type: array
    required: true
    description: "Mailbox addresses to delete from. Pairs by index with message_id."

consts:
  # Gmail API. Auth is OAuth2 with a domain-wide-delegated service account
  # (impersonation set via 'sub' claim) or an admin user grant. Required
  # scope: https://www.googleapis.com/auth/gmail.modify (delete needs
  # mail.google.com for some accounts; modify is sufficient for users
  # who impersonate themselves via DWD).
  gmail_base: "https://gmail.googleapis.com/gmail/v1/users"
  gmail_auth_header: "Bearer CHANGEME_TOKEN"

steps:
  - name: validate_input
    type: if
    condition: "{{ inputs.message_id | size }} == 0 or {{ inputs.email | size }} == 0"
    steps:
      - name: log_missing_input
        type: console
        with:
          message: "Message ID or recipient mailbox missing — nothing to evict."

  - name: evict_messages
    type: foreach
    foreach: "${{ inputs.message_id }}"
    steps:
      # Gmail API: DELETE /gmail/v1/users/{userId}/messages/{id}
      # https://developers.google.com/gmail/api/reference/rest/v1/users.messages/delete
      # Hard-deletes the message immediately. Returns 204 No Content.
      # Use messages.trash for soft-delete to Trash instead.
      - name: delete_message
        type: http
        with:
          url: "{{ consts.gmail_base }}/{{ inputs.email[loop.index0] }}/messages/{{ item }}"
          method: DELETE
          headers:
            Authorization: "{{ consts.gmail_auth_header }}"
        on-failure:
          continue: true
          retry:
            max-attempts: 3
            delay: "5s"

      - name: record_result
        type: data.set
        with:
          observable:
            type: "Gmail message ID"
            source: "GSuite for Gmail"
            mailbox: "{{ inputs.email[loop.index0] }}"
            message_id: "{{ item }}"
            action: "hard-deleted"
            status: "{{ steps.delete_message.output.status | default: 'unknown' }}"
            http_code: "{{ steps.delete_message.output.code | default: '' }}"
            message: "{{ steps.delete_message.output.message | default: '' }}"

      - name: log_observable
        type: console
        with:
          message: |
            Evicted from {{ inputs.email[loop.index0] }}:
            message_id={{ item }}
            status={{ steps.record_result.output.observable.status }}
            http_code={{ steps.record_result.output.observable.http_code }}

  - name: create_security_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "Workflow: GSuite Gmail — Message Eviction"
        description: |
          Automated case created by the **GSuite Gmail — Message Eviction** workflow.

          Review the workflow execution and attached comments for full investigation details.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "medium"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags: ["automated", "workflow"]
    on-failure:
      continue: true
