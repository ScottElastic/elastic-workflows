# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "GSuite Gmail — Search and Purge"
description: >
  Locates a message across Gmail mailboxes by Internet Message ID,
  prompts an analyst to confirm deletion, then hard-deletes each
  matching message. Captures a summary of every mailbox the message
  was removed from. Pairs an identifier-analysis stage with an
  eviction stage; without analyst approval the eviction is skipped.
enabled: true
tags: ["splunk-soar", "email-triage", "search-and-purge", "gmail", "gsuite", "translated"]

triggers:
  - type: alert
  - type: manual

inputs:
  - name: internet_message_id
    type: string
    required: true
    description: "RFC-2822 Internet Message-ID header used to locate copies in user mailboxes."
  - name: auto_approve
    type: boolean
    required: false
    description: "When true, skip the analyst confirmation and proceed directly to deletion."

consts:
  # Replace with your G Suite admin OAuth credential / proxy endpoint.
  gsuite_endpoint: "https://gmail.googleapis.com/gmail/v1/users"
  gsuite_auth_header: "Bearer CHANGEME_TOKEN"
  # Internal search service that maps an Internet-Message-ID to recipient mailboxes.
  message_search_endpoint: "https://CHANGEME-mail-search.internal/api/find-recipients"

steps:
  - name: validate_input
    type: if
    condition: "{{ inputs.internet_message_id | size }} == 0"
    steps:
      - name: log_missing_input
        type: console
        with:
          message: "No Internet Message ID supplied — nothing to search."

  # Stand-in for the Message Identifier Activity Analysis sub-playbook,
  # which inspects audit logs for every mailbox containing the message.
  - name: locate_recipients
    type: http
    with:
      url: "{{ consts.message_search_endpoint }}"
      method: POST
      headers:
        Authorization: "{{ consts.gsuite_auth_header }}"
        Content-Type: "application/json"
      body:
        message_id: "{{ inputs.internet_message_id }}"
    on-failure:
      retry:
        max-attempts: 2
        delay: "3s"
      continue: true

  - name: check_recipients_found
    type: if
    condition: "{{ steps.locate_recipients.output.recipients | size }} == 0"
    steps:
      - name: log_no_recipients
        type: console
        with:
          message: "No mailbox carries this Internet Message ID — nothing to purge."
    else:
      - name: summarize_targets
        type: data.set
        with:
          summary:
            message_id: "{{ inputs.internet_message_id }}"
            mailbox_count: "{{ steps.locate_recipients.output.recipients | size }}"
            mailboxes: "{{ steps.locate_recipients.output.recipients }}"

      - name: log_pending_purge
        type: console
        with:
          message: |
            Found {{ steps.summarize_targets.output.summary.mailbox_count }} mailbox(es).
            Hard delete will be permanent and non-recoverable.

      # Manual confirmation gate. The original playbook used phantom.prompt2.
      # TODO: wire to a Kibana case approval or a webhook prompt connector.
      - name: confirm_or_auto
        type: if
        condition: "{{ inputs.auto_approve }} == true"
        steps:
          - name: purge_each_mailbox
            type: foreach
            with:
              items: ${{ steps.locate_recipients.output.recipients }}
            steps:
              - name: delete_message
                type: http
                with:
                  url: "{{ consts.gsuite_endpoint }}/{{ item.recipient }}/messages/{{ item.gmail_id }}"
                  method: DELETE
                  headers:
                    Authorization: "{{ consts.gsuite_auth_header }}"
                on-failure:
                  retry:
                    max-attempts: 2
                    delay: "3s"
                  continue: true

              - name: record_observable
                type: data.set
                with:
                  observable:
                    type: "Gmail message ID"
                    source: "GSuite for Gmail"
                    mailbox: "{{ item.recipient }}"
                    message_id: "{{ item.gmail_id }}"
                    status: "{{ steps.delete_message.output.status | default: 'unknown' }}"

              - name: log_purge_result
                type: console
                with:
                  message: "Purged {{ item.gmail_id }} from {{ item.recipient }}: {{ steps.delete_message.output.status | default: 'unknown' }}"
        else:
          - name: log_awaiting_approval
            type: console
            with:
              message: "auto_approve is false — analyst confirmation required before purge."
