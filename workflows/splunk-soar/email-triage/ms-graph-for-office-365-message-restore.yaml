# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "MS Graph O365 — Message Restore"
description: >
  Recovers soft-deleted Office 365 messages from Recoverable Items
  Deletions back into Inbox. For each (email, message_id) pair: searches
  the recoverableitemsdeletions well-known folder via Graph $filter on
  internetMessageId, then issues a POST .../move with destinationId
  "inbox". Designed as the inverse of the Message Eviction workflow.
  Maps to D3FEND RestoreEmail.
enabled: true
tags: ["splunk-soar", "email-triage", "email-restore", "o365", "ms-graph", "translated"]

triggers:
  - type: manual

inputs:
  - name: email
    type: array
    required: true
    description: "Mailbox UPNs containing the message to restore."
  - name: message_id
    type: array
    required: true
    description: "Internet Message IDs to restore. Paired by position with email."

consts:
  # Microsoft Graph v1.0. Bearer token via OAuth2 client-credentials.
  # App permission: Mail.ReadWrite.
  graph_base: "https://graph.microsoft.com/v1.0"
  graph_auth_header: "Bearer CHANGEME_TOKEN"

steps:
  - name: validate_inputs
    type: if
    condition: "{{ inputs.email | size }} == 0 or {{ inputs.message_id | size }} == 0"
    steps:
      - name: log_missing_input
        type: console
        with:
          message: "Either email or message_id input is empty — aborting."

  - name: process_each_target
    type: foreach
    foreach: "${{ inputs.message_id }}"
    steps:
      # Microsoft Graph: GET /users/{id|UPN}/mailFolders/recoverableitemsdeletions/messages
      # Uses the well-known folder name "recoverableitemsdeletions".
      # https://learn.microsoft.com/en-us/graph/api/user-list-messages
      - name: locate_deleted_message
        type: http
        with:
          url: "{{ consts.graph_base }}/users/{{ inputs.email[loop.index0] }}/mailFolders/recoverableitemsdeletions/messages"
          method: GET
          headers:
            Authorization: "{{ consts.graph_auth_header }}"
            Accept: "application/json"
          query:
            "$filter": "internetMessageId eq {{ item }}"
            "$select": "id,subject,internetMessageId"
            "$top": "10"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
          continue: true

      - name: check_message_found
        type: if
        condition: "{{ steps.locate_deleted_message.output.value | size }} >= 1"
        steps:
          # Microsoft Graph: POST /users/{id|UPN}/messages/{messageId}/move
          # https://learn.microsoft.com/en-us/graph/api/message-move
          # destinationId "inbox" is a well-known folder name. Returns
          # 201 Created with the moved message resource.
          - name: move_to_inbox
            type: http
            with:
              url: "{{ consts.graph_base }}/users/{{ inputs.email[loop.index0] }}/messages/{{ steps.locate_deleted_message.output.value[0].id }}/move"
              method: POST
              headers:
                Authorization: "{{ consts.graph_auth_header }}"
                Content-Type: "application/json"
              body:
                destinationId: "inbox"
            on-failure:
              retry:
                max-attempts: 3
                delay: "5s"

          - name: record_observable
            type: data.set
            with:
              observable:
                type: "Internet Message ID"
                source: "MS Graph for Office365"
                value: "{{ item }}"
                mailbox: "{{ inputs.email[loop.index0] }}"
                action: "restored"
                graph_message_id: "{{ steps.move_to_inbox.output.id | default: '' }}"
                subject: "{{ steps.locate_deleted_message.output.value[0].subject | default: '' }}"
                message: "moved from recoverableitemsdeletions to inbox"

          - name: log_restore
            type: console
            with:
              message: "Restored {{ item }} to {{ inputs.email[loop.index0] }}/Inbox (new graph_id={{ steps.record_observable.output.observable.graph_message_id }})"
        else:
          - name: log_no_match
            type: console
            with:
              message: "Message {{ item }} not in {{ inputs.email[loop.index0] }} recoverable deletions — cannot restore."

  - name: create_security_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "Workflow: MS Graph O365 — Message Restore"
        description: |
          Automated case created by the **MS Graph O365 — Message Restore** workflow.

          Review the workflow execution and attached comments for full investigation details.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "medium"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags: ["automated", "workflow"]
    on-failure:
      continue: true
