# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "MS Graph O365 — Search and Purge"
description: >
  Hunts an Internet Message-ID across every mailbox in an Office 365
  tenant via Microsoft Graph and soft-deletes the matching items (moves
  to Recoverable Items Deletions). Enumerates mailboxes with GET /users
  ($filter mail ne null), searches each via $filter on internetMessageId,
  and deletes only with analyst approval (auto_approve=true). Produces
  observables consumable by the matching Search-and-Restore workflow.
enabled: true
tags: ["splunk-soar", "email-triage", "search-and-purge", "o365", "ms-graph", "translated"]

triggers:
  - type: alert
  - type: manual

inputs:
  - name: internet_message_id
    type: string
    required: true
    description: "Internet Message-ID header to find and remove from O365 mailboxes."
  - name: auto_approve
    type: boolean
    required: false
    default: false
    description: "Bypass analyst confirmation when true. Defaults to false."

consts:
  # Microsoft Graph v1.0. Bearer token via OAuth2 client-credentials.
  # App permissions: User.Read.All, Mail.ReadWrite.
  graph_base: "https://graph.microsoft.com/v1.0"
  graph_auth_header: "Bearer CHANGEME_TOKEN"

steps:
  - name: validate_input
    type: if
    condition: "{{ inputs.internet_message_id | size }} == 0"
    steps:
      - name: log_missing
        type: console
        with:
          message: "No Internet Message ID supplied — aborting."

  # Microsoft Graph: GET /users with mail filter to skip unlicensed accounts.
  # https://learn.microsoft.com/en-us/graph/api/user-list
  # Pagination via @odata.nextLink not handled here — tenants larger than
  # 999 mailboxes need follow-up calls.
  - name: list_mailboxes
    type: http
    with:
      url: "{{ consts.graph_base }}/users"
      method: GET
      headers:
        Authorization: "{{ consts.graph_auth_header }}"
        ConsistencyLevel: "eventual"
        Accept: "application/json"
      query:
        "$select": "id,userPrincipalName,mail"
        "$filter": "mail ne null"
        "$count": "true"
        "$top": "999"
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"
      continue: true

  - name: locate_recipients
    type: foreach
    foreach: "${{ steps.list_mailboxes.output.value | default: [] }}"
    steps:
      # Microsoft Graph: GET /users/{id|UPN}/messages?$filter=internetMessageId eq '...'
      - name: find_message_id
        type: http
        with:
          url: "{{ consts.graph_base }}/users/{{ item.userPrincipalName }}/messages"
          method: GET
          headers:
            Authorization: "{{ consts.graph_auth_header }}"
            Accept: "application/json"
          query:
            "$filter": "internetMessageId eq '{{ inputs.internet_message_id }}'"
            "$select": "id,subject"
            "$top": "10"
        on-failure:
          retry:
            max-attempts: 2
            delay: "3s"
          continue: true

      - name: hit_found
        type: if
        condition: "{{ steps.find_message_id.output.value | size }} >= 1"
        steps:
          - name: record_target
            type: data.set
            with:
              target:
                recipient: "{{ item.userPrincipalName }}"
                graph_message_id: "{{ steps.find_message_id.output.value[0].id }}"
                subject: "{{ steps.find_message_id.output.value[0].subject | default: '' }}"

  - name: handle_results
    type: if
    condition: "{{ steps.locate_recipients.output | size }} > 0"
    steps:
      - name: summarize_targets
        type: data.set
        with:
          summary:
            message_id: "{{ inputs.internet_message_id }}"
            mailbox_count: "{{ steps.locate_recipients.output | size }}"
            targets: "${{ steps.locate_recipients.output }}"

      - name: log_targets
        type: console
        with:
          message: |
            {{ steps.summarize_targets.output.summary.mailbox_count }} mailbox(es) hold
            message {{ inputs.internet_message_id }}. Soft delete is recoverable.

      - name: confirm_purge
        type: if
        condition: "{{ inputs.auto_approve }} == true"
        steps:
          - name: purge_each_mailbox
            type: foreach
            foreach: "${{ steps.locate_recipients.output }}"
            steps:
              # Microsoft Graph: DELETE /users/{id|UPN}/messages/{messageId}
              # https://learn.microsoft.com/en-us/graph/api/message-delete
              - name: delete_message
                type: http
                with:
                  url: "{{ consts.graph_base }}/users/{{ item.target.recipient }}/messages/{{ item.target.graph_message_id }}"
                  method: DELETE
                  headers:
                    Authorization: "{{ consts.graph_auth_header }}"
                on-failure:
                  retry:
                    max-attempts: 3
                    delay: "5s"

              - name: record_purge_observable
                type: data.set
                with:
                  observable:
                    type: "Internet Message ID"
                    source: "MS Graph for Office365"
                    value: "{{ inputs.internet_message_id }}"
                    mailbox: "{{ item.target.recipient }}"
                    graph_message_id: "{{ item.target.graph_message_id }}"
                    subject: "{{ item.target.subject }}"
                    action: "soft-deleted"
                    status: "{{ steps.delete_message.output.status | default: 'deleted' }}"
                    message: "Soft-deleted; recoverable via Search-and-Restore."

              - name: log_each_purge
                type: console
                with:
                  message: "Purged {{ inputs.internet_message_id }} from {{ item.target.recipient }}"
        else:
          - name: log_awaiting_approval
            type: console
            with:
              message: "Analyst approval required — set auto_approve=true to proceed."
    else:
      - name: log_no_recipients
        type: console
        with:
          message: "No mailbox holds this Internet Message ID."
