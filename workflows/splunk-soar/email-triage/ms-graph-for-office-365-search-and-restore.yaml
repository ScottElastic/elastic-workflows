# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "MS Graph O365 — Search and Restore"
description: >
  Reverses a prior Search-and-Purge by sweeping each mailbox's Recoverable
  Items Deletions for a target Internet Message-ID and moving the matching
  item back to Inbox via Graph. Designed to consume the audit observables
  produced by Search-and-Purge (array of {email, internet_message_id}
  pairs). Maps to D3FEND RestoreEmail.
enabled: true
tags: ["splunk-soar", "email-triage", "search-and-restore", "o365", "ms-graph", "translated"]

triggers:
  - type: alert
  - type: manual

inputs:
  - name: targets
    type: array
    required: true
    description: >-
      Array of objects each with `email` and `internet_message_id` fields,
      typically sourced from a prior Search-and-Purge audit observable.

consts:
  # Microsoft Graph v1.0. Bearer token via OAuth2 client-credentials.
  # App permission: Mail.ReadWrite.
  graph_base: "https://graph.microsoft.com/v1.0"
  graph_auth_header: "Bearer CHANGEME_TOKEN"

steps:
  - name: validate_input
    type: if
    condition: "{{ inputs.targets | size }} == 0"
    steps:
      - name: log_missing
        type: console
        with:
          message: "No mailbox + message_id pairs supplied — nothing to restore."

  - name: restore_each_target
    type: foreach
    foreach: "${{ inputs.targets }}"
    steps:
      # Microsoft Graph: GET /users/{id|UPN}/mailFolders/recoverableitemsdeletions/messages
      # https://learn.microsoft.com/en-us/graph/api/user-list-messages
      - name: find_deleted_message
        type: http
        with:
          url: "{{ consts.graph_base }}/users/{{ item.email }}/mailFolders/recoverableitemsdeletions/messages"
          method: GET
          headers:
            Authorization: "{{ consts.graph_auth_header }}"
            Accept: "application/json"
          query:
            "$filter": "internetMessageId eq {{ item.internet_message_id }}"
            "$select": "id,subject,internetMessageId"
            "$top": "10"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
          continue: true

      - name: restore_if_found
        type: if
        condition: "{{ steps.find_deleted_message.output.value | size }} >= 1"
        steps:
          # Microsoft Graph: POST /users/{id|UPN}/messages/{messageId}/move
          # https://learn.microsoft.com/en-us/graph/api/message-move
          - name: move_back_to_inbox
            type: http
            with:
              url: "{{ consts.graph_base }}/users/{{ item.email }}/messages/{{ steps.find_deleted_message.output.value[0].id }}/move"
              method: POST
              headers:
                Authorization: "{{ consts.graph_auth_header }}"
                Content-Type: "application/json"
              body:
                destinationId: "inbox"
            on-failure:
              continue: true
              retry:
                max-attempts: 3
                delay: "5s"

          - name: record_restore_observable
            type: data.set
            with:
              observable:
                type: "Internet Message ID"
                source: "MS Graph for Office365"
                value: "{{ item.internet_message_id }}"
                mailbox: "{{ item.email }}"
                action: "restored"
                new_graph_message_id: "{{ steps.move_back_to_inbox.output.id | default: '' }}"
                subject: "{{ steps.find_deleted_message.output.value[0].subject | default: '' }}"

          - name: log_restored
            type: console
            with:
              message: "Restored {{ item.internet_message_id }} to {{ item.email }}/Inbox"
        else:
          - name: log_not_found
            type: console
            with:
              message: "Message {{ item.internet_message_id }} not in {{ item.email }} recoverable deletions."

  - name: post_summary_note
    type: console
    with:
      message: |
        Search and Restore finished against {{ inputs.targets | size }} target(s).

  - name: create_security_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "Workflow: MS Graph O365 — Search and Restore"
        description: |
          Automated case created by the **MS Graph O365 — Search and Restore** workflow.

          Review the workflow execution and attached comments for full investigation details.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "medium"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags: ["automated", "workflow"]
    on-failure:
      continue: true
