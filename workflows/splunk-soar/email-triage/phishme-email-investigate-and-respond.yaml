# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "PhishMe — Investigate and Respond"
description: >
  Reacts to a high-severity phishing indicator imported from Cofense/PhishMe.
  When severity is "high", pulls the PhishMe threat report, creates a
  ServiceNow incident, then per-indicator runs VirusTotal reputation on IP,
  domain, URL, and file hash. Any indicator with >= 10 positives triggers a
  block (PAN-OS for IP and URL, Cisco Umbrella for domain, Carbon Black for
  hash plus an EDR hunt) and a work-note update on the ServiceNow ticket.
  Lower-severity events still get reputation lookups but no ticketing or
  blocking. Blocks are destructive (no continue: true on those steps).
enabled: true
tags: ["splunk-soar", "email-triage", "phishme", "cofense", "virustotal", "servicenow", "carbonblack", "translated"]

triggers:
  - type: alert
  - type: manual

inputs:
  - name: severity
    type: string
    required: false
    description: "Incoming artifact severity. When 'high', PhishMe report retrieval and ticketing are performed."
  - name: phishme_threat_id
    type: string
    required: false
    description: "Cofense/PhishMe threat identifier that drives the get-report call."
  - name: destination_ip
    type: string
    required: false
    description: "Destination IP indicator to reputation-check and block on PAN."
  - name: destination_domain
    type: string
    required: false
    description: "DNS domain indicator to reputation-check and block on OpenDNS Umbrella."
  - name: destination_url
    type: string
    required: false
    description: "URL indicator to reputation-check and block on PAN."
  - name: file_hash_md5
    type: string
    required: false
    description: "File hash to reputation-check, block in EDR, and hunt across endpoints."
  - name: source_ip
    type: string
    required: false
    description: "Origin IP captured from the artifact; included in ServiceNow work notes."

consts:
  virustotal_connector_id: "CHANGEME-virustotal-connector"
  servicenow_connector_id: "CHANGEME-servicenow-connector"
  # Cofense Intelligence API — see https://www.cofense.com/cofense-intelligence/.
  # Auth: HTTP Basic with API user/key. Threat malware lookup is GET /apiv1/threat/malware/{id}.
  phishme_endpoint: "https://www.threathq.com"
  phishme_token: "Basic CHANGEME"
  # PAN-OS XML API — key= query param.
  pan_endpoint: "https://CHANGEME-pan.example.com/api"
  pan_api_key: "CHANGEME"
  pan_vsys: "vsys1"
  pan_block_group: "SOAR_BLOCK"
  # Cisco Umbrella Enforcement API — see s-platform.api.opendns.com docs.
  opendns_umbrella_endpoint: "https://s-platform.api.opendns.com/1.0"
  opendns_umbrella_customer_key: "CHANGEME"
  # Carbon Black Response — POST /api/v1/banning/blacklist + /api/v6 processes/search_jobs.
  carbonblack_endpoint: "https://CHANGEME-cb.example.com"
  carbonblack_token: "CHANGEME"
  carbonblack_org_key: "CHANGEME-org-key"
  positives_threshold: 10

steps:
  - name: gate_on_severity
    type: if
    condition: "{{ inputs.severity | default: '' }} == 'high'"
    steps:
      # Cofense Intelligence: GET /apiv1/threat/malware/{id}.
      - name: get_phishme_report
        type: http
        with:
          url: "{{ consts.phishme_endpoint }}/apiv1/threat/malware/{{ inputs.phishme_threat_id }}"
          method: GET
          headers:
            Authorization: "{{ consts.phishme_token }}"
            Accept: "application/json"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
          continue: true

      # Create the ServiceNow incident that subsequent blocks update.
      - name: create_servicenow_incident
        type: http
        with:
          url: "{{ consts.servicenow_base | default: 'https://CHANGEME-servicenow.service-now.com' }}/api/now/table/incident"
          method: POST
          headers:
            Content-Type: "application/json"
            Authorization: "{{ consts.servicenow_auth | default: 'Basic CHANGEME_SN_AUTH' }}"
          body:
            short_description: "PhishMe high-severity threat {{ inputs.phishme_threat_id }}"
        on-failure:
          continue: true

      - name: ip_track
        type: if
        condition: "{{ inputs.destination_ip | size }} > 0"
        steps:
          # phantom asset: virustotal — "ip reputation".
          - name: ip_reputation
            type: http
            with:
              url: "{{ consts.virustotal_base | default: 'https://www.virustotal.com' }}/api/v3/ip_addresses/{{ inputs.destination_ip }}"
              method: GET
              headers:
                x-apikey: "{{ consts.virustotal_api_key | default: 'CHANGEME_VT_KEY' }}"
            on-failure:
              continue: true

          - name: ip_actionable
            type: if
            condition: "{{ steps.ip_reputation.output.summary.total_positives | default: 0 }} >= {{ consts.positives_threshold }}"
            steps:
              # PAN-OS: add IP to SOAR_BLOCK address group. Destructive.
              - name: block_ip
                type: http
                with:
                  url: "{{ consts.pan_endpoint }}/"
                  method: POST
                  query:
                    type: "config"
                    action: "set"
                    xpath: "/config/devices/entry[@name='localhost.localdomain']/vsys/entry[@name={{ consts.pan_vsys }}]/address-group/entry[@name={{ consts.pan_block_group }}]/static"
                    element: "<member>{{ inputs.destination_ip }}</member>"
                    key: "{{ consts.pan_api_key }}"
                on-failure:
                  continue: true
                  retry:
                    max-attempts: 3
                    delay: "5s"

              - name: note_ip_block_to_servicenow
                type: http
                with:
                  url: "{{ consts.servicenow_base | default: 'https://CHANGEME-servicenow.service-now.com' }}/api/now/table/incident"
                  method: POST
                  headers:
                    Content-Type: "application/json"
                    Authorization: "{{ consts.servicenow_auth | default: 'Basic CHANGEME_SN_AUTH' }}"
                  body:
                    short_description: "{{ inputs.ticket_title | default: 'Workflow ticket' }}"
                on-failure:
                  continue: true

      - name: domain_track
        type: if
        condition: "{{ inputs.destination_domain | size }} > 0"
        steps:
          - name: domain_reputation
            type: http
            with:
              url: "{{ consts.virustotal_base | default: 'https://www.virustotal.com' }}/api/v3/domains/{{ inputs.destination_domain }}"
              method: GET
              headers:
                x-apikey: "{{ consts.virustotal_api_key | default: 'CHANGEME_VT_KEY' }}"
            on-failure:
              continue: true

          - name: domain_actionable
            type: if
            condition: "{{ steps.domain_reputation.output.summary.total_positives | default: 0 }} >= {{ consts.positives_threshold }}"
            steps:
              # Cisco Umbrella Enforcement: POST /events?customerKey=...
              # Submits a security event that blocks the domain via Umbrella.
              # Destructive — fail loudly.
              - name: block_domain
                type: http
                with:
                  url: "{{ consts.opendns_umbrella_endpoint }}/events"
                  method: POST
                  query:
                    customerKey: "{{ consts.opendns_umbrella_customer_key }}"
                  headers:
                    Content-Type: "application/json"
                  body:
                    alertTime: "{{ 'now' | date: '%Y-%m-%dT%H:%M:%S.0Z' }}"
                    deviceId: "elastic-workflows"
                    deviceVersion: "1.0"
                    dstDomain: "{{ inputs.destination_domain }}"
                    dstUrl: "http://{{ inputs.destination_domain }}/"
                    eventTime: "{{ 'now' | date: '%Y-%m-%dT%H:%M:%S.0Z' }}"
                    protocolVersion: "1.0a"
                    providerName: "Security Platform"
                on-failure:
                  continue: true
                  retry:
                    max-attempts: 3
                    delay: "5s"

              - name: note_domain_block_to_servicenow
                type: http
                with:
                  url: "{{ consts.servicenow_base | default: 'https://CHANGEME-servicenow.service-now.com' }}/api/now/table/incident"
                  method: POST
                  headers:
                    Content-Type: "application/json"
                    Authorization: "{{ consts.servicenow_auth | default: 'Basic CHANGEME_SN_AUTH' }}"
                  body:
                    short_description: "{{ inputs.ticket_title | default: 'Workflow ticket' }}"
                on-failure:
                  continue: true

      - name: url_track
        type: if
        condition: "{{ inputs.destination_url | size }} > 0"
        steps:
          - name: url_reputation
            type: http
            with:
              url: "{{ consts.virustotal_base | default: 'https://www.virustotal.com' }}/api/v3/urls"
              method: POST
              headers:
                x-apikey: "{{ consts.virustotal_api_key | default: 'CHANGEME_VT_KEY' }}"
                Content-Type: "application/x-www-form-urlencoded"
              body: "url={{ inputs.destination_url }}"
            on-failure:
              retry:
                max-attempts: 2
                delay: "5s"
              continue: true

          - name: url_actionable
            type: if
            condition: "{{ steps.url_reputation.output.summary.total_positives | default: 0 }} >= {{ consts.positives_threshold }}"
            steps:
              # PAN-OS: add URL to a custom URL category (configured in
              # PAN-OS as URL_BLOCK). Destructive.
              - name: block_url
                type: http
                with:
                  url: "{{ consts.pan_endpoint }}/"
                  method: POST
                  query:
                    type: "config"
                    action: "set"
                    xpath: "/config/profiles/custom-url-category/entry[@name='URL_BLOCK']/list"
                    element: "<member>{{ inputs.destination_url }}</member>"
                    key: "{{ consts.pan_api_key }}"
                on-failure:
                  continue: true
                  retry:
                    max-attempts: 3
                    delay: "5s"

              - name: note_url_block_to_servicenow
                type: http
                with:
                  url: "{{ consts.servicenow_base | default: 'https://CHANGEME-servicenow.service-now.com' }}/api/now/table/incident"
                  method: POST
                  headers:
                    Content-Type: "application/json"
                    Authorization: "{{ consts.servicenow_auth | default: 'Basic CHANGEME_SN_AUTH' }}"
                  body:
                    short_description: "{{ inputs.ticket_title | default: 'Workflow ticket' }}"
                on-failure:
                  continue: true

      - name: hash_track
        type: if
        condition: "{{ inputs.file_hash_md5 | size }} > 0"
        steps:
          - name: hash_reputation
            type: http
            with:
              url: "{{ consts.virustotal_base | default: 'https://www.virustotal.com' }}/api/v3/files/{{ inputs.file_hash_md5 }}"
              method: GET
              headers:
                x-apikey: "{{ consts.virustotal_api_key | default: 'CHANGEME_VT_KEY' }}"
            on-failure:
              retry:
                max-attempts: 2
                delay: "5s"
              continue: true

          - name: hash_actionable
            type: if
            condition: "{{ steps.hash_reputation.output.summary.total_positives | default: 0 }} >= {{ consts.positives_threshold }}"
            steps:
              # Carbon Black Response: ban the hash. Destructive.
              - name: block_hash_in_edr
                type: http
                with:
                  url: "{{ consts.carbonblack_endpoint }}/api/v1/banning/blacklist"
                  method: POST
                  headers:
                    X-Auth-Token: "{{ consts.carbonblack_token }}"
                    Content-Type: "application/json"
                  body:
                    md5hash: "{{ inputs.file_hash_md5 }}"
                    text: "Elastic Workflows — PhishMe-driven block"
                    enabled: true
                on-failure:
                  continue: true
                  retry:
                    max-attempts: 3
                    delay: "5s"

              # Carbon Black Enterprise: POST /api/investigate/v2/orgs/{org_key}/processes/search_jobs.
              - name: hunt_hash_in_edr
                type: http
                with:
                  url: "{{ consts.carbonblack_endpoint }}/api/investigate/v2/orgs/{{ consts.carbonblack_org_key }}/processes/search_jobs"
                  method: POST
                  headers:
                    X-Auth-Token: "{{ consts.carbonblack_token }}"
                    Content-Type: "application/json"
                  body:
                    query: "hash:{{ inputs.file_hash_md5 }}"
                on-failure:
                  retry:
                    max-attempts: 3
                    delay: "5s"
                  continue: true

              - name: note_hash_actions_to_servicenow
                type: http
                with:
                  url: "{{ consts.servicenow_base | default: 'https://CHANGEME-servicenow.service-now.com' }}/api/now/table/incident"
                  method: POST
                  headers:
                    Content-Type: "application/json"
                    Authorization: "{{ consts.servicenow_auth | default: 'Basic CHANGEME_SN_AUTH' }}"
                  body:
                    short_description: "{{ inputs.ticket_title | default: 'Workflow ticket' }}"
                on-failure:
                  continue: true

      - name: finalize_container
        type: data.set
        with:
          container:
            severity: "high"
            status: "closed"
            servicenow_id: "{{ steps.create_servicenow_incident.output.number | default: 'unknown' }}"

      - name: log_finalized
        type: console
        with:
          message: "PhishMe response finished. ServiceNow incident: {{ steps.finalize_container.output.container.servicenow_id }}"
    else:
      # Non-high severity: still reputation-check what we have but skip ticketing.
      - name: passive_enrichment
        type: console
        with:
          message: "Severity is not high — running reputation-only enrichment."

      - name: ip_only
        type: if
        condition: "{{ inputs.destination_ip | size }} > 0"
        steps:
          - name: ip_reputation_only
            type: http
            with:
              url: "{{ consts.virustotal_base | default: 'https://www.virustotal.com' }}/api/v3/ip_addresses/{{ inputs.destination_ip }}"
              method: GET
              headers:
                x-apikey: "{{ consts.virustotal_api_key | default: 'CHANGEME_VT_KEY' }}"
            on-failure:
              continue: true

      - name: domain_only
        type: if
        condition: "{{ inputs.destination_domain | size }} > 0"
        steps:
          - name: domain_reputation_only
            type: http
            with:
              url: "{{ consts.virustotal_base | default: 'https://www.virustotal.com' }}/api/v3/domains/{{ inputs.destination_domain }}"
              method: GET
              headers:
                x-apikey: "{{ consts.virustotal_api_key | default: 'CHANGEME_VT_KEY' }}"
            on-failure:
              continue: true

      - name: url_only
        type: if
        condition: "{{ inputs.destination_url | size }} > 0"
        steps:
          - name: url_reputation_only
            type: http
            with:
              url: "{{ consts.virustotal_base | default: 'https://www.virustotal.com' }}/api/v3/urls"
              method: POST
              headers:
                x-apikey: "{{ consts.virustotal_api_key | default: 'CHANGEME_VT_KEY' }}"
                Content-Type: "application/x-www-form-urlencoded"
              body: "url={{ inputs.destination_url }}"
            on-failure:
              retry:
                max-attempts: 2
                delay: "5s"
              continue: true

      - name: hash_only
        type: if
        condition: "{{ inputs.file_hash_md5 | size }} > 0"
        steps:
          - name: hash_reputation_only
            type: http
            with:
              url: "{{ consts.virustotal_base | default: 'https://www.virustotal.com' }}/api/v3/files/{{ inputs.file_hash_md5 }}"
              method: GET
              headers:
                x-apikey: "{{ consts.virustotal_api_key | default: 'CHANGEME_VT_KEY' }}"
            on-failure:
              retry:
                max-attempts: 2
                delay: "5s"
              continue: true

  - name: create_security_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "Workflow: PhishMe — Investigate and Respond"
        description: |
          Automated case created by the **PhishMe — Investigate and Respond** workflow.

          Review the workflow execution and attached comments for full investigation details.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "medium"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags: ["automated", "workflow"]
    on-failure:
      continue: true
