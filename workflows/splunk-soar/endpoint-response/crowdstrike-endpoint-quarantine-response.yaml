# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "CrowdStrike — Endpoint Quarantine Response"
description: >
  Orchestrates the analyst-driven response phase after a CrowdStrike
  IOC enrichment run. Checks for a case owner, exchanges Falcon API
  credentials for an OAuth2 bearer, surfaces an AI triage prompt, and
  based on the three boolean inputs (response_deny / response_isolate /
  response_evict) calls the corresponding Falcon APIs: indicators,
  devices-actions, and an RTR `rm`. Destructive when any branch fires.
enabled: true
tags: ["splunk-soar", "endpoint-response", "crowdstrike", "response", "translated"]

triggers:
  - type: manual
  - type: alert

inputs:
  - name: device
    type: string
    required: true
    description: "Hostname or device id of the affected endpoint."
  - name: file_hash
    type: string
    required: false
    description: "File hash to consider for denylisting / eviction."
  - name: file_path
    type: string
    required: false
    description: "Absolute file path on the endpoint, for eviction."
  - name: case_owner
    type: string
    required: false
    description: "Owner of the Kibana case driving this response (empty triggers a reminder note)."
  - name: case_id
    type: string
    required: false
    description: "Kibana case id to attach commentary to."
  - name: response_deny
    type: boolean
    required: false
    description: "Skip the analyst prompt and force the denylist branch."
    default: false
  - name: response_isolate
    type: boolean
    required: false
    description: "Skip the analyst prompt and force the isolation branch."
    default: false
  - name: response_evict
    type: boolean
    required: false
    description: "Skip the analyst prompt and force the file-eviction branch."
    default: false

consts:
  crowdstrike_base_url: "https://api.crowdstrike.com"
  crowdstrike_client_id: "CHANGEME_FALCON_CLIENT_ID"
  crowdstrike_client_secret: "CHANGEME_FALCON_CLIENT_SECRET"
  llm_connector_id: "CHANGEME-openai-connector"

steps:
  - name: get_token
    type: http
    with:
      url: "{{ consts.crowdstrike_base_url }}/oauth2/token"
      method: POST
      headers:
        X-Api-Key: "{{ consts.mock_api_key }}"
        Content-Type: "application/x-www-form-urlencoded"
        Accept: "application/json"
      body: "client_id={{ consts.crowdstrike_client_id }}&client_secret={{ consts.crowdstrike_client_secret }}"
    on-failure:
      continue: true
      retry:
        max-attempts: 3
        delay: "5s"

  - name: owner_check
    type: if
    condition: "{{ inputs.case_owner | size }} == 0"
    steps:
      - name: log_owner_missing
        type: console
        with:
          message: "No case owner assigned — analyst should claim this case before continuing."
      - name: comment_owner_missing
        type: if
        condition: "{{ inputs.case_id | size }} > 0"
        steps:
          - name: post_owner_reminder
            type: kibana.request
            with:
              method: POST
              path: "/api/cases/{{ inputs.case_id }}/comments"
              body:
                type: "user"
                comment: "Please assign a case owner before performing response actions."
                owner: "cases"

  - name: triage_summary
    type: ai.prompt
    connector-id: "{{ consts.llm_connector_id }}"
    with:
      prompt: |
        Summarize the context for an analyst about to choose CrowdStrike
        response actions. Respond with JSON shaped as:
        {"summary": "<4-6 bullet summary of evidence>",
         "deny": "yes|no", "isolate": "yes|no", "evict": "yes|no",
         "rationale": "<one sentence>"}.

        Recommend deny=yes when the hash is reliably attributed to
        malware. Recommend isolate=yes when the host shows active
        execution or lateral indicators. Recommend evict=yes only when
        you also recommend deny=yes AND a file path is provided.

        Context:
          device: {{ inputs.device }}
          file_hash: {{ inputs.file_hash | default: '(none)' }}
          file_path: {{ inputs.file_path | default: '(none)' }}
          case_id: {{ inputs.case_id | default: '(none)' }}
    on-failure:
      continue: true

  - name: resolve_device
    type: http
    with:
      url: "{{ consts.crowdstrike_base_url }}/devices/queries/devices/v1"
      method: GET
      headers:
        X-Api-Key: "{{ consts.mock_api_key }}"
        Authorization: "Bearer {{ steps.get_token.output.body.access_token }}"
      query:
        limit: "1"
        filter: "hostname:{{ inputs.device }},device_id:{{ inputs.device }}"
    on-failure:
      continue: true

  - name: capture_device_id
    type: data.set
    with:
      device_id: "{{ steps.resolve_device.output.resources[0] | default: inputs.device }}"

  - name: maybe_denylist
    type: if
    condition: "{{ inputs.response_deny }} and {{ inputs.file_hash | size }} > 0"
    steps:
      - name: upload_deny_indicator
        type: http
        with:
          url: "{{ consts.crowdstrike_base_url }}/iocs/entities/indicators/v1"
          method: POST
          headers:
            X-Api-Key: "{{ consts.mock_api_key }}"
            Authorization: "Bearer {{ steps.get_token.output.body.access_token }}"
            Content-Type: "application/json"
          body:
            indicators:
              - value: "{{ inputs.file_hash }}"
                type: "sha256"
                action: "prevent"
                platforms: ["windows", "mac", "linux"]
                severity: "high"
                applied_globally: false
                host_groups: []
                description: "Denylisted via Elastic Workflow quarantine-response translation"
        on-failure:
          retry:
            max-attempts: 2
            delay: "5s"
          continue: true

  - name: maybe_isolate
    type: if
    condition: "{{ inputs.response_isolate }}"
    steps:
      - name: contain_device
        type: http
        with:
          url: "{{ consts.crowdstrike_base_url }}/devices/entities/devices-actions/v2"
          method: POST
          headers:
            X-Api-Key: "{{ consts.mock_api_key }}"
            Authorization: "Bearer {{ steps.get_token.output.body.access_token }}"
            Content-Type: "application/json"
          query:
            action_name: "contain"
          body:
            ids:
              - "{{ steps.capture_device_id.output.device_id }}"
        on-failure:
          retry:
            max-attempts: 2
            delay: "5s"
          continue: true

  - name: maybe_evict
    type: if
    condition: "{{ inputs.response_evict }} and {{ inputs.file_path | size }} > 0"
    steps:
      - name: open_rtr_session
        type: http
        with:
          url: "{{ consts.crowdstrike_base_url }}/real-time-response/entities/sessions/v1"
          method: POST
          headers:
            X-Api-Key: "{{ consts.mock_api_key }}"
            Authorization: "Bearer {{ steps.get_token.output.body.access_token }}"
            Content-Type: "application/json"
          body:
            device_id: "{{ steps.capture_device_id.output.device_id }}"
        on-failure:
          continue: true

      - name: run_rm
        type: http
        with:
          url: "{{ consts.crowdstrike_base_url }}/real-time-response/entities/admin-command/v1"
          method: POST
          headers:
            X-Api-Key: "{{ consts.mock_api_key }}"
            Authorization: "Bearer {{ steps.get_token.output.body.access_token }}"
            Content-Type: "application/json"
          body:
            base_command: "rm"
            command_string: "rm {{ inputs.file_path }}"
            session_id: "{{ steps.open_rtr_session.output.resources[0].session_id | default: '' }}"
        on-failure:
          continue: true

      - name: close_rtr_session
        type: http
        with:
          url: "{{ consts.crowdstrike_base_url }}/real-time-response/entities/sessions/v1"
          method: DELETE
          headers:
            X-Api-Key: "{{ consts.mock_api_key }}"
            Authorization: "Bearer {{ steps.get_token.output.body.access_token }}"
          query:
            session_id: "{{ steps.open_rtr_session.output.resources[0].session_id | default: '' }}"
        on-failure:
          continue: true

  - name: log_outcome
    type: console
    with:
      message: |
        Quarantine response complete on device {{ steps.capture_device_id.output.device_id }}.
        deny={{ inputs.response_deny }} isolate={{ inputs.response_isolate }} evict={{ inputs.response_evict }}

  - name: create_security_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "Workflow: CrowdStrike — Endpoint Quarantine Response"
        description: |
          Automated case created by the **CrowdStrike — Endpoint Quarantine Response** workflow.

          Review the workflow execution and attached comments for full investigation details.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "medium"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags: ["automated", "workflow"]
    on-failure:
      continue: true
