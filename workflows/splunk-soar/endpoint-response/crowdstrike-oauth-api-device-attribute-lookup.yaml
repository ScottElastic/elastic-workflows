# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "CrowdStrike — Device Attribute Lookup"
description: >
  Resolves a device value (IP or hostname) to CrowdStrike Falcon device
  attributes. Acquires an OAuth2 bearer, branches on naive IPv4
  detection to query by local/external IP or hostname filter, then
  pulls the device entity record. Result is shaped into a normalized
  OCSF-style device observable.
enabled: true
tags: ["splunk-soar", "endpoint-response", "crowdstrike", "device-info", "translated"]

triggers:
  - type: manual

inputs:
  - name: device
    type: string
    required: true
    description: "Hostname, IP address, or device identifier to look up in CrowdStrike."

consts:
  # CrowdStrike Falcon OAuth API. Replace base URL with your tenant's host
  # (e.g. api.crowdstrike.com, api.us-2.crowdstrike.com, etc.) and provide
  # OAuth2 client credentials minted from the Falcon console.
  crowdstrike_base_url: "https://api.crowdstrike.com"
  crowdstrike_client_id: "CHANGEME_FALCON_CLIENT_ID"
  crowdstrike_client_secret: "CHANGEME_FALCON_CLIENT_SECRET"

steps:
  - name: validate_device
    type: if
    condition: "{{ inputs.device | size }} == 0"
    steps:
      - name: log_missing_device
        type: console
        with:
          message: "No device value supplied; nothing to query."

  - name: get_token
    type: http
    with:
      url: "{{ consts.crowdstrike_base_url }}/oauth2/token"
      method: POST
      headers:
        X-Api-Key: "{{ consts.mock_api_key }}"
        Content-Type: "application/x-www-form-urlencoded"
        Accept: "application/json"
      body: "client_id={{ consts.crowdstrike_client_id }}&client_secret={{ consts.crowdstrike_client_secret }}"
    on-failure:
      continue: true
      retry:
        max-attempts: 3
        delay: "5s"

  - name: detect_ipv4
    type: data.set
    with:
      # Naive IPv4 detection — Liquid does not expose regex, so we check
      # for three dots and a digit prefix. Good enough as a router.
      is_ip: "{{ inputs.device | split: '.' | size }} == 4"

  - name: lookup_by_ip
    type: if
    condition: "{{ steps.detect_ipv4.output.is_ip }}"
    steps:
      # TODO: replace with a native CrowdStrike connector when available.
      - name: query_device_by_ip
        type: http
        with:
          url: "{{ consts.crowdstrike_base_url }}/devices/queries/devices/v1"
          method: GET
          headers:
            X-Api-Key: "{{ consts.mock_api_key }}"
            Authorization: "Bearer {{ steps.get_token.output.body.access_token }}"
            Accept: "application/json"
          query:
            limit: "10"
            filter: "local_ip:{{ inputs.device }},external_ip:{{ inputs.device }}"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
          continue: true

      - name: get_ip_device_details
        type: http
        with:
          url: "{{ consts.crowdstrike_base_url }}/devices/entities/devices/v2"
          method: GET
          headers:
            X-Api-Key: "{{ consts.mock_api_key }}"
            Authorization: "Bearer {{ steps.get_token.output.body.access_token }}"
          query:
            ids: "${{ steps.query_device_by_ip.output.resources }}"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
          continue: true

      - name: build_ip_observable
        type: data.set
        with:
          observable:
            type: "ip"
            value: "{{ inputs.device }}"
            source: "CrowdStrike OAuth API"
            attributes:
              hostname: "{{ steps.get_ip_device_details.output.resources[0].hostname | default: '' }}"
              connection_ip: "{{ steps.get_ip_device_details.output.resources[0].connection_ip | default: '' }}"
              mac: "{{ steps.get_ip_device_details.output.resources[0].mac_address | default: '' }}"
              os: "{{ steps.get_ip_device_details.output.resources[0].os_version | default: '' }}"
              uid: "{{ steps.get_ip_device_details.output.resources[0].device_id | default: '' }}"
              product_type: "{{ steps.get_ip_device_details.output.resources[0].product_type_desc | default: 'Unknown' }}"
    else:
      - name: query_device_by_hostname
        type: http
        with:
          url: "{{ consts.crowdstrike_base_url }}/devices/queries/devices/v1"
          method: GET
          headers:
            X-Api-Key: "{{ consts.mock_api_key }}"
            Authorization: "Bearer {{ steps.get_token.output.body.access_token }}"
            Accept: "application/json"
          query:
            limit: "10"
            filter: "hostname:{{ inputs.device }}"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
          continue: true

      - name: get_hostname_device_details
        type: http
        with:
          url: "{{ consts.crowdstrike_base_url }}/devices/entities/devices/v2"
          method: GET
          headers:
            X-Api-Key: "{{ consts.mock_api_key }}"
            Authorization: "Bearer {{ steps.get_token.output.body.access_token }}"
          query:
            ids: "${{ steps.query_device_by_hostname.output.resources }}"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
          continue: true

      - name: build_hostname_observable
        type: data.set
        with:
          observable:
            type: "host name"
            value: "{{ inputs.device }}"
            source: "CrowdStrike OAuth API"
            attributes:
              hostname: "{{ steps.get_hostname_device_details.output.resources[0].hostname | default: '' }}"
              connection_ip: "{{ steps.get_hostname_device_details.output.resources[0].connection_ip | default: '' }}"
              mac: "{{ steps.get_hostname_device_details.output.resources[0].mac_address | default: '' }}"
              os: "{{ steps.get_hostname_device_details.output.resources[0].os_version | default: '' }}"
              uid: "{{ steps.get_hostname_device_details.output.resources[0].device_id | default: '' }}"
              product_type: "{{ steps.get_hostname_device_details.output.resources[0].product_type_desc | default: 'Unknown' }}"

  - name: log_summary
    type: console
    with:
      message: |
        CrowdStrike device lookup completed for {{ inputs.device }}.
        Branch taken: {{ steps.detect_ipv4.output.is_ip | default: false }} (ip-based)

  - name: create_security_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "Workflow: CrowdStrike — Device Attribute Lookup"
        description: |
          Automated case created by the **CrowdStrike — Device Attribute Lookup** workflow.

          Review the workflow execution and attached comments for full investigation details.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "medium"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags: ["automated", "workflow"]
    on-failure:
      continue: true
