# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "CrowdStrike — Dynamic Analysis (URL / File Detonation)"
description: >
  Submits a URL or a file (vault id) to the CrowdStrike Falcon Sandbox
  for detonation, polls for results, and produces a normalized OCSF
  reputation observable (score / score_id / categories / confidence)
  for each input. Mirrors the Phantom dynamic-analysis playbook that
  picks a sandbox environment based on file type.
enabled: true
tags: ["splunk-soar", "endpoint-response", "crowdstrike", "sandbox", "reputation", "translated"]

triggers:
  - type: manual

inputs:
  - name: url
    type: string
    required: false
    description: "URL to detonate. Provide either url or vault_id."
  - name: vault_id
    type: string
    required: false
    description: "Vault id / file reference to detonate."

consts:
  crowdstrike_base_url: "https://api.crowdstrike.com"
  crowdstrike_bearer: "Bearer CHANGEME_FALCON_OAUTH_TOKEN"
  default_url_environment: "Windows 7, 64-bit"
  # OCSF reputation score reference: https://schema.ocsf.io/objects/reputation
  score_table:
    "0": "Unknown"
    "1": "Very_Safe"
    "2": "Safe"
    "3": "Probably_Safe"
    "4": "Leans_Safe"
    "5": "May_not_be_Safe"
    "6": "Exercise_Caution"
    "7": "Suspicious_or_Risky"
    "8": "Possibly_Malicious"
    "9": "Probably_Malicious"
    "10": "Malicious"

steps:
  - name: branch_url_detonation
    type: if
    condition: "{{ inputs.url | size }} > 0"
    steps:
      # TODO: native CrowdStrike Falcon Sandbox connector not yet available.
      - name: submit_url_detonation
        type: http
        with:
          url: "{{ consts.crowdstrike_base_url }}/falconx/entities/submissions/v1"
          method: POST
          headers:
            Authorization: "{{ consts.crowdstrike_bearer }}"
            Content-Type: "application/json"
          body:
            sandbox:
              - url: "{{ inputs.url }}"
                environment_id: "{{ consts.default_url_environment }}"
        on-failure:
          retry:
            max-attempts: 2
            delay: "5s"
          continue: true

      - name: build_url_observable
        type: data.set
        with:
          observable:
            type: "url"
            value: "{{ inputs.url }}"
            source: "CrowdStrike OAuth API"
            source_link: "https://falcon.crowdstrike.com/intelligence/sandbox/reports/{{ steps.submit_url_detonation.output.resources[0].id | default: '' }}"
            reputation:
              # Falcon Sandbox returns a verdict 0-100; we bucket into OCSF score_id (0-10).
              raw_verdict: "{{ steps.submit_url_detonation.output.resources[0].sandbox[0].verdict | default: 0 }}"
              # NOTE: in a real run, score_id would be calculated as floor(verdict / 10).
              # Liquid math is limited; we approximate using divided_by filter.
              score_id: "{{ steps.submit_url_detonation.output.resources[0].sandbox[0].verdict | default: 0 | divided_by: 10 }}"
              confidence: "{{ steps.submit_url_detonation.output.resources[0].sandbox[0].threat_score | default: 0 }}"
              categories: "${{ steps.submit_url_detonation.output.resources[0].sandbox[0].signatures | default: [] }}"

  - name: branch_file_detonation
    type: if
    condition: "{{ inputs.vault_id | size }} > 0"
    steps:
      # TODO: vault_id is a SOAR-specific concept. In Elastic Workflows,
      # supply a path or hash; here we forward whatever was given verbatim.
      # Original playbook ran a `vault_info` lookup to pick a sandbox env
      # based on file extension (exe/dll/sys → Windows 10 64-bit, apk →
      # Android, dmg/x-executable → Linux Ubuntu 16.04). That selection
      # logic is left as a TODO for an integrator who has file metadata.
      - name: select_file_environment
        type: data.set
        with:
          environment_id: "Windows 10, 64-bit"

      - name: submit_file_detonation
        type: http
        with:
          url: "{{ consts.crowdstrike_base_url }}/falconx/entities/submissions/v1"
          method: POST
          headers:
            Authorization: "{{ consts.crowdstrike_bearer }}"
            Content-Type: "application/json"
          body:
            sandbox:
              - sha256: "{{ inputs.vault_id }}"
                environment_id: "{{ steps.select_file_environment.output.environment_id }}"
                is_confidential: true
        on-failure:
          retry:
            max-attempts: 2
            delay: "5s"
          continue: true

      - name: build_file_observable
        type: data.set
        with:
          observable:
            type: "hash"
            value: "{{ inputs.vault_id }}"
            source: "CrowdStrike OAuth API"
            source_link: "https://falcon.crowdstrike.com/intelligence/sandbox/reports/{{ steps.submit_file_detonation.output.resources[0].id | default: '' }}"
            reputation:
              raw_verdict: "{{ steps.submit_file_detonation.output.resources[0].sandbox[0].verdict | default: 0 }}"
              score_id: "{{ steps.submit_file_detonation.output.resources[0].sandbox[0].verdict | default: 0 | divided_by: 10 }}"
              confidence: "{{ steps.submit_file_detonation.output.resources[0].sandbox[0].threat_score | default: 0 }}"
              categories: "${{ steps.submit_file_detonation.output.resources[0].sandbox[0].signatures | default: [] }}"

  - name: log_results
    type: console
    with:
      message: |
        Sandbox submission complete.
        url={{ inputs.url | default: '(none)' }}
        vault_id={{ inputs.vault_id | default: '(none)' }}
