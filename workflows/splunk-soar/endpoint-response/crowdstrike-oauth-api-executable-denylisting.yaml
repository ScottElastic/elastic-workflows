# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "CrowdStrike — Executable Denylisting"
description: >
  Adds a file hash to CrowdStrike Falcon as a custom IOC with
  action=prevent. Validates inputs, exchanges Falcon API credentials
  for an OAuth2 bearer, resolves the device, then uploads the indicator
  via /iocs/entities/indicators/v1. Destructive: future executions of
  that hash will be blocked across the matching scope.
enabled: true
tags: ["splunk-soar", "endpoint-response", "crowdstrike", "ioc", "denylist", "translated"]

triggers:
  - type: manual

inputs:
  - name: device
    type: string
    required: true
    description: "Hostname or device id to scope the indicator to."
  - name: hash
    type: string
    required: true
    description: "File hash (typically SHA256 or MD5) to add as a deny indicator."

consts:
  crowdstrike_base_url: "https://api.crowdstrike.com"
  crowdstrike_client_id: "CHANGEME_FALCON_CLIENT_ID"
  crowdstrike_client_secret: "CHANGEME_FALCON_CLIENT_SECRET"

steps:
  - name: validate_inputs
    type: if
    condition: "{{ inputs.device | size }} == 0 or {{ inputs.hash | size }} == 0"
    steps:
      - name: log_missing_inputs
        type: console
        with:
          message: "Both device and hash must be supplied to denylist an executable."

  - name: get_token
    type: http
    with:
      url: "{{ consts.crowdstrike_base_url }}/oauth2/token"
      method: POST
      headers:
        Content-Type: "application/x-www-form-urlencoded"
        Accept: "application/json"
      body: "client_id={{ consts.crowdstrike_client_id }}&client_secret={{ consts.crowdstrike_client_secret }}"
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"

  - name: query_device
    type: http
    with:
      url: "{{ consts.crowdstrike_base_url }}/devices/queries/devices/v1"
      method: GET
      headers:
        Authorization: "Bearer {{ steps.get_token.output.body.access_token }}"
      query:
        limit: "1"
        filter: "hostname:{{ inputs.device }}"
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"
      continue: true

  - name: capture_device_id
    type: data.set
    with:
      device_id: "{{ steps.query_device.output.resources[0] | default: inputs.device }}"

  - name: upload_indicator
    type: http
    with:
      url: "{{ consts.crowdstrike_base_url }}/iocs/entities/indicators/v1"
      method: POST
      headers:
        Authorization: "Bearer {{ steps.get_token.output.body.access_token }}"
        Content-Type: "application/json"
      body:
        indicators:
          - value: "{{ inputs.hash }}"
            type: "sha256"
            action: "prevent"
            platforms: ["windows", "mac", "linux"]
            severity: "high"
            applied_globally: false
            host_groups: []
            description: "Added by Elastic Workflow translation of CrowdStrike denylist playbook"
            source: "Elastic Workflow"
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"

  - name: build_file_observable
    type: data.set
    with:
      observable:
        type: "hash"
        value: "{{ inputs.hash }}"
        source: "CrowdStrike OAuth API"
        action: "prevent"
        scoped_device: "{{ steps.capture_device_id.output.device_id }}"
        status: "{{ steps.upload_indicator.output.resources[0] | default: 'unknown' }}"

  - name: log_result
    type: console
    with:
      message: |
        Denylist indicator submitted for hash={{ inputs.hash }}
        device_id={{ steps.capture_device_id.output.device_id }}
