# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "CrowdStrike — File Collection (RTR get / put)"
description: >
  Retrieves a file from a CrowdStrike-managed device via Real-Time
  Response. Exchanges Falcon API credentials for an OAuth2 bearer,
  resolves the device, opens an RTR session, runs `get` against the
  target path, lists and downloads the retrieved file, then deletes the
  session. Requires RTR privileges on the API client.
enabled: true
tags: ["splunk-soar", "endpoint-response", "crowdstrike", "rtr", "file-collection", "translated"]

triggers:
  - type: manual

inputs:
  - name: device
    type: string
    required: true
    description: "Hostname or device id from which the file will be collected."
  - name: path
    type: string
    required: true
    description: "Absolute path of the file on the target endpoint."

consts:
  crowdstrike_base_url: "https://api.crowdstrike.com"
  crowdstrike_client_id: "CHANGEME_FALCON_CLIENT_ID"
  crowdstrike_client_secret: "CHANGEME_FALCON_CLIENT_SECRET"

steps:
  - name: validate_inputs
    type: if
    condition: "{{ inputs.device | size }} == 0 or {{ inputs.path | size }} == 0"
    steps:
      - name: log_missing_inputs
        type: console
        with:
          message: "Both device and file path are required to collect a file."

  - name: get_token
    type: http
    with:
      url: "{{ consts.crowdstrike_base_url }}/oauth2/token"
      method: POST
      headers:
        Content-Type: "application/x-www-form-urlencoded"
        Accept: "application/json"
      body: "client_id={{ consts.crowdstrike_client_id }}&client_secret={{ consts.crowdstrike_client_secret }}"
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"

  - name: query_device
    type: http
    with:
      url: "{{ consts.crowdstrike_base_url }}/devices/queries/devices/v1"
      method: GET
      headers:
        Authorization: "Bearer {{ steps.get_token.output.body.access_token }}"
      query:
        limit: "1"
        filter: "hostname:{{ inputs.device }}"
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"
      continue: true

  - name: capture_device_id
    type: data.set
    with:
      device_id: "{{ steps.query_device.output.resources[0] | default: inputs.device }}"

  - name: create_rtr_session
    type: http
    with:
      url: "{{ consts.crowdstrike_base_url }}/real-time-response/entities/sessions/v1"
      method: POST
      headers:
        Authorization: "Bearer {{ steps.get_token.output.body.access_token }}"
        Content-Type: "application/json"
      body:
        device_id: "{{ steps.capture_device_id.output.device_id }}"
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"
      continue: true

  - name: capture_session_id
    type: data.set
    with:
      session_id: "{{ steps.create_rtr_session.output.resources[0].session_id | default: '' }}"

  - name: run_get_command
    type: http
    with:
      url: "{{ consts.crowdstrike_base_url }}/real-time-response/entities/admin-command/v1"
      method: POST
      headers:
        Authorization: "Bearer {{ steps.get_token.output.body.access_token }}"
        Content-Type: "application/json"
      body:
        base_command: "get"
        command_string: "get {{ inputs.path }}"
        session_id: "{{ steps.capture_session_id.output.session_id }}"
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"
      continue: true

  - name: list_session_files
    type: http
    with:
      url: "{{ consts.crowdstrike_base_url }}/real-time-response/entities/file/v2"
      method: GET
      headers:
        Authorization: "Bearer {{ steps.get_token.output.body.access_token }}"
      query:
        session_id: "{{ steps.capture_session_id.output.session_id }}"
    on-failure:
      continue: true

  - name: get_session_file
    type: http
    with:
      url: "{{ consts.crowdstrike_base_url }}/real-time-response/entities/extracted-file-contents/v1"
      method: GET
      headers:
        Authorization: "Bearer {{ steps.get_token.output.body.access_token }}"
      query:
        session_id: "{{ steps.capture_session_id.output.session_id }}"
        sha256: "{{ steps.list_session_files.output.resources[0].sha256 | default: '' }}"
    on-failure:
      continue: true

  - name: delete_rtr_session
    type: http
    with:
      url: "{{ consts.crowdstrike_base_url }}/real-time-response/entities/sessions/v1"
      method: DELETE
      headers:
        Authorization: "Bearer {{ steps.get_token.output.body.access_token }}"
      query:
        session_id: "{{ steps.capture_session_id.output.session_id }}"
    on-failure:
      continue: true

  - name: build_file_artifact
    type: data.set
    with:
      observable:
        type: "file"
        value: "{{ inputs.path }}"
        source: "CrowdStrike OAuth API"
        attributes:
          device_id: "{{ steps.capture_device_id.output.device_id }}"
          sha256: "{{ steps.list_session_files.output.resources[0].sha256 | default: '' }}"
          size: "{{ steps.list_session_files.output.resources[0].size | default: 0 }}"
          session_id: "{{ steps.capture_session_id.output.session_id }}"

  - name: log_result
    type: console
    with:
      message: |
        File collection for {{ inputs.path }} from {{ inputs.device }} complete.
        sha256={{ steps.list_session_files.output.resources[0].sha256 | default: '(unknown)' }}
