# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "CrowdStrike — File Eviction (RTR rm)"
description: >
  Deletes a file from a CrowdStrike-managed device via Real-Time
  Response. Resolves the device, opens an RTR session, runs the rm
  command against the supplied path, and closes the session. Emits a
  file observable that captures the eviction outcome.
enabled: true
tags: ["splunk-soar", "endpoint-response", "crowdstrike", "rtr", "file-deletion", "translated"]

triggers:
  - type: manual

inputs:
  - name: device
    type: string
    required: true
    description: "Hostname or device id where the file should be deleted."
  - name: path
    type: string
    required: true
    description: "Absolute path of the file to remove."

consts:
  crowdstrike_base_url: "https://api.crowdstrike.com"
  crowdstrike_bearer: "Bearer CHANGEME_FALCON_OAUTH_TOKEN"

steps:
  - name: validate_inputs
    type: if
    condition: "{{ inputs.device | size }} == 0 or {{ inputs.path | size }} == 0"
    steps:
      - name: log_missing_inputs
        type: console
        with:
          message: "Both device and path are required to evict a file."

  - name: query_device
    type: http
    with:
      url: "{{ consts.crowdstrike_base_url }}/devices/queries/devices/v1"
      method: GET
      headers:
        Authorization: "{{ consts.crowdstrike_bearer }}"
      query:
        limit: 1
        filter: "hostname:'{{ inputs.device }}'"
    on-failure:
      retry:
        max-attempts: 2
        delay: "3s"
      continue: true

  - name: capture_device_id
    type: data.set
    with:
      device_id: "{{ steps.query_device.output.resources[0] | default: inputs.device }}"

  - name: create_rtr_session
    type: http
    with:
      url: "{{ consts.crowdstrike_base_url }}/real-time-response/entities/sessions/v1"
      method: POST
      headers:
        Authorization: "{{ consts.crowdstrike_bearer }}"
        Content-Type: "application/json"
      body:
        device_id: "{{ steps.capture_device_id.output.device_id }}"
    on-failure:
      retry:
        max-attempts: 2
        delay: "5s"
      continue: true

  - name: run_rm_command
    type: http
    with:
      url: "{{ consts.crowdstrike_base_url }}/real-time-response/entities/admin-command/v1"
      method: POST
      headers:
        Authorization: "{{ consts.crowdstrike_bearer }}"
        Content-Type: "application/json"
      body:
        base_command: "rm"
        command_string: "rm '{{ inputs.path }}'"
        session_id: "{{ steps.create_rtr_session.output.resources[0].session_id | default: '' }}"
    on-failure:
      retry:
        max-attempts: 2
        delay: "5s"
      continue: true

  - name: delete_rtr_session
    type: http
    with:
      url: "{{ consts.crowdstrike_base_url }}/real-time-response/entities/sessions/v1"
      method: DELETE
      headers:
        Authorization: "{{ consts.crowdstrike_bearer }}"
      query:
        session_id: "{{ steps.create_rtr_session.output.resources[0].session_id | default: '' }}"
    on-failure:
      continue: true

  - name: build_file_observable
    type: data.set
    with:
      observable:
        type: "file"
        value: "{{ inputs.path }}"
        source: "CrowdStrike OAuth API"
        action: "evicted"
        device_id: "{{ steps.capture_device_id.output.device_id }}"
        rm_status: "{{ steps.run_rm_command.output.resources[0].complete | default: false }}"

  - name: log_result
    type: console
    with:
      message: |
        File eviction attempted for {{ inputs.path }} on device {{ steps.capture_device_id.output.device_id }}.
        complete={{ steps.run_rm_command.output.resources[0].complete | default: false }}
