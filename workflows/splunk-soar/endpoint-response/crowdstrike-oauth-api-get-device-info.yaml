# ─────────────────────────────────────────────────────────────────────
name: "CrowdStrike — Get Device Info"
description: >
  Resolves a CrowdStrike device identifier given a hostname or
  device_id. Acquires an OAuth2 bearer token, queries the devices index,
  then fetches device entity details. Useful as a prelude to other
  CrowdStrike action workflows that need a Falcon device_id.
enabled: true
tags: ["splunk-soar", "endpoint-response", "crowdstrike", "device-info", "helper", "translated"]

triggers:
  - type: manual

inputs:
  - name: device
    type: string
    required: true
    description: "Hostname or CrowdStrike agent id to resolve."

consts:
  crowdstrike_base_url: "https://api.crowdstrike.com"
  crowdstrike_client_id: "CHANGEME_FALCON_CLIENT_ID"
  crowdstrike_client_secret: "CHANGEME_FALCON_CLIENT_SECRET"

steps:
  - name: validate_device
    type: if
    condition: "{{ inputs.device | size }} == 0"
    steps:
      - name: log_missing
        type: console
        with:
          message: "Provide a hostname or device_id."

  - name: get_token
    type: http
    with:
      url: "{{ consts.crowdstrike_base_url }}/oauth2/token"
      method: POST
      headers:
        X-Api-Key: "{{ consts.mock_api_key }}"
        Content-Type: "application/x-www-form-urlencoded"
        Accept: "application/json"
      body: "client_id={{ consts.crowdstrike_client_id }}&client_secret={{ consts.crowdstrike_client_secret }}"
    on-failure:
      continue: true
      retry:
        max-attempts: 3
        delay: "5s"

  - name: query_device
    type: http
    with:
      url: "{{ consts.crowdstrike_base_url }}/devices/queries/devices/v1"
      method: GET
      headers:
        X-Api-Key: "{{ consts.mock_api_key }}"
        Authorization: "Bearer {{ steps.get_token.output.body.access_token }}"
      query:
        limit: "1"
        # Treat short opaque strings as device_ids; quoted hostnames
        # also pass through fine because the filter accepts either.
        filter: "hostname:{{ inputs.device }},device_id:{{ inputs.device }}"
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"
      continue: true

  - name: fetch_details
    type: http
    with:
      url: "{{ consts.crowdstrike_base_url }}/devices/entities/devices/v2"
      method: GET
      headers:
        X-Api-Key: "{{ consts.mock_api_key }}"
        Authorization: "Bearer {{ steps.get_token.output.body.access_token }}"
      query:
        ids: "${{ steps.query_device.output.resources }}"
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"
      continue: true

  - name: build_device_observable
    type: data.set
    with:
      observable:
        type: "host"
        value: "{{ inputs.device }}"
        source: "CrowdStrike OAuth API"
        attributes:
          device_id: "{{ steps.fetch_details.output.resources[0].device_id | default: '' }}"
          hostname: "{{ steps.fetch_details.output.resources[0].hostname | default: '' }}"
          os: "{{ steps.fetch_details.output.resources[0].os_version | default: '' }}"
          mac: "{{ steps.fetch_details.output.resources[0].mac_address | default: '' }}"
          connection_ip: "{{ steps.fetch_details.output.resources[0].connection_ip | default: '' }}"
          last_seen: "{{ steps.fetch_details.output.resources[0].last_seen | default: '' }}"

  - name: log_result
    type: console
    with:
      message: |
        Resolved {{ inputs.device }} -> device_id={{ steps.build_device_observable.output.observable.attributes.device_id }}

  - name: create_security_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "Workflow: CrowdStrike — Get Device Info"
        description: |
          Automated case created by the **CrowdStrike — Get Device Info** workflow.

          Review the workflow execution and attached comments for full investigation details.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "medium"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags: ["automated", "workflow"]
    on-failure:
      continue: true
