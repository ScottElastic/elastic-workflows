# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "CrowdStrike — Identifier Activity Analysis"
description: >
  Hunts a file hash or domain across the CrowdStrike fleet. Acquires an
  OAuth2 bearer, queries /indicators/queries/devices/v1 for matching
  device ids, then enriches each match via the devices entity endpoint
  and produces a normalized observable plus summary record.
enabled: true
tags: ["splunk-soar", "endpoint-response", "crowdstrike", "hunt", "translated"]

triggers:
  - type: manual

inputs:
  - name: file
    type: string
    required: false
    description: "File hash to hunt across CrowdStrike-managed endpoints."
  - name: domain
    type: string
    required: false
    description: "Domain name to hunt across CrowdStrike-managed endpoints."

consts:
  crowdstrike_base_url: "https://api.crowdstrike.com"
  crowdstrike_client_id: "CHANGEME_FALCON_CLIENT_ID"
  crowdstrike_client_secret: "CHANGEME_FALCON_CLIENT_SECRET"

steps:
  - name: get_token
    type: http
    with:
      url: "{{ consts.crowdstrike_base_url }}/oauth2/token"
      method: POST
      headers:
        Content-Type: "application/x-www-form-urlencoded"
        Accept: "application/json"
      body: "client_id={{ consts.crowdstrike_client_id }}&client_secret={{ consts.crowdstrike_client_secret }}"
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"

  - name: branch_file
    type: if
    condition: "{{ inputs.file | size }} > 0"
    steps:
      - name: hunt_file
        type: http
        with:
          url: "{{ consts.crowdstrike_base_url }}/indicators/queries/devices/v1"
          method: GET
          headers:
            Authorization: "Bearer {{ steps.get_token.output.body.access_token }}"
          query:
            type: "sha256"
            value: "{{ inputs.file }}"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
          continue: true

      - name: any_file_hits
        type: if
        condition: "{{ steps.hunt_file.output.resources | size }} > 0"
        steps:
          - name: get_systems_from_file
            type: http
            with:
              url: "{{ consts.crowdstrike_base_url }}/devices/entities/devices/v2"
              method: GET
              headers:
                Authorization: "Bearer {{ steps.get_token.output.body.access_token }}"
              query:
                ids: "${{ steps.hunt_file.output.resources }}"
            on-failure:
              continue: true

          - name: build_file_observable
            type: data.set
            with:
              observable:
                type: "hash"
                value: "{{ inputs.file }}"
                source: "CrowdStrike OAuth API"
                devices_seen: "${{ steps.hunt_file.output.resources | default: [] }}"
                device_count: "{{ steps.hunt_file.output.resources | size }}"

  - name: branch_domain
    type: if
    condition: "{{ inputs.domain | size }} > 0"
    steps:
      - name: hunt_domain
        type: http
        with:
          url: "{{ consts.crowdstrike_base_url }}/indicators/queries/devices/v1"
          method: GET
          headers:
            Authorization: "Bearer {{ steps.get_token.output.body.access_token }}"
          query:
            type: "domain"
            value: "{{ inputs.domain }}"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
          continue: true

      - name: any_domain_hits
        type: if
        condition: "{{ steps.hunt_domain.output.resources | size }} > 0"
        steps:
          - name: get_systems_from_domain
            type: http
            with:
              url: "{{ consts.crowdstrike_base_url }}/devices/entities/devices/v2"
              method: GET
              headers:
                Authorization: "Bearer {{ steps.get_token.output.body.access_token }}"
              query:
                ids: "${{ steps.hunt_domain.output.resources }}"
            on-failure:
              continue: true

          - name: build_domain_observable
            type: data.set
            with:
              observable:
                type: "domain"
                value: "{{ inputs.domain }}"
                source: "CrowdStrike OAuth API"
                devices_seen: "${{ steps.hunt_domain.output.resources | default: [] }}"
                device_count: "{{ steps.hunt_domain.output.resources | size }}"

  - name: log_summary
    type: console
    with:
      message: |
        Identifier activity analysis complete.
        file={{ inputs.file | default: '(none)' }} hits={{ steps.hunt_file.output.resources | size | default: 0 }}
        domain={{ inputs.domain | default: '(none)' }} hits={{ steps.hunt_domain.output.resources | size | default: 0 }}

  - name: create_security_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "Workflow: CrowdStrike — Identifier Activity Analysis"
        description: |
          Automated case created by the **CrowdStrike — Identifier Activity Analysis** workflow.

          Review the workflow execution and attached comments for full investigation details.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "medium"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags: ["automated", "workflow"]
    on-failure:
      continue: true
