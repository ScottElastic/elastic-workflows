# ─────────────────────────────────────────────────────────────────────
name: "CrowdStrike — Network Isolation"
description: >
  Network-contains a CrowdStrike-managed device. Takes a hostname or
  device_id, exchanges Falcon API credentials for a short-lived OAuth2
  bearer, resolves the device, then calls devices-actions with
  action_name=contain. Destructive: the host will lose network
  connectivity except for the CrowdStrike sensor channel.
enabled: true
tags: ["splunk-soar", "endpoint-response", "crowdstrike", "network-isolation", "quarantine", "translated"]

triggers:
  - type: manual

inputs:
  - name: device
    type: string
    required: true
    description: "Hostname or device id to isolate."

consts:
  crowdstrike_base_url: "https://api.crowdstrike.com"
  crowdstrike_client_id: "CHANGEME_FALCON_CLIENT_ID"
  crowdstrike_client_secret: "CHANGEME_FALCON_CLIENT_SECRET"

steps:
  - name: validate_device
    type: if
    condition: "{{ inputs.device | size }} == 0"
    steps:
      - name: log_missing
        type: console
        with:
          message: "A device must be supplied for isolation."

  - name: get_token
    type: http
    with:
      url: "{{ consts.crowdstrike_base_url }}/oauth2/token"
      method: POST
      headers:
        Content-Type: "application/x-www-form-urlencoded"
        Accept: "application/json"
      body: "client_id={{ consts.crowdstrike_client_id }}&client_secret={{ consts.crowdstrike_client_secret }}"
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"

  - name: query_device
    type: http
    with:
      url: "{{ consts.crowdstrike_base_url }}/devices/queries/devices/v1"
      method: GET
      headers:
        Authorization: "Bearer {{ steps.get_token.output.body.access_token }}"
      query:
        limit: 1
        filter: "hostname:'{{ inputs.device }}',device_id:'{{ inputs.device }}'"
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"
      continue: true

  - name: capture_device_id
    type: data.set
    with:
      device_id: "{{ steps.query_device.output.resources[0] | default: inputs.device }}"

  - name: contain_device
    type: http
    with:
      url: "{{ consts.crowdstrike_base_url }}/devices/entities/devices-actions/v2"
      method: POST
      headers:
        Authorization: "Bearer {{ steps.get_token.output.body.access_token }}"
        Content-Type: "application/json"
      query:
        action_name: "contain"
      body:
        ids:
          - "{{ steps.capture_device_id.output.device_id }}"
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"

  - name: build_host_observable
    type: data.set
    with:
      observable:
        type: "host"
        value: "{{ inputs.device }}"
        source: "CrowdStrike OAuth API"
        action: "contained"
        device_id: "{{ steps.capture_device_id.output.device_id }}"
        status: "{{ steps.contain_device.output.resources[0].path | default: 'unknown' }}"

  - name: log_result
    type: console
    with:
      message: |
        Isolation requested for device {{ steps.capture_device_id.output.device_id }}.
