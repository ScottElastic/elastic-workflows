# ─────────────────────────────────────────────────────────────────────
name: "CrowdStrike — Network Restore"
description: >
  Lifts network containment from a CrowdStrike-managed device. Acquires
  an OAuth2 bearer token, resolves the supplied hostname or device_id to
  a Falcon device, then calls devices-actions with
  action_name=lift_containment. The host regains normal network access.
enabled: true
tags: ["splunk-soar", "endpoint-response", "crowdstrike", "network-restore", "unquarantine", "translated"]

triggers:
  - type: manual

inputs:
  - name: device
    type: string
    required: true
    description: "Hostname or device id to release from containment."

consts:
  crowdstrike_base_url: "https://api.crowdstrike.com"
  crowdstrike_client_id: "CHANGEME_FALCON_CLIENT_ID"
  crowdstrike_client_secret: "CHANGEME_FALCON_CLIENT_SECRET"

steps:
  - name: validate_device
    type: if
    condition: "{{ inputs.device | size }} == 0"
    steps:
      - name: log_missing
        type: console
        with:
          message: "A device must be supplied to lift containment."

  - name: get_token
    type: http
    with:
      url: "{{ consts.crowdstrike_base_url }}/oauth2/token"
      method: POST
      headers:
        X-Api-Key: "{{ consts.mock_api_key }}"
        Content-Type: "application/x-www-form-urlencoded"
        Accept: "application/json"
      body: "client_id={{ consts.crowdstrike_client_id }}&client_secret={{ consts.crowdstrike_client_secret }}"
    on-failure:
      continue: true
      retry:
        max-attempts: 3
        delay: "5s"

  - name: query_device
    type: http
    with:
      url: "{{ consts.crowdstrike_base_url }}/devices/queries/devices/v1"
      method: GET
      headers:
        X-Api-Key: "{{ consts.mock_api_key }}"
        Authorization: "Bearer {{ steps.get_token.output.body.access_token }}"
      query:
        limit: "1"
        filter: "hostname:{{ inputs.device }},device_id:{{ inputs.device }}"
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"
      continue: true

  - name: capture_device_id
    type: data.set
    with:
      device_id: "{{ steps.query_device.output.resources[0] | default: inputs.device }}"

  - name: lift_containment
    type: http
    with:
      url: "{{ consts.crowdstrike_base_url }}/devices/entities/devices-actions/v2"
      method: POST
      headers:
        X-Api-Key: "{{ consts.mock_api_key }}"
        Authorization: "Bearer {{ steps.get_token.output.body.access_token }}"
        Content-Type: "application/json"
      query:
        action_name: "lift_containment"
      body:
        ids:
          - "{{ steps.capture_device_id.output.device_id }}"
    on-failure:
      continue: true
      retry:
        max-attempts: 3
        delay: "5s"

  - name: build_host_observable
    type: data.set
    with:
      observable:
        type: "host"
        value: "{{ inputs.device }}"
        source: "CrowdStrike OAuth API"
        action: "containment-lifted"
        device_id: "{{ steps.capture_device_id.output.device_id }}"
        status: "{{ steps.lift_containment.output.resources[0].path | default: 'unknown' }}"

  - name: log_result
    type: console
    with:
      message: |
        Network restore requested for device {{ steps.capture_device_id.output.device_id }}.

  - name: create_security_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "Workflow: CrowdStrike — Network Restore"
        description: |
          Automated case created by the **CrowdStrike — Network Restore** workflow.

          Review the workflow execution and attached comments for full investigation details.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "medium"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags: ["automated", "workflow"]
    on-failure:
      continue: true
