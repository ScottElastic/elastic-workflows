# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "CrowdStrike — Process Termination"
description: >
  Terminates one or more processes on a CrowdStrike-managed device via
  Real-Time Response. Exchanges Falcon API credentials for an OAuth2
  bearer, resolves the device, opens an RTR session, iterates the PID
  list running `kill`, and closes the session. Destructive: target
  processes are killed. Note that CrowdStrike may report success even
  when a particular PID is no longer running.
enabled: true
tags: ["splunk-soar", "endpoint-response", "crowdstrike", "rtr", "process-kill", "translated"]

triggers:
  - type: manual

inputs:
  - name: device
    type: string
    required: true
    description: "Hostname or device id where processes will be terminated."
  - name: pid
    type: array
    required: true
    description: "List of process IDs to terminate."

consts:
  crowdstrike_base_url: "https://api.crowdstrike.com"
  crowdstrike_client_id: "CHANGEME_FALCON_CLIENT_ID"
  crowdstrike_client_secret: "CHANGEME_FALCON_CLIENT_SECRET"

steps:
  - name: validate_inputs
    type: if
    condition: "{{ inputs.device | size }} == 0 or {{ inputs.pid | size }} == 0"
    steps:
      - name: log_missing
        type: console
        with:
          message: "Both device and at least one PID are required."

  - name: get_token
    type: http
    with:
      url: "{{ consts.crowdstrike_base_url }}/oauth2/token"
      method: POST
      headers:
        Content-Type: "application/x-www-form-urlencoded"
        Accept: "application/json"
      body: "client_id={{ consts.crowdstrike_client_id }}&client_secret={{ consts.crowdstrike_client_secret }}"
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"

  - name: query_device
    type: http
    with:
      url: "{{ consts.crowdstrike_base_url }}/devices/queries/devices/v1"
      method: GET
      headers:
        Authorization: "Bearer {{ steps.get_token.output.body.access_token }}"
      query:
        limit: "1"
        filter: "hostname:{{ inputs.device }},device_id:{{ inputs.device }}"
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"
      continue: true

  - name: capture_device_id
    type: data.set
    with:
      device_id: "{{ steps.query_device.output.resources[0] | default: inputs.device }}"

  - name: create_rtr_session
    type: http
    with:
      url: "{{ consts.crowdstrike_base_url }}/real-time-response/entities/sessions/v1"
      method: POST
      headers:
        Authorization: "Bearer {{ steps.get_token.output.body.access_token }}"
        Content-Type: "application/json"
      body:
        device_id: "{{ steps.capture_device_id.output.device_id }}"
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"
      continue: true

  - name: capture_session_id
    type: data.set
    with:
      session_id: "{{ steps.create_rtr_session.output.resources[0].session_id | default: '' }}"

  - name: terminate_each_pid
    type: foreach
    foreach: "${{ inputs.pid }}"
    steps:
      - name: run_kill
        type: http
        with:
          url: "{{ consts.crowdstrike_base_url }}/real-time-response/entities/admin-command/v1"
          method: POST
          headers:
            Authorization: "Bearer {{ steps.get_token.output.body.access_token }}"
            Content-Type: "application/json"
          body:
            base_command: "kill"
            command_string: "kill {{ item }}"
            session_id: "{{ steps.capture_session_id.output.session_id }}"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
          continue: true

      - name: log_pid_outcome
        type: console
        with:
          message: |
            kill pid={{ item }} complete={{ steps.run_kill.output.resources[0].complete | default: false }}

  - name: delete_rtr_session
    type: http
    with:
      url: "{{ consts.crowdstrike_base_url }}/real-time-response/entities/sessions/v1"
      method: DELETE
      headers:
        Authorization: "Bearer {{ steps.get_token.output.body.access_token }}"
      query:
        session_id: "{{ steps.capture_session_id.output.session_id }}"
    on-failure:
      continue: true

  - name: build_process_observable
    type: data.set
    with:
      observable:
        type: "process"
        value: "{{ inputs.pid | join: ',' }}"
        source: "CrowdStrike OAuth API"
        action: "terminate"
        device_id: "{{ steps.capture_device_id.output.device_id }}"

  - name: create_security_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "Workflow: CrowdStrike — Process Termination"
        description: |
          Automated case created by the **CrowdStrike — Process Termination** workflow.

          Review the workflow execution and attached comments for full investigation details.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "medium"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags: ["automated", "workflow"]
    on-failure:
      continue: true
