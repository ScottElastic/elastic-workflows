# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "AWS EC2 — Instance Isolation"
description: >
  Network-isolates an EC2 instance by replacing every security group on
  its primary ENI with a single quarantine group. Captures the
  before/after security-group configuration so the change can be
  attached to a Kibana case for forensic review. Requires an AWS SigV4
  signing proxy (see consts.ec2_endpoint) — AWS does not accept
  unsigned API calls.
enabled: true
tags: ["splunk-soar", "endpoint-response", "aws", "ec2", "network-isolation", "translated"]

triggers:
  - type: manual
  - type: alert

inputs:
  - name: instance_id
    type: string
    required: true
    description: "EC2 instance id (i-...) to isolate."
  - name: isolation_security_group
    type: string
    required: false
    description: "Security group id to apply as the quarantine SG."
    default: "sg-CHANGEME-isolation"
  - name: region
    type: string
    required: false
    description: "AWS region the instance lives in."
    default: "us-east-1"
  - name: case_id
    type: string
    required: false
    description: "Optional Kibana case id to attach a before/after comment to."

consts:
  # AWS EC2 Query API endpoint:
  #   https://ec2.<region>.amazonaws.com/?Action=...&Version=2016-11-15
  # Every call must be SigV4-signed. The plain `http` step cannot sign
  # requests, so operators MUST front this with one of:
  #   * an AWS Lambda invoked via API Gateway with IAM auth
  #   * an aws-sigv4-proxy sidecar (https://github.com/awslabs/aws-sigv4-proxy)
  #   * a small signing middleware that forwards to the real endpoint
  # Replace `sigv4_proxy_base` with that proxy's base URL; it should
  # accept the same query string and forward it with a valid signature.
  sigv4_proxy_base: "https://CHANGEME-sigv4-proxy.internal/ec2"
  aws_region: "us-east-1"
  aws_auth_header: "Bearer CHANGEME_PROXY_TOKEN"

steps:
  - name: validate_input
    type: if
    condition: "{{ inputs.instance_id | size }} == 0"
    steps:
      - name: log_missing
        type: console
        with:
          message: "instance_id is required."

  # GET DescribeInstances — Query API, parse Reservations[].Instances[].SecurityGroups[].GroupId
  - name: describe_instance_before
    type: http
    with:
      url: "{{ consts.sigv4_proxy_base }}/?Action=DescribeInstances&Version=2016-11-15&InstanceId.1={{ inputs.instance_id }}&Region={{ inputs.region }}"
      method: GET
      headers:
        Authorization: "{{ consts.aws_auth_header }}"
        Accept: "application/json"
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"
      continue: true

  - name: capture_existing_sgs
    type: data.set
    with:
      # The SigV4 proxy is expected to return the EC2 Query response as JSON.
      existing_groups: "${{ steps.describe_instance_before.output.Reservations[0].Instances[0].SecurityGroups | default: [] }}"

  # POST ModifyInstanceAttribute with a single GroupId.1 — replaces ALL
  # security groups on the primary ENI with the quarantine SG. This is
  # the canonical way to isolate; no separate per-SG revoke call needed.
  # Destructive: no continue:true.
  - name: assign_isolation_sg
    type: http
    with:
      url: "{{ consts.sigv4_proxy_base }}/?Action=ModifyInstanceAttribute&Version=2016-11-15&InstanceId={{ inputs.instance_id }}&GroupId.1={{ inputs.isolation_security_group }}&Region={{ inputs.region }}"
      method: POST
      headers:
        Authorization: "{{ consts.aws_auth_header }}"
        Accept: "application/json"
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"

  # The Phantom playbook ran a per-SG revoke loop here as a "safety belt".
  # In AWS EC2 that is a no-op for isolation: ModifyInstanceAttribute
  # above already replaces the ENI's group list atomically, and
  # RevokeSecurityGroupIngress only edits rules *inside* a group (which
  # would corrupt unrelated workloads using those SGs). We keep the step
  # name so downstream references don't break, but it now just records
  # the SG ids that were detached so the case comment can show them.
  - name: remove_existing_sgs
    type: data.set
    with:
      detached_groups: "${{ steps.capture_existing_sgs.output.existing_groups | map: 'GroupId' | default: [] }}"

  - name: describe_instance_after
    type: http
    with:
      url: "{{ consts.sigv4_proxy_base }}/?Action=DescribeInstances&Version=2016-11-15&InstanceId.1={{ inputs.instance_id }}&Region={{ inputs.region }}"
      method: GET
      headers:
        Authorization: "{{ consts.aws_auth_header }}"
        Accept: "application/json"
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"
      continue: true

  - name: build_change_comment
    type: data.set
    with:
      summary:
        instance_id: "{{ inputs.instance_id }}"
        region: "{{ inputs.region }}"
        before_groups: "${{ steps.capture_existing_sgs.output.existing_groups }}"
        after_groups: "${{ steps.describe_instance_after.output.Reservations[0].Instances[0].SecurityGroups | default: [] }}"
        isolation_sg_applied: "{{ inputs.isolation_security_group }}"

  - name: attach_to_case
    type: if
    condition: "{{ inputs.case_id | size }} > 0"
    steps:
      - name: post_comment
        type: kibana.request
        with:
          method: POST
          path: "/api/cases/{{ inputs.case_id }}/comments"
          body:
            type: "user"
            comment: "EC2 instance {{ inputs.instance_id }} ({{ inputs.region }}) isolated. Before SGs: {{ steps.build_change_comment.output.summary.before_groups | json }} After SGs:  {{ steps.build_change_comment.output.summary.after_groups | json }} Applied isolation SG: {{ inputs.isolation_security_group }}"
            owner: "cases"

  - name: log_outcome
    type: console
    with:
      message: |
        EC2 isolation complete for instance {{ inputs.instance_id }}.

  - name: create_security_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "Workflow: AWS EC2 — Instance Isolation"
        description: |
          Automated case created by the **AWS EC2 — Instance Isolation** workflow.

          Review the workflow execution and attached comments for full investigation details.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "medium"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags: ["automated", "workflow"]
    on-failure:
      continue: true
