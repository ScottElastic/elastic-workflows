# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "CrowdStrike — Host Quarantine"
description: >
  Minimal CrowdStrike Falcon endpoint quarantine workflow. Exchanges
  Falcon API credentials for an OAuth2 bearer, calls devices-actions
  with action_name=contain for the supplied device_id, and, on success,
  emits a 'contained' tag observable so downstream automation can
  recognize hosts already in network isolation. Destructive: the host
  loses network connectivity outside the sensor channel.
enabled: true
tags: ["splunk-soar", "endpoint-response", "crowdstrike", "quarantine", "translated"]

triggers:
  - type: manual

inputs:
  - name: device_id
    type: string
    required: true
    description: "CrowdStrike Falcon agent id (device_id) to contain."
  - name: hostname
    type: string
    required: false
    description: "Optional friendly hostname to tag as 'contained'."

consts:
  crowdstrike_base_url: "https://api.crowdstrike.com"
  crowdstrike_client_id: "CHANGEME_FALCON_CLIENT_ID"
  crowdstrike_client_secret: "CHANGEME_FALCON_CLIENT_SECRET"

steps:
  - name: validate_input
    type: if
    condition: "{{ inputs.device_id | size }} == 0"
    steps:
      - name: log_missing
        type: console
        with:
          message: "device_id is required."

  - name: get_token
    type: http
    with:
      url: "{{ consts.crowdstrike_base_url }}/oauth2/token"
      method: POST
      headers:
        Content-Type: "application/x-www-form-urlencoded"
        Accept: "application/json"
      body: "client_id={{ consts.crowdstrike_client_id }}&client_secret={{ consts.crowdstrike_client_secret }}"
    on-failure:
      continue: true
      retry:
        max-attempts: 3
        delay: "5s"

  - name: quarantine_device
    type: http
    with:
      url: "{{ consts.crowdstrike_base_url }}/devices/entities/devices-actions/v2"
      method: POST
      headers:
        Authorization: "Bearer {{ steps.get_token.output.body.access_token }}"
        Content-Type: "application/json"
      query:
        action_name: "contain"
      body:
        ids:
          - "{{ inputs.device_id }}"
    on-failure:
      continue: true
      retry:
        max-attempts: 3
        delay: "5s"

  - name: check_success
    type: if
    condition: "{{ steps.quarantine_device.output.errors | size }} == 0"
    steps:
      - name: tag_contained_host
        type: if
        condition: "{{ inputs.hostname | size }} > 0"
        steps:
          # The original community playbook called a custom function
          # local/indicator_tag to tag the hostname as 'contained'.
          # Mirror that by emitting an observable record other workflows
          # can pick up; integrators with an indicator store can route
          # this into ES.
          - name: emit_contained_tag
            type: data.set
            with:
              tagged_indicator:
                value: "{{ inputs.hostname }}"
                type: "host name"
                tag: "contained"
                source: "CrowdStrike OAuth API"

  - name: log_outcome
    type: console
    with:
      message: |
        Containment requested for {{ inputs.device_id }} (hostname={{ inputs.hostname | default: '(unspecified)' }}).

  - name: create_security_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "Workflow: CrowdStrike — Host Quarantine"
        description: |
          Automated case created by the **CrowdStrike — Host Quarantine** workflow.

          Review the workflow execution and attached comments for full investigation details.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "medium"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags: ["automated", "workflow"]
    on-failure:
      continue: true
