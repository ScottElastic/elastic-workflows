# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "Microsoft Defender for Endpoint — Network Isolation"
description: >
  Network-isolates a device managed by Microsoft Defender for Endpoint via
  POST /api/machines/{id}/isolate. uid must be the Defender machineId
  (not hostname) — use the Defender devices endpoint to resolve names if
  needed. Records a host observable with the action id returned by
  Defender so callers can poll for completion. Maps to MITRE D3FEND
  d3f:NetworkIsolation.
enabled: true
tags: ["splunk-soar", "endpoint-response", "microsoft-defender", "network-isolation", "translated"]

triggers:
  - type: manual

inputs:
  - name: uid
    type: string
    required: true
    description: "Defender for Endpoint machineId (GUID/hash form, not hostname)."
  - name: isolation_type
    type: string
    required: false
    description: "Defender isolation strength. Allowed: Full, Selective, UnManagedDevice."
    default: "Full"
  - name: comment
    type: string
    required: false
    description: "Free-text justification recorded with the action."
    default: "Isolated by Elastic Workflow network-isolation translation"

consts:
  # Microsoft Defender for Endpoint (Microsoft 365 Defender unified API).
  # NOTE: The historical api.securitycenter.microsoft.com base is being
  # superseded by api.security.microsoft.com — both currently route to
  # the same backend. Use the unified host going forward.
  # Bearer token via OAuth2 client-credentials with scope
  # https://api.securitycenter.microsoft.com/.default. Required app
  # permission: Machine.Isolate.
  defender_base_url: "https://api.security.microsoft.com"
  defender_bearer: "Bearer CHANGEME_DEFENDER_TOKEN"

steps:
  - name: validate_uid
    type: if
    condition: "{{ inputs.uid | size }} == 0"
    steps:
      - name: log_missing
        type: console
        with:
          message: "A Defender machineId must be supplied to isolate."

  # Defender API: POST /api/machines/{id}/isolate
  # https://learn.microsoft.com/en-us/defender-endpoint/api/isolate-machine
  # Returns 201 Created with a MachineAction body. Rate limits: 100/min, 1500/hr.
  # This is a destructive containment action — no continue:true.
  - name: isolate_machine
    type: http
    with:
      url: "{{ consts.defender_base_url }}/api/machines/{{ inputs.uid }}/isolate"
      method: POST
      headers:
        Authorization: "{{ consts.defender_bearer }}"
        Content-Type: "application/json"
      body:
        Comment: "{{ inputs.comment }}"
        IsolationType: "{{ inputs.isolation_type }}"
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"

  - name: build_host_observable
    type: data.set
    with:
      observable:
        type: "host"
        value: "{{ inputs.uid }}"
        source: "Microsoft Defender for Endpoint"
        action: "isolated"
        isolation_type: "{{ inputs.isolation_type }}"
        defender_action_id: "{{ steps.isolate_machine.output.id | default: '' }}"
        machine_id: "{{ steps.isolate_machine.output.machineId | default: inputs.uid }}"
        status: "{{ steps.isolate_machine.output.status | default: 'Pending' }}"
        requestor_comment: "{{ inputs.comment }}"

  - name: log_result
    type: console
    with:
      message: |
        Defender isolation requested for {{ inputs.uid }} (type={{ inputs.isolation_type }}).
        action_id={{ steps.build_host_observable.output.observable.defender_action_id }}
        status={{ steps.build_host_observable.output.observable.status }}
