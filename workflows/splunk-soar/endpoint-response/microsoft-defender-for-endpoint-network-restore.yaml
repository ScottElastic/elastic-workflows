# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "Microsoft Defender for Endpoint — Network Restore"
description: >
  Lifts Defender for Endpoint network isolation via
  POST /api/machines/{id}/unisolate. uid must be the Defender machineId.
  Duplicate calls for the same machine return HTTP 400 with
  "Action is already in progress" — operators should poll the machine
  action to confirm completion. Maps to MITRE D3FEND d3f:RestoreNetworkAccess.
enabled: true
tags: ["splunk-soar", "endpoint-response", "microsoft-defender", "network-restore", "translated"]

triggers:
  - type: manual

inputs:
  - name: uid
    type: string
    required: true
    description: "Defender for Endpoint machineId (GUID/hash form, not hostname)."
  - name: comment
    type: string
    required: false
    description: "Free-text justification recorded with the action."
    default: "Restored by Elastic Workflow network-restore translation"

consts:
  # Microsoft Defender for Endpoint unified API host. Bearer token via
  # OAuth2 client-credentials. App permission: Machine.Isolate.
  defender_base_url: "https://api.security.microsoft.com"
  defender_bearer: "Bearer CHANGEME_DEFENDER_TOKEN"

steps:
  - name: validate_uid
    type: if
    condition: "{{ inputs.uid | size }} == 0"
    steps:
      - name: log_missing
        type: console
        with:
          message: "A Defender machineId must be supplied to lift isolation."

  # Defender API: POST /api/machines/{id}/unisolate
  # https://learn.microsoft.com/en-us/defender-endpoint/api/unisolate-machine
  # Returns 201 Created with a MachineAction body. Rate limits: 100/min, 1500/hr.
  - name: unisolate_machine
    type: http
    with:
      url: "{{ consts.defender_base_url }}/api/machines/{{ inputs.uid }}/unisolate"
      method: POST
      headers:
        Authorization: "{{ consts.defender_bearer }}"
        Content-Type: "application/json"
      body:
        Comment: "{{ inputs.comment }}"
    on-failure:
      continue: true
      retry:
        max-attempts: 3
        delay: "5s"

  - name: build_host_observable
    type: data.set
    with:
      observable:
        type: "host"
        value: "{{ inputs.uid }}"
        source: "Microsoft Defender for Endpoint"
        action: "isolation-lifted"
        defender_action_id: "{{ steps.unisolate_machine.output.id | default: '' }}"
        machine_id: "{{ steps.unisolate_machine.output.machineId | default: inputs.uid }}"
        status: "{{ steps.unisolate_machine.output.status | default: 'Pending' }}"
        requestor_comment: "{{ inputs.comment }}"

  - name: log_result
    type: console
    with:
      message: |
        Defender isolation lift requested for {{ inputs.uid }}.
        action_id={{ steps.build_host_observable.output.observable.defender_action_id }}
        status={{ steps.build_host_observable.output.observable.status }}

  - name: create_security_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "Workflow: Microsoft Defender for Endpoint — Network Restore"
        description: |
          Automated case created by the **Microsoft Defender for Endpoint — Network Restore** workflow.

          Review the workflow execution and attached comments for full investigation details.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "medium"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags: ["automated", "workflow"]
    on-failure:
      continue: true
