# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "Windows Defender ATP — Identifier Activity Analysis"
description: >
  Pivots on a file hash or domain to find every Defender-managed device
  that observed the indicator. Calls /api/files/{sha}/machines and/or
  /api/domains/{domain}/machines and builds a normalized observable per
  indicator with the device hit list (computerDnsName, lastSeen, riskScore,
  etc. as returned by Defender). Useful for blast-radius enumeration during
  triage. Maps to MITRE D3FEND d3f:IdentifierActivityAnalysis.
enabled: true
tags: ["splunk-soar", "endpoint-response", "windows-defender-atp", "hunt", "translated"]

triggers:
  - type: manual

inputs:
  - name: file_hash
    type: string
    required: false
    description: "SHA1 or SHA256 file hash to pivot on via Defender."
  - name: domain
    type: string
    required: false
    description: "Domain to pivot on via Defender."

consts:
  # Microsoft Defender for Endpoint unified API host. Bearer token via
  # OAuth2 client-credentials. App permission: Machine.Read.All (file/domain
  # device-list endpoints require Machine.Read.All).
  defender_base_url: "https://api.security.microsoft.com"
  defender_bearer: "Bearer CHANGEME_DEFENDER_TOKEN"

steps:
  - name: branch_file
    type: if
    condition: "{{ inputs.file_hash | size }} > 0"
    steps:
      # Defender API: GET /api/files/{Sha1 or Sha256}/machines
      # Returns 200 with a collection { value: [machine, ...] } where each
      # machine carries id, computerDnsName, osPlatform, lastSeen, riskScore,
      # etc. Lookup-style enrichment — continue on failure.
      - name: get_file_devices
        type: http
        with:
          url: "{{ consts.defender_base_url }}/api/files/{{ inputs.file_hash }}/machines"
          method: GET
          headers:
            Authorization: "{{ consts.defender_bearer }}"
            Accept: "application/json"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
          continue: true

      - name: any_file_hits
        type: if
        condition: "{{ steps.get_file_devices.output.value | size }} > 0"
        steps:
          - name: build_file_observable
            type: data.set
            with:
              observable:
                type: "hash"
                value: "{{ inputs.file_hash }}"
                source: "Microsoft Defender for Endpoint"
                devices_seen: "${{ steps.get_file_devices.output.value | default: [] }}"
                device_count: "{{ steps.get_file_devices.output.value | size }}"

  - name: branch_domain
    type: if
    condition: "{{ inputs.domain | size }} > 0"
    steps:
      # Defender API: GET /api/domains/{domain}/machines
      - name: get_domain_devices
        type: http
        with:
          url: "{{ consts.defender_base_url }}/api/domains/{{ inputs.domain }}/machines"
          method: GET
          headers:
            Authorization: "{{ consts.defender_bearer }}"
            Accept: "application/json"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
          continue: true

      - name: any_domain_hits
        type: if
        condition: "{{ steps.get_domain_devices.output.value | size }} > 0"
        steps:
          - name: build_domain_observable
            type: data.set
            with:
              observable:
                type: "domain"
                value: "{{ inputs.domain }}"
                source: "Microsoft Defender for Endpoint"
                devices_seen: "${{ steps.get_domain_devices.output.value | default: [] }}"
                device_count: "{{ steps.get_domain_devices.output.value | size }}"

  - name: log_summary
    type: console
    with:
      message: |
        Defender ATP identifier-activity analysis complete.
        file_hash={{ inputs.file_hash | default: '(none)' }} hits={{ steps.get_file_devices.output.value | size | default: 0 }}
        domain={{ inputs.domain | default: '(none)' }} hits={{ steps.get_domain_devices.output.value | size | default: 0 }}

  - name: create_security_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "Workflow: Windows Defender ATP — Identifier Activity Analysis"
        description: |
          Automated case created by the **Windows Defender ATP — Identifier Activity Analysis** workflow.

          Review the workflow execution and attached comments for full investigation details.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "medium"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags: ["automated", "workflow"]
    on-failure:
      continue: true
