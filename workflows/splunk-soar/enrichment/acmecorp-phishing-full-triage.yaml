          | Recorded Future | {{ steps.derive_indicators.output.domain }} | score={{ steps.rf_domain.output.data.data.risk.score | default: '-' }} ({{ steps.rf_domain.output.data.data.risk.criticalityLabel | default: '-' }}) |
          | Anomali ThreatStream | {{ steps.derive_indicators.output.ip }} | {{ steps.anomali_ip.output.data.meta.total_count | default: 0 }} intel records |
          | TruSTAR | {{ steps.derive_indicators.output.ip }} | priority={{ steps.trustar_ip.output.data.priorityScore | default: '-' }}, report={{ steps.trustar_ip.output.data.reportId | default: '-' }} |
          | VirusTotal | IP {{ steps.derive_indicators.output.ip }} | {{ steps.vt_ip.output.data.data.attributes.last_analysis_stats.malicious | default: '-' }} malicious engines |
          | VirusTotal | Hash | {{ steps.vt_hash.output.data.data.attributes.last_analysis_stats.malicious | default: '-' }} malicious engines |
          | VirusTotal | {{ steps.derive_indicators.output.domain }} | {{ steps.vt_domain.output.data.data.attributes.last_analysis_stats.malicious | default: '-' }} malicious engines |
          | MaxMind GeoIP | {{ steps.derive_indicators.output.ip }} | {{ steps.maxmind_ip.output.data.city.names.en | default: '-' }}, {{ steps.maxmind_ip.output.data.country.names.en | default: '-' }}, AS{{ steps.maxmind_ip.output.data.traits.autonomous_system_number | default: '-' }} |
          | URLScan.io | {{ steps.derive_indicators.output.url }} | malicious={{ steps.urlscan_result.output.data.verdicts.overall.malicious | default: '-' }}, score={{ steps.urlscan_result.output.data.verdicts.overall.score | default: '-' }} |
          | PhishTank | {{ steps.derive_indicators.output.url }} | in_db={{ steps.phishtank_url.output.data.results.in_database | default: '-' }} |
          | PassiveTotal WHOIS | {{ steps.derive_indicators.output.domain }} | registrar={{ steps.whois.output.data.registrar | default: '-' }}, org={{ steps.whois.output.data.organization | default: '-' }} |
          | Google Safe Browsing | {{ steps.derive_indicators.output.url }} | {{ steps.safebrowsing_url.output.data.matches | size | default: 0 }} threat matches |
          | Cisco Umbrella | {{ steps.derive_indicators.output.domain }} | {{ steps.umbrella_events.output.data | size | default: 0 }} DNS events |
          | MS Graph User | {{ steps.derive_indicators.output.username }} | {{ steps.graph_user.output.data.displayName | default: '-' }}, {{ steps.graph_user.output.data.department | default: '-' }} |
          | MS Graph Sign-ins | {{ steps.derive_indicators.output.username }} | {{ steps.graph_signins.output.data.value | size | default: 0 }} recent sign-ins |
          | CrowdStrike | {{ steps.derive_indicators.output.hostname }} | {{ steps.cs_device.output.data.resources | size | default: 0 }} devices, {{ steps.cs_detections.output.data.meta.pagination.total | default: 0 }} detections |
          | Splunk | IOC search | SID={{ steps.splunk_search.output.data.sid | default: '-' }} |
    on-failure:
      continue: true

  # ── 36. Log completion ────────────────────────────────────────────────────
  - name: log_complete
