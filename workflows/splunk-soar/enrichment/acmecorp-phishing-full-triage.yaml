  # ── 35. Comment 4 — Raw Vendor Enrichment ─────────────────────────────────
  - name: post_vendor_table
    type: kibana.request
    with:
      method: POST
      path: "/api/cases/{{ steps.capture_case_id.output.case_id | default: 'no-case' }}/comments"
      body:
        type: "user"
        owner: "securitySolution"
        comment: |
          # Raw Vendor Enrichment Data

          *16+ sources queried — full data for analyst reference*

          | Source | Indicator | Finding |
          |--------|-----------|---------|
          | GreyNoise Community | {{ steps.derive_indicators.output.ip }} | classification={{ steps.gn_community.output.data.classification | default: '-' }}, noise={{ steps.gn_community.output.data.noise | default: '-' }} |
          | GreyNoise Context | {{ steps.derive_indicators.output.ip }} | actor={{ steps.gn_context.output.data.actor | default: '-' }}, tags={{ steps.gn_context.output.data.tags | join: ',' | default: 'none' }} |
          | GreyNoise GNQL | TOR pivot | {{ steps.gn_gnql.output.data.count | default: 0 }} results |
          | Recorded Future | IP {{ steps.derive_indicators.output.ip }} | score={{ steps.rf_ip.output.data.data.risk.score | default: '-' }} ({{ steps.rf_ip.output.data.data.risk.criticalityLabel | default: '-' }}) |
