name: "AcmeCorp Phishing Full Triage"
description: >
  End-to-end automated triage for the AcmeCorp phishing incident targeting
  jdoe@acmecorp.com / DESKTOP-A4K9B2Z. Enriches the C2 IP (185.220.101.47),
  dropped malware hash, phishing domain (evil.example.com), and user identity
  across 16+ threat-intel, identity, and endpoint vendors, then creates a rich
  Elastic Security case with an AI triage analysis, AI-generated threat
  intelligence dashboard, prioritized response playbook, and full vendor detail.
  NOTE: `type: http` step responses are accessible at output.data.* (body wrapper).
  `type: kibana.request` and `type: data.set` expose output fields directly.
enabled: true
tags: ["demo", "phishing", "acmecorp", "full-triage", "enrichment", "ai-powered"]

triggers:
  - type: manual

inputs:
  - name: ip
    type: string
    required: false
    description: "C2 IP to investigate. Defaults to 185.220.101.47."
  - name: username
    type: string
    required: false
    description: "Affected user principal name. Defaults to jdoe@acmecorp.com."
  - name: hostname
    type: string
    required: false
    description: "Compromised endpoint hostname. Defaults to DESKTOP-A4K9B2Z."
  - name: sha256
    type: string
    required: false
    description: "Malware SHA-256 hash of the dropped payload."
  - name: domain
    type: string
    required: false
    description: "Phishing / C2 domain. Defaults to evil.example.com."
  - name: url
    type: string
    required: false
    description: "Malicious URL observed. Defaults to the stage2 dropper URL."

consts:
  kibana_base_url: "https://scotth-9-8e23db.kb.us-west2.gcp.elastic-cloud.com"
  # All vendor and AI calls route through ngrok tunnel → localhost:8080 (llm_mock_server).
  # AI analysis endpoint: POST /ai/invoke {message:"..."} → {output:"<markdown>"}
  ngrok_base: "https://reserveless-augusta-nonaccordantly.ngrok-free.dev"
  # Demo auth tokens — mock ignores auth values.
  greynoise_api_key: "demo-greynoise-key-acmecorp"
  recorded_future_token: "demo-rf-token-acmecorp"
  anomali_username: "demo_analyst"
  anomali_apikey: "demo-anomali-key-acmecorp"
  trustar_token: "demo-trustar-bearer-acmecorp"
  virustotal_api_key: "demo-vt-key-acmecorp"
  maxmind_account_id: "123456"
  maxmind_license_key: "demo-maxmind-license"
  urlscan_api_key: "demo-urlscan-key-acmecorp"
  safebrowsing_api_key: "demo-gsb-key-acmecorp"
  umbrella_customer_key: "demo-umbrella-key-acmecorp"
  graph_token: "demo-graph-bearer-acmecorp"
  crowdstrike_client_id: "demo-cs-client-acmecorp"
  crowdstrike_client_secret: "demo-cs-secret-acmecorp"
  passivetotal_username: "demo@acmecorp.com"
  passivetotal_api_key: "demo-pt-key-acmecorp"

steps:
  # ── 0. Derive canonical indicators ───────────────────────────────────────
  - name: derive_indicators
    type: data.set
    with:
      ip: "{{ inputs.ip | default: '185.220.101.47' }}"
      username: "{{ inputs.username | default: 'jdoe@acmecorp.com' }}"
      hostname: "{{ inputs.hostname | default: 'DESKTOP-A4K9B2Z' }}"
      sha256: "{{ inputs.sha256 | default: 'a3f8e2d1c9b4f7e6a5d2c8b1e9f4a7d3c6b2e5f8a1d4c7b3e6f2a9d5c8b4e7f1' }}"
      domain: "{{ inputs.domain | default: 'evil.example.com' }}"
      url: "{{ inputs.url | default: 'https://185.220.101.47/dropper/stage2.ps1' }}"

  # ── 1. GreyNoise Community ────────────────────────────────────────────────
  - name: gn_community
    type: http
    with:
      url: "{{ consts.ngrok_base }}/v3/community/{{ steps.derive_indicators.output.ip }}"
      method: GET
      headers:
        X-Api-Key: "{{ consts.mock_api_key }}"
        key: "{{ consts.greynoise_api_key }}"
        Accept: "application/json"
    on-failure:
      continue: true

  # ── 2. GreyNoise Full Context ─────────────────────────────────────────────
  - name: gn_context
    type: http
    with:
      url: "{{ consts.ngrok_base }}/v3/noise/context/{{ steps.derive_indicators.output.ip }}"
      method: GET
      headers:
        X-Api-Key: "{{ consts.mock_api_key }}"
        key: "{{ consts.greynoise_api_key }}"
        Accept: "application/json"
    on-failure:
      continue: true

  # ── 3. GreyNoise GNQL ─────────────────────────────────────────────────────
  - name: gn_gnql
    type: http
    with:
      url: "{{ consts.ngrok_base }}/v3/experimental/gnql"
      method: GET
      headers:
        X-Api-Key: "{{ consts.mock_api_key }}"
        key: "{{ consts.greynoise_api_key }}"
        Accept: "application/json"
      query:
        query: "ip:{{ steps.derive_indicators.output.ip }} tags:Tor Exit Node classification:malicious"
        size: "10"
    on-failure:
      continue: true

  # ── 4. Recorded Future — IP risk ─────────────────────────────────────────
  - name: rf_ip
    type: http
    with:
      url: "{{ consts.ngrok_base }}/v2/ip/{{ steps.derive_indicators.output.ip }}"
      method: GET
      headers:
        X-Api-Key: "{{ consts.mock_api_key }}"
        X-RFToken: "{{ consts.recorded_future_token }}"
        Accept: "application/json"
      query:
        fields: "risk,intelCard,timestamps,relatedEntities"
    on-failure:
      continue: true

  # ── 5. Recorded Future — hash risk ───────────────────────────────────────
  - name: rf_hash
    type: http
    with:
      url: "{{ consts.ngrok_base }}/v2/hash/{{ steps.derive_indicators.output.sha256 }}"
      method: GET
      headers:
        X-Api-Key: "{{ consts.mock_api_key }}"
        X-RFToken: "{{ consts.recorded_future_token }}"
        Accept: "application/json"
      query:
        fields: "risk,intelCard,timestamps"
    on-failure:
      continue: true

  # ── 6. Recorded Future — domain risk ─────────────────────────────────────
  - name: rf_domain
    type: http
    with:
      url: "{{ consts.ngrok_base }}/v2/domain/{{ steps.derive_indicators.output.domain }}"
      method: GET
      headers:
        X-Api-Key: "{{ consts.mock_api_key }}"
        X-RFToken: "{{ consts.recorded_future_token }}"
        Accept: "application/json"
      query:
        fields: "risk,intelCard,timestamps"
    on-failure:
      continue: true

  # ── 7. Anomali ThreatStream ───────────────────────────────────────────────
  - name: anomali_ip
    type: http
    with:
      url: "{{ consts.ngrok_base }}/api/v2/intelligence/"
      method: GET
      headers:
        X-Api-Key: "{{ consts.mock_api_key }}"
        Authorization: "apikey {{ consts.anomali_username }}:{{ consts.anomali_apikey }}"
        Accept: "application/json"
      query:
        type: "ip"
        value: "{{ steps.derive_indicators.output.ip }}"
        limit: "5"
    on-failure:
      continue: true

  # ── 8. TruSTAR ────────────────────────────────────────────────────────────
  - name: trustar_ip
    type: http
    with:
      url: "{{ consts.ngrok_base }}/api/1.3/indicators/search"
      method: POST
      headers:
        X-Api-Key: "{{ consts.mock_api_key }}"
        Authorization: "Bearer {{ consts.trustar_token }}"
        Content-Type: "application/json"
      body:
        types: ["IP"]
        value: "{{ steps.derive_indicators.output.ip }}"
    on-failure:
      continue: true

  # ── 9. VirusTotal — IP ────────────────────────────────────────────────────
  - name: vt_ip
    type: http
    with:
      url: "{{ consts.ngrok_base }}/api/v3/ip_addresses/{{ steps.derive_indicators.output.ip }}"
      method: GET
      headers:
        X-Api-Key: "{{ consts.mock_api_key }}"
        x-apikey: "{{ consts.virustotal_api_key }}"
        Accept: "application/json"
    on-failure:
      continue: true

  # ── 10. VirusTotal — hash ─────────────────────────────────────────────────
  - name: vt_hash
    type: http
    with:
      url: "{{ consts.ngrok_base }}/api/v3/files/{{ steps.derive_indicators.output.sha256 }}"
      method: GET
      headers:
        X-Api-Key: "{{ consts.mock_api_key }}"
        x-apikey: "{{ consts.virustotal_api_key }}"
        Accept: "application/json"
    on-failure:
      continue: true

  # ── 11. VirusTotal — domain ───────────────────────────────────────────────
  - name: vt_domain
    type: http
    with:
      url: "{{ consts.ngrok_base }}/api/v3/domains/{{ steps.derive_indicators.output.domain }}"
      method: GET
      headers:
        X-Api-Key: "{{ consts.mock_api_key }}"
        x-apikey: "{{ consts.virustotal_api_key }}"
        Accept: "application/json"
    on-failure:
      continue: true

  # ── 12. MaxMind GeoIP ─────────────────────────────────────────────────────
  - name: maxmind_ip
    type: http
    with:
      url: "{{ consts.ngrok_base }}/geoip/v2.1/insights/{{ steps.derive_indicators.output.ip }}"
      method: GET
      headers:
        X-Api-Key: "{{ consts.mock_api_key }}"
        Authorization: "Basic {{ consts.maxmind_account_id }}:{{ consts.maxmind_license_key }}"
        Accept: "application/json"
    on-failure:
      continue: true

  # ── 13. URLScan.io — submit ───────────────────────────────────────────────
  - name: urlscan_submit
    type: http
    with:
      url: "{{ consts.ngrok_base }}/api/v1/scan/"
      method: POST
      headers:
        X-Api-Key: "{{ consts.mock_api_key }}"
        API-Key: "{{ consts.urlscan_api_key }}"
        Content-Type: "application/json"
      body:
        url: "{{ steps.derive_indicators.output.url }}"
        visibility: "private"
    on-failure:
      continue: true

  # ── 14. URLScan.io — result ───────────────────────────────────────────────
  - name: urlscan_result
    type: http
    with:
      url: "{{ consts.ngrok_base }}/api/v1/result/{{ steps.urlscan_submit.output.data.uuid | default: '00000000-0000-0000-0000-000000000000' }}"
      method: GET
      headers:
        X-Api-Key: "{{ consts.mock_api_key }}"
        API-Key: "{{ consts.urlscan_api_key }}"
        Accept: "application/json"
    on-failure:
      continue: true

  # ── 15. PhishTank ─────────────────────────────────────────────────────────
  - name: phishtank_url
    type: http
    with:
      url: "{{ consts.ngrok_base }}/checkurl/"
      method: POST
      headers:
        X-Api-Key: "{{ consts.mock_api_key }}"
        Content-Type: "application/x-www-form-urlencoded"
      body:
        url: "{{ steps.derive_indicators.output.url }}"
        format: "json"
        app_key: "demo-phishtank-key-acmecorp"
    on-failure:
      continue: true

  # ── 16. PassiveTotal WHOIS ────────────────────────────────────────────────
  - name: whois
    type: http
    with:
      url: "{{ consts.ngrok_base }}/v2/whois"
      method: GET
      headers:
        X-Api-Key: "{{ consts.mock_api_key }}"
        Authorization: "Basic {{ consts.passivetotal_username }}:{{ consts.passivetotal_api_key }}"
        Accept: "application/json"
      query:
        query: "{{ steps.derive_indicators.output.domain }}"
    on-failure:
      continue: true

  # ── 17. Google Safe Browsing ──────────────────────────────────────────────
  - name: safebrowsing_url
    type: http
    with:
      url: "{{ consts.ngrok_base }}/v4/threatMatches:find"
      method: POST
      headers:
        X-Api-Key: "{{ consts.mock_api_key }}"
        Content-Type: "application/json"
      query:
        key: "{{ consts.safebrowsing_api_key }}"
      body:
        client:
          clientId: "acmecorp-soar"
          clientVersion: "1.0.0"
        threatInfo:
          threatTypes: ["MALWARE", "SOCIAL_ENGINEERING", "UNWANTED_SOFTWARE"]
          platformTypes: ["ANY_PLATFORM"]
          threatEntryTypes: ["URL"]
          threatEntries:
            - url: "{{ steps.derive_indicators.output.url }}"
    on-failure:
      continue: true

  # ── 18. Cisco Umbrella ────────────────────────────────────────────────────
  - name: umbrella_events
    type: http
    with:
      url: "{{ consts.ngrok_base }}/1.0/events"
      method: GET
      headers:
        X-Api-Key: "{{ consts.mock_api_key }}"
        Accept: "application/json"
      query:
        customerKey: "{{ consts.umbrella_customer_key }}"
        from: "-3600000"
        to: "0"
        domain: "{{ steps.derive_indicators.output.domain }}"
    on-failure:
      continue: true

  # ── 19. Microsoft Graph — user attributes ────────────────────────────────
  - name: graph_user
    type: http
    with:
      url: "{{ consts.ngrok_base }}/v1.0/users/{{ steps.derive_indicators.output.username }}"
      method: GET
      headers:
        X-Api-Key: "{{ consts.mock_api_key }}"
        Authorization: "Bearer {{ consts.graph_token }}"
        Accept: "application/json"
    on-failure:
      continue: true

  # ── 20. Microsoft Graph — sign-in audit ──────────────────────────────────
  - name: graph_signins
    type: http
    with:
      url: "{{ consts.ngrok_base }}/v1.0/auditLogs/signIns"
      method: GET
      headers:
        X-Api-Key: "{{ consts.mock_api_key }}"
        Authorization: "Bearer {{ consts.graph_token }}"
        Accept: "application/json"
      query:
        "$filter": "userPrincipalName eq '{{ steps.derive_indicators.output.username }}'"
        "$top": "5"
        "$orderby": "createdDateTime desc"
    on-failure:
      continue: true

  # ── 21. CrowdStrike — OAuth2 token ───────────────────────────────────────
  - name: cs_token
    type: http
    with:
      url: "{{ consts.ngrok_base }}/oauth2/token"
      method: POST
      headers:
        X-Api-Key: "{{ consts.mock_api_key }}"
        Content-Type: "application/x-www-form-urlencoded"
      body:
        client_id: "{{ consts.crowdstrike_client_id }}"
        client_secret: "{{ consts.crowdstrike_client_secret }}"
    on-failure:
      continue: true

  # ── 22. CrowdStrike — device search ──────────────────────────────────────
  - name: cs_device
    type: http
    with:
      url: "{{ consts.ngrok_base }}/devices/queries/devices/v1"
      method: GET
      headers:
        X-Api-Key: "{{ consts.mock_api_key }}"
        Authorization: "Bearer {{ steps.cs_token.output.data.access_token | default: 'no-token' }}"
        Accept: "application/json"
      query:
        filter: "hostname:'{{ steps.derive_indicators.output.hostname }}'"
    on-failure:
      continue: true

  # ── 23. CrowdStrike — detections ─────────────────────────────────────────
  - name: cs_detections
    type: http
    with:
      url: "{{ consts.ngrok_base }}/detects/queries/detects/v1"
      method: GET
      headers:
        X-Api-Key: "{{ consts.mock_api_key }}"
        Authorization: "Bearer {{ steps.cs_token.output.data.access_token | default: 'no-token' }}"
        Accept: "application/json"
      query:
        filter: "device.hostname:'{{ steps.derive_indicators.output.hostname }}'"
        sort: "max_severity_displayname.desc"
        limit: "5"
    on-failure:
      continue: true

  # ── 24. Splunk — submit search job ───────────────────────────────────────
  - name: splunk_search
    type: http
    with:
      url: "{{ consts.ngrok_base }}/services/search/v2/jobs"
      method: POST
      headers:
        X-Api-Key: "{{ consts.mock_api_key }}"
        Authorization: "Splunk demo-splunk-token-acmecorp"
        Content-Type: "application/x-www-form-urlencoded"
        Accept: "application/json"
      body:
        search: "search index=main ({{ steps.derive_indicators.output.ip }} OR {{ steps.derive_indicators.output.hostname }}) earliest=-24h | head 20"
        output_mode: "json"
    on-failure:
      continue: true

  # ── 25. Splunk — fetch results ────────────────────────────────────────────
  - name: splunk_results
    type: http
    with:
      url: "{{ consts.ngrok_base }}/services/search/v2/jobs/{{ steps.splunk_search.output.data.sid | default: 'pending' }}/results"
      method: GET
      headers:
        X-Api-Key: "{{ consts.mock_api_key }}"
        Authorization: "Splunk demo-splunk-token-acmecorp"
        Accept: "application/json"
      query:
        output_mode: "json"
        count: "10"
    on-failure:
      continue: true

  # ── 26. Compile triage summary scalars ────────────────────────────────────
  - name: build_summary
    type: data.set
    with:
      gn_classification: "{{ steps.gn_community.output.data.classification | default: 'unknown' }}"
      gn_noise: "{{ steps.gn_community.output.data.noise | default: false }}"
      gn_last_seen: "{{ steps.gn_community.output.data.last_seen | default: '-' }}"
      gn_context_actor: "{{ steps.gn_context.output.data.actor | default: 'unknown' }}"
      gn_context_country: "{{ steps.gn_context.output.data.metadata.country | default: '-' }}"
      gn_context_org: "{{ steps.gn_context.output.data.metadata.organization | default: '-' }}"
      gn_gnql_count: "{{ steps.gn_gnql.output.data.count | default: 0 }}"
      rf_ip_score: "{{ steps.rf_ip.output.data.data.risk.score | default: 'N/A' }}"
      rf_ip_label: "{{ steps.rf_ip.output.data.data.risk.criticalityLabel | default: 'N/A' }}"
      rf_ip_summary: "{{ steps.rf_ip.output.data.data.risk.riskSummary | default: '-' }}"
      rf_hash_score: "{{ steps.rf_hash.output.data.data.risk.score | default: 'N/A' }}"
      rf_hash_label: "{{ steps.rf_hash.output.data.data.risk.criticalityLabel | default: 'N/A' }}"
      rf_domain_score: "{{ steps.rf_domain.output.data.data.risk.score | default: 'N/A' }}"
      rf_domain_label: "{{ steps.rf_domain.output.data.data.risk.criticalityLabel | default: 'N/A' }}"
      vt_ip_malicious: "{{ steps.vt_ip.output.data.data.attributes.last_analysis_stats.malicious | default: 'N/A' }}"
      vt_hash_malicious: "{{ steps.vt_hash.output.data.data.attributes.last_analysis_stats.malicious | default: 'N/A' }}"
      vt_domain_malicious: "{{ steps.vt_domain.output.data.data.attributes.last_analysis_stats.malicious | default: 'N/A' }}"
      anomali_total: "{{ steps.anomali_ip.output.data.meta.total_count | default: 0 }}"
      trustar_priority: "{{ steps.trustar_ip.output.data.priorityScore | default: 'N/A' }}"
      trustar_report_id: "{{ steps.trustar_ip.output.data.reportId | default: '-' }}"
      whois_org: "{{ steps.whois.output.data.organization | default: 'unknown' }}"
      whois_registrar: "{{ steps.whois.output.data.registrar | default: 'unknown' }}"
      whois_registered: "{{ steps.whois.output.data.registered | default: '-' }}"
      whois_country: "{{ steps.whois.output.data.country | default: '-' }}"
      geoip_country: "{{ steps.maxmind_ip.output.data.country.names.en | default: '-' }}"
      geoip_city: "{{ steps.maxmind_ip.output.data.city.names.en | default: '-' }}"
      geoip_asn_org: "{{ steps.maxmind_ip.output.data.traits.autonomous_system_organization | default: '-' }}"
      geoip_asn: "{{ steps.maxmind_ip.output.data.traits.autonomous_system_number | default: '-' }}"
      urlscan_score: "{{ steps.urlscan_result.output.data.verdicts.overall.score | default: 'N/A' }}"
      urlscan_malicious: "{{ steps.urlscan_result.output.data.verdicts.overall.malicious | default: false }}"
      urlscan_uuid: "{{ steps.urlscan_submit.output.data.uuid | default: '-' }}"
      phishtank_in_db: "{{ steps.phishtank_url.output.data.results.in_database | default: false }}"
      phishtank_verified: "{{ steps.phishtank_url.output.data.results.verified | default: false }}"
      graph_display_name: "{{ steps.graph_user.output.data.displayName | default: steps.derive_indicators.output.username }}"
      graph_enabled: "{{ steps.graph_user.output.data.accountEnabled | default: true }}"
      graph_dept: "{{ steps.graph_user.output.data.department | default: 'unknown' }}"
      graph_job_title: "{{ steps.graph_user.output.data.jobTitle | default: '-' }}"
      graph_office: "{{ steps.graph_user.output.data.officeLocation | default: '-' }}"
      cs_detection_total: "{{ steps.cs_detections.output.data.meta.pagination.total | default: 0 }}"
      cs_device_count: "{{ steps.cs_device.output.data.meta.pagination.total | default: 0 }}"
      splunk_sid: "{{ steps.splunk_search.output.data.sid | default: 'N/A' }}"

  # ================================================================
  # AI ANALYSIS PHASE
  # ================================================================

  # ── 27. AI Phishing Triage & Attribution ──────────────────────────────────
  - name: ai_phishing_triage
    type: http
    with:
      url: "{{ consts.ngrok_base }}/ai/invoke"
      method: POST
      headers:
        X-Api-Key: "{{ consts.mock_api_key }}"
        Content-Type: "application/json"
      body:
        message: |
          You are a senior SOC analyst investigating a confirmed phishing incident at AcmeCorp.
          Analyze the threat intelligence enrichment data below and produce a comprehensive incident analysis.

          INCIDENT CONTEXT:
          - Email Subject: "ACTION REQUIRED: March Invoice"
          - Phishing Sender: hr-noreply@acmecorp-invoices.com
          - Attachment Executed: invoice_march.exe
          - Victim: {{ steps.build_summary.output.graph_display_name }} ({{ steps.build_summary.output.graph_job_title }}, {{ steps.build_summary.output.graph_dept }})
          - Endpoint: {{ steps.derive_indicators.output.hostname }}
          - Account Currently Enabled: {{ steps.build_summary.output.graph_enabled }}

          NETWORK THREAT INTELLIGENCE — C2 IP: {{ steps.derive_indicators.output.ip }}
          - GreyNoise: classification={{ steps.build_summary.output.gn_classification }}, actor={{ steps.build_summary.output.gn_context_actor }}, country={{ steps.build_summary.output.gn_context_country }}, org={{ steps.build_summary.output.gn_context_org }}, last_seen={{ steps.build_summary.output.gn_last_seen }}
          - GreyNoise TOR query matches: {{ steps.build_summary.output.gn_gnql_count }}
          - Recorded Future: score={{ steps.build_summary.output.rf_ip_score }}/100 ({{ steps.build_summary.output.rf_ip_label }}), {{ steps.build_summary.output.rf_ip_summary }}
          - VirusTotal: {{ steps.build_summary.output.vt_ip_malicious }} malicious detection engines
          - MaxMind GeoIP: {{ steps.build_summary.output.geoip_city }}, {{ steps.build_summary.output.geoip_country }}, AS{{ steps.build_summary.output.geoip_asn }} ({{ steps.build_summary.output.geoip_asn_org }})
          - Anomali ThreatStream: {{ steps.build_summary.output.anomali_total }} intel records
          - TruSTAR: priority={{ steps.build_summary.output.trustar_priority }}, report={{ steps.build_summary.output.trustar_report_id }}

          MALWARE INTELLIGENCE — SHA-256: {{ steps.derive_indicators.output.sha256 }}
          - Recorded Future: score={{ steps.build_summary.output.rf_hash_score }}/100 ({{ steps.build_summary.output.rf_hash_label }})
          - VirusTotal: {{ steps.build_summary.output.vt_hash_malicious }} malicious detection engines

          DOMAIN & URL INTELLIGENCE — {{ steps.derive_indicators.output.domain }}
          - PassiveTotal WHOIS: registrar={{ steps.build_summary.output.whois_registrar }}, org={{ steps.build_summary.output.whois_org }}, registered={{ steps.build_summary.output.whois_registered }}, country={{ steps.build_summary.output.whois_country }}
          - Recorded Future Domain: score={{ steps.build_summary.output.rf_domain_score }}/100 ({{ steps.build_summary.output.rf_domain_label }})
          - VirusTotal Domain: {{ steps.build_summary.output.vt_domain_malicious }} malicious detection engines
          - URLScan.io: malicious={{ steps.build_summary.output.urlscan_malicious }}, threat_score={{ steps.build_summary.output.urlscan_score }}
          - PhishTank: in_database={{ steps.build_summary.output.phishtank_in_db }}, verified_phish={{ steps.build_summary.output.phishtank_verified }}

          ENDPOINT & IDENTITY:
          - CrowdStrike Falcon: {{ steps.build_summary.output.cs_device_count }} devices found, {{ steps.build_summary.output.cs_detection_total }} active detections
          - Microsoft Graph sign-ins: 5 recent sign-ins retrieved for {{ steps.derive_indicators.output.username }}

          Produce exactly these sections:

          ## Executive Summary
          [3 sentences. Plain English. Suitable for a CISO briefing. What happened, who was impacted, and what the immediate risk is.]

          ## Kill Chain Reconstruction
          [Number each stage. For each: MITRE ATT&CK tactic + technique ID + what evidence from the data supports it.]

          ## Threat Actor / Malware Attribution
          [Identify malware family or threat actor based on the IOCs. State confidence: High/Medium/Low with specific reasoning.]

          ## Blast Radius Assessment
          [Scope of compromise. Lateral movement indicators. Other accounts or systems at risk. Data exfiltration likelihood.]

          ## Immediate Containment — Next 30 Minutes
          [Bulleted checklist. Specific and actionable. Name exact systems and accounts.]
    on-failure:
      continue: true
      retry:
        max-attempts: 2

  # ── 28. AI Threat Intelligence Dashboard ──────────────────────────────────
  - name: ai_threat_intel_dashboard
    type: http
    with:
      url: "{{ consts.ngrok_base }}/ai/invoke"
      method: POST
      headers:
        X-Api-Key: "{{ consts.mock_api_key }}"
        Content-Type: "application/json"
      body:
        message: |
          Build a threat intelligence investigation dashboard using only markdown tables.
          Return ONLY the formatted markdown sections below. No prose outside the tables.

          RAW THREAT INTELLIGENCE DATA:
          IP: {{ steps.derive_indicators.output.ip }}
          SHA256: {{ steps.derive_indicators.output.sha256 }}
          Domain: {{ steps.derive_indicators.output.domain }}
          URL: {{ steps.derive_indicators.output.url }}
          User: {{ steps.derive_indicators.output.username }} ({{ steps.build_summary.output.graph_display_name }}, {{ steps.build_summary.output.graph_job_title }}, {{ steps.build_summary.output.graph_dept }})
          Endpoint: {{ steps.derive_indicators.output.hostname }}

          Scores and verdicts:
          - GreyNoise IP: classification={{ steps.build_summary.output.gn_classification }}, actor={{ steps.build_summary.output.gn_context_actor }}, last_seen={{ steps.build_summary.output.gn_last_seen }}
          - RF IP: {{ steps.build_summary.output.rf_ip_score }}/100 ({{ steps.build_summary.output.rf_ip_label }})
          - RF Hash: {{ steps.build_summary.output.rf_hash_score }}/100 ({{ steps.build_summary.output.rf_hash_label }})
          - RF Domain: {{ steps.build_summary.output.rf_domain_score }}/100 ({{ steps.build_summary.output.rf_domain_label }})
          - VT IP malicious engines: {{ steps.build_summary.output.vt_ip_malicious }}
          - VT Hash malicious engines: {{ steps.build_summary.output.vt_hash_malicious }}
          - VT Domain malicious engines: {{ steps.build_summary.output.vt_domain_malicious }}
          - Anomali intel records: {{ steps.build_summary.output.anomali_total }}
          - TruSTAR priority: {{ steps.build_summary.output.trustar_priority }}
          - URLScan malicious: {{ steps.build_summary.output.urlscan_malicious }}, score={{ steps.build_summary.output.urlscan_score }}
          - PhishTank in_db: {{ steps.build_summary.output.phishtank_in_db }}, verified={{ steps.build_summary.output.phishtank_verified }}
          - GeoIP: {{ steps.build_summary.output.geoip_city }}, {{ steps.build_summary.output.geoip_country }}, AS{{ steps.build_summary.output.geoip_asn }} {{ steps.build_summary.output.geoip_asn_org }}
          - WHOIS: registrar={{ steps.build_summary.output.whois_registrar }}, org={{ steps.build_summary.output.whois_org }}, registered={{ steps.build_summary.output.whois_registered }}
          - CrowdStrike: {{ steps.build_summary.output.cs_device_count }} devices, {{ steps.build_summary.output.cs_detection_total }} active detections
          - Account enabled: {{ steps.build_summary.output.graph_enabled }}

          Build these exact sections:

          ## IOC Threat Intelligence Matrix
          | IOC | Type | GreyNoise | Recorded Future | VirusTotal | Anomali / TruSTAR | Overall Verdict |
          [One row per IOC: IP, SHA256, Domain, URL. Use 🔴 CRITICAL / 🟠 HIGH / 🟡 MEDIUM / 🟢 LOW verdicts in the last column.]

          ## Identity & Account Risk
          | Field | Value | Risk Assessment |
          [Include: display name, job title, department, account state, sign-in anomaly risk, why Finance is a high-value target]

          ## Endpoint Detection Status
          | Source | Metric | Value | Recommended Action |
          [CrowdStrike devices found, active detection count, endpoint isolation status]

          ## Domain & URL Intelligence
          | Source | Indicator | Finding | Verdict |
          [URLScan, PhishTank, Google Safe Browsing, WHOIS, RF Domain, VT Domain — one row each]

          ## Geolocation & Network Infrastructure
          | Attribute | Value |
          [IP, city, country, ASN, ASN org, TOR classification, last seen, GreyNoise actor]
    on-failure:
      continue: true
      retry:
        max-attempts: 2

  # ── 29. AI Response Playbook ───────────────────────────────────────────────
  - name: ai_response_playbook
    type: http
    with:
      url: "{{ consts.ngrok_base }}/ai/invoke"
      method: POST
      headers:
        X-Api-Key: "{{ consts.mock_api_key }}"
        Content-Type: "application/json"
      body:
        message: |
          You are a senior incident responder. Based on this phishing investigation, produce a prioritized response playbook and hunting queries.

          Triage Summary:
          {{ steps.ai_phishing_triage.output.data.output }}

          Key operational data:
          - Victim: {{ steps.build_summary.output.graph_display_name }} ({{ steps.build_summary.output.graph_job_title }}, {{ steps.build_summary.output.graph_dept }})
          - Account Enabled: {{ steps.build_summary.output.graph_enabled }}
          - Endpoint: {{ steps.derive_indicators.output.hostname }}, CrowdStrike detections={{ steps.build_summary.output.cs_detection_total }}
          - C2 IP: {{ steps.derive_indicators.output.ip }} (RF={{ steps.build_summary.output.rf_ip_score }}/100, GN={{ steps.build_summary.output.gn_classification }}, actor={{ steps.build_summary.output.gn_context_actor }})
          - Malware hash: {{ steps.derive_indicators.output.sha256 }} (VT={{ steps.build_summary.output.vt_hash_malicious }} engines, RF={{ steps.build_summary.output.rf_hash_score }}/100)
          - Phishing domain: {{ steps.derive_indicators.output.domain }} (WHOIS org={{ steps.build_summary.output.whois_org }})
          - Dropper URL: {{ steps.derive_indicators.output.url }}

          Produce exactly these sections:

          ## Response Playbook

          ### 🔴 Immediate Actions (0-30 min)
          - [ ] [Specific action — who does it, on which system]
          [5-7 items. Must name {{ steps.derive_indicators.output.hostname }}, {{ steps.derive_indicators.output.username }}, {{ steps.derive_indicators.output.ip }} specifically where relevant.]

          ### 🟡 Short-term Actions (30 min - 4 hrs)
          - [ ] [Scoping, hunting, evidence preservation actions]
          [5-7 items.]

          ### 🟢 Long-term Actions (4 hrs+)
          - [ ] [Hardening, detection improvements, process changes]
          [4-5 items.]

          ## ES|QL Hunting Queries

          Provide 3 copy-paste-ready ES|QL queries:

          **1. Fleet-wide C2 connections to {{ steps.derive_indicators.output.ip }}**
          ```esql
          FROM logs-* | WHERE destination.ip == "{{ steps.derive_indicators.output.ip }}"
          ```
          What this finds: all hosts communicating with the C2 IP

          **2. SHA-256 execution history across endpoints**
          ```esql
          FROM logs-* | WHERE process.hash.sha256 == "{{ steps.derive_indicators.output.sha256 }}"
          ```
          What this finds: every host that executed this malware hash

          **3. Phishing email delivery timeline**
          ```esql
          FROM logs-* | WHERE email.from.address == "hr-noreply@acmecorp-invoices.com"
          ```
          What this finds: all recipients of the phishing campaign

          ## Suggested Follow-on Workflows
          - Active Directory password reset for jdoe (activedirectory-reset-password workflow)
          - CrowdStrike endpoint isolation for DESKTOP-A4K9B2Z
          - IOC block-list push to firewall for 185.220.101.47 and evil.example.com
    on-failure:
      continue: true
      retry:
        max-attempts: 2

  # ================================================================
  # CASE CREATION & COMMENTS
  # ================================================================

  # ── 30. Create Elastic Security case ──────────────────────────────────────
  - name: create_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "AcmeCorp Phishing — {{ steps.derive_indicators.output.username }} → {{ steps.derive_indicators.output.ip }}"
        description: |
          # Phishing Incident Response

          > **Severity: CRITICAL** — Automated triage by Kibana Workflows. Human analyst sign-off required before containment.

          ---

          ## Victim Profile

          | Field | Value |
          |-------|-------|
          | Name | {{ steps.build_summary.output.graph_display_name }} |
          | Email | `{{ steps.derive_indicators.output.username }}` |
          | Job Title | {{ steps.build_summary.output.graph_job_title }} |
          | Department | {{ steps.build_summary.output.graph_dept }} |
          | Endpoint | `{{ steps.derive_indicators.output.hostname }}` |
          | Account Enabled | **{{ steps.build_summary.output.graph_enabled }}** |

          ---

          ## Indicators of Compromise

          | Type | Value |
          |------|-------|
          | C2 IP | `{{ steps.derive_indicators.output.ip }}` |
          | Phishing Domain | `{{ steps.derive_indicators.output.domain }}` |
          | Dropper URL | `{{ steps.derive_indicators.output.url }}` |
          | Malware SHA-256 | `{{ steps.derive_indicators.output.sha256 }}` |
          | Email Subject | ACTION REQUIRED: March Invoice |
          | Phishing Sender | `hr-noreply@acmecorp-invoices.com` |

          ---

          ## What's in This Case

          Four automated analysis comments have been posted below:

          1. **AI Phishing Analysis** — Kill chain reconstruction, threat actor attribution, blast radius, and immediate containment checklist
          2. **Threat Intel Dashboard** — IOC matrix comparing all vendor scores, identity risk assessment, endpoint status
          3. **Response Playbook** — Prioritized 🔴🟡🟢 actions and ready-to-run ES|QL hunting queries
          4. **Raw Vendor Enrichment** — Full data from 16+ threat intelligence sources for analyst reference

          ---

          *Enriched by: GreyNoise · Recorded Future · VirusTotal · MaxMind · URLScan.io · PhishTank · PassiveTotal · Google Safe Browsing · Cisco Umbrella · Anomali ThreatStream · TruSTAR · Microsoft Graph · CrowdStrike Falcon · Splunk SIEM*

          [Open AI Assistant]({{ consts.kibana_base_url }}/app/security/ai-assistant) to continue this investigation interactively.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "critical"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags:
          - "automated"
          - "phishing"
          - "acmecorp"
          - "jdoe"
          - "critical"
          - "ai-enriched"
    on-failure:
      continue: true

  # ── 31. Capture case ID ────────────────────────────────────────────────────
  - name: capture_case_id
    type: data.set
    with:
      case_id: "{{ steps.create_case.output.id | default: '' }}"

  # ── 32. Comment 1 — AI Phishing Analysis ──────────────────────────────────
  - name: post_ai_triage
