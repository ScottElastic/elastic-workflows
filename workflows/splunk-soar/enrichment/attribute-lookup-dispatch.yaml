# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "Attribute Lookup — Dispatch"
description: >
  Decides which attribute-lookup workflows (AD LDAP, Azure AD Graph,
  CrowdStrike Falcon, etc.) should run for the artifacts attached to an
  alert. Inputs: optional explicit artifact id list (defaults to all
  current alert artifacts) and an optional Kibana case to comment on.
  Output is a structured recommendation plus a case comment — actual
  child workflow invocation is performed by the parent enrichment chain.
enabled: true
tags: ["splunk-soar", "enrichment", "dispatch", "attribute-lookup", "translated"]

triggers:
  - type: alert
  - type: manual

inputs:
  - name: artifact_ids
    type: array
    required: false
    description: "Optional explicit artifact id list. If empty, all current alert artifacts are used."
  - name: case_id
    type: string
    required: false
    description: "Optional Kibana case ID to update on completion."

consts:
  # Tag set used by the downstream playbooks the dispatcher invokes.
  dispatch_tags: ["attributes"]

steps:
  - name: collect_artifacts
    type: data.set
    with:
      artifacts: "${{ inputs.artifact_ids }}"

  - name: any_artifacts
    type: if
    condition: "{{ steps.collect_artifacts.output.artifacts | size }} > 0"
    steps:
      # TODO: Elastic Workflows does not yet expose a generic "dispatch by tag"
      # primitive. As a placeholder, summarize the artifacts and let an agent
      # decide which lookup workflow to invoke. The original Phantom version
      # called community/dispatch_input_playbooks with playbook_tags=attributes.
      - name: ai_dispatch_decision
        type: ai.prompt
        with:
          prompt: |
            You are an enrichment dispatcher. Given the artifacts below,
            extract entities and recommend which attribute-lookup
            workflow should run for each one.

            Allowed workflow ids (lower-snake-case):
              ad_ldap_entity_attribute_lookup
              azure_ad_graph_user_attribute_lookup
              crowdstrike_device_attribute_lookup

            Artifacts (JSON):
            {{ steps.collect_artifacts.output.artifacts | json }}

            Respond with ONE JSON object on a single line, no prose:
              {"dispatch":[{"entity":"<value>","entity_type":"user|device|ip|domain|url|hash","workflows":["<id>",...]}]}
            Use an empty array if no entities are recognised.
        on-failure:
          retry:
            max-attempts: 2
            delay: "5s"
          continue: true

      - name: log_dispatch_summary
        type: console
        with:
          message: "Attribute lookup dispatch suggestions: {{ steps.ai_dispatch_decision.output.dispatch | json | default: '[]' }}"

      - name: case_update_branch
        type: if
        condition: "{{ inputs.case_id | size }} > 0"
        steps:
          - name: comment_on_case
            type: kibana.addCaseComment
            with:
              caseId: "{{ inputs.case_id }}"
              comment: "Attribute lookup dispatch complete. Suggested follow-ups: {{ steps.ai_dispatch_decision.output.dispatch | json | default: '[]' }}"
    else:
      - name: no_new_artifacts
        type: console
        with:
          message: "No new artifacts found to dispatch."
