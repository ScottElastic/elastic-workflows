# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "Dynamic Analysis — Dispatch"
description: >
  Recommends sandbox detonation workflows for the URLs and files attached
  to an alert. Inputs: optional arrays of URLs and vault ids, and an
  optional Kibana case to comment on. Returns a recommendation summary
  per indicator (Splunk Attack Analyzer, VirusTotal, UrlScan, etc.) —
  actual detonation is performed by the named child workflow.
enabled: true
tags: ["splunk-soar", "enrichment", "dispatch", "dynamic-analysis", "sandbox", "translated"]

triggers:
  - type: alert
  - type: manual

inputs:
  - name: urls
    type: array
    required: false
    description: "URLs to detonate. If empty, taken from alert artifacts."
  - name: vault_ids
    type: array
    required: false
    description: "Vault IDs (file references) to detonate."
  - name: case_id
    type: string
    required: false
    description: "Optional Kibana case ID to update on completion."

consts:
  # Tag downstream sandbox detonation workflows.
  dispatch_tags: ["sandbox"]

steps:
  - name: collect_inputs
    type: data.set
    with:
      urls: "${{ inputs.urls }}"
      vault_ids: "${{ inputs.vault_ids }}"

  - name: have_inputs
    type: if
    condition: "{{ steps.collect_inputs.output.urls | size }} > 0 or {{ steps.collect_inputs.output.vault_ids | size }} > 0"
    steps:
      # TODO: Elastic Workflows has no generic dispatcher by tag yet. Use an
      # ai.prompt step to recommend which sandbox/dynamic analysis workflow to
      # run for the supplied indicators. Equivalent to the Phantom playbook's
      # call to community/dispatch_input_playbooks with playbook_tags=sandbox.
      - name: ai_dispatch_decision
        type: ai.prompt
        with:
          prompt: |
            You are routing indicators to sandbox detonation workflows.

            Allowed workflow ids:
              splunk_attack_analyzer_dynamic_analysis
              virustotal_v3_dynamic_analysis
              urlscan_io_dynamic_analysis
              crowdstrike_oauth_api_dynamic_analysis

            URLs (JSON array): {{ steps.collect_inputs.output.urls | json }}
            Vault IDs (JSON array): {{ steps.collect_inputs.output.vault_ids | json }}

            Respond with ONE JSON object on a single line, no prose:
              {"plan":[{"indicator":"<value>","indicator_type":"url|file","workflows":["<id>",...]}]}
            If both lists are empty, respond with {"plan":[]}.
        on-failure:
          retry:
            max-attempts: 2
            delay: "5s"
          continue: true

      - name: summary_table
        type: data.set
        with:
          summary:
            total_urls: "{{ steps.collect_inputs.output.urls | size }}"
            total_files: "{{ steps.collect_inputs.output.vault_ids | size }}"
            plan: "${{ steps.ai_dispatch_decision.output.plan | default: [] }}"

      - name: case_update_branch
        type: if
        condition: "{{ inputs.case_id | size }} > 0"
        steps:
          - name: comment_case_with_summary
            type: kibana.request
            with:
              method: POST
              path: "/api/cases/{{ inputs.case_id }}/comments"
              body:
                type: "user"
                comment: "Dynamic analysis dispatch complete. Plan: {{ steps.ai_dispatch_decision.output.plan | json | default: '[]' }}"
                owner: "cases"

      - name: log_dispatch
        type: console
        with:
          message: |
            Dynamic analysis dispatch run.
            urls={{ steps.collect_inputs.output.urls | size }}
            files={{ steps.collect_inputs.output.vault_ids | size }}
    else:
      - name: no_indicators
        type: console
        with:
          message: "No URL or vault_id indicators supplied — nothing to dispatch."
