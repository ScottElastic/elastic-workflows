# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "Identifier Activity Analysis — Dispatch"
description: >
  Recommends identifier-activity analysis workflows for the indicators
  on an alert (Splunk searches, Defender ATP, CrowdStrike, mailbox
  message lookups). Inputs: optional artifact id list (defaults to all
  current alert artifacts) and an optional Kibana case to comment on.
  Output is a structured per-indicator plan; downstream invocation is
  the caller's responsibility.
enabled: true
tags: ["splunk-soar", "enrichment", "dispatch", "identifier-activity", "translated"]

triggers:
  - type: alert
  - type: manual

inputs:
  - name: artifact_ids
    type: array
    required: false
    description: "Optional artifact id list to limit dispatch. Defaults to all current alert artifacts."
  - name: case_id
    type: string
    required: false
    description: "Optional Kibana case ID to update with the merged report."

consts:
  dispatch_tags: ["identifier_activity"]

steps:
  - name: collect_artifacts
    type: data.set
    with:
      artifacts: "${{ inputs.artifact_ids }}"

  - name: have_artifacts
    type: if
    condition: "{{ steps.collect_artifacts.output.artifacts | size }} > 0"
    steps:
      # TODO: Replace with native multi-workflow dispatcher when available.
      # The original Phantom playbook called community/dispatch_input_playbooks
      # with playbook_tags=identifier_activity.
      - name: ai_dispatch_decision
        type: ai.prompt
        with:
          prompt: |
            You are routing indicators to identifier-activity workflows.

            Allowed workflow ids:
              splunk_identifier_activity_analysis
              splunk_message_identifier_activity_analysis
              defender_atp_identifier_activity_analysis
              crowdstrike_identifier_activity_analysis
              g_suite_for_gmail_message_identifier_activity_analysis
              ms_graph_for_office_365_message_identifier_activity_analysis

            Artifacts (JSON): {{ steps.collect_artifacts.output.artifacts | json }}

            Respond with ONE JSON object on a single line, no prose:
              {"plan":[{"indicator":"<value>","indicator_type":"url|ip|domain|hash|message_id","workflows":["<id>",...]}]}
            Use an empty array when nothing maps.
        on-failure:
          retry:
            max-attempts: 2
            delay: "5s"
          continue: true

      - name: merge_reports
        type: data.set
        with:
          merged_report: |
            Identifier activity analysis dispatch run.
            Artifacts processed: {{ steps.collect_artifacts.output.artifacts | size }}
            Plan: {{ steps.ai_dispatch_decision.output.plan | json | default: '[]' }}

      - name: case_update_branch
        type: if
        condition: "{{ inputs.case_id | size }} > 0"
        steps:
          - name: comment_with_report
            type: kibana.addCaseComment
            with:
              caseId: "{{ inputs.case_id }}"
              comment: "{{ steps.merge_reports.output.merged_report }}"

      - name: log_dispatch
        type: console
        with:
          message: "{{ steps.merge_reports.output.merged_report }}"
    else:
      - name: no_artifacts
        type: console
        with:
          message: "No artifacts available — nothing to dispatch."
