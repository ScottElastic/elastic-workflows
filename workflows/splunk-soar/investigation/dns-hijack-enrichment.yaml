# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "DNS Hijack — Enrichment"
description: >
  Enriches a suspected DNS hijack notable event by geolocating the new answer
  IP (MaxMind), pulling whois (WhoisXMLAPI), fetching host details and TLS
  certificate metadata from Censys v2, querying PassiveTotal for IP and domain
  classifications, and checking Malware Domain List. Builds a single comment
  posted to an optional Kibana case and the originating Splunk ES notable.
enabled: true
tags: ["splunk-soar", "investigation", "dns", "enrichment", "splunk-es", "translated"]

triggers:
  - type: manual
  - type: alert

inputs:
  - name: domain
    type: string
    required: true
    description: "Domain whose DNS record was observed changing."
  - name: current_answer
    type: string
    required: true
    description: "Currently observed IP address answering for the domain."
  - name: notable_event_id
    type: string
    required: false
    description: "Splunk ES notable event ID to update with enrichment results."
  - name: kibana_case_id
    type: string
    required: false
    description: "Optional Kibana case to append the enrichment summary to."

consts:
  # MaxMind GeoIP2 Web Service — Basic auth user:license-key.
  maxmind_endpoint: "https://geoip.maxmind.com/geoip/v2.1/city/"
  maxmind_auth: "Basic CHANGEME"
  # WhoisXML API — `apiKey` query parameter on the WhoisService endpoint.
  whois_endpoint: "https://www.whoisxmlapi.com/whoisserver/WhoisService"
  whois_api_key: "CHANGEME"
  # Censys v2 — Basic auth with api_id:api_secret.
  censys_endpoint: "https://search.censys.io/api/v2"
  censys_auth: "Basic CHANGEME"
  # PassiveTotal (RiskIQ) — Basic auth with username:api_key.
  passivetotal_endpoint: "https://api.passivetotal.org/v2"
  passivetotal_auth: "Basic CHANGEME"
  malware_domain_list_endpoint: "https://www.malwaredomainlist.com/mdl.php"
  # Splunk ES notable update — POST /services/notable_update.
  splunk_endpoint: "https://CHANGEME-splunk.example.com:8089"
  splunk_auth: "Bearer CHANGEME"

steps:
  - name: geolocate_current_answer
    type: http
    with:
      url: "{{ consts.maxmind_endpoint }}{{ inputs.current_answer }}"
      method: GET
      headers:
        Authorization: "{{ consts.maxmind_auth }}"
        Accept: "application/json"
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"
      continue: true

  - name: whois_ip
    type: http
    with:
      url: "{{ consts.whois_endpoint }}"
      method: GET
      query:
        apiKey: "{{ consts.whois_api_key }}"
        ipAddress: "{{ inputs.current_answer }}"
        outputFormat: "JSON"
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"
      continue: true

  # Censys v2: GET /api/v2/hosts/{ip} returns services + cert fingerprints.
  - name: censys_ip_lookup
    type: http
    with:
      url: "{{ consts.censys_endpoint }}/hosts/{{ inputs.current_answer }}"
      method: GET
      headers:
        Authorization: "{{ consts.censys_auth }}"
        Accept: "application/json"
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"
      continue: true

  - name: tls_certificate_present
    type: if
    condition: "{{ steps.censys_ip_lookup.output.result.services | size }} > 0"
    steps:
      # Censys v2 certificates lookup: GET /api/v2/certificates/{sha256_fp}.
      - name: censys_lookup_certificate
        type: http
        with:
          url: "{{ consts.censys_endpoint }}/certificates/{{ steps.censys_ip_lookup.output.result.services[0].tls.certificates.leaf_fp_sha_256 }}"
          method: GET
          headers:
            Authorization: "{{ consts.censys_auth }}"
            Accept: "application/json"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
          continue: true

  - name: passivetotal_ip_reputation
    type: http
    with:
      url: "{{ consts.passivetotal_endpoint }}/enrichment"
      method: GET
      headers:
        Authorization: "{{ consts.passivetotal_auth }}"
      query:
        query: "{{ inputs.current_answer }}"
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"
      continue: true

  - name: passivetotal_domain_reputation
    type: http
    with:
      url: "{{ consts.passivetotal_endpoint }}/enrichment"
      method: GET
      headers:
        Authorization: "{{ consts.passivetotal_auth }}"
      query:
        query: "{{ inputs.domain }}"
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"
      continue: true

  - name: malware_domain_list_check
    type: http
    with:
      url: "{{ consts.malware_domain_list_endpoint }}"
      method: GET
      query:
        search: "{{ inputs.domain }}"
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"
      continue: true

  - name: build_summary
    type: data.set
    with:
      summary:
        domain: "{{ inputs.domain }}"
        current_answer: "{{ inputs.current_answer }}"
        geoip: "{{ steps.geolocate_current_answer.output.country.iso_code | default: 'n/a' }}"
        whois_org: "{{ steps.whois_ip.output.WhoisRecord.registrant.organization | default: 'n/a' }}"
        cert_issuer_cn: "{{ steps.censys_ip_lookup.output.result.services[0].tls.certificates.leaf_data.issuer.common_name | default: 'n/a' }}"
        cert_issuer_org: "{{ steps.censys_ip_lookup.output.result.services[0].tls.certificates.leaf_data.issuer.organization | default: 'n/a' }}"
        passivetotal_ip_classification: "{{ steps.passivetotal_ip_reputation.output.classification | default: 'unclassified' }}"
        malware_domain_list_hit: "{{ steps.malware_domain_list_check.output.matches | size | default: 0 }}"

  - name: post_to_case
    type: if
    condition: "{{ inputs.kibana_case_id | size }} > 0"
    steps:
      - name: append_case_comment
        type: kibana.request
        with:
          method: POST
          path: "/api/cases/{{ inputs.kibana_case_id }}/comments"
          body:
            type: "user"
            comment: "DNS hijack enrichment for {{ inputs.domain }} (current answer: {{ inputs.current_answer }}) GeoIP: {{ steps.build_summary.output.summary.geoip }} Whois org: {{ steps.build_summary.output.summary.whois_org }} TLS issuer: {{ steps.build_summary.output.summary.cert_issuer_cn }} ({{ steps.build_summary.output.summary.cert_issuer_org }}) PassiveTotal IP classification: {{ steps.build_summary.output.summary.passivetotal_ip_classification }} Malware Domain List hits: {{ steps.build_summary.output.summary.malware_domain_list_hit }}"
            owner: "cases"

  - name: update_splunk_notable
    type: if
    condition: "{{ inputs.notable_event_id | size }} > 0"
    steps:
      - name: splunk_update
        type: http
        with:
          url: "{{ consts.splunk_endpoint }}/services/notable_update"
          method: POST
          headers:
            Authorization: "{{ consts.splunk_auth }}"
            Content-Type: "application/x-www-form-urlencoded"
          body: "ruleUIDs={{ inputs.notable_event_id }}&comment=Enrichment+attached"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
          continue: true

  - name: create_security_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "Workflow: DNS Hijack — Enrichment"
        description: |
          Automated case created by the **DNS Hijack — Enrichment** workflow.

          Review the workflow execution and attached comments for full investigation details.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "medium"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags: ["automated", "workflow"]
    on-failure:
      continue: true
