# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "AWS EC2 — Security Hub Finding Investigation & Notification"
description: >
  Investigates a Security Hub finding for an exposed EC2 instance. Pulls EC2
  metadata, security groups, host firewall rules, processes, and current
  network connections; geolocates and reputation-checks any external remote
  IPs; opens a Jira ticket via the native jira connector and notifies the
  owner over Slack; then surfaces a console prompt asking whether to invoke
  the EC2 isolation workflow. Inputs: `finding_id`, `instance_id`,
  `severity_normalized` (gate: only proceeds when > 35), `remote_ips`.
  AWS calls remain http stubs pending a first-class SigV4 connector.
enabled: true
tags: ["splunk-soar", "investigation", "aws", "ec2", "security-hub", "translated"]

triggers:
  - type: alert
  - type: manual

inputs:
  - name: finding_id
    type: string
    required: true
    description: "AWS Security Hub finding ID (the cef.Id field on the artifact)."
  - name: instance_id
    type: string
    required: true
    description: "EC2 instance ID referenced in the AwsEc2Instance resource."
  - name: severity_normalized
    type: number
    required: true
    description: "Normalized SecurityHub severity (only proceed if > 35)."
  - name: remote_ips
    type: array
    required: false
    description: "Remote IPs called out in the finding's productFields."
  - name: jira_connector_id
    type: string
    required: false
    default: "CHANGEME-jira-connector"
  - name: slack_connector_id
    type: string
    required: false
    default: "CHANGEME-slack-connector"

consts:
  # AWS query-string API endpoints. The Authorization header below is a stub
  # — real callers must produce a SigV4 signature (AWS4-HMAC-SHA256). EC2
  # actions documented at docs.aws.amazon.com/AWSEC2/latest/APIReference and
  # the SecurityHub UpdateFindings/BatchUpdateFindings actions at
  # docs.aws.amazon.com/securityhub/1.0/APIReference.
  aws_ec2_endpoint: "https://ec2.us-east-1.amazonaws.com"
  aws_securityhub_endpoint: "https://securityhub.us-east-1.amazonaws.com"
  aws_auth_header: "AWS4-HMAC-SHA256 CHANGEME-sigv4-signature"
  # In-house SSH execution proxy (no native Elastic SSH connector yet).
  ssh_proxy_endpoint: "https://CHANGEME-ssh-proxy.internal/run"
  ssh_proxy_auth: "Bearer CHANGEME"
  # MaxMind GeoIP2 Web Service — Basic auth with account-id:license-key.
  # See dev.maxmind.com/geoip/docs/web-services.
  maxmind_endpoint: "https://geoip.maxmind.com/geoip/v2.1/city"
  maxmind_auth: "Basic CHANGEME_BASE64_ACCOUNT_LICENSE"
  # RiskIQ PassiveTotal v2 — Basic auth with email:api_key.
  passivetotal_endpoint: "https://api.passivetotal.org/v2/enrichment"
  passivetotal_auth: "Basic CHANGEME_BASE64_EMAIL_KEY"
  internal_vpc_cidr: "172.31.0.0/16"
  # Console search link template for SecurityHub findings.
  securityhub_console_base: "https://console.aws.amazon.com/securityhub/home?region=us-east-1#/findings?search=Id%3D%255Coperator%255C%253AEQUALS%255C%253A"

steps:
  - name: severity_gate
    type: if
    condition: "{{ inputs.severity_normalized }} > 35"
    steps:
      # EC2 query API. SigV4-signed requests required — the auth header is a
      # placeholder; in production wire this through an AWS signing connector
      # or a signing proxy. EC2 Version: 2016-11-15 (or newer).
      - name: describe_ec2_instance
        type: http
        with:
          url: "{{ consts.aws_ec2_endpoint }}/"
          method: GET
          headers:
            Authorization: "{{ consts.aws_auth_header }}"
          query:
            Action: "DescribeInstances"
            Version: "2016-11-15"
            InstanceId.1: "{{ inputs.instance_id }}"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
          continue: true

      - name: list_security_groups
        type: http
        with:
          url: "{{ consts.aws_ec2_endpoint }}/"
          method: GET
          headers:
            Authorization: "{{ consts.aws_auth_header }}"
          query:
            Action: "DescribeSecurityGroups"
            Version: "2016-11-15"
            "Filter.1.Name": "group-id"
            "Filter.1.Value.1": "{{ steps.describe_ec2_instance.output.Reservations[0].Instances[0].SecurityGroups[0].GroupId | default: '' }}"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
          continue: true

      - name: list_firewall_rules_on_host
        type: http
        with:
          url: "{{ consts.ssh_proxy_endpoint }}/iptables-list"
          method: POST
          headers:
            Authorization: "{{ consts.ssh_proxy_auth }}"
            Content-Type: "application/json"
          body:
            host: "{{ steps.describe_ec2_instance.output.Reservations[0].Instances[0].NetworkInterfaces[0].Association.PublicDnsName }}"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
          continue: true

      - name: list_processes_on_host
        type: http
        with:
          url: "{{ consts.ssh_proxy_endpoint }}/ps"
          method: POST
          headers:
            Authorization: "{{ consts.ssh_proxy_auth }}"
            Content-Type: "application/json"
          body:
            host: "{{ steps.describe_ec2_instance.output.Reservations[0].Instances[0].NetworkInterfaces[0].Association.PublicDnsName }}"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
          continue: true

      - name: list_connections_on_host
        type: http
        with:
          url: "{{ consts.ssh_proxy_endpoint }}/netstat"
          method: POST
          headers:
            Authorization: "{{ consts.ssh_proxy_auth }}"
            Content-Type: "application/json"
          body:
            host: "{{ steps.describe_ec2_instance.output.Reservations[0].Instances[0].NetworkInterfaces[0].Association.PublicDnsName }}"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
          continue: true

      - name: filter_external_connection_ips
        type: data.set
        # Drop addresses that fall in the internal VPC CIDR before sending to
        # geolocation / reputation services.
        with:
          # Downstream consumers should treat this as an opaque list and only
          # enrich addresses that aren't in {{ consts.internal_vpc_cidr }}.
          connection_ips: ${{ steps.list_connections_on_host.output.connections }}

      - name: enrich_remote_ips_from_finding
        type: foreach
        foreach: "${{ inputs.remote_ips }}"
        steps:
          # MaxMind GeoIP2 City — GET /geoip/v2.1/city/{ip}. Returns
          # {city, country, continent, location, traits, ...}.
          - name: geolocate_finding_ip
            type: http
            with:
              url: "{{ consts.maxmind_endpoint }}/{{ item }}"
              method: GET
              headers:
                Authorization: "{{ consts.maxmind_auth }}"
                Accept: "application/json"
            on-failure:
              retry:
                max-attempts: 3
                delay: "5s"
              continue: true

          # PassiveTotal enrichment — GET /v2/enrichment?query={ip}. Returns
          # tags, classification, dynamic-dns/sinkhole flags, etc.
          - name: passivetotal_reputation_finding_ip
            type: http
            with:
              url: "{{ consts.passivetotal_endpoint }}"
              method: GET
              headers:
                Authorization: "{{ consts.passivetotal_auth }}"
                Accept: "application/json"
              query:
                query: "{{ item }}"
            on-failure:
              retry:
                max-attempts: 3
                delay: "5s"
              continue: true

      - name: build_finding_url
        type: data.set
        with:
          finding_url: "{{ consts.securityhub_console_base }}{{ inputs.finding_id }}"

      - name: build_notification_body
        type: data.set
        with:
          summary: |
            Security Hub finding {{ inputs.finding_id }} for EC2 instance {{ inputs.instance_id }}
            Severity (normalized): {{ inputs.severity_normalized }}
            Direct link: {{ steps.build_finding_url.output.finding_url }}

      - name: create_jira_ticket
        type: http
        with:
          url: "{{ consts.jira_base | default: 'https://jira.example.com' }}/rest/api/3/issue"
          method: POST
          headers:
            Content-Type: "application/json"
          body:
            fields:
              summary: "Security Hub: exposed EC2 instance {{ inputs.instance_id }}"
              description:
                type: doc
                version: 1
                content:
                  - type: paragraph
                    content:
                      - type: text
                        text: "{{ steps.build_notification_body.output.summary }}"

      - name: notify_instance_owner
        type: http
        with:
          url: "{{ consts.slack_webhook | default: 'https://hooks.slack.com/services/CHANGEME' }}"
          method: POST
          headers:
            Content-Type: "application/json"
          body:
            channel: "#security-alerts"
            text: "{{ steps.build_notification_body.output.summary }}"

      - name: prompt_for_isolation
        type: console
        with:
          message: |
            Analyst decision required: should EC2 instance {{ inputs.instance_id }} be moved to the
            isolation Security Group? If yes, run the EC2 Instance Isolation workflow.

      # SecurityHub BatchUpdateFindings — applies a Note to one or more
      # findings. Uses the AWS JSON 1.1 protocol via x-amz-target header.
      # See docs.aws.amazon.com/securityhub/1.0/APIReference/API_BatchUpdateFindings.html
      - name: note_to_securityhub_finding
        type: http
        with:
          url: "{{ consts.aws_securityhub_endpoint }}/findings/batchupdate"
          method: POST
          headers:
            Authorization: "{{ consts.aws_auth_header }}"
            Content-Type: "application/x-amz-json-1.1"
            X-Amz-Target: "SecurityHub.BatchUpdateFindings"
          body:
            FindingIdentifiers:
              - Id: "{{ inputs.finding_id }}"
                ProductArn: "{{ event.alerts[0].productArn | default: '' }}"
            Note:
              Text: "Investigated by Elastic Workflow; Jira ticket {{ steps.create_jira_ticket.output.external_id | default: 'unknown' }} created and owner notified."
              UpdatedBy: "elastic-workflows"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
          continue: true

  - name: create_security_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "Workflow: AWS EC2 — Security Hub Finding Investigation & Notification"
        description: |
          Automated case created by the **AWS EC2 — Security Hub Finding Investigation & Notification** workflow.

          Review the workflow execution and attached comments for full investigation details.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "medium"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags: ["automated", "workflow"]
    on-failure:
      continue: true
