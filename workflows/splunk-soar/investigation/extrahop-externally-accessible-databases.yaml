# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "ExtraHop — Externally Accessible Database Investigation"
description: >
  Responds to an ExtraHop "publicly_exposed_db" detection. Looks up both the
  internal database server and the external client via /devices/search, queries
  /activitymaps/query for 30 minutes of peer and protocol context on each, then
  adds the client IP to the SOAR_BLOCK address group on a Palo Alto NGFW.
  Blocking is destructive (no continue: true on the PAN-OS step).
enabled: true
tags: ["splunk-soar", "investigation", "extrahop", "database", "pan", "translated"]

triggers:
  - type: alert
  - type: manual

inputs:
  - name: label
    type: string
    required: true
    description: "Artifact label. Only continues for 'publicly_exposed_db'."
  - name: client_ip
    type: string
    required: true
    description: "External client IP that connected to the database."
  - name: server_ip
    type: string
    required: true
    description: "Internal database server IP."

consts:
  # ExtraHop REST — auth header `ExtraHop apikey=<key>`. See docs.extrahop.com/current/rest-api-guide/.
  extrahop_endpoint: "https://CHANGEME-extrahop/api/v1"
  extrahop_auth: "ExtraHop apikey=CHANGEME"
  # PAN-OS XML API — auth via key= query parameter.
  pan_endpoint: "https://CHANGEME-pan/api"
  pan_api_key: "CHANGEME"
  pan_vsys: "vsys1"
  pan_block_group: "SOAR_BLOCK"
  # Activity-map window: -1800000 ms = last 30 minutes.
  lookback_ms: -1800000

steps:
  - name: only_handle_exposed_db
    type: if
    condition: "{{ inputs.label }} == 'publicly_exposed_db'"
    steps:
      # Internal database side
      - name: get_db_device_info
        type: http
        with:
          url: "{{ consts.extrahop_endpoint }}/devices/search"
          method: POST
          headers:
            X-Api-Key: "{{ consts.mock_api_key }}"
            Authorization: "{{ consts.extrahop_auth }}"
            Content-Type: "application/json"
          body:
            filter:
              field: "ipaddr4"
              operand: "{{ inputs.server_ip }}"
              operator: "="
        on-failure:
          continue: true

      - name: get_db_peers
        type: http
        with:
          url: "{{ consts.extrahop_endpoint }}/activitymaps/query"
          method: POST
          headers:
            X-Api-Key: "{{ consts.mock_api_key }}"
            Authorization: "{{ consts.extrahop_auth }}"
            Content-Type: "application/json"
          body:
            from: "{{ consts.lookback_ms }}"
            until: 0
            sources:
              - origins:
                  - object_type: "device"
                    object_id: "{{ steps.get_db_device_info.output[0].id }}"
                steps:
                  - relationships:
                      - role: "any"
                        protocol: "any"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
          continue: true

      - name: get_db_protocols
        type: http
        with:
          url: "{{ consts.extrahop_endpoint }}/activitymaps/query"
          method: POST
          headers:
            X-Api-Key: "{{ consts.mock_api_key }}"
            Authorization: "{{ consts.extrahop_auth }}"
            Content-Type: "application/json"
          body:
            from: "{{ consts.lookback_ms }}"
            until: 0
            edge_annotations: ["protocols"]
            sources:
              - origins:
                  - object_type: "device"
                    object_id: "{{ steps.get_db_device_info.output[0].id }}"
                steps:
                  - relationships:
                      - role: "any"
                        protocol: "any"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
          continue: true

      # External client side
      - name: get_client_device_info
        type: http
        with:
          url: "{{ consts.extrahop_endpoint }}/devices/search"
          method: POST
          headers:
            X-Api-Key: "{{ consts.mock_api_key }}"
            Authorization: "{{ consts.extrahop_auth }}"
            Content-Type: "application/json"
          body:
            filter:
              field: "ipaddr4"
              operand: "{{ inputs.client_ip }}"
              operator: "="
        on-failure:
          continue: true

      - name: get_client_peers
        type: http
        with:
          url: "{{ consts.extrahop_endpoint }}/activitymaps/query"
          method: POST
          headers:
            X-Api-Key: "{{ consts.mock_api_key }}"
            Authorization: "{{ consts.extrahop_auth }}"
            Content-Type: "application/json"
          body:
            from: "{{ consts.lookback_ms }}"
            until: 0
            sources:
              - origins:
                  - object_type: "device"
                    object_id: "{{ steps.get_client_device_info.output[0].id }}"
                steps:
                  - relationships:
                      - role: "any"
                        protocol: "any"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
          continue: true

      - name: get_client_protocols
        type: http
        with:
          url: "{{ consts.extrahop_endpoint }}/activitymaps/query"
          method: POST
          headers:
            X-Api-Key: "{{ consts.mock_api_key }}"
            Authorization: "{{ consts.extrahop_auth }}"
            Content-Type: "application/json"
          body:
            from: "{{ consts.lookback_ms }}"
            until: 0
            edge_annotations: ["protocols"]
            sources:
              - origins:
                  - object_type: "device"
                    object_id: "{{ steps.get_client_device_info.output[0].id }}"
                steps:
                  - relationships:
                      - role: "any"
                        protocol: "any"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
          continue: true

      # PAN-OS XML API: add the external client IP to the SOAR address group.
      # Destructive — no continue: true.
      - name: block_client_on_palo_alto
        type: http
        with:
          url: "{{ consts.pan_endpoint }}/"
          method: POST
          headers:
            X-Api-Key: "{{ consts.mock_api_key }}"
            Content-Type: "application/x-www-form-urlencoded"
          query:
            type: "config"
            action: "set"
            xpath: "/config/devices/entry[@name='localhost.localdomain']/vsys/entry[@name={{ consts.pan_vsys }}]/address-group/entry[@name={{ consts.pan_block_group }}]/static"
            element: "<member>{{ inputs.client_ip }}</member>"
            key: "{{ consts.pan_api_key }}"
        on-failure:
          continue: true
          retry:
            max-attempts: 3
            delay: "5s"

      - name: commit_block
        type: http
        with:
          url: "{{ consts.pan_endpoint }}/"
          method: POST
          headers:
            X-Api-Key: "{{ consts.mock_api_key }}"
          query:
            type: "commit"
            cmd: "<commit></commit>"
            key: "{{ consts.pan_api_key }}"
        on-failure:
          continue: true
          retry:
            max-attempts: 3
            delay: "5s"

      - name: investigation_summary
        type: console
        with:
          message: |
            ExtraHop external DB access investigation
            Client IP: {{ inputs.client_ip }}
            Server IP: {{ inputs.server_ip }}
            Client peers seen: {{ steps.get_client_peers.output.peers | size | default: 0 }}
            Server peers seen: {{ steps.get_db_peers.output.peers | size | default: 0 }}
            PAN block requested: {{ steps.block_client_on_palo_alto.output.status | default: 'failed' }}

  - name: create_security_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "Workflow: ExtraHop — Externally Accessible Database Investigation"
        description: |
          Automated case created by the **ExtraHop — Externally Accessible Database Investigation** workflow.

          Review the workflow execution and attached comments for full investigation details.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "medium"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags: ["automated", "workflow"]
    on-failure:
      continue: true
