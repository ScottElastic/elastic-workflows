# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "ExtraHop — New DNS Server Discovery & Scan"
description: >
  Runs every 30 minutes. Queries ExtraHop for devices that became active as
  DNS servers in the lookback window, pulls profile, peer, and protocol
  context for each one, then launches a Nessus vulnerability scan using a
  named scan policy supplied as an input. Requires the named Nessus policy
  to already exist on the scanner.
enabled: true
tags: ["splunk-soar", "investigation", "extrahop", "dns", "nessus", "scheduled", "translated"]

triggers:
  - type: scheduled
    with:
      every: "30m"
  - type: manual

inputs:
  - name: nessus_policy_name
    type: string
    required: true
    description: "Name of the Nessus scan policy to apply against any newly seen DNS server."

consts:
  # ExtraHop REST — auth header `ExtraHop apikey=<key>`.
  extrahop_endpoint: "https://CHANGEME-extrahop/api/v1"
  extrahop_auth: "ExtraHop apikey=CHANGEME"
  # Tenable Nessus REST — auth via X-ApiKeys header in a single string.
  # See https://docs.tenable.com/nessus/Content/RESTAPIReference.htm.
  nessus_endpoint: "https://CHANGEME-nessus:8834"
  nessus_auth: "accessKey=CHANGEME; secretKey=CHANGEME"
  # -1800000 ms = last 30 minutes (devices/search accepts ms timestamps).
  active_from_ms: -1800000

steps:
  # POST /devices/search with activity=dns_server returns devices acting as DNS.
  - name: get_new_dns_servers
    type: http
    with:
      url: "{{ consts.extrahop_endpoint }}/devices/search"
      method: POST
      headers:
        X-Api-Key: "{{ consts.mock_api_key }}"
        Authorization: "{{ consts.extrahop_auth }}"
        Content-Type: "application/json"
      body:
        active_from: "{{ consts.active_from_ms }}"
        active_until: 0
        filter:
          field: "activity"
          operand: "dns_server"
          operator: "="
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"
      continue: true

  - name: list_nessus_policies
    type: http
    with:
      url: "{{ consts.nessus_endpoint }}/policies"
      method: GET
      headers:
        X-Api-Key: "{{ consts.mock_api_key }}"
        X-ApiKeys: "{{ consts.nessus_auth }}"
        Accept: "application/json"
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"
      continue: true

  - name: any_new_servers_found
    type: if
    condition: "{{ steps.get_new_dns_servers.output.devices | size }} > 0"
    steps:
      - name: investigate_each_new_server
        type: foreach
        foreach: "${{ steps.get_new_dns_servers.output.devices }}"
        steps:
          - name: skip_if_no_ip
            type: if
            condition: "{{ item.ipaddr4 | size }} > 0"
            steps:
              - name: get_device_info
                type: http
                with:
                  url: "{{ consts.extrahop_endpoint }}/devices/{{ item.id }}"
                  method: GET
                  headers:
                    X-Api-Key: "{{ consts.mock_api_key }}"
                    Authorization: "{{ consts.extrahop_auth }}"
                on-failure:
                  retry:
                    max-attempts: 3
                    delay: "5s"
                  continue: true

              - name: get_peers
                type: http
                with:
                  url: "{{ consts.extrahop_endpoint }}/activitymaps/query"
                  method: POST
                  headers:
                    X-Api-Key: "{{ consts.mock_api_key }}"
                    Authorization: "{{ consts.extrahop_auth }}"
                    Content-Type: "application/json"
                  body:
                    from: "{{ consts.active_from_ms }}"
                    until: 0
                    sources:
                      - origins:
                          - object_type: "device"
                            object_id: "{{ item.id }}"
                        steps:
                          - relationships:
                              - role: "any"
                                protocol: "any"
                on-failure:
                  retry:
                    max-attempts: 3
                    delay: "5s"
                  continue: true

              - name: get_protocols
                type: http
                with:
                  url: "{{ consts.extrahop_endpoint }}/activitymaps/query"
                  method: POST
                  headers:
                    X-Api-Key: "{{ consts.mock_api_key }}"
                    Authorization: "{{ consts.extrahop_auth }}"
                    Content-Type: "application/json"
                  body:
                    from: "{{ consts.active_from_ms }}"
                    until: 0
                    edge_annotations: ["protocols"]
                    sources:
                      - origins:
                          - object_type: "device"
                            object_id: "{{ item.id }}"
                        steps:
                          - relationships:
                              - role: "any"
                                protocol: "any"
                on-failure:
                  retry:
                    max-attempts: 3
                    delay: "5s"
                  continue: true

              # Match the configured policy by name from the Nessus policy list.
              - name: pick_policy_id
                type: data.set
                with:
                  matched_policies: "${{ steps.list_nessus_policies.output.policies | default: [] | where: 'name', inputs.nessus_policy_name }}"

              # POST /scans creates a scan; settings.policy_id ties it to the template.
              - name: launch_nessus_scan
                type: http
                with:
                  url: "{{ consts.nessus_endpoint }}/scans"
                  method: POST
                  headers:
                    X-Api-Key: "{{ consts.mock_api_key }}"
                    X-ApiKeys: "{{ consts.nessus_auth }}"
                    Content-Type: "application/json"
                  body:
                    uuid: "{{ steps.pick_policy_id.output.matched_policies[0].template_uuid }}"
                    settings:
                      name: "Auto-scan new DNS server {{ item.ipaddr4 }}"
                      text_targets: "{{ item.ipaddr4 }}"
                      policy_id: "{{ steps.pick_policy_id.output.matched_policies[0].id }}"
                      enabled: false
                      launch_now: true
                on-failure:
                  retry:
                    max-attempts: 3
                    delay: "5s"
                  continue: true

              - name: log_scan_launched
                type: console
                with:
                  message: "Nessus scan launched against newly seen DNS server {{ item.ipaddr4 }} (scan id {{ steps.launch_nessus_scan.output.scan.id | default: 'n/a' }})."

  - name: create_security_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "Workflow: ExtraHop — New DNS Server Discovery & Scan"
        description: |
          Automated case created by the **ExtraHop — New DNS Server Discovery & Scan** workflow.

          Review the workflow execution and attached comments for full investigation details.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "medium"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags: ["automated", "workflow"]
    on-failure:
      continue: true
