# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "Splunk — Internal Host log4j Investigation (CVE-2021-44228)"
description: >
  Collects log4j (CVE-2021-44228) context for an internal host by running
  four Splunk searches via /services/search/jobs/export — notable event
  history, Java process metadata from datamodel=Endpoint.Processes,
  children of Java processes, and the ES asset_lookup_by_str row for the
  host. Requires the host's IP or hostname. Read-only; no remediation.
enabled: true
tags: ["splunk-soar", "investigation", "log4j", "cve-2021-44228", "splunk", "translated"]

triggers:
  - type: manual

inputs:
  - name: ip_or_hostname
    type: string
    required: true
    description: "Hostname or IP of the host to query about."

consts:
  # Splunk REST: /services/search/jobs/export streams synchronous results
  # back to the caller. Auth uses a session token in the Authorization
  # header per Splunk REST best practice.
  splunk_search_endpoint: "https://CHANGEME-splunk:8089/services/search/jobs/export"
  splunk_auth_header: "Bearer CHANGEME_SPLUNK_TOKEN"

steps:
  - name: build_notable_history_query
    type: data.set
    with:
      query: "`notable` | search dest={{ inputs.ip_or_hostname }} | table _time, dest, rule_name, owner, priority, severity, status_description"

  - name: build_process_info_query
    type: data.set
    with:
      query: "| tstats `security_content_summariesonly` count values(Processes.process) as process min(_time) as firstTime max(_time) as lastTime FROM datamodel=Endpoint.Processes where earliest=-7d by Processes.user Processes.parent_process_name Processes.process_name Processes.dest | `drop_dm_object_name(\"Processes\")` | search process_name=\"*java*\" | search dest={{ inputs.ip_or_hostname }} | `security_content_ctime(firstTime)` | `security_content_ctime(lastTime)`"

  - name: build_children_of_java_query
    type: data.set
    with:
      query: "| tstats `security_content_summariesonly` count values(Processes.process) as process min(_time) as firstTime max(_time) as lastTime FROM datamodel=Endpoint.Processes where earliest=-7d by Processes.user Processes.parent_process_name Processes.process_name Processes.dest | `drop_dm_object_name(\"Processes\")` | search parent_process_name=\"*java*\" | search dest={{ inputs.ip_or_hostname }} | `security_content_ctime(firstTime)` | `security_content_ctime(lastTime)`"

  - name: build_es_assets_query
    type: data.set
    with:
      query: "| inputlookup asset_lookup_by_str | search asset IN (\"{{ inputs.ip_or_hostname }}\") | eval category = mvjoin(category, \"; \")"

  - name: run_notable_history
    type: http
    with:
      url: "{{ consts.splunk_search_endpoint }}"
      method: POST
      headers:
        Authorization: "{{ consts.splunk_auth_header }}"
        Content-Type: "application/x-www-form-urlencoded"
      body: "search={{ steps.build_notable_history_query.output.query | url_encode }}&output_mode=json"
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"
        on-status: [429, 502, 503, 504]
      continue: true

  - name: run_process_info
    type: http
    with:
      url: "{{ consts.splunk_search_endpoint }}"
      method: POST
      headers:
        Authorization: "{{ consts.splunk_auth_header }}"
        Content-Type: "application/x-www-form-urlencoded"
      body: "search={{ steps.build_process_info_query.output.query | url_encode }}&output_mode=json"
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"
        on-status: [429, 502, 503, 504]
      continue: true

  - name: run_children_of_java
    type: http
    with:
      url: "{{ consts.splunk_search_endpoint }}"
      method: POST
      headers:
        Authorization: "{{ consts.splunk_auth_header }}"
        Content-Type: "application/x-www-form-urlencoded"
      body: "search={{ steps.build_children_of_java_query.output.query | url_encode }}&output_mode=json"
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"
        on-status: [429, 502, 503, 504]
      continue: true

  - name: run_es_assets
    type: http
    with:
      url: "{{ consts.splunk_search_endpoint }}"
      method: POST
      headers:
        Authorization: "{{ consts.splunk_auth_header }}"
        Content-Type: "application/x-www-form-urlencoded"
      body: "search={{ steps.build_es_assets_query.output.query | url_encode }}&output_mode=json"
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"
        on-status: [429, 502, 503, 504]
      continue: true

  - name: summary
    type: console
    with:
      message: |
        Splunk log4j investigation summary for {{ inputs.ip_or_hostname }}
        Notable hits: {{ steps.run_notable_history.output.results | size | default: 0 }}
        Java processes: {{ steps.run_process_info.output.results | size | default: 0 }}
        Java children: {{ steps.run_children_of_java.output.results | size | default: 0 }}
        Asset lookup rows: {{ steps.run_es_assets.output.results | size | default: 0 }}

  - name: create_security_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "Workflow: Splunk — Internal Host log4j Investigation (CVE-2021-44228)"
        description: |
          Automated case created by the **Splunk — Internal Host log4j Investigation (CVE-2021-44228)** workflow.

          Review the workflow execution and attached comments for full investigation details.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "medium"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags: ["automated", "workflow"]
    on-failure:
      continue: true
