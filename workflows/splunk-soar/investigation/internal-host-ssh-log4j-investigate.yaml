# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "Linux Host — SSH-based log4j Sweep (CVE-2021-44228)"
description: >
  Scans a Linux host for evidence of CVE-2021-44228 (log4j JndiLookup).
  Input: an IP or hostname reachable by the SSH proxy. Uploads a bash
  collector that captures the Java version, ps/jps process listings,
  every .jar on disk containing JndiLookup.class, and .war files with
  embedded log4j jars; results are zipped on-target and copied back.
enabled: true
tags: ["splunk-soar", "investigation", "log4j", "cve-2021-44228", "ssh", "linux", "translated"]

triggers:
  - type: manual

inputs:
  - name: ip_or_hostname
    type: string
    required: true
    description: "Target Linux host to inspect for log4j vulnerability evidence."

consts:
  ssh_proxy_endpoint: "https://CHANGEME-ssh-proxy.internal"
  ssh_proxy_auth: "Bearer CHANGEME"
  remote_output_dir: "/tmp"
  collector_script_name: "splunk_soar_internal_host_ssh_log4j_investigate.sh"

steps:
  # TODO: replace http stubs with a native SSH connector once available in
  # Elastic Workflows.
  - name: upload_log4j_collector
    type: http
    with:
      url: "{{ consts.ssh_proxy_endpoint }}/put-file"
      method: POST
      headers:
        X-Api-Key: "{{ consts.mock_api_key }}"
        Authorization: "{{ consts.ssh_proxy_auth }}"
      body:
        host: "{{ inputs.ip_or_hostname }}"
        destination: "{{ consts.remote_output_dir }}/{{ consts.collector_script_name }}"
        script_name: "{{ consts.collector_script_name }}"
    # Read-only collection — continue so analyst still gets partial
    # evidence if one step fails (upload / run / fetch are sequential).
    on-failure:
      retry:
        max-attempts: 2
        delay: "5s"
      continue: true

  - name: run_log4j_collector
    type: http
    with:
      url: "{{ consts.ssh_proxy_endpoint }}/execute"
      method: POST
      headers:
        X-Api-Key: "{{ consts.mock_api_key }}"
        Authorization: "{{ consts.ssh_proxy_auth }}"
      body:
        host: "{{ inputs.ip_or_hostname }}"
        command: "bash {{ consts.remote_output_dir }}/{{ consts.collector_script_name }} {{ inputs.ip_or_hostname }}"
    # Read-only collection — continue so analyst still gets partial
    # evidence if one step fails (upload / run / fetch are sequential).
    on-failure:
      retry:
        max-attempts: 2
        delay: "5s"
      continue: true

  - name: fetch_log4j_output
    type: http
    with:
      url: "{{ consts.ssh_proxy_endpoint }}/get-file"
      method: POST
      headers:
        X-Api-Key: "{{ consts.mock_api_key }}"
        Authorization: "{{ consts.ssh_proxy_auth }}"
      body:
        host: "{{ inputs.ip_or_hostname }}"
        path: "{{ consts.remote_output_dir }}/{{ inputs.ip_or_hostname }}_ssh_log4j_output.zip"
    # Read-only collection — continue so analyst still gets partial
    # evidence if one step fails (upload / run / fetch are sequential).
    on-failure:
      retry:
        max-attempts: 2
        delay: "5s"
      continue: true

  - name: investigation_summary
    type: console
    with:
      message: |
        log4j SSH sweep done for {{ inputs.ip_or_hostname }}.
        Output zip: {{ steps.fetch_log4j_output.output.path | default: 'not retrieved' }}
        Outputs include java_environment.csv, jars_with_jndi.csv, wars_with_jars.csv.

  - name: create_security_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "Workflow: Linux Host — SSH-based log4j Sweep (CVE-2021-44228)"
        description: |
          Automated case created by the **Linux Host — SSH-based log4j Sweep (CVE-2021-44228)** workflow.

          Review the workflow execution and attached comments for full investigation details.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "medium"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags: ["automated", "workflow"]
    on-failure:
      continue: true
