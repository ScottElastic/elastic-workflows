# ─────────────────────────────────────────────────────────────────────
name: "Windows Host — WinRM log4j Sweep (CVE-2021-44228)"
description: >
  Scans a Windows host for evidence of CVE-2021-44228. Input: an IP or
  hostname reachable by the WinRM proxy. Walks every FileSystem PSDrive
  and greps .jar, .jsp, and .jspx files for "JndiLookup.class", then
  renders a markdown note with each match's file path and line number.
enabled: true
tags: ["splunk-soar", "investigation", "log4j", "cve-2021-44228", "winrm", "windows", "translated"]

triggers:
  - type: manual

inputs:
  - name: ip_or_hostname
    type: string
    required: true
    description: "Target Windows host to scan for log4j evidence."

consts:
  winrm_proxy_endpoint: "https://CHANGEME-winrm-proxy.internal"
  winrm_proxy_auth: "Bearer CHANGEME"
  # Inline PowerShell that uses Select-String against all .jar/.jsp/.jspx files
  # on every FileSystem PSDrive and returns JSON: [{LineNumber, Path}, ...].
  traversal_script: "$ProgressPreference = 'SilentlyContinue'; Get-PSDrive -PSProvider FileSystem | foreach {(gci ($_.Root) -rec -force -include ('*.jsp', '*.jspx', '*.jar') -ea 0 | foreach {select-string \"JndiLookup.class\" $_} | Select-Object -Property LineNumber, Path )} | ConvertTo-Json"

steps:
  # TODO: replace http stub with a native WinRM connector once available.
  - name: run_traversal_script
    type: http
    with:
      url: "{{ consts.winrm_proxy_endpoint }}/run-script"
      method: POST
      headers:
        X-Api-Key: "{{ consts.mock_api_key }}"
        Authorization: "{{ consts.winrm_proxy_auth }}"
      body:
        host: "{{ inputs.ip_or_hostname }}"
        script: "{{ consts.traversal_script }}"
    on-failure:
      retry:
        max-attempts: 2
        delay: "5s"
      continue: true

  - name: any_results
    type: if
    condition: "{{ steps.run_traversal_script.output.std_out | size }} > 0"
    steps:
      - name: build_markdown_note
        type: data.set
        # The original playbook walked the JSON output and built a markdown
        # table per host. We preserve the same shape here.
        with:
          note_content: |
            ### Device - {{ inputs.ip_or_hostname }}
            | Path | LineNumber |
            | --- | --- |
            findings={{ steps.run_traversal_script.output.std_out }}

      - name: emit_note
        type: console
        with:
          message: "{{ steps.build_markdown_note.output.note_content }}"
    else:
      - name: no_findings_message
        type: console
        with:
          message: "log4j WinRM sweep on {{ inputs.ip_or_hostname }} found no JndiLookup.class matches."

  - name: create_security_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "Workflow: Windows Host — WinRM log4j Sweep (CVE-2021-44228)"
        description: |
          Automated case created by the **Windows Host — WinRM log4j Sweep (CVE-2021-44228)** workflow.

          Review the workflow execution and attached comments for full investigation details.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "medium"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags: ["automated", "workflow"]
    on-failure:
      continue: true
