# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "Let's Encrypt — Phishing Domain Investigation"
description: >
  Investigates a domain or URL suspected of Let's Encrypt-backed phishing.
  Queries crt.sh for certificates issued to the domain; if every issuer is
  Let's Encrypt and the result set is small (<= 50 certs), screenshots the
  URL, submits it to urlscan.io for analysis, and runs a PassiveTotal whois
  lookup. Posts the combined summary back to an optional Kibana case.
enabled: true
tags: ["splunk-soar", "investigation", "phishing", "lets-encrypt", "censys", "urlscan", "translated"]

triggers:
  - type: manual

inputs:
  - name: domain
    type: string
    required: true
    description: "Domain to investigate (used for Censys queries and whois)."
  - name: url
    type: string
    required: true
    description: "Full URL to screenshot and scan with urlscan.io."
  - name: kibana_case_id
    type: string
    required: false
    description: "Optional Kibana case to post the comment to."

consts:
  # crt.sh is a free public Certificate Transparency log search.
  # JSON output: array of objects with issuer_name, name_value, not_before, etc.
  crtsh_endpoint: "https://crt.sh"
  urlscan_endpoint: "https://urlscan.io/api/v1/scan/"
  urlscan_api_key: "CHANGEME"
  screenshot_endpoint: "https://api.screenshotmachine.com/"
  screenshot_api_key: "CHANGEME"
  passivetotal_endpoint: "https://api.passivetotal.org/v2/whois"
  passivetotal_auth: "Basic CHANGEME"
  # Substring matched against the crt.sh issuer_name field.
  lets_encrypt_issuer_substring: "Let's Encrypt"
  cert_result_limit: 50

steps:
  # crt.sh: GET /?q=<domain>&output=json — no auth required.
  - name: crtsh_query_certificate
    type: http
    with:
      url: "{{ consts.crtsh_endpoint }}/"
      method: GET
      headers:
        X-Api-Key: "{{ consts.mock_api_key }}"
      query:
        q: "{{ inputs.domain }}"
        output: "json"
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"
      continue: true

  - name: count_le_certs
    type: data.set
    with:
      total: "{{ steps.crtsh_query_certificate.output | default: [] | size }}"
      le_only: "{{ steps.crtsh_query_certificate.output | default: []}}"

  - name: under_result_cap_and_lets_encrypt
    type: if
    condition: "({{ steps.count_le_certs.output.total | default: 0 }} <= {{ consts.cert_result_limit }}) and ({{ steps.count_le_certs.output.le_only }} == true) and ({{ steps.count_le_certs.output.total }} > 0)"
    steps:
      - name: screenshot_url
        type: http
        with:
          url: "{{ consts.screenshot_endpoint }}"
          method: GET
          headers:
            X-Api-Key: "{{ consts.mock_api_key }}"
          query:
            key: "{{ consts.screenshot_api_key }}"
            url: "{{ inputs.url }}"
            dimension: "Normal"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
          continue: true

      - name: urlscan_url
        type: http
        with:
          url: "{{ consts.urlscan_endpoint }}"
          method: POST
          headers:
            X-Api-Key: "{{ consts.mock_api_key }}"
            API-Key: "{{ consts.urlscan_api_key }}"
            Content-Type: "application/json"
          body:
            url: "{{ inputs.url }}"
            visibility: "private"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
          continue: true

      - name: passivetotal_whois
        type: http
        with:
          url: "{{ consts.passivetotal_endpoint }}"
          method: GET
          headers:
            X-Api-Key: "{{ consts.mock_api_key }}"
            Authorization: "{{ consts.passivetotal_auth }}"
          query:
            query: "{{ inputs.domain }}"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
          continue: true

      - name: build_associated_data
        type: data.set
        with:
          summary: |
            Certificate Transparency (crt.sh):
              Total certs seen: {{ steps.count_le_certs.output.total | default: 0 }}
              First issuer: {{ steps.crtsh_query_certificate.output[0].issuer_name | default: 'n/a' }}
              First SAN list: {{ steps.crtsh_query_certificate.output[0].name_value | default: 'n/a' }}
              All Let's Encrypt: {{ steps.count_le_certs.output.le_only }}

            URLScan:
              Result UUID: {{ steps.urlscan_url.output.uuid | default: 'n/a' }}
              Result URL:  {{ steps.urlscan_url.output.result | default: 'n/a' }}

            PassiveTotal Whois:
              Organization: {{ steps.passivetotal_whois.output.organization | default: 'n/a' }}
              Country: {{ steps.passivetotal_whois.output.country | default: 'n/a' }}

      - name: emit_results
        type: console
        with:
          message: "{{ steps.build_associated_data.output.summary }}"

      - name: append_to_case
        type: if
        condition: "{{ inputs.kibana_case_id | size }} > 0"
        steps:
          - name: add_case_comment
            type: kibana.request
            with:
              method: POST
              path: "/api/cases/{{ inputs.kibana_case_id }}/comments"
              body:
                type: "user"
                comment: "{{ steps.build_associated_data.output.summary }}"
                owner: "cases"

    else:
      - name: too_many_or_wrong_issuer
        type: console
        with:
          message: |
            Skipping deep investigation for {{ inputs.domain }}.
            crt.sh returned {{ steps.count_le_certs.output.total | default: 0 }} certs;
            all-Let's-Encrypt flag was {{ steps.count_le_certs.output.le_only | default: 'unknown' }}.
            The playbook only proceeds when there are 1-{{ consts.cert_result_limit }} certs
            and every issuer name contains {{ consts.lets_encrypt_issuer_substring }}.

  - name: create_security_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "Workflow: Let's Encrypt — Phishing Domain Investigation"
        description: |
          Automated case created by the **Let's Encrypt — Phishing Domain Investigation** workflow.

          Review the workflow execution and attached comments for full investigation details.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "medium"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags: ["automated", "workflow"]
    on-failure:
      continue: true
