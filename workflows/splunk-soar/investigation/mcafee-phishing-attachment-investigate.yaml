# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "McAfee — Phishing Attachment Investigation"
description: >
  Investigates a phishing attachment by detonating it in McAfee/Trellix
  Advanced Threat Defense. If the verdict is malicious (severity >= 3),
  geolocates every callback IP via MaxMind, fetches PassiveTotal reputation
  for each, pushes IPs to the OpenDXL fabric, runs an Active Response hash
  hunt for the dropped payloads, and on any MAR hit creates a ServiceNow
  ticket and emails the analyst with consolidated findings. Requires the
  vault_id of the attachment as input.
enabled: true
tags: ["splunk-soar", "investigation", "phishing", "mcafee", "atd", "opendxl", "translated"]

triggers:
  - type: alert
  - type: manual

inputs:
  - name: vault_id
    type: string
    required: true
    description: "Vault/file ID of the email attachment to detonate."
  - name: from_email
    type: string
    required: false
    description: "Sender of the original phishing email (for ticket context)."
  - name: source_data_identifier
    type: string
    required: false
    description: "Original alert source identifier (for ticket context)."

consts:
  # McAfee/Trellix ATD has limited public docs since the Trellix acquisition.
  # TODO: confirm endpoint paths against your appliance — the integration
  # historically used /php/fileupload.php with a session token cookie obtained
  # from /php/session.php. Wire your real auth flow before enabling.
  mcafee_atd_endpoint: "https://CHANGEME-atd.example.com/php"
  mcafee_atd_auth: "Bearer CHANGEME"
  # OpenDXL fabric — exposes IP and TIE hash topics. Path is the local
  # OpenDXL broker REST shim, not a public McAfee service. TODO: update path.
  mcafee_opendxl_endpoint: "https://CHANGEME-opendxl.example.com"
  mcafee_opendxl_auth: "Bearer CHANGEME"
  maxmind_endpoint: "https://geoip.maxmind.com/geoip/v2.1/city/"
  maxmind_auth: "Basic CHANGEME"
  passivetotal_endpoint: "https://api.passivetotal.org/v2/enrichment"
  passivetotal_auth: "Basic CHANGEME"
  servicenow_connector_id: "CHANGEME-servicenow-connector"
  smtp_connector_id: "CHANGEME-email-connector"
  analyst_email: "analyst@example.com"
  admin_email: "admin@example.com"
  email_from: "soar@example.com"
  malicious_severity_threshold: 3

steps:
  - name: has_attachment
    type: if
    condition: "{{ inputs.vault_id | size }} > 0"
    steps:
      # TODO: McAfee/Trellix ATD has no public REST docs post-acquisition.
      # Wire to the real ATD endpoint and session cookie flow used by your
      # appliance before enabling. Below shape matches the legacy connector.
      - name: atd_detonate_file
        type: http
        with:
          url: "{{ consts.mcafee_atd_endpoint }}/fileupload.php"
          method: POST
          headers:
            Authorization: "{{ consts.mcafee_atd_auth }}"
          body:
            vault_id: "{{ inputs.vault_id }}"
        on-failure:
          retry:
            max-attempts: 3
            delay: "10s"
          continue: true

      - name: notify_admin_with_verdict
        type: console
        with:
          message: "Email would be sent to: {{ consts.admin_email }} | subject: ATD verdict: {{ steps.atd_detonate_file.output.Summary.verdict | default: 'unknown' }}"

      - name: detonation_was_malicious
        type: if
        condition: "{{ steps.atd_detonate_file.output.Summary.Verdict.Severity | default: 0 }} >= {{ consts.malicious_severity_threshold }}"
        steps:
          - name: enrich_ips_seen_during_detonation
            type: foreach
            foreach: "${{ steps.atd_detonate_file.output.Summary.Ips }}"
            steps:
              - name: geolocate_ip
                type: http
                with:
                  url: "{{ consts.maxmind_endpoint }}{{ item.Ipv4 }}"
                  method: GET
                  headers:
                    Authorization: "{{ consts.maxmind_auth }}"
                on-failure:
                  retry:
                    max-attempts: 3
                    delay: "5s"
                  continue: true

              - name: opendxl_push_ip
                type: http
                with:
                  url: "{{ consts.mcafee_opendxl_endpoint }}/ip"
                  method: POST
                  headers:
                    Authorization: "{{ consts.mcafee_opendxl_auth }}"
                  body:
                    dxl_ip: "{{ item.Ipv4 }}"
                on-failure:
                  continue: true

              - name: passivetotal_ip_reputation
                type: http
                with:
                  url: "{{ consts.passivetotal_endpoint }}"
                  method: GET
                  headers:
                    Authorization: "{{ consts.passivetotal_auth }}"
                  query:
                    query: "{{ item.Ipv4 }}"
                on-failure:
                  retry:
                    max-attempts: 3
                    delay: "5s"
                  continue: true

          - name: hunt_each_hash_via_mar
            type: foreach
            foreach: "${{ steps.atd_detonate_file.output.Summary.Files }}"
            steps:
              - name: opendxl_mar_lookup_hash
                type: http
                with:
                  url: "{{ consts.mcafee_opendxl_endpoint }}/mar/lookup"
                  method: POST
                  headers:
                    Authorization: "{{ consts.mcafee_opendxl_auth }}"
                  body:
                    mar_md5: "{{ item.Md5 }}"
                on-failure:
                  continue: true

              - name: mar_hit_remediation
                type: if
                condition: "{{ steps.opendxl_mar_lookup_hash.output.items | size | default: 0 }} > 0"
                steps:
                  - name: opendxl_push_hash_to_tie
                    type: http
                    with:
                      url: "{{ consts.mcafee_opendxl_endpoint }}/tie/hash"
                      method: POST
                      headers:
                        Authorization: "{{ consts.mcafee_opendxl_auth }}"
                      body:
                        dxl_rep: "KNOWN_MALICIOUS"
                        tie_md5: "{{ item.Md5 }}"
                    on-failure:
                      continue: true

                  - name: build_ticket_body
                    type: data.set
                    with:
                      body: |
                        Suspected phishing email received from {{ inputs.from_email | default: 'unknown' }}
                        (source_data_identifier {{ inputs.source_data_identifier | default: 'unknown' }}).

                        ATD severity: {{ steps.atd_detonate_file.output.Summary.Verdict.Severity }}
                        MAR hits: {{ steps.opendxl_mar_lookup_hash.output.items | size }}
                        First MAR hostname: {{ steps.opendxl_mar_lookup_hash.output.items[0].output.HostInfo.hostname | default: 'n/a' }}

                        Please continue to investigate these endpoints as soon as possible.

                  - name: create_servicenow_ticket
                    type: http
                    with:
                      url: "{{ consts.servicenow_base | default: 'https://CHANGEME-servicenow.service-now.com' }}/api/now/table/incident"
                      method: POST
                      headers:
                        Content-Type: "application/json"
                        Authorization: "{{ consts.servicenow_auth | default: 'Basic CHANGEME_SN_AUTH' }}"
                      body:
                        short_description: "phishing attachment present on endpoints"
                    on-failure:
                      continue: true

                  - name: email_analyst
                    type: console
                    with:
                      message: "Email would be sent to: {{ consts.analyst_email }} | subject: phishing attachment present on endpoints"

  - name: create_security_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "Workflow: McAfee — Phishing Attachment Investigation"
        description: |
          Automated case created by the **McAfee — Phishing Attachment Investigation** workflow.

          Review the workflow execution and attached comments for full investigation details.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "medium"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags: ["automated", "workflow"]
    on-failure:
      continue: true
