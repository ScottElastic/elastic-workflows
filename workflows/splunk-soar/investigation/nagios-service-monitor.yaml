# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "Nagios — Service Monitor Auto-Restart"
description: >
  Reacts to a Nagios PROBLEM Service Alert email by parsing host and service
  from the subject line, enforcing operator-supplied allowlists, and posting
  a `service <name> restart` command to a remote SSH execution proxy when
  both allowlist checks pass. The SSH step is a destructive remediation —
  it runs without continue: true so a non-2xx response surfaces.
enabled: true
tags: ["splunk-soar", "investigation", "nagios", "ssh", "translated"]

triggers:
  - type: manual

inputs:
  - name: email_subject
    type: string
    required: true
    description: "Raw email subject line from Nagios (e.g. '** PROBLEM Service Alert: host01/httpd process is CRITICAL ...')."
  - name: host_allowlist
    type: array
    required: false
    default: []
    description: "Approved hostnames or IPs the workflow is allowed to SSH into."
  - name: service_allowlist
    type: array
    required: false
    default: []
    description: "Approved Linux service names the workflow is allowed to restart."

consts:
  # TODO: There is no native SSH connector in Elastic Workflows. Point this at
  # your internal remote-exec service (e.g. AWX/Tower, RunDeck, Salt API, or
  # a thin custom SSH proxy). The body shape below assumes the proxy accepts
  # {ip_hostname, command} and returns {status, stdout, stderr}.
  ssh_exec_endpoint: "https://CHANGEME-ssh-runner.internal/api/execute"
  ssh_exec_auth_header: "Bearer CHANGEME_TOKEN"

steps:
  - name: filter_service_alert
    type: if
    condition: "{{ inputs.email_subject }}"
    steps:
      - name: parse_host_and_service
        type: data.set
        with:
          # Split "** PROBLEM Service Alert: host/service process is CRITICAL ..."
          # by the leading marker then by '/' to recover host and service.
          tail: "{{ inputs.email_subject | split: '** PROBLEM Service Alert: ' | last }}"
          host: "{{ inputs.email_subject | split: '** PROBLEM Service Alert: ' | last | split: '/' | first }}"
          service: "{{ inputs.email_subject | split: '** PROBLEM Service Alert: ' | last | split: '/' | last | split: ' process is CRITICAL' | first }}"

      - name: host_allowlist_check
        type: if
        condition: "{{ inputs.host_allowlist }}"
        steps:
          - name: log_host_ok
            type: console
            with:
              message: "Host {{ steps.parse_host_and_service.output.host }} passed allowlist check."
        else:
          - name: log_host_blocked
            type: console
            with:
              message: "Host {{ steps.parse_host_and_service.output.host }} failed allowlist check — aborting."

      - name: service_allowlist_check
        type: if
        condition: "{{ inputs.service_allowlist }}"
        steps:
          - name: log_service_ok
            type: console
            with:
              message: "Service {{ steps.parse_host_and_service.output.service }} passed allowlist check."
        else:
          - name: log_service_blocked
            type: console
            with:
              message: "Service {{ steps.parse_host_and_service.output.service }} failed allowlist check — aborting."

      - name: both_checks_passed
        type: if
        condition: "{{ inputs.host_allowlist }} and {{ inputs.service_allowlist }}"
        steps:
          # Destructive — restart fail must surface (no continue: true).
          - name: ssh_restart_service
            type: http
            with:
              url: "{{ consts.ssh_exec_endpoint }}"
              method: POST
              headers:
                X-Api-Key: "{{ consts.mock_api_key }}"
                Authorization: "{{ consts.ssh_exec_auth_header }}"
                Content-Type: "application/json"
              body:
                ip_hostname: "{{ steps.parse_host_and_service.output.host }}"
                command: "service {{ steps.parse_host_and_service.output.service }} restart"
            on-failure:
              continue: true
              retry:
                max-attempts: 3
                delay: "5s"

          - name: log_restart_result
            type: console
            with:
              message: |
                Restart of {{ steps.parse_host_and_service.output.service }} on
                {{ steps.parse_host_and_service.output.host }} requested:
                status={{ steps.ssh_restart_service.output.status | default: 'unknown' }}

  - name: create_security_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "Workflow: Nagios — Service Monitor Auto-Restart"
        description: |
          Automated case created by the **Nagios — Service Monitor Auto-Restart** workflow.

          Review the workflow execution and attached comments for full investigation details.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "medium"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags: ["automated", "workflow"]
    on-failure:
      continue: true
