# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "ProtectWise — Investigate and Respond"
description: >
  Investigates a file hash and destination IP from an alert. Runs VirusTotal
  reputation on the hash and the IP, queries the ProtectWise observations and
  PCAP APIs, geolocates the IP via MaxMind, and runs whois. If VirusTotal
  positives meet the threshold, blocks the hash in Carbon Black and closes the
  case. If ProtectWise flags the IP as a beacon, blocks it on the Palo Alto
  firewall and opens a Jira ticket. Blocks are destructive (no continue: true).
enabled: true
tags: ["splunk-soar", "investigation", "protectwise", "virustotal", "carbonblack", "translated"]

triggers:
  - type: manual
  - type: alert

inputs:
  - name: file_hash
    type: string
    required: false
    description: "SHA-256/MD5 hash extracted from alert artifact (cef.fileHash)."
  - name: destination_address
    type: string
    required: false
    description: "Destination IP from the alert artifact (cef.destinationAddress)."
  - name: observation_id
    type: string
    required: false
    description: "ProtectWise observation ID used for PCAP retrieval."
  - name: sensor_id
    type: string
    required: false
    description: "ProtectWise sensor ID for PCAP retrieval."

consts:
  # ProtectWise was acquired by Verizon and shut down its public API in 2018.
  # TODO: re-point to your replacement NDR (e.g. Stellar Cyber, Vectra, etc.)
  # if migrating. The endpoint shape below matches the original asset.
  protectwise_endpoint: "https://api.protectwise.net"
  protectwise_token: "Bearer CHANGEME"
  # Carbon Black Response (legacy) — POST /api/v1/banning/blacklist.
  carbonblack_endpoint: "https://CHANGEME-carbonblack.internal"
  carbonblack_token: "CHANGEME"
  # PAN-OS XML API — key= query parameter auth.
  panorama_endpoint: "https://CHANGEME-panorama.internal/api"
  panorama_api_key: "CHANGEME"
  panorama_vsys: "vsys1"
  panorama_block_group: "SOAR_BLOCK"
  maxmind_endpoint: "https://geoip.maxmind.com/geoip/v2.1"
  maxmind_auth: "Basic CHANGEME"
  whois_endpoint: "https://CHANGEME-whois.internal/lookup"
  virustotal_connector_id: "CHANGEME-virustotal-connector"
  jira_connector_id: "CHANGEME-jira-connector"
  smtp_connector_id: "CHANGEME-email-connector"
  notification_to: "soc@example.com"
  jira_project_key: "AP"
  vt_positives_threshold: 10

steps:
  - name: hash_branch
    type: if
    condition: "{{ inputs.file_hash | size }} > 0"
    steps:
      - name: file_reputation
        type: http
        with:
          url: "{{ consts.virustotal_base | default: 'https://www.virustotal.com' }}/api/v3/files/{{ inputs.file_hash }}"
          method: GET
          headers:
            x-apikey: "{{ consts.virustotal_api_key | default: 'CHANGEME_VT_KEY' }}"
        on-failure:
          retry:
            max-attempts: 2
            delay: "5s"
          continue: true

      - name: maybe_block_hash
        type: if
        condition: "${{ steps.file_reputation.output.positives | default: 0 }} >= ${{ consts.vt_positives_threshold }}"
        steps:
          # Carbon Black Response: POST /api/v1/banning/blacklist with
          # X-Auth-Token. Destructive — fail loudly.
          - name: block_hash
            type: http
            with:
              url: "{{ consts.carbonblack_endpoint }}/api/v1/banning/blacklist"
              method: POST
              headers:
                X-Auth-Token: "{{ consts.carbonblack_token }}"
                Content-Type: "application/json"
              body:
                md5hash: "{{ inputs.file_hash }}"
                text: "Elastic Workflows — blocked from ProtectWise investigation"
                enabled: true
            on-failure:
              retry:
                max-attempts: 3
                delay: "5s"

          - name: raise_severity_high
            type: data.set
            with:
              container_severity: "high"
              container_status: "closed"

          - name: notify_closed
            type: console
            with:
              message: "Email would be sent to: {{ consts.notification_to }} | subject: Phantom — Hash blocked, container closed"

  - name: ip_branch
    type: if
    condition: "{{ inputs.destination_address | size }} > 0"
    steps:
      - name: hunt_ip
        type: http
        with:
          url: "{{ consts.protectwise_endpoint }}/api/v1/observations/threats/search"
          method: POST
          headers:
            Authorization: "{{ consts.protectwise_token }}"
            Content-Type: "application/json"
          body:
            destinationAddress: "{{ inputs.destination_address }}"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
          continue: true

      - name: ip_reputation
        type: http
        with:
          url: "{{ consts.virustotal_base | default: 'https://www.virustotal.com' }}/api/v3/ip_addresses/{{ inputs.destination_address }}"
          method: GET
          headers:
            x-apikey: "{{ consts.virustotal_api_key | default: 'CHANGEME_VT_KEY' }}"
        on-failure:
          continue: true

      - name: geolocate_ip
        type: http
        with:
          url: "{{ consts.maxmind_endpoint }}/city/{{ inputs.destination_address }}"
          method: GET
          headers:
            Authorization: "{{ consts.maxmind_auth }}"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
          continue: true

      - name: whois_ip
        type: http
        with:
          url: "{{ consts.whois_endpoint }}"
          method: POST
          body:
            ip: "{{ inputs.destination_address }}"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
          continue: true

      - name: get_pcap
        type: if
        condition: "{{ inputs.observation_id | size }} > 0"
        steps:
          - name: pcap_request
            type: http
            with:
              url: "{{ consts.protectwise_endpoint }}/api/v1/pcap"
              method: POST
              headers:
                Authorization: "{{ consts.protectwise_token }}"
                Content-Type: "application/json"
              body:
                id: "{{ inputs.observation_id }}"
                type: "Observation"
                sensorid: "{{ inputs.sensor_id }}"
            on-failure:
              retry:
                max-attempts: 3
                delay: "5s"
              continue: true

      - name: beacon_detected
        type: if
        condition: "{{ steps.hunt_ip.output | json }}"
        steps:
          # Panorama XML API: add destination IP to SOAR_BLOCK address group.
          # Destructive — fail loudly.
          - name: block_ip
            type: http
            with:
              url: "{{ consts.panorama_endpoint }}/"
              method: POST
              query:
                type: "config"
                action: "set"
                xpath: "/config/devices/entry[@name='localhost.localdomain']/vsys/entry[@name={{ consts.panorama_vsys }}]/address-group/entry[@name={{ consts.panorama_block_group }}]/static"
                element: "<member>{{ inputs.destination_address }}</member>"
                key: "{{ consts.panorama_api_key }}"
            on-failure:
              retry:
                max-attempts: 3
                delay: "5s"

          - name: commit_block
            type: http
            with:
              url: "{{ consts.panorama_endpoint }}/"
              method: POST
              query:
                type: "commit"
                cmd: "<commit></commit>"
                key: "{{ consts.panorama_api_key }}"
            on-failure:
              retry:
                max-attempts: 3
                delay: "5s"

          - name: open_jira_ticket
            type: http
            with:
              url: "{{ consts.jira_base | default: 'https://jira.example.com' }}/rest/api/3/issue"
              method: POST
              headers:
                Content-Type: "application/json"
              body:
                fields:
                  summary: "Deployed Block IP: {{ inputs.destination_address }}"
                  description:
                    type: doc
                    version: 1
                    content:
                      - type: paragraph
                        content:
                          - type: text
                            text: "Follow-up required for block rule. IP investigated via ProtectWise hunt; flagged as beacon."

  - name: summarize
    type: console
    with:
      message: |
        ProtectWise investigation complete.
        hash={{ inputs.file_hash }} positives={{ steps.file_reputation.output.positives | default: 'n/a' }}
        ip={{ inputs.destination_address }} hunt_summary={{ steps.hunt_ip.output | json | truncate: 200 }}
