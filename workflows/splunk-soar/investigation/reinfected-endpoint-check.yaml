# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "Reinfected Endpoint — Triage"
description: >
  Classifies an infected source address as new or repeat by checking it against
  a passed-in list, then files a ServiceNow incident sized to the situation
  (urgency 2) via the native servicenow connector. New addresses are appended
  to a tracking index (`soar-state-infected-endpoints`) so future runs can
  detect reinfections. Inputs: `source_address` (required), `infected_endpoints`
  (current known list).
enabled: true
tags: ["splunk-soar", "investigation", "endpoint", "servicenow", "translated"]

triggers:
  - type: manual
  - type: alert

inputs:
  - name: source_address
    type: string
    required: true
    description: "Source address of the infected endpoint."
  - name: infected_endpoints
    type: array
    required: false
    default: []
    description: "Current list of known-infected endpoints (custom list equivalent)."

consts:
  servicenow_connector_id: "CHANGEME-servicenow-connector"
  # Elastic Workflows do not have a native 'custom list' primitive. Storing
  # the list as a JSON document in an internal index is one option; the
  # placeholder below sketches that approach.
  list_index: "soar-state-infected-endpoints"

steps:
  - name: ensure_source_present
    type: if
    condition: "{{ inputs.source_address | size }} > 0"
    steps:
      - name: classify
        type: if
        condition: "{{ inputs.infected_endpoints }}"
        steps:
          - name: build_repeat_summary
            type: data.set
            with:
              summary: "Repeat offender endpoint detected: {{ inputs.source_address }}. Matched against infected_endpoints list."

          - name: ticket_repeat
            type: http
            with:
              url: "{{ consts.servicenow_base | default: 'https://CHANGEME-servicenow.service-now.com' }}/api/now/table/incident"
              method: POST
              headers:
                Content-Type: "application/json"
                Authorization: "{{ consts.servicenow_auth | default: 'Basic CHANGEME_SN_AUTH' }}"
              body:
                short_description: "Reinfected Endpoint Instance"
            on-failure:
              continue: true

        else:
          # First-time infection: add to list, then file ticket.
          - name: append_to_list
            type: http
            with:
              url: "{{ consts.elasticsearch_base | default: 'https://CHANGEME-es.elastic-cloud.com' }}/{{ consts.list_index }}/_doc"
              method: POST
              headers:
                Content-Type: "application/json"
                Authorization: "{{ consts.elasticsearch_auth | default: 'ApiKey CHANGEME_ES_KEY' }}"
              body: "{{ item | json }}"
            on-failure:
              continue: true

          - name: build_new_summary
            type: data.set
            with:
              summary: "New infected endpoint added to tracking list: {{ inputs.source_address }}."

          - name: ticket_new
            type: http
            with:
              url: "{{ consts.servicenow_base | default: 'https://CHANGEME-servicenow.service-now.com' }}/api/now/table/incident"
              method: POST
              headers:
                Content-Type: "application/json"
                Authorization: "{{ consts.servicenow_auth | default: 'Basic CHANGEME_SN_AUTH' }}"
              body:
                short_description: "New Infected Endpoints"
            on-failure:
              continue: true

  - name: log_complete
    type: console
    with:
      message: "Reinfected endpoint check complete for {{ inputs.source_address }}."

  - name: create_security_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "Workflow: Reinfected Endpoint — Triage"
        description: |
          Automated case created by the **Reinfected Endpoint — Triage** workflow.

          Review the workflow execution and attached comments for full investigation details.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "medium"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags: ["automated", "workflow"]
    on-failure:
      continue: true
