# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "Splunk Risk Notable — Auto-Merge"
description: >
  De-duplicates Splunk risk-notable containers that share the same
  risk_object inside a 24-hour window. Inputs: this container's id and
  the risk_object value. If any related notable is already a case, this
  container is merged into it. Otherwise a new case is auto-created and
  the other related notables roll into it. Emits a `merge_result` string
  ("merged into case" / "created case" / "no related events") that the
  parent workflow branches on.
enabled: true
tags: ["splunk-soar", "investigation", "splunk", "risk-notable", "merge", "translated"]

triggers:
  - type: manual
  - type: alert

inputs:
  - name: container_id
    type: string
    required: true
    description: "Current SOAR/Kibana case identifier."
  - name: risk_object
    type: string
    required: false
    description: "Risk object value (user, host, etc.) used to find related notables."

consts:
  kibana_case_id: "CHANGEME-case-id"
  related_lookback: "-24h"
  related_label: "risk_notable"
  alerts_index: ".internal.alerts-security.alerts-default*"

steps:
  # Phantom uses the custom function `community/find_related_containers`.
  # Translate that to an ES search against the alerts index, filtering on
  # the risk_object field within the lookback window.
  - name: find_related_events
    type: elasticsearch.search
    with:
      index: "{{ consts.alerts_index }}"
      size: 25
      query:
        bool:
          must:
            - term:
                kibana.alert.workflow_tags: "{{ consts.related_label }}"
            - term:
                risk_object.keyword: "{{ inputs.risk_object }}"
            - range:
                "@timestamp":
                  gte: "now{{ consts.related_lookback }}"
          must_not:
            - term:
                kibana.alert.workflow_status: "closed"
    on-failure:
      retry:
        max-attempts: 2
        delay: "5s"
      continue: true

  - name: classify_relations
    type: if
    # Any of the related events already a "case"? In Elastic the case
    # association is on a separate object; here we use a stand-in field.
    condition: "{{ steps.find_related_events.output.hits.hits | map: '_source.container_type' }}"
    steps:
      - name: merge_into_existing_case
        type: kibana.request
        with:
          method: POST
          path: "/api/cases/{{ consts.kibana_case_id }}/comments"
          body:
            type: "user"
            comment: "Auto-merge: container {{ inputs.container_id }} merged into an existing case discovered via shared risk_object {{ inputs.risk_object }}."
        on-failure:
          continue: true


      - name: set_merge_result_merged
        type: data.set
        with:
          merge_result: "merged into case"

    else:
      - name: any_open_relatives
        type: if
        condition: "${{ steps.find_related_events.output.hits.total.value | default: 0 }} > 0"
        steps:
          # Promote this container to a case and roll others into it.
          - name: create_case
            type: kibana.request
            with:
              method: POST
              path: "/api/cases"
              body:
                title: "Risk Notable — auto-merged for {{ inputs.risk_object }}"
                description: "{{ inputs.description | default: 'Created by workflow.' }}"
                connector:
                  id: "none"
                  name: "none"
                  type: ".none"
                  fields: null
                settings:
                  syncAlerts: false
                owner: "cases"
                tags: []

          - name: set_merge_result_created
            type: data.set
            with:
              merge_result: "created case"
        else:
          - name: set_merge_result_none
            type: data.set
            with:
              merge_result: "no related events"

  - name: log_result
    type: console
    with:
      message: |
        Auto-merge complete. risk_object={{ inputs.risk_object }}
        related_count={{ steps.find_related_events.output.hits.total.value | default: 0 }}

  - name: create_security_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "Workflow: Splunk Risk Notable — Auto-Merge"
        description: |
          Automated case created by the **Splunk Risk Notable — Auto-Merge** workflow.

          Review the workflow execution and attached comments for full investigation details.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "medium"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags: ["automated", "workflow"]
    on-failure:
      continue: true
