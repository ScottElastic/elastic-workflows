# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "Splunk Risk Notable — Import Contributing Events"
description: >
  Pulls the contributing risk events for a Splunk ES notable
  (datamodel=Risk.All_Risk) via /services/search/jobs/export, transforms
  each row into an artifact-shaped record with CIM→CEF mapping, indexes
  them in Elasticsearch, and builds a markdown MITRE ATT&CK breakdown
  suitable for a case comment. Requires container_id, event_id,
  risk_object, risk_object_type, and the notable's info_min/max_time.
enabled: true
tags: ["splunk-soar", "investigation", "splunk", "risk-notable", "import", "mitre", "translated"]

triggers:
  - type: manual
  - type: alert

inputs:
  - name: container_id
    type: string
    required: true
    description: "Owning SOAR/Kibana case identifier."
  - name: event_id
    type: string
    required: true
    description: "Splunk ES notable event_id."
  - name: risk_object
    type: string
    required: true
    description: "Risk object value (typically user or host)."
  - name: risk_object_type
    type: string
    required: true
    description: "Risk object type (user, system, etc.)."
  - name: info_min_time
    type: string
    required: true
    description: "Earliest time for the contributing-events query."
  - name: info_max_time
    type: string
    required: true
    description: "Latest time for the contributing-events query."

consts:
  splunk_endpoint: "https://CHANGEME-splunk.internal:8089"
  splunk_auth_header: "Bearer CHANGEME_SPLUNK_TOKEN"
  splunk_ui_host: "CHANGEME-splunk-ui"
  individual_risk_threshold: 70
  cumulative_risk_threshold: 250

steps:
  # Step 1: Look up the Splunk asset settings — original Phantom playbook
  # uses this to render the link to the ES risk_analysis dashboard.
  - name: resolve_splunk_host
    type: data.set
    with:
      device: "{{ consts.splunk_ui_host }}"

  - name: ensure_event_id
    type: if
    condition: "{{ inputs.event_id | size }} > 0"
    steps:
      # Step 2: Build the Splunk SPL for contributing risk events.
      # The original SPL aggregates risk events for the matched user/host
      # by search_name and risk_message and computes _total_risk_score.
      - name: compose_risk_query
        type: data.set
        with:
          query: |
            datamodel:Risk
            | search risk_object="{{ inputs.risk_object }}" risk_object_type="{{ inputs.risk_object_type }}"
            | where _time>={{ inputs.info_min_time }} AND _time<={{ inputs.info_max_time }}
            | eval risk_event_id = if(isnull(risk_event_id), index + "_" + _cd + "_" + splunk_server, risk_event_id)
            | eventstats count by risk_event_id
            | where count < 2
            | stats values(*) as * sum(calculated_risk_score) as _total_risk_score earliest(_time) as earliest latest(_time) as latest by search_name risk_message
            | where NOT (match(source, "Splunk\sSOAR") AND _total_risk_score<=0)

      - name: run_risk_query
        type: http
        with:
          url: "{{ consts.splunk_endpoint }}/services/search/jobs/export"
          method: POST
          headers:
            X-Api-Key: "{{ consts.mock_api_key }}"
            Authorization: "{{ consts.splunk_auth_header }}"
            Content-Type: "application/x-www-form-urlencoded"
          body: "search={{ steps.compose_risk_query.output.query | url_encode }}&output_mode=json"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
            on-status: [429, 502, 503, 504]
          continue: true

      - name: results_present
        type: if
        condition: "${{ steps.run_risk_query.output.summary.total_events | default: 0 }} > 0"
        steps:
          # Convert each Splunk Risk row into an artifact-shaped record with
          # Splunk CIM → ArcSight CEF field renaming.
          - name: parse_risk_results
            type: ai.prompt
            connector-id: "CHANGEME-llm-connector"
            with:
              prompt: |
                Convert Splunk Datamodel:Risk rows to artifact records. For
                each row, emit one JSON object with these fields and nothing
                else:
                  - cef_data: object remapping CIM fields to CEF
                      src -> sourceAddress (if IPv4) or sourceHostName
                      dest -> destinationAddress (if IPv4) or destinationHostName
                      user -> destinationUserName
                      file_hash -> fileHash
                      url -> requestURL
                  - tags: array of strings parsed from rule_attack_tactic_technique
                  - data: { threat_object, risk_event } from the row
                  - name: search_name (string)
                  - description: risk_message, else description (string)
                  - calculated_risk_score: number
                Return only a JSON array. No prose, no markdown fences.

                Rows: {{ steps.run_risk_query.output | json }}

          # Create artifact-shaped documents in Elasticsearch. The original
          # playbook uses community/artifact_create.
          - name: index_risk_artifacts
            type: http
            with:
              url: "{{ consts.elasticsearch_base | default: 'https://CHANGEME-es.elastic-cloud.com' }}/soar-risk-artifacts/_doc"
              method: POST
              headers:
                X-Api-Key: "{{ consts.mock_api_key }}"
                Content-Type: "application/json"
                Authorization: "{{ consts.elasticsearch_auth | default: 'ApiKey CHANGEME_ES_KEY' }}"
              body: "{{ item | json }}"
            on-failure:
              continue: true

          - name: build_mitre_summary
            type: ai.prompt
            connector-id: "CHANGEME-llm-connector"
            with:
              prompt: |
                Build a markdown MITRE ATT&CK summary from these artifacts.
                Group by tactic, then technique. Format:
                  ## <Tactic Name>
                  - #### Technique: <Tnnnn>
                    - <risk_message>
                    - <risk_message>
                Sort tactics by total calculated_risk_score descending.
                Deduplicate identical risk_message values within a technique.
                If no MITRE tags exist on any artifact, return exactly:
                "No Tactics / Techniques available in contributing risk events."
                Return only markdown. No code fences, no commentary.

                Artifacts: {{ steps.parse_risk_results.output | json }}

          # Compose final summary note: ES Risk Analysis link + event table
          # + MITRE breakdown. Avoids copying the original template verbatim.
          - name: build_summary_note
            type: data.set
            with:
              note_title: "[Auto-Generated] Notable Event Summary"
              note_content: |
                ### Splunk Enterprise Security detected that {{ inputs.risk_object_type }} **{{ inputs.risk_object }}** has accumulated risk.

                [View on Splunk ES](https://{{ steps.resolve_splunk_host.output.device }}/en-US/app/SplunkEnterpriseSecuritySuite/risk_analysis?form.risk_object_raw={{ inputs.risk_object }}&form.risk_object_type_raw={{ inputs.risk_object_type }}&earliest={{ inputs.info_min_time }}&latest={{ inputs.info_max_time }})

                # MITRE ATT&CK Breakdown

                {{ steps.build_mitre_summary.output | default: 'No MITRE data available.' }}

          - name: log_summary
            type: console
            with:
              message: "Risk import complete for {{ inputs.risk_object }} — {{ steps.run_risk_query.output.summary.total_events | default: 0 }} contributing events parsed."

  - name: create_security_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "Workflow: Splunk Risk Notable — Import Contributing Events"
        description: |
          Automated case created by the **Splunk Risk Notable — Import Contributing Events** workflow.

          Review the workflow execution and attached comments for full investigation details.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "medium"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags: ["automated", "workflow"]
    on-failure:
      continue: true
