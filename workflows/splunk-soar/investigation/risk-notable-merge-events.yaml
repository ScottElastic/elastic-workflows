# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "Splunk Risk Notable — Manual Merge Events"
description: >
  Interactive companion to the auto-merge workflow. Searches Elastic
  for events sharing the current notable's risk_object/threat_object
  values over the last 30 days, asks the analyst (via a prompt-style
  message) whether to merge them all, merge selected events, or skip,
  then merges the chosen events into the current case and updates the
  Splunk notable with a comment pointing at the parent case.
enabled: true
tags: ["splunk-soar", "investigation", "splunk", "risk-notable", "merge", "translated"]

triggers:
  - type: manual

inputs:
  - name: container_id
    type: string
    required: true
    description: "Current Kibana case identifier."
  - name: container_name
    type: string
    required: false
    description: "Display name for the current case."
  - name: risk_object_values
    type: array
    required: false
    default: []
    description: "List of risk object values (from artifacts)."
  - name: threat_object_values
    type: array
    required: false
    default: []
    description: "List of threat object values (from artifact data)."
  - name: descriptions
    type: array
    required: false
    default: []
    description: "Artifact descriptions, used for de-duplication."
  - name: merge_decision
    type: string
    required: false
    default: "Do Nothing"
    description: "Analyst response: Merge All, Merge Individually, or Do Nothing."
  - name: selected_container_ids
    type: array
    required: false
    default: []
    description: "Container IDs the analyst selected for individual merge."
  - name: workbook_present
    type: boolean
    required: false
    default: false
    description: "True when the Risk Investigation workbook is attached."

consts:
  kibana_case_id: "CHANGEME-case-id"
  alerts_index: ".internal.alerts-security.alerts-default*"
  splunk_endpoint: "https://CHANGEME-splunk.internal:8089"
  minimum_match_count: 3
  search_lookback: "-30d"

steps:
  - name: skip_for_automation_user
    type: console
    with:
      message: "Risk notable manual merge requires an interactive analyst. Continuing with provided merge_decision='{{ inputs.merge_decision }}'."

  # Combine risk_object + threat_object + description values, dedup.
  - name: combine_related_fields
    type: data.set
    with:
      value_list: "${{ inputs.risk_object_values | concat: inputs.threat_object_values | concat: inputs.descriptions | uniq }}"

  - name: find_related_events
    type: elasticsearch.search
    with:
      index: "{{ consts.alerts_index }}"
      size: 50
      query:
        bool:
          must:
            - range:
                "@timestamp":
                  gte: "now{{ consts.search_lookback }}"
          should:
            - terms:
                risk_object.keyword: "${{ inputs.risk_object_values }}"
            - terms:
                threat_object.keyword: "${{ inputs.threat_object_values }}"
          minimum_should_match: 1
    on-failure:
      continue: true

  - name: related_present
    type: if
    condition: "${{ steps.find_related_events.output.hits.total.value | default: 0 }} > 0"
    steps:
      # Phantom uses an interactive `prompt2`. In Elastic Workflows there is
      # no native human-in-the-loop prompt — analyst response must be passed
      # in via the merge_decision input. Emit a console message so the
      # analyst sees the candidate list when they run the workflow.
      - name: render_candidate_table
        type: console
        with:
          message: |
            Found {{ steps.find_related_events.output.hits.total.value }} candidate events for merge.
            Merge decision currently set to: {{ inputs.merge_decision }}
            (Re-run with merge_decision="Merge All" / "Merge Individually" / "Do Nothing".)

      - name: merge_all_branch
        type: if
        condition: "{{ inputs.merge_decision }} == 'Merge All'"
        steps:
          - name: merge_all
            type: kibana.addCaseComment
            with:
              caseId: "{{ consts.kibana_case_id }}"
              comment: |
                Result of merge process:
                Merged all {{ steps.find_related_events.output.hits.total.value }} related events into case
                {{ inputs.container_id }} - {{ inputs.container_name | default: '' }}.
            on-failure:
              continue: true

      - name: merge_individually_branch
        type: if
        condition: "{{ inputs.merge_decision }} == 'Merge Individually'"
        steps:
          - name: merge_selected
            type: foreach
            with:
              items: "${{ inputs.selected_container_ids }}"
            steps:
              - name: comment_merge_selection
                type: kibana.addCaseComment
                with:
                  caseId: "{{ consts.kibana_case_id }}"
                  comment: "Merged related event container {{ item }} into case {{ inputs.container_id }}."
                on-failure:
                  continue: true

      - name: do_nothing_branch
        type: if
        condition: "{{ inputs.merge_decision }} == 'Do Nothing'"
        steps:
          - name: note_no_merge
            type: kibana.addCaseComment
            with:
              caseId: "{{ consts.kibana_case_id }}"
              comment: "Analyst opted not to merge related events. Candidates list captured for reference."
            on-failure:
              continue: true

      # Push notable update back to Splunk regardless of branch.
      - name: update_splunk_notable
        type: http
        with:
          url: "{{ consts.splunk_endpoint }}/services/notable_update"
          method: POST
          body:
            comment: "Case {{ inputs.container_id }} - merge decision: {{ inputs.merge_decision }}"
        on-failure:
          continue: true
    else:
      - name: no_related_events_note
        type: kibana.addCaseComment
        with:
          caseId: "{{ consts.kibana_case_id }}"
          comment: "[Auto-Generated] Find Related Events Summary — no related events based on input fields and minimum threshold."
        on-failure:
          continue: true
