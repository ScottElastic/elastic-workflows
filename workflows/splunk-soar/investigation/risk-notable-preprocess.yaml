# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "Splunk Risk Notable — Preprocess"
description: >
  Prepares a Splunk ES risk notable for investigation: records the notable
  artifact as evidence on the Kibana case, pins a deep-link to the ES
  incident-review screen, sets the notable to in_progress via
  /services/notable_update with a back-reference comment, and updates the
  case title, description, and severity to mirror the notable source and
  urgency.
enabled: true
tags: ["splunk-soar", "investigation", "splunk", "risk-notable", "preprocess", "translated"]

triggers:
  - type: manual
  - type: alert

inputs:
  - name: container_id
    type: string
    required: true
    description: "Kibana case identifier."
  - name: event_id
    type: string
    required: true
    description: "Splunk ES notable event_id."
  - name: info_min_time
    type: string
    required: false
    description: "Notable info_min_time (used to construct the ES URL)."
  - name: risk_object
    type: string
    required: false
    description: "Risk object (user, host)."
  - name: risk_object_type
    type: string
    required: false
    description: "Risk object type."
  - name: source
    type: string
    required: false
    description: "Source detection name."
  - name: urgency
    type: string
    required: false
    description: "Splunk urgency, used as case severity."
  - name: container_url
    type: string
    required: false
    description: "URL pointing to this case in Kibana."

consts:
  # Splunk Enterprise REST. notable_update is form-encoded and takes
  # ruleUIDs (comma-separated event_ids), status, comment, urgency, owner.
  splunk_endpoint: "https://CHANGEME-splunk.internal:8089"
  splunk_auth_header: "Bearer CHANGEME_SPLUNK_TOKEN"
  splunk_ui_host: "CHANGEME-splunk-ui"
  kibana_case_id: "CHANGEME-case-id"

steps:
  - name: ensure_event_id_present
    type: if
    condition: "{{ inputs.event_id | size }} > 0"
    steps:
      - name: mark_notable_artifact_evidence
        type: data.set
        with:
          # Original: community/mark_evidence on the artifact. In Elastic
          # there is no first-class evidence flag, so we record it as a
          # comment on the case.
          evidence_note: "Splunk notable artifact for event_id={{ inputs.event_id }} marked as evidence."

      - name: post_evidence_note
        type: kibana.request
        with:
          method: POST
          path: "/api/cases/{{ consts.kibana_case_id }}/comments"
          body:
            type: "user"
            comment: "{{ steps.mark_notable_artifact_evidence.output.evidence_note }}"
            owner: "cases"

        on-failure:
          continue: true

          # Compose ES incident-review URL for this notable.
      - name: build_es_url
        type: data.set
        with:
          es_url: "https://{{ consts.splunk_ui_host }}/en-US/app/SplunkEnterpriseSecuritySuite/incident_review?earliest={{ inputs.info_min_time | default: '0' }}&latest=now&search=event_id%3D{{ inputs.event_id }}"

      - name: pin_es_url
        type: kibana.request
        with:
          method: POST
          path: "/api/cases/{{ consts.kibana_case_id }}/comments"
          body:
            type: "user"
            comment: "Enterprise Security: {{ steps.build_es_url.output.es_url }}"
            owner: "cases"

        on-failure:
          continue: true

      - name: build_es_back_reference
        type: data.set
        with:
          note: |
            Elastic case created: {{ inputs.container_id }}
            Details: {{ inputs.container_url | default: '(case URL unavailable)' }}

      - name: update_splunk_notable
        type: http
        with:
          url: "{{ consts.splunk_endpoint }}/services/notable_update"
          method: POST
          headers:
            Authorization: "{{ consts.splunk_auth_header }}"
            Content-Type: "application/x-www-form-urlencoded"
          body: "ruleUIDs={{ inputs.event_id }}&comment={{ steps.build_es_back_reference.output.note | url_encode }}&status=in_progress&output_mode=json"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
            on-status: [429, 502, 503, 504]
          continue: true

      # Update case metadata to reflect the notable. Elastic Workflows does
      # not expose a native "update case attributes" step, so we model it
      # as a kibana.request to the cases API.
      - name: rename_and_set_severity
        type: kibana.request
        with:
          method: PATCH
          path: "/api/cases"
          body:
            cases:
              - id: "{{ consts.kibana_case_id }}"
                title: "{{ inputs.source | default: 'Risk Notable' }}: {{ inputs.risk_object | default: 'unknown' }}"
                description: "{{ inputs.source | default: 'Splunk Risk Notable' }}"
                severity: "{{ inputs.urgency | default: 'medium' }}"
        on-failure:
          continue: true

  - name: log_complete
    type: console
    with:
      message: "Preprocess complete for event_id {{ inputs.event_id }}."
