# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "Splunk ES — Close Investigation"
description: >
  Closes the Kibana case and the matching Splunk ES notable event in one
  step. Sets the case status to closed and posts the case id, closing
  user, and timestamp back into the notable via /services/notable_update
  with status=closed. Requires container_id (Kibana case id) and event_id
  (Splunk notable ruleUID).
enabled: true
tags: ["splunk-soar", "investigation", "splunk", "close", "translated"]

triggers:
  - type: manual

inputs:
  - name: container_id
    type: string
    required: true
    description: "Kibana case identifier."
  - name: event_id
    type: string
    required: true
    description: "Splunk ES notable event_id."
  - name: close_time
    type: string
    required: false
    description: "Close timestamp (defaults to now)."
  - name: closing_user
    type: string
    required: false
    description: "Username of the analyst closing the case."

consts:
  splunk_endpoint: "https://CHANGEME-splunk.internal:8089"
  splunk_auth_header: "Bearer CHANGEME_SPLUNK_TOKEN"
  kibana_case_id: "CHANGEME-case-id"

steps:
  - name: resolve_user
    type: data.set
    with:
      user: "{{ inputs.closing_user | default: 'workflow-automation' }}"
      timestamp: "{{ inputs.close_time | default: 'now' }}"

  # Close the Kibana case. No continue:true — closing is the primary intent
  # of this workflow, fail loud if Kibana rejects the patch.
  - name: close_kibana_case
    type: kibana.request
    with:
      method: PATCH
      path: "/api/cases"
      body:
        cases:
          - id: "{{ consts.kibana_case_id }}"
            status: "closed"
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"
        on-status: [429, 502, 503, 504]

  - name: ensure_event_id_present
    type: if
    condition: "{{ inputs.event_id | size }} > 0"
    steps:
      - name: build_close_comment
        type: data.set
        with:
          comment: "Elastic case {{ inputs.container_id }} closed at {{ steps.resolve_user.output.timestamp }} by {{ steps.resolve_user.output.user }}"

      # Destructive: mark notable closed. No continue:true — operator must
      # see this fail so the notable is not left dangling on a closed case.
      - name: close_splunk_notable
        type: http
        with:
          url: "{{ consts.splunk_endpoint }}/services/notable_update"
          method: POST
          headers:
            Authorization: "{{ consts.splunk_auth_header }}"
            Content-Type: "application/x-www-form-urlencoded"
          body: "ruleUIDs={{ inputs.event_id }}&status=5&comment={{ steps.build_close_comment.output.comment | url_encode }}&output_mode=json"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
            on-status: [429, 502, 503, 504]

  - name: log_complete
    type: console
    with:
      message: "Closed investigation for event_id {{ inputs.event_id }} / case {{ inputs.container_id }}."
