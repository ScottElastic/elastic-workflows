# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "SSH Endpoint — Investigate New Linux Server"
description: >
  Triggered by a Jira ticket carrying the `new_linux_server` label. Pulls the
  ticket via the native jira connector, JQL-searches Jira Cloud REST v3 for
  prior tickets with the same label, confirms the target host runs CentOS 7
  over an SSH runner stub, then captures `last -a` and `ss -tunapl` output and
  posts both as Jira comments. Inputs: `jira_key` (required), `target_host`
  (required), `ticket_label` (default `new_linux_server`). Requires an
  external SSH execution endpoint (no native Elastic SSH connector yet).
enabled: true
tags: ["splunk-soar", "investigation", "ssh", "jira", "linux", "translated"]

triggers:
  - type: manual

inputs:
  - name: jira_key
    type: string
    required: true
    description: "Jira ticket key (e.g. ABC-1234)."
  - name: target_host
    type: string
    required: true
    description: "Hostname or IP of the Linux server to investigate (taken from the Jira ticket custom field)."
  - name: ticket_label
    type: string
    required: false
    default: "new_linux_server"
    description: "Custom label that must be present for processing to proceed."

consts:
  jira_connector_id: "CHANGEME-jira-connector"
  # Jira Cloud REST API base + Basic auth header (base64 of email:api_token).
  # Used for JQL search since the Kibana jira connector doesn't expose search.
  jira_base: "https://CHANGEME-jira.internal"
  jira_base_url: "https://CHANGEME-jira.internal"
  jira_auth_header: "Basic CHANGEME_BASE64_EMAIL_TOKEN"
  # SSH execution stub. No native Elastic SSH connector yet — point this at
  # your in-house remote-execution proxy / Ansible Tower / Rundeck endpoint.
  ssh_runner_endpoint: "https://CHANGEME-ssh-runner.internal/api/execute"
  ssh_runner_auth_header: "Bearer CHANGEME_TOKEN"

steps:
  - name: get_ticket
    type: http
    with:
      url: "{{ consts.jira_base | default: 'https://CHANGEME-jira.internal' }}/rest/api/3/issue"
      method: POST
      headers:
        Content-Type: "application/json"
      body:
        fields:
          summary: "{{ inputs.ticket_title | default: 'Workflow ticket' }}"
          description:
            type: doc
            version: 1
            content:
              - type: paragraph
                content:
                  - type: text
                    text: "{{ inputs.description | default: '' }}"

  - name: only_new_linux_server
    type: if
    condition: "{{ steps.get_ticket.output.fields.customLabels | default: '' }}"
    steps:
      # Jira Cloud REST v3 JQL search. v2 /search is deprecated; v3 uses
      # /search/jql with POST body. Returns issues + nextPageToken.
      - name: search_existing_tickets
        type: http
        with:
          url: "{{ consts.jira_base_url }}/rest/api/3/search/jql"
          method: POST
          headers:
            Authorization: "{{ consts.jira_auth_header }}"
            Content-Type: "application/json"
            Accept: "application/json"
          body:
            jql: "labels = \"{{ inputs.ticket_label }}\""
            maxResults: 100
            fields:
              - "summary"
              - "status"
              - "created"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
          continue: true

      # Original playbook checks for an existing "case" container with the
      # matching label, and merges this one into it; if none, it promotes
      # this container to a case. Modeled here as a console step that
      # describes which branch ran.
      - name: promote_or_merge
        type: if
        condition: "${{ steps.search_existing_tickets.output.issues | size | default: 0 }} > 1"
        steps:
          - name: log_merge_existing
            type: console
            with:
              message: "Existing parent case found among {{ steps.search_existing_tickets.output.issues | size }} matching tickets — would merge this ticket into it."
        else:
          - name: log_promote_to_case
            type: console
            with:
              message: "No matching parent case found — would promote this ticket to a Case for future batching."

      - name: check_centos_version
        type: http
        with:
          url: "{{ consts.ssh_runner_endpoint }}"
          method: POST
          headers:
            Authorization: "{{ consts.ssh_runner_auth_header }}"
            Content-Type: "application/json"
          body:
            ip_hostname: "{{ inputs.target_host }}"
            command: "cat /etc/redhat-release"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
          continue: true

      - name: is_centos7
        type: if
        condition: "{{ steps.check_centos_version.output.output | default: '' }}"
        steps:
          # Run login history and listening port enumeration in parallel.
          - name: get_login_history
            type: http
            with:
              url: "{{ consts.ssh_runner_endpoint }}"
              method: POST
              headers:
                Authorization: "{{ consts.ssh_runner_auth_header }}"
                Content-Type: "application/json"
              body:
                ip_hostname: "{{ inputs.target_host }}"
                command: "/usr/bin/last -a"
            on-failure:
              retry:
                max-attempts: 3
                delay: "5s"
              continue: true

          - name: list_open_ports
            type: http
            with:
              url: "{{ consts.ssh_runner_endpoint }}"
              method: POST
              headers:
                Authorization: "{{ consts.ssh_runner_auth_header }}"
                Content-Type: "application/json"
              body:
                ip_hostname: "{{ inputs.target_host }}"
                command: "/usr/sbin/ss -tunapl"
            on-failure:
              retry:
                max-attempts: 3
                delay: "5s"
              continue: true

          # Build Jira-style markup tables for the comments.
          - name: format_login_table
            type: data.set
            with:
              login_table: |
                || output of '/usr/bin/last -a' ||
                | {{ steps.get_login_history.output.output | default: 'no output' }} |

          - name: format_port_table
            type: data.set
            with:
              port_table: |
                || protocol || state || recv-q || send-q || local_address:port || peer_address:port ||
                | {{ steps.list_open_ports.output.output | default: 'no output' }} |

          - name: enrich_ticket_logins
            type: http
            with:
              url: "{{ consts.jira_base | default: 'https://CHANGEME-jira.internal' }}/rest/api/3/issue"
              method: POST
              headers:
                Content-Type: "application/json"
              body:
                fields:
                  summary: "{{ inputs.ticket_title | default: 'Workflow ticket' }}"
                  description:
                    type: doc
                    version: 1
                    content:
                      - type: paragraph
                        content:
                          - type: text
                            text: "{{ inputs.description | default: '' }}"

          - name: enrich_ticket_ports
            type: http
            with:
              url: "{{ consts.jira_base | default: 'https://CHANGEME-jira.internal' }}/rest/api/3/issue"
              method: POST
              headers:
                Content-Type: "application/json"
              body:
                fields:
                  summary: "{{ inputs.ticket_title | default: 'Workflow ticket' }}"
                  description:
                    type: doc
                    version: 1
                    content:
                      - type: paragraph
                        content:
                          - type: text
                            text: "{{ inputs.description | default: '' }}"

        else:
          - name: report_unsupported_os
            type: http
            with:
              url: "{{ consts.jira_base | default: 'https://CHANGEME-jira.internal' }}/rest/api/3/issue"
              method: POST
              headers:
                Content-Type: "application/json"
              body:
                fields:
                  summary: "{{ inputs.ticket_title | default: 'Workflow ticket' }}"
                  description:
                    type: doc
                    version: 1
                    content:
                      - type: paragraph
                        content:
                          - type: text
                            text: "{{ inputs.description | default: '' }}"

  - name: log_complete
    type: console
    with:
      message: "SSH investigation pass completed for Jira ticket {{ inputs.jira_key }}."

  - name: create_security_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "Workflow: SSH Endpoint — Investigate New Linux Server"
        description: |
          Automated case created by the **SSH Endpoint — Investigate New Linux Server** workflow.

          Review the workflow execution and attached comments for full investigation details.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "medium"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags: ["automated", "workflow"]
    on-failure:
      continue: true
