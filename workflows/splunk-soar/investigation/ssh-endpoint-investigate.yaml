# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "SSH Endpoint — Investigate New Linux Server"
description: >
  Fired when a Jira ticket arrives tagged as a new Linux server. Looks
  up the ticket, ensures the work hasn't already been done elsewhere
  (matches against existing tickets in the same Jira project), confirms
  the host runs CentOS 7, then collects login history and listening
  ports via SSH and writes the results back as Jira comments. The
  first ticket of its kind is promoted to a Case so subsequent tickets
  can be batched together.
enabled: true
tags: ["splunk-soar", "investigation", "ssh", "jira", "linux", "translated"]

triggers:
  - type: manual

inputs:
  - name: jira_key
    type: string
    required: true
    description: "Jira ticket key (e.g. ABC-1234)."
  - name: target_host
    type: string
    required: true
    description: "Hostname or IP of the Linux server to investigate (taken from the Jira ticket custom field)."
  - name: ticket_label
    type: string
    required: false
    default: "new_linux_server"
    description: "Custom label that must be present for processing to proceed."

consts:
  jira_connector_id: "CHANGEME-jira-connector"
  # SSH execution stub. Replace with a real remote-execution connector
  # when available.
  ssh_runner_endpoint: "https://CHANGEME-ssh-runner.internal/api/execute"
  ssh_runner_auth_header: "Bearer CHANGEME_TOKEN"

steps:
  - name: get_ticket
    type: jira
    connector-id: "{{ consts.jira_connector_id }}"
    with:
      subAction: "getIncident"
      subActionParams:
        externalId: "{{ inputs.jira_key }}"
    on-failure:
      continue: true

  - name: only_new_linux_server
    type: if
    condition: "{{ steps.get_ticket.output.fields.customLabels | default: '' | contains: inputs.ticket_label }}"
    steps:
      - name: search_existing_tickets
        type: http
        with:
          url: "https://CHANGEME-jira.atlassian.net/rest/api/2/search"
          method: GET
          query:
            jql: "labels = {{ inputs.ticket_label }}"
        on-failure:
          continue: true

      # Original playbook checks for an existing "case" container with the
      # matching label, and merges this one into it; if none, it promotes
      # this container to a case. Modeled here as a console step that
      # describes which branch ran.
      - name: promote_or_merge
        type: if
        condition: "${{ steps.search_existing_tickets.output.total | default: 0 }} > 0"
        steps:
          - name: log_merge_existing
            type: console
            with:
              message: "Existing parent case found among {{ steps.search_existing_tickets.output.total }} matching tickets — would merge this ticket into it."
        else:
          - name: log_promote_to_case
            type: console
            with:
              message: "No matching parent case found — would promote this ticket to a Case for future batching."

      - name: check_centos_version
        type: http
        with:
          url: "{{ consts.ssh_runner_endpoint }}"
          method: POST
          headers:
            Authorization: "{{ consts.ssh_runner_auth_header }}"
            Content-Type: "application/json"
          body:
            ip_hostname: "{{ inputs.target_host }}"
            command: "cat /etc/redhat-release"
        on-failure:
          continue: true

      - name: is_centos7
        type: if
        condition: "{{ steps.check_centos_version.output.output | default: '' | contains: 'CentOS Linux release 7' }}"
        steps:
          # Run login history and listening port enumeration in parallel.
          - name: get_login_history
            type: http
            with:
              url: "{{ consts.ssh_runner_endpoint }}"
              method: POST
              headers:
                Authorization: "{{ consts.ssh_runner_auth_header }}"
                Content-Type: "application/json"
              body:
                ip_hostname: "{{ inputs.target_host }}"
                command: "/usr/bin/last -a"
            on-failure:
              continue: true

          - name: list_open_ports
            type: http
            with:
              url: "{{ consts.ssh_runner_endpoint }}"
              method: POST
              headers:
                Authorization: "{{ consts.ssh_runner_auth_header }}"
                Content-Type: "application/json"
              body:
                ip_hostname: "{{ inputs.target_host }}"
                command: "/usr/sbin/ss -tunapl"
            on-failure:
              continue: true

          # Build Jira-style markup tables for the comments.
          - name: format_login_table
            type: data.set
            with:
              login_table: |
                || output of '/usr/bin/last -a' ||
                | {{ steps.get_login_history.output.output | default: 'no output' }} |

          - name: format_port_table
            type: data.set
            with:
              port_table: |
                || protocol || state || recv-q || send-q || local_address:port || peer_address:port ||
                | {{ steps.list_open_ports.output.output | default: 'no output' }} |

          - name: enrich_ticket_logins
            type: jira
            connector-id: "{{ consts.jira_connector_id }}"
            with:
              subAction: "addComment"
              subActionParams:
                incidentId: "{{ inputs.jira_key }}"
                comment:
                  comment: "{{ steps.format_login_table.output.login_table }}"
            on-failure:
              continue: true

          - name: enrich_ticket_ports
            type: jira
            connector-id: "{{ consts.jira_connector_id }}"
            with:
              subAction: "addComment"
              subActionParams:
                incidentId: "{{ inputs.jira_key }}"
                comment:
                  comment: "{{ steps.format_port_table.output.port_table }}"
            on-failure:
              continue: true
        else:
          - name: report_unsupported_os
            type: jira
            connector-id: "{{ consts.jira_connector_id }}"
            with:
              subAction: "addComment"
              subActionParams:
                incidentId: "{{ inputs.jira_key }}"
                comment:
                  comment: "Workflow could not enrich this ticket — the host is not running CentOS 7, the only OS supported by this playbook."
            on-failure:
              continue: true

  - name: log_complete
    type: console
    with:
      message: "SSH investigation pass completed for Jira ticket {{ inputs.jira_key }}."
