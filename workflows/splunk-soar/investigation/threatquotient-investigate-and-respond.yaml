# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "ThreatQuotient — Investigate and Respond"
description: >
  Investigates the source and destination IPs on an alert: looks each up
  in ThreatQuotient (TQ) and VirusTotal, creates a TQ event with an
  optional file attachment, and either (a) blocks the IP on Palo Alto
  Panorama and any VT-flagged URLs that exceed the positives threshold,
  or (b) creates a Review-status IOC in TQ if TQ has no prior record.
  Inputs: source_address, destination_address, internal_ranges (skip
  list), optional vault_id. Destructive: pushes Panorama firewall
  block commands.
enabled: true
tags: ["splunk-soar", "investigation", "threatquotient", "virustotal", "translated"]

triggers:
  - type: manual
  - type: alert

inputs:
  - name: source_address
    type: string
    required: false
    description: "External source address from the alert."
  - name: destination_address
    type: string
    required: false
    description: "External destination address from the alert."
  - name: internal_ranges
    type: array
    required: false
    default: []
    description: "CIDRs / IPs considered internal (skip enrichment)."
  - name: vault_id
    type: string
    required: false
    description: "Optional file vault ID (uploads to ThreatQ event)."

consts:
  # ThreatQuotient ThreatQ on-prem appliance. Auth: bearer OAuth token
  # obtained from POST /api/token. Endpoints: /indicators, /events,
  # /attachments, /indicators/search.
  threatq_endpoint: "https://CHANGEME-threatq.internal/api"
  threatq_auth_header: "Bearer CHANGEME_TQ_TOKEN"
  # Palo Alto Panorama XML API. Auth: ?key=<api_key>. Address-group
  # updates require a commit; this stub assumes a pre-existing dynamic
  # address group bound to a block policy.
  panorama_endpoint: "https://CHANGEME-panorama.internal"
  panorama_api_key: "CHANGEME_PANORAMA_KEY"
  panorama_block_group: "soar-block-list"
  virustotal_connector_id: "CHANGEME-virustotal-connector"
  vt_positives_threshold: 1

steps:
  # Always create a ThreatQ event for this incident.
  - name: create_threatq_event
    type: http
    with:
      url: "{{ consts.threatq_endpoint }}/events"
      method: POST
      headers:
        Authorization: "{{ consts.threatq_auth_header }}"
        Content-Type: "application/json"
      body:
        title: "Elastic-translated investigation event"
        type: "Incident"
        description: "Auto-created by elastic-workflows ThreatQuotient — Investigate and Respond. src={{ inputs.source_address | default: '-' }} dst={{ inputs.destination_address | default: '-' }}"
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"
      continue: true

  # If a file was attached to the alert, upload it to the ThreatQ event.
  - name: upload_file_if_present
    type: if
    condition: "{{ inputs.vault_id | size }} > 0"
    steps:
      - name: upload_file
        type: http
        with:
          url: "{{ consts.threatq_endpoint }}/attachments"
          method: POST
          headers:
            Authorization: "{{ consts.threatq_auth_header }}"
          body:
            vault_id: "{{ inputs.vault_id }}"
            event_id: "{{ steps.create_threatq_event.output.id | default: '' }}"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
          continue: true

  # Destination IP path.
  - name: dst_branch
    type: if
    condition: "{{ inputs.destination_address | size }} > 0 and {{ inputs.internal_ranges | size }} == 0"
    steps:
      - name: dst_ip_reputation_tq
        type: http
        with:
          url: "{{ consts.threatq_endpoint }}/indicators/search"
          method: POST
          headers:
            Authorization: "{{ consts.threatq_auth_header }}"
          body:
            query: "{{ inputs.destination_address }}"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
          continue: true

      - name: dst_present_in_tq
        type: if
        condition: "{{ steps.dst_ip_reputation_tq.output.message | default: '' }} == 'SUCCESS'"
        steps:
          - name: dst_ip_reputation_vt
            type: http
            with:
              url: "{{ consts.virustotal_base | default: 'https://www.virustotal.com' }}/api/v3/ip_addresses/{{ inputs.destination_address }}"
              method: GET
              headers:
                x-apikey: "{{ consts.virustotal_api_key | default: 'CHANGEME_VT_KEY' }}"
            on-failure:
              continue: true

          - name: dst_block_if_active_adversary
            type: if
            condition: "{{ steps.dst_ip_reputation_tq.output.data | json }}"
            steps:
              # Panorama XML API: append IP to the dynamic address group.
              # Destructive — no `continue: true` so the analyst sees failures.
              - name: block_dst_ip
                type: http
                with:
                  url: "{{ consts.panorama_endpoint }}/api/"
                  method: POST
                  headers:
                    Content-Type: "application/x-www-form-urlencoded"
                  query:
                    type: "config"
                    action: "set"
                    key: "{{ consts.panorama_api_key }}"
                    xpath: "/config/shared/address-group/entry[@name={{ consts.panorama_block_group }}]/static"
                    element: "<member>{{ inputs.destination_address }}</member>"
                on-failure:
                  continue: true
                  retry:
                    max-attempts: 3
                    delay: "5s"

          - name: dst_block_high_url
            type: if
            condition: "${{ steps.dst_ip_reputation_vt.output.detected_urls | default: [] | size }} > 0"
            steps:
              - name: create_dst_url_ioc
                type: http
                with:
                  url: "{{ consts.threatq_endpoint }}/indicators"
                  method: POST
                  headers:
                    Authorization: "{{ consts.threatq_auth_header }}"
                  body:
                    indicator: "${{ steps.dst_ip_reputation_vt.output.detected_urls | map: 'url' }}"
                    indicator_type: "URL"
                    indicator_status: "Review"
                on-failure:
                  retry:
                    max-attempts: 3
                    delay: "5s"
                  continue: true

              # Panorama XML API: register the URL on a dynamic URL category
              # bound to a blocking security policy. Destructive — fail loud.
              - name: block_dst_url
                type: http
                with:
                  url: "{{ consts.panorama_endpoint }}/api/"
                  method: POST
                  headers:
                    Content-Type: "application/x-www-form-urlencoded"
                  query:
                    type: "config"
                    action: "set"
                    key: "{{ consts.panorama_api_key }}"
                    xpath: "/config/shared/profiles/custom-url-category/entry[@name={{ consts.panorama_block_group }}]/list"
                    element: "<member>${{ steps.dst_ip_reputation_vt.output.detected_urls | map: 'url' | first }}</member>"
                on-failure:
                  continue: true
                  retry:
                    max-attempts: 3
                    delay: "5s"
        else:
          # No ThreatQ record yet → create an IOC for analyst review.
          - name: create_dst_ip_ioc
            type: http
            with:
              url: "{{ consts.threatq_endpoint }}/indicators"
              method: POST
              headers:
                Authorization: "{{ consts.threatq_auth_header }}"
              body:
                indicator: "{{ inputs.destination_address }}"
                indicator_type: "IP Address"
                indicator_status: "Review"
            on-failure:
              retry:
                max-attempts: 3
                delay: "5s"
              continue: true

  # Source IP path (mirror image of destination).
  - name: src_branch
    type: if
    condition: "{{ inputs.source_address | size }} > 0 and {{ inputs.internal_ranges | size }} == 0"
    steps:
      - name: src_ip_reputation_tq
        type: http
        with:
          url: "{{ consts.threatq_endpoint }}/indicators/search"
          method: POST
          headers:
            Authorization: "{{ consts.threatq_auth_header }}"
          body:
            query: "{{ inputs.source_address }}"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
          continue: true

      - name: src_present_in_tq
        type: if
        condition: "{{ steps.src_ip_reputation_tq.output.message | default: '' }} == 'SUCCESS'"
        steps:
          - name: src_ip_reputation_vt
            type: http
            with:
              url: "{{ consts.virustotal_base | default: 'https://www.virustotal.com' }}/api/v3/ip_addresses/{{ inputs.source_address }}"
              method: GET
              headers:
                x-apikey: "{{ consts.virustotal_api_key | default: 'CHANGEME_VT_KEY' }}"
            on-failure:
              continue: true

          - name: src_block_if_active_adversary
            type: if
            condition: "{{ steps.src_ip_reputation_tq.output.data | json }}"
            steps:
              - name: block_src_ip
                type: http
                with:
                  url: "{{ consts.panorama_endpoint }}/api/"
                  method: POST
                  headers:
                    Content-Type: "application/x-www-form-urlencoded"
                  query:
                    type: "config"
                    action: "set"
                    key: "{{ consts.panorama_api_key }}"
                    xpath: "/config/shared/address-group/entry[@name={{ consts.panorama_block_group }}]/static"
                    element: "<member>{{ inputs.source_address }}</member>"
                on-failure:
                  continue: true
                  retry:
                    max-attempts: 3
                    delay: "5s"

          - name: src_block_high_url
            type: if
            condition: "${{ steps.src_ip_reputation_vt.output.detected_urls | default: [] | size }} > 0"
            steps:
              - name: create_src_url_ioc
                type: http
                with:
                  url: "{{ consts.threatq_endpoint }}/indicators"
                  method: POST
                  headers:
                    Authorization: "{{ consts.threatq_auth_header }}"
                  body:
                    indicator: "${{ steps.src_ip_reputation_vt.output.detected_urls | map: 'url' }}"
                    indicator_type: "URL"
                    indicator_status: "Review"
                on-failure:
                  retry:
                    max-attempts: 3
                    delay: "5s"
                  continue: true

              - name: block_src_url
                type: http
                with:
                  url: "{{ consts.panorama_endpoint }}/api/"
                  method: POST
                  headers:
                    Content-Type: "application/x-www-form-urlencoded"
                  query:
                    type: "config"
                    action: "set"
                    key: "{{ consts.panorama_api_key }}"
                    xpath: "/config/shared/profiles/custom-url-category/entry[@name={{ consts.panorama_block_group }}]/list"
                    element: "<member>${{ steps.src_ip_reputation_vt.output.detected_urls | map: 'url' | first }}</member>"
                on-failure:
                  continue: true
                  retry:
                    max-attempts: 3
                    delay: "5s"
        else:
          - name: create_src_ip_ioc
            type: http
            with:
              url: "{{ consts.threatq_endpoint }}/indicators"
              method: POST
              headers:
                Authorization: "{{ consts.threatq_auth_header }}"
              body:
                indicator: "{{ inputs.source_address }}"
                indicator_type: "IP Address"
                indicator_status: "Review"
            on-failure:
              retry:
                max-attempts: 3
                delay: "5s"
              continue: true

  - name: log_complete
    type: console
    with:
      message: "ThreatQuotient investigation finished for src={{ inputs.source_address | default: '-' }} dst={{ inputs.destination_address | default: '-' }}."

  - name: create_security_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "Workflow: ThreatQuotient — Investigate and Respond"
        description: |
          Automated case created by the **ThreatQuotient — Investigate and Respond** workflow.

          Review the workflow execution and attached comments for full investigation details.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "medium"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags: ["automated", "workflow"]
    on-failure:
      continue: true
