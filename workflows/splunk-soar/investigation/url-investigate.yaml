# ─────────────────────────────────────────────────────────────────────
name: "URL — Investigate (Splunk Intelligence Management)"
description: >
  Looks up each input URL against Splunk Intelligence Management
  (formerly TruSTAR) and records a verdict row for any indicator that
  returns priorityScore MEDIUM, HIGH or CRITICAL. Inputs: array of URLs.
  Note: TruSTAR APIs are being deprecated in favour of Splunk Mission
  Control — the http step here is a best-effort stub and should be
  replaced once a Mission Control connector lands.
enabled: true
tags: ["splunk-soar", "investigation", "url", "trustar", "splunk-intelligence-management", "translated"]

triggers:
  - type: manual

inputs:
  - name: urls
    type: array
    required: true
    description: "List of URLs to enrich."

consts:
  # TruSTAR / Splunk Intelligence Management v1.3. TruSTAR APIs are being
  # deprecated as the product migrates to Splunk Mission Control; treat
  # this as a stub until a Mission Control connector is available.
  trustar_endpoint: "https://api.trustar.co/api/1.3"
  trustar_auth_header: "Bearer CHANGEME_TRUSTAR_TOKEN"

steps:
  - name: per_url
    type: foreach
    foreach: "${{ inputs.urls }}"
    steps:
      - name: indicator_reputation
        type: http
        with:
          url: "{{ consts.trustar_endpoint }}/indicators/search"
          method: POST
          headers:
            Authorization: "{{ consts.trustar_auth_header }}"
            Content-Type: "application/json"
          body:
            indicator_value: "{{ item }}"
            limit: 10000
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
          continue: true

      - name: tag_indicator
        type: console
        with:
          message: "Tagging URL {{ item }} with priorityScore={{ steps.indicator_reputation.output.priorityScore | default: 'unknown' }}"

      - name: capture_for_verdict
        type: if
        condition: "{{ steps.indicator_reputation.output.priorityScore | default: '' }} == 'MEDIUM' or {{ steps.indicator_reputation.output.priorityScore | default: '' }} == 'HIGH' or {{ steps.indicator_reputation.output.priorityScore | default: '' }} == 'CRITICAL'"
        steps:
          - name: record_verdict_row
            type: data.set
            with:
              row: "| {{ item }} :: {{ steps.indicator_reputation.output.priorityScore }} |"

          - name: log_verdict_row
            type: console
            with:
              message: "Verdict row: {{ steps.record_verdict_row.output.row }}"

  - name: log_complete
    type: console
    with:
      message: "URL investigation finished for {{ inputs.urls | size }} URL(s)."
