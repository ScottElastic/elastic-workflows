# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "Commvault Cloud — Disable Data Aging"
description: >
  Pauses Commvault Cloud data aging on a specific client so existing backup
  copies cannot be pruned during an active incident. On API success, writes
  a confirmation comment to the linked Kibana case and closes it; on
  failure, writes a failure comment and leaves the case open. Destructive in
  the sense that it changes Commvault retention policy — fail loudly.
enabled: true
tags: ["splunk-soar", "misc", "commvault", "backup", "data-aging", "translated"]

triggers:
  - type: manual

inputs:
  - name: client_name
    type: string
    required: true
    description: "Commvault client (server hostname) to protect from data aging."
  - name: kibana_case_id
    type: string
    required: false
    description: "Optional Kibana case to update with the outcome."

consts:
  # Commvault REST API base — typical path is /commandcenter/api or
  # /webconsole/api depending on appliance topology. Auth uses an Authtoken
  # obtained from POST /Login (returns `token`); pass via Authtoken header.
  # See https://documentation.commvault.com/v11/expert/rest_api.html.
  # TODO: confirm the exact disable-data-aging operation against your
  # Commvault version — the action below targets the legacy SOAR pattern.
  commvault_endpoint: "https://CHANGEME-commvault.example.com/commandcenter/api"
  commvault_auth_header: "QSDK CHANGEME_TOKEN"

steps:
  # Destructive — disabling data aging changes retention. Fail loudly.
  - name: disable_data_aging
    type: http
    with:
      url: "{{ consts.commvault_endpoint }}/Client/DataAging/Disable"
      method: POST
      headers:
        Authtoken: "{{ consts.commvault_auth_header }}"
        Accept: "application/json"
        Content-Type: "application/json"
      body:
        clientName: "{{ inputs.client_name }}"
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"

  - name: branch_on_outcome
    type: if
    condition: "{{ steps.disable_data_aging.output.status }} == 'success'"
    steps:
      - name: log_success
        type: console
        with:
          message: "Data aging disabled for {{ inputs.client_name }}."
      - name: success_case_update
        type: if
        condition: "{{ inputs.kibana_case_id | size }} > 0"
        steps:
          - name: success_comment
            type: kibana.request
            with:
              method: POST
              path: "/api/cases/{{ inputs.kibana_case_id }}/comments"
              body:
                type: "user"
                comment: "Commvault data aging disabled for {{ inputs.client_name }}."
                owner: "cases"

          - name: close_case
            type: kibana.request
            with:
              method: PATCH
              path: "/api/cases"
              body:
                - id: "{{ inputs.kibana_case_id }}"
                  status: "closed"
                  version: "WzAsMV0="

    else:
      - name: log_failure
        type: console
        with:
          message: "Could not disable data aging for {{ inputs.client_name }}."
      - name: failure_case_update
        type: if
        condition: "{{ inputs.kibana_case_id | size }} > 0"
        steps:
          - name: failure_comment
            type: kibana.request
            with:
              method: POST
              path: "/api/cases/{{ inputs.kibana_case_id }}/comments"
              body:
                type: "user"
                comment: "Commvault data aging change for {{ inputs.client_name }} did not complete successfully."
                owner: "cases"

