# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "Customer Firewall Request — Handle Artifact"
description: >
  Companion workflow to "customer-firewall-request-parse-csv". Takes parsed
  rows (each labeled `customer_request`) and dispatches each to one of four
  Palo Alto Networks XML API operations — block or unblock by source or
  destination IP — by appending or removing the IP from address-group
  members on the firewall, then committing. Inputs: `requests` (array of
  rows with `label`, `action`, `sourceAddress`, `destinationAddress`).
enabled: true
tags: ["splunk-soar", "misc", "firewall", "pan", "translated"]

triggers:
  - type: manual

inputs:
  - name: requests
    type: array
    required: true
    description: >
      Array of parsed firewall request rows. Each entry should be an object
      with: label, action (block_ip|unblock_ip), sourceAddress, destinationAddress.

consts:
  # Palo Alto Networks PAN-OS XML API. Reference:
  # https://docs.paloaltonetworks.com/pan-os/11-2/pan-os-panorama-api
  pan_endpoint: "https://CHANGEME-pan-fw.example.com/api"
  pan_api_key: "CHANGEME-pan-api-key"
  pan_vsys: "vsys1"
  # Address-group names that this workflow appends to or removes from.
  pan_block_src_group: "elastic-block-src"
  pan_block_dst_group: "elastic-block-dst"

steps:
  - name: process_each_request
    type: foreach
    foreach: "${{ inputs.requests }}"
    steps:
      # Only operate on rows tagged "customer_request" as in the source playbook.
      - name: gate_label
        type: if
        condition: "{{ item.label }} == 'customer_request'"
        steps:
          # Case 1: block by source IP — add an address object and append it
          # to the blocked-source address group.
          - name: block_src_branch
            type: if
            condition: "{{ item.action }} == 'block_ip' and {{ item.sourceAddress | size }} > 0 and {{ item.destinationAddress | size }} == 0"
            steps:
              - name: pan_create_src_address
                type: http
                with:
                  url: "{{ consts.pan_endpoint }}/"
                  method: POST
                  headers:
                    Content-Type: "application/x-www-form-urlencoded"
                  query:
                    type: "config"
                    action: "set"
                    xpath: "/config/devices/entry[@name='localhost.localdomain']/vsys/entry[@name={{ consts.pan_vsys }}]/address/entry[@name='ew-block-{{ item.sourceAddress }}']"
                    element: "<ip-netmask>{{ item.sourceAddress }}</ip-netmask><description>Blocked by Elastic Workflows</description>"
                    key: "{{ consts.pan_api_key }}"
                on-failure:
                  continue: true
                  retry:
                    max-attempts: 3
                    delay: "5s"
              - name: pan_block_src
                type: http
                with:
                  url: "{{ consts.pan_endpoint }}/"
                  method: POST
                  headers:
                    Content-Type: "application/x-www-form-urlencoded"
                  query:
                    type: "config"
                    action: "set"
                    xpath: "/config/devices/entry[@name='localhost.localdomain']/vsys/entry[@name={{ consts.pan_vsys }}]/address-group/entry[@name={{ consts.pan_block_src_group }}]/static"
                    element: "<member>ew-block-{{ item.sourceAddress }}</member>"
                    key: "{{ consts.pan_api_key }}"
                on-failure:
                  continue: true
                  retry:
                    max-attempts: 3
                    delay: "5s"
              - name: log_block_src
                type: console
                with:
                  message: "Blocked source IP {{ item.sourceAddress }} in {{ consts.pan_block_src_group }} ({{ consts.pan_vsys }})."

          # Case 2: block by destination IP
          - name: block_dst_branch
            type: if
            condition: "{{ item.action }} == 'block_ip' and {{ item.destinationAddress | size }} > 0 and {{ item.sourceAddress | size }} == 0"
            steps:
              - name: pan_create_dst_address
                type: http
                with:
                  url: "{{ consts.pan_endpoint }}/"
                  method: POST
                  headers:
                    Content-Type: "application/x-www-form-urlencoded"
                  query:
                    type: "config"
                    action: "set"
                    xpath: "/config/devices/entry[@name='localhost.localdomain']/vsys/entry[@name={{ consts.pan_vsys }}]/address/entry[@name='ew-block-{{ item.destinationAddress }}']"
                    element: "<ip-netmask>{{ item.destinationAddress }}</ip-netmask><description>Blocked by Elastic Workflows</description>"
                    key: "{{ consts.pan_api_key }}"
                on-failure:
                  continue: true
                  retry:
                    max-attempts: 3
                    delay: "5s"
              - name: pan_block_dst
                type: http
                with:
                  url: "{{ consts.pan_endpoint }}/"
                  method: POST
                  headers:
                    Content-Type: "application/x-www-form-urlencoded"
                  query:
                    type: "config"
                    action: "set"
                    xpath: "/config/devices/entry[@name='localhost.localdomain']/vsys/entry[@name={{ consts.pan_vsys }}]/address-group/entry[@name={{ consts.pan_block_dst_group }}]/static"
                    element: "<member>ew-block-{{ item.destinationAddress }}</member>"
                    key: "{{ consts.pan_api_key }}"
                on-failure:
                  continue: true
                  retry:
                    max-attempts: 3
                    delay: "5s"
              - name: log_block_dst
                type: console
                with:
                  message: "Blocked destination IP {{ item.destinationAddress }} in {{ consts.pan_block_dst_group }} ({{ consts.pan_vsys }})."

          # Case 3: unblock by source IP — remove the member from the group.
          - name: unblock_src_branch
            type: if
            condition: "{{ item.action }} == 'unblock_ip' and {{ item.sourceAddress | size }} > 0 and {{ item.destinationAddress | size }} == 0"
            steps:
              - name: pan_unblock_src
                type: http
                with:
                  url: "{{ consts.pan_endpoint }}/"
                  method: POST
                  headers:
                    Content-Type: "application/x-www-form-urlencoded"
                  query:
                    type: "config"
                    action: "delete"
                    xpath: "/config/devices/entry[@name='localhost.localdomain']/vsys/entry[@name={{ consts.pan_vsys }}]/address-group/entry[@name={{ consts.pan_block_src_group }}]/static/member[text()='ew-block-{{ item.sourceAddress }}']"
                    key: "{{ consts.pan_api_key }}"
                on-failure:
                  continue: true
                  retry:
                    max-attempts: 3
                    delay: "5s"
              - name: log_unblock_src
                type: console
                with:
                  message: "Unblocked source IP {{ item.sourceAddress }} from {{ consts.pan_block_src_group }} ({{ consts.pan_vsys }})."

          # Case 4: unblock by destination IP
          - name: unblock_dst_branch
            type: if
            condition: "{{ item.action }} == 'unblock_ip' and {{ item.destinationAddress | size }} > 0 and {{ item.sourceAddress | size }} == 0"
            steps:
              - name: pan_unblock_dst
                type: http
                with:
                  url: "{{ consts.pan_endpoint }}/"
                  method: POST
                  headers:
                    Content-Type: "application/x-www-form-urlencoded"
                  query:
                    type: "config"
                    action: "delete"
                    xpath: "/config/devices/entry[@name='localhost.localdomain']/vsys/entry[@name={{ consts.pan_vsys }}]/address-group/entry[@name={{ consts.pan_block_dst_group }}]/static/member[text()='ew-block-{{ item.destinationAddress }}']"
                    key: "{{ consts.pan_api_key }}"
                on-failure:
                  continue: true
                  retry:
                    max-attempts: 3
                    delay: "5s"
              - name: log_unblock_dst
                type: console
                with:
                  message: "Unblocked destination IP {{ item.destinationAddress }} from {{ consts.pan_block_dst_group }} ({{ consts.pan_vsys }})."

  # Single commit after all per-item changes have been queued.
  - name: pan_commit
    type: http
    with:
      url: "{{ consts.pan_endpoint }}/"
      method: POST
      headers:
        Content-Type: "application/x-www-form-urlencoded"
      query:
        type: "commit"
        cmd: "<commit><description>Customer firewall request batch</description></commit>"
        key: "{{ consts.pan_api_key }}"
    on-failure:
      continue: true
      retry:
        max-attempts: 3
        delay: "10s"

  - name: create_security_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "Workflow: Customer Firewall Request — Handle Artifact"
        description: |
          Automated case created by the **Customer Firewall Request — Handle Artifact** workflow.

          Review the workflow execution and attached comments for full investigation details.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "medium"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags: ["automated", "workflow"]
    on-failure:
      continue: true
