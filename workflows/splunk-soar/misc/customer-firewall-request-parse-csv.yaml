# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "Customer Firewall Request — Parse CSV"
description: >
  Parses a customer-supplied CSV of firewall change requests (either
  fetched from csv_url or passed inline) into structured records with
  fields {label, action, sourceAddress, destinationAddress, severity}.
  Rows missing an action (block_ip/unblock_ip) or both address fields
  are dropped. When invoke_handler_workflow_id is provided, the parsed
  records are forwarded to the customer-firewall-request-handle-artifact
  sibling workflow for execution.
enabled: true
tags: ["splunk-soar", "misc", "firewall", "csv", "translated"]

triggers:
  - type: manual

inputs:
  - name: csv_url
    type: string
    required: false
    description: "URL to fetch the CSV from (alternative to inline_csv)."
  - name: inline_csv
    type: string
    required: false
    description: >
      Raw CSV content. Must contain an "action" column and either a
      "sourceAddress" or "destinationAddress" column.
  - name: invoke_handler_workflow_id
    type: string
    required: false
    description: "Workflow ID to forward parsed requests to (handle-artifact pair)."

consts:
  # If you fetch the file via http, this is the bearer header. Leave as
  # CHANGEME otherwise and rely on inline_csv.
  csv_auth_header: "Bearer CHANGEME_TOKEN"

steps:
  - name: load_csv
    type: if
    condition: "{{ inputs.csv_url | size }} > 0"
    steps:
      - name: fetch_csv
        type: http
        with:
          url: "{{ inputs.csv_url }}"
          method: GET
          headers:
            Authorization: "{{ consts.csv_auth_header }}"
        on-failure:
          retry:
            max-attempts: 2
            delay: "3s"
          continue: true
      - name: stash_fetched
        type: data.set
        with:
          raw_csv: "{{ steps.fetch_csv.output.body }}"
    else:
      - name: stash_inline
        type: data.set
        with:
          raw_csv: "{{ inputs.inline_csv }}"

  # The original Phantom playbook embedded a Python csv.DictReader loop. The
  # equivalent in Elastic Workflows is to lean on an ai.prompt step (or a
  # simple http call to a CSV-parsing microservice) to turn the raw text
  # into a structured array of objects.
  - name: parse_rows
    type: ai.prompt
    with:
      prompt: |
        You are a strict CSV-to-JSON converter for firewall change
        requests.

        Treat the first row of the input as the header. For every
        subsequent row, emit an object with EXACTLY these keys:
          - label: always the literal string "customer_request"
          - action: one of "block_ip" or "unblock_ip"
          - sourceAddress: string, may be empty
          - destinationAddress: string, may be empty
          - severity: always the literal string "high"

        Drop any row where action is not one of the two allowed values,
        OR where BOTH sourceAddress and destinationAddress are empty
        after trimming whitespace.

        CSV input:
        {{ steps.load_csv.output.raw_csv }}

        Output: a single JSON array of those objects and nothing else.
        Do not include explanations, prose, or markdown fences.

  - name: capture_artifacts
    type: data.set
    with:
      requests: "${{ steps.parse_rows.output.response }}"

  - name: log_count
    type: console
    with:
      message: "Parsed {{ steps.capture_artifacts.output.requests | size }} customer_request rows."

  # Forward to the sibling handler workflow if a target was provided.
  # The original Phantom playbook called `phantom.playbook("local/customer_firewall_request_parse_csv", container)`
  # to invoke the handler. Elastic Workflows does not yet ship a built-in
  # workflow-from-workflow primitive — operators can either use the Kibana
  # Workflows REST API directly or chain via an alert trigger that consumes
  # the indexed requests.
  - name: dispatch_handler
    type: if
    condition: "{{ inputs.invoke_handler_workflow_id | size }} > 0"
    steps:
      - name: run_handle_artifact
        type: kibana.request
        with:
          method: POST
          path: "/api/workflows/{{ inputs.invoke_handler_workflow_id }}/_execute"
          body:
            inputs:
              requests: "${{ steps.capture_artifacts.output.requests }}"
        on-failure:
          retry:
            max-attempts: 2
            delay: "3s"
          continue: true
