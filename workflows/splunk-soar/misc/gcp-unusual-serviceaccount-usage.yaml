# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "GCP — Unusual Service Account Usage Triage"
description: >
  Triages a GCP unusual-service-account-usage alert. Branches on which
  inputs are populated: (A) account + instance — lists SA keys, fetches
  instance metadata, asks the analyst whether to delete keys and/or stop
  the VM; (B) account only — offers key deletion; (C) neither — flags
  the case for manual review. Destructive actions (key delete, VM stop)
  fail loud; enrichment calls tolerate transient errors.
enabled: true
tags: ["splunk-soar", "misc", "gcp", "service-account", "identity", "translated"]

triggers:
  - type: alert
  - type: manual

inputs:
  - name: service_account
    type: string
    required: false
    description: "GCP service account email/ID from the alert."
  - name: instance_id
    type: string
    required: false
    description: "GCE instance ID involved in the activity, if any."
  - name: instance_zone
    type: string
    required: false
    description: "GCE zone for the involved instance."
  - name: kibana_case_id
    type: string
    required: false
    description: "Case to add comments / decisions to."

consts:
  # GCP IAM v1 — service account key management.
  #   GET    /projects/{p}/serviceAccounts/{sa}/keys
  #   DELETE /{key.name}            (key.name already includes the full
  #                                   projects/.../serviceAccounts/.../keys/... path)
  gcp_iam_endpoint: "https://iam.googleapis.com/v1"
  gcp_iam_token: "Bearer CHANGEME_TOKEN"
  # GCP Compute v1 — VM metadata + stop.
  #   GET  /projects/{p}/zones/{z}/instances/{i}
  #   POST /projects/{p}/zones/{z}/instances/{i}/stop   (empty body)
  # Tokens are short-lived (1h). In production, source them from the
  # GCE metadata server or mint via a service-account JWT exchange and
  # inject through a credential broker rather than hard-coding here.
  gcp_compute_endpoint: "https://compute.googleapis.com/compute/v1"
  gcp_compute_token: "Bearer CHANGEME_TOKEN"
  gcp_project_id: "CHANGEME-project-id"

steps:
  - name: branch_on_inputs
    type: if
    condition: "{{ inputs.service_account | size }} > 0 and {{ inputs.instance_id | size }} > 0"
    steps:
      # Path A — both account and VM known.
      # GET /projects/{p}/serviceAccounts/{sa}/keys — enrichment, tolerate failure.
      - name: list_keys_a
        type: http
        with:
          url: "{{ consts.gcp_iam_endpoint }}/projects/{{ consts.gcp_project_id }}/serviceAccounts/{{ inputs.service_account }}/keys"
          method: GET
          headers:
            Authorization: "{{ consts.gcp_iam_token }}"
            Accept: "application/json"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
          continue: true

      # GET /projects/{p}/zones/{z}/instances/{i} — enrichment, tolerate failure.
      - name: describe_instance_a
        type: http
        with:
          url: "{{ consts.gcp_compute_endpoint }}/projects/{{ consts.gcp_project_id }}/zones/{{ inputs.instance_zone }}/instances/{{ inputs.instance_id }}"
          method: GET
          headers:
            Authorization: "{{ consts.gcp_compute_token }}"
            Accept: "application/json"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
          continue: true

      - name: prompt_keys_and_vm
        type: ai.prompt
        with:
          prompt: |
            You are triaging a GCP unusual-service-account-usage alert.

            Decide two things based on the evidence below:
              1. delete_keys     — revoke every active key on this service
                                   account (irreversible; breaks any workloads
                                   still using these keys).
              2. stop_instance   — gracefully shut down the GCE VM (preserves
                                   disk, keeps forensics intact).

            Recommend "Yes" for delete_keys if any key is user-managed, was
            created recently, has unusual origin, or is unused.
            Recommend "Yes" for stop_instance if the VM is the active source
            of the unusual activity AND business impact is acceptable.

            Service account: {{ inputs.service_account }}

            Keys ({{ steps.list_keys_a.output.keys | size | default: 0 }}):
            {% for key in steps.list_keys_a.output.keys %}
              - name={{ key.name }} type={{ key.keyType }} origin={{ key.keyOrigin }} alg={{ key.keyAlgorithm }} validAfter={{ key.validAfterTime }} validBefore={{ key.validBeforeTime }}
            {% endfor %}

            Instance:
              id={{ steps.describe_instance_a.output.id | default: '' }}
              name={{ steps.describe_instance_a.output.name | default: '' }}
              machineType={{ steps.describe_instance_a.output.machineType | default: '' }}
              status={{ steps.describe_instance_a.output.status | default: '' }}
              networkIP={{ steps.describe_instance_a.output.networkInterfaces[0].networkIP | default: '' }}

            Respond with EXACTLY this JSON shape and nothing else:
            {"delete_keys": "Yes|No", "stop_instance": "Yes|No", "rationale": "<one sentence>"}
          timeout: "30m"

      - name: maybe_delete_keys_a
        type: if
        condition: "{{ steps.prompt_keys_and_vm.output.response | parse_json | get: 'delete_keys' | downcase }} == 'yes'"
        steps:
          - name: delete_keys_a_loop
            type: foreach
            with:
              items: ${{ steps.list_keys_a.output.keys }}
            steps:
              # DELETE https://iam.googleapis.com/v1/{key.name}
              # key.name is already a fully-qualified resource path.
              # Destructive — fail loud.
              - name: delete_single_key_a
                type: http
                with:
                  url: "{{ consts.gcp_iam_endpoint }}/{{ item.name }}"
                  method: DELETE
                  headers:
                    Authorization: "{{ consts.gcp_iam_token }}"
                on-failure:
                  retry:
                    max-attempts: 3
                    delay: "5s"

      - name: maybe_stop_instance_a
        type: if
        condition: "{{ steps.prompt_keys_and_vm.output.response | parse_json | get: 'stop_instance' | downcase }} == 'yes'"
        steps:
          # POST /projects/{p}/zones/{z}/instances/{i}/stop — empty body.
          # Destructive — fail loud.
          - name: stop_instance_call
            type: http
            with:
              url: "{{ consts.gcp_compute_endpoint }}/projects/{{ consts.gcp_project_id }}/zones/{{ inputs.instance_zone }}/instances/{{ inputs.instance_id }}/stop"
              method: POST
              headers:
                Authorization: "{{ consts.gcp_compute_token }}"
                Content-Length: "0"
            on-failure:
              retry:
                max-attempts: 3
                delay: "5s"
    else:
      # Path B — account known but no VM
      - name: maybe_path_b
        type: if
        condition: "{{ inputs.service_account | size }} > 0"
        steps:
          # GET /projects/{p}/serviceAccounts/{sa}/keys
          - name: list_keys_b
            type: http
            with:
              url: "{{ consts.gcp_iam_endpoint }}/projects/{{ consts.gcp_project_id }}/serviceAccounts/{{ inputs.service_account }}/keys"
              method: GET
              headers:
                Authorization: "{{ consts.gcp_iam_token }}"
                Accept: "application/json"
            on-failure:
              retry:
                max-attempts: 3
                delay: "5s"
              continue: true

          - name: prompt_keys_only
            type: ai.prompt
            with:
              prompt: |
                You are triaging a GCP unusual-service-account-usage alert
                where no VM was identified. Decide whether to delete every
                active key on the service account (irreversible).

                Recommend "Yes" if any key is user-managed (keyType=USER_MANAGED),
                was minted recently, or is unused. Recommend "No" if every key
                is system-managed and clearly in active production use.

                Service account: {{ inputs.service_account }}

                Keys ({{ steps.list_keys_b.output.keys | size | default: 0 }}):
                {% for key in steps.list_keys_b.output.keys %}
                  - name={{ key.name }} type={{ key.keyType }} alg={{ key.keyAlgorithm }} validAfter={{ key.validAfterTime }} validBefore={{ key.validBeforeTime }}
                {% endfor %}

                Respond with EXACTLY: Yes or No (no other text).
              timeout: "30m"

          - name: maybe_delete_keys_b
            type: if
            condition: "{{ steps.prompt_keys_only.output.response | downcase | trim }} == 'yes'"
            steps:
              - name: delete_keys_b_loop
                type: foreach
                with:
                  items: ${{ steps.list_keys_b.output.keys }}
                steps:
                  # DELETE https://iam.googleapis.com/v1/{key.name}
                  # Destructive — fail loud.
                  - name: delete_single_key_b
                    type: http
                    with:
                      url: "{{ consts.gcp_iam_endpoint }}/{{ item.name }}"
                      method: DELETE
                      headers:
                        Authorization: "{{ consts.gcp_iam_token }}"
                    on-failure:
                      retry:
                        max-attempts: 3
                        delay: "5s"
        else:
          # Path C — neither input; manual review only.
          - name: flag_for_manual_review
            type: if
            condition: "{{ inputs.kibana_case_id | size }} > 0"
            steps:
              - name: manual_review_note
                type: kibana.addCaseComment
                with:
                  caseId: "{{ inputs.kibana_case_id }}"
                  comment: >
                    Unusual GCP service account alert triggered but no service
                    account name was present. Manual investigation needed.
          - name: log_manual_review
            type: console
            with:
              message: "Alert lacked a service account; routing to manual triage."
