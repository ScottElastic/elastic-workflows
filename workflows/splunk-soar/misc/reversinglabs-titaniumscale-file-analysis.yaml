# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "ReversingLabs TitaniumScale — File Detonation"
description: >
  Submits each input SHA-256 to a ReversingLabs TitaniumScale
  appliance via `POST /api/tiscale/v1/upload?full_report=true`, then
  surfaces the TitaniumCore classification (MALICIOUS / SUSPICIOUS /
  KNOWN / UNKNOWN) per sample. The body assumes the file is already
  resident on the appliance, keyed by hash; replace with a multipart
  upload step if you need to push the bytes from the workflow runner.
enabled: true
tags: ["splunk-soar", "misc", "file-analysis", "reversinglabs", "titaniumscale", "translated"]

triggers:
  - type: manual

inputs:
  - name: vault_ids
    type: array
    required: true
    description: "One or more vault IDs (file hashes) to detonate on TitaniumScale."

consts:
  # TitaniumScale appliance base URL and API token. The original Phantom
  # asset wrapped this in the reversinglabs_titaniumscale_v2 connector.
  titaniumscale_endpoint: "https://CHANGEME-titaniumscale.example.com/api/tiscale/v1"
  titaniumscale_token: "Token CHANGEME_TOKEN"

steps:
  - name: detonate_each_file
    type: foreach
    foreach: "${{ inputs.vault_ids }}"
    steps:
      # TODO: replace with a native ReversingLabs TitaniumScale connector
      # when one ships. The original SOAR action was "detonate file and get
      # report" against the reversinglabs_titaniumscale_v2 asset.
      - name: titaniumscale_detonate
        type: http
        with:
          url: "{{ consts.titaniumscale_endpoint }}/upload"
          method: POST
          headers:
            Authorization: "{{ consts.titaniumscale_token }}"
            Content-Type: "application/json"
            Accept: "application/json"
          query:
            full_report: "true"
          body:
            sha256: "{{ item }}"
        on-failure:
          retry:
            max-attempts: 3
            delay: "10s"
          continue: true

      - name: record_classification
        type: data.set
        with:
          observable:
            type: "hash"
            value: "{{ item }}"
            source: "ReversingLabs TitaniumScale"
            classification: "{{ steps.titaniumscale_detonate.output.tc_report.classification.classification | default: 'unknown' }}"
            classification_factor: "{{ steps.titaniumscale_detonate.output.tc_report.classification.factor | default: 0 }}"
            threat_name: "{{ steps.titaniumscale_detonate.output.tc_report.classification.result | default: '' }}"
            sample_type: "{{ steps.titaniumscale_detonate.output.tc_report.info.file.file_type | default: '' }}"

      - name: log_classification
        type: console
        with:
          message: |
            File {{ item }} TitaniumScale verdict: {{ steps.record_classification.output.observable.classification }} threat={{ steps.record_classification.output.observable.threat_name }}

  - name: create_security_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "Workflow: ReversingLabs TitaniumScale — File Detonation"
        description: |
          Automated case created by the **ReversingLabs TitaniumScale — File Detonation** workflow.

          Review the workflow execution and attached comments for full investigation details.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "medium"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags: ["automated", "workflow"]
    on-failure:
      continue: true
