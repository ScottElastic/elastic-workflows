# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "User-Approved Endpoint Containment Ticket"
description: >
  Human-in-the-loop containment ticket workflow. Given a source IP, an
  incident commander is prompted Yes/No. On Yes, the IP is looked up in
  an "infected-endpoints-baseline" Elasticsearch index: unknown IPs get
  a fresh ArcSight containment case and are added to the baseline;
  known IPs get a reinfection case. The originating Kibana case is
  closed at the end of every approved branch.
enabled: true
tags: ["splunk-soar", "misc", "containment", "approval", "case-management", "translated"]

triggers:
  - type: alert
  - type: manual

inputs:
  - name: source_address
    type: string
    required: false
    description: "IP of the suspect endpoint."
  - name: kibana_case_id
    type: string
    required: false
    description: "Case ID for status closures and notes."

consts:
  # Baseline ES index for infected endpoints. The original Phantom playbook
  # held this in a custom list — operators here can wire to any index they
  # already use for endpoint state.
  infected_endpoints_index: "infected-endpoints-baseline"
  # ArcSight ESM connector originally. Stubbed via http here.
  arcsight_endpoint: "https://CHANGEME-arcsight.example.com/www/manager-service/rest"
  arcsight_auth_header: "Bearer CHANGEME_TOKEN"

steps:
  - name: branch_on_source
    type: if
    condition: "{{ inputs.source_address | size }} > 0"
    steps:
      - name: ask_incident_commander
        type: ai.prompt
        with:
          prompt: |
            You are an incident commander approval prompt. An endpoint
            at IP {{ inputs.source_address }} has been flagged as
            infected by automated detection. The next step would open a
            containment case in the ticketing system and (if the host
            is new) add it to the infected-endpoints baseline.

            Decide whether the containment ticket should be opened.

            Output: respond with EXACTLY one of the two strings:
              Yes
              No
            Do not include explanation, punctuation, or whitespace.

      - name: on_approval
        type: if
        condition: "{{ steps.ask_incident_commander.output.response | downcase }} == 'yes'"
        steps:
          - name: lookup_baseline
            type: elasticsearch.search
            with:
              index: "{{ consts.infected_endpoints_index }}"
              size: 1
              body:
                query:
                  term:
                    source_address: "{{ inputs.source_address }}"
            on-failure:
              continue: true

          - name: route_initial_or_repeat
            type: if
            condition: "{{ steps.lookup_baseline.output.hits.total.value | default: 0 }} == 0"
            steps:
              # New infection — file the initial ticket and add to baseline.
              # TODO: swap for a native ArcSight/case connector.
              - name: create_initial_ticket
                type: http
                with:
                  url: "{{ consts.arcsight_endpoint }}/CaseService/createCase"
                  method: POST
                  headers:
                    Authorization: "{{ consts.arcsight_auth_header }}"
                    Content-Type: "application/json"
                  body:
                    name: "Contain Endpoint At {{ inputs.source_address }}"
                    parent_group: "All Cases/All Cases"
                on-failure:
                  retry:
                    max-attempts: 2
                    delay: "5s"
                  continue: true
              - name: add_to_baseline
                type: http
                with:
                  url: "{{ consts.elasticsearch_base | default: 'https://CHANGEME-es.elastic-cloud.com' }}/{{ consts.infected_endpoints_index }}/_doc"
                  method: POST
                  headers:
                    Content-Type: "application/json"
                    Authorization: "{{ consts.elasticsearch_auth | default: 'ApiKey CHANGEME_ES_KEY' }}"
                  body: "{{ item | json }}"
                on-failure:
                  continue: true

            else:
              # Already on the list — file a reinfection ticket.
              - name: create_reinfection_ticket
                type: http
                with:
                  url: "{{ consts.arcsight_endpoint }}/CaseService/createCase"
                  method: POST
                  headers:
                    Authorization: "{{ consts.arcsight_auth_header }}"
                    Content-Type: "application/json"
                  body:
                    name: "Contain Reinfected Endpoint At {{ inputs.source_address }}"
                    parent_group: "All Cases/All Cases"
                on-failure:
                  retry:
                    max-attempts: 2
                    delay: "5s"
                  continue: true

  - name: close_case
    type: if
    condition: "{{ inputs.kibana_case_id | size }} > 0"
    steps:
      - name: kibana_close
        type: kibana.request
        with:
          method: PATCH
          path: "/api/cases"
          body:
            - id: "{{ inputs.kibana_case_id }}"
              status: "closed"
              version: "WzAsMV0="

  - name: create_security_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "Workflow: User-Approved Endpoint Containment Ticket"
        description: |
          Automated case created by the **User-Approved Endpoint Containment Ticket** workflow.

          Review the workflow execution and attached comments for full investigation details.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "medium"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags: ["automated", "workflow"]
    on-failure:
      continue: true
