# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "User-Approved Domain Block via Umbrella"
description: >
  Scores a domain against DomainTools' Risk API and — when the score meets
  or exceeds a threshold (default 80) — asks an automation engineer to
  approve a Cisco Umbrella block. On approval, submits the block via the
  Umbrella Enforcement API and records an unblock follow-up for operators
  to schedule (Elastic Workflows does not yet ship an in-band delayed-
  action primitive). Inputs: `domain` (string).
enabled: true
tags: ["splunk-soar", "misc", "domain-block", "umbrella", "domaintools", "approval", "translated"]

triggers:
  - type: alert
  - type: manual

inputs:
  - name: domain
    type: string
    required: true
    description: "Domain to evaluate and (potentially) block."

consts:
  # DomainTools Risk API (api_username/api_key auth in URL query).
  domaintools_endpoint: "https://api.domaintools.com/v1"
  domaintools_user: "CHANGEME-domaintools-user"
  domaintools_token: "CHANGEME-domaintools-key"
  # Cisco Umbrella Enforcement API.
  # Reference: https://developer.cisco.com/docs/cloud-security/enforcement-api/
  umbrella_endpoint: "https://s-platform.api.opendns.com/1.0/events"
  umbrella_customer_key: "CHANGEME-umbrella-customer-key"
  # Threshold above which an approval prompt is shown.
  risk_threshold: 80
  block_duration_minutes: 60

steps:
  # DomainTools risk lookup — non-destructive enrichment, allow continue.
  - name: domain_reputation
    type: http
    with:
      url: "{{ consts.domaintools_endpoint }}/risk/"
      method: GET
      headers:
        Accept: "application/json"
      query:
        domain: "{{ inputs.domain }}"
        api_username: "{{ consts.domaintools_user }}"
        api_key: "{{ consts.domaintools_token }}"
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"
      continue: true

  - name: extract_risk_score
    type: data.set
    with:
      risk_score: "{{ steps.domain_reputation.output.response.risk_score | default: 0 }}"

  - name: evaluate_risk
    type: if
    condition: "{{ steps.extract_risk_score.output.risk_score }} >= {{ consts.risk_threshold }}"
    steps:
      - name: ask_for_approval
        type: ai.prompt
        with:
          prompt: |
            You are reviewing a proposed DNS block. Decide whether the
            evidence justifies an Umbrella Enforcement block.

            Domain:         {{ inputs.domain }}
            Risk score:     {{ steps.extract_risk_score.output.risk_score }}
            Threshold:      {{ consts.risk_threshold }}
            Proximity:      {{ steps.domain_reputation.output.response.components.proximity | default: 'n/a' }}
            Threat profile: {{ steps.domain_reputation.output.response.components.threat_profile | default: 'n/a' }}
            Block window:   {{ consts.block_duration_minutes }} minutes

            Respond with a single JSON object:
              {
                "decision":  "approve" | "reject",
                "reason":    "<one-sentence justification>",
                "confidence":"low" | "medium" | "high"
              }
          output_schema: object

      - name: on_approval
        type: if
        condition: "{{ steps.ask_for_approval.output.decision | downcase }} == 'approve'"
        steps:
          # Destructive change — no `continue: true`.
          - name: umbrella_block_domain
            type: http
            with:
              url: "{{ consts.umbrella_endpoint }}?customerKey={{ consts.umbrella_customer_key }}"
              method: POST
              headers:
                Content-Type: "application/json"
                Accept: "application/json"
              body:
                alertTime: "{{ now | date: '%Y-%m-%dT%H:%M:%S.000Z' }}"
                deviceId: "elastic-workflow"
                deviceVersion: "1.0"
                dstDomain: "{{ inputs.domain }}"
                eventTime: "{{ now | date: '%Y-%m-%dT%H:%M:%S.000Z' }}"
                providerName: "Elastic Workflows"
                eventSeverity: "HIGH"
                eventType: "Botnet"
                eventDescription: "Approved by analyst: {{ steps.ask_for_approval.output.reason | default: 'n/a' }}"
                protocolVersion: "1.0a"
            on-failure:
              retry:
                max-attempts: 3
                delay: "5s"

          - name: record_unblock_followup
            type: data.set
            with:
              unblock_followup:
                domain: "{{ inputs.domain }}"
                scheduled_minutes_from_now: "{{ consts.block_duration_minutes }}"
                note: >
                  Original SOAR playbook scheduled a delayed unblock action.
                  In Elastic, wire a scheduled trigger or queue this record
                  to a sibling unblock workflow.

          - name: log_block_applied
            type: console
            with:
              message: "Blocked {{ inputs.domain }} on Umbrella; unblock follow-up captured."
    else:
      - name: log_below_threshold
        type: console
        with:
          message: "Domain {{ inputs.domain }} risk {{ steps.extract_risk_score.output.risk_score }} is below threshold; no action."

  - name: create_security_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "Workflow: User-Approved Domain Block via Umbrella"
        description: |
          Automated case created by the **User-Approved Domain Block via Umbrella** workflow.

          Review the workflow execution and attached comments for full investigation details.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "medium"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags: ["automated", "workflow"]
    on-failure:
      continue: true
