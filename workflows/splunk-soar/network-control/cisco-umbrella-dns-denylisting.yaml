# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "Cisco Umbrella — DNS Denylisting"
description: >
  Pushes one or more domains onto a Cisco Umbrella block list via the
  Enforcement API (POST /1.0/events). Each domain becomes a security event
  with the caller's customer key; successful submissions are captured as
  normalized observable records. Inputs: `domains` (array). Implements
  MITRE D3FEND DNS denylisting (d3f:DNSDenylisting).
enabled: true
tags: ["splunk-soar", "network-control", "dns-denylist", "cisco-umbrella", "translated"]

triggers:
  - type: manual

inputs:
  - name: domains
    type: array
    required: true
    description: "Domains to block in Cisco Umbrella."

consts:
  # Cisco Umbrella Enforcement API. The customer key authenticates the
  # integration and is appended as a query parameter on every request.
  # Reference: https://developer.cisco.com/docs/cloud-security/enforcement-api/
  umbrella_enforcement_endpoint: "https://s-platform.api.opendns.com/1.0/events"
  umbrella_customer_key: "CHANGEME-umbrella-customer-key"
  umbrella_source_name: "Elastic Workflows"
  umbrella_device_id: "elastic-workflow"

steps:
  - name: guard_domain_input
    type: if
    condition: "{{ inputs.domains | size }} == 0"
    steps:
      - name: log_no_domains
        type: console
        with:
          message: "No domains supplied — nothing to deny in Umbrella."

  - name: block_each_domain
    type: foreach
    with:
      items: ${{ inputs.domains }}
    steps:
      # Cisco Umbrella Enforcement API — POST a security event referencing
      # the destination domain. Umbrella replies with the new event id and
      # current disposition. Destructive change: no `continue: true`.
      - name: block_domain
        type: http
        with:
          url: "{{ consts.umbrella_enforcement_endpoint }}?customerKey={{ consts.umbrella_customer_key }}"
          method: POST
          headers:
            Content-Type: "application/json"
            Accept: "application/json"
          body:
            alertTime: "{{ now | date: '%Y-%m-%dT%H:%M:%S.000Z' }}"
            deviceId: "{{ consts.umbrella_device_id }}"
            deviceVersion: "1.0"
            dstDomain: "{{ item }}"
            eventTime: "{{ now | date: '%Y-%m-%dT%H:%M:%S.000Z' }}"
            providerName: "{{ consts.umbrella_source_name }}"
            eventSeverity: "HIGH"
            eventType: "Botnet"
            eventDescription: "Domain submitted for DNS denylisting by Elastic Workflows."
            protocolVersion: "1.0a"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"

      # Umbrella returns 202 Accepted with `{id, disposition}` on success.
      - name: classify_block_outcome
        type: if
        condition: "{{ steps.block_domain.output.id | default: '' | size }} > 0"
        steps:
          - name: capture_blocked
            type: data.set
            with:
              observable:
                type: "domain"
                value: "{{ item }}"
                source: "Cisco Umbrella"
                status: "blocked"
                umbrella_event_id: "{{ steps.block_domain.output.id }}"
                disposition: "{{ steps.block_domain.output.disposition | default: 'unknown' }}"
          - name: log_blocked
            type: console
            with:
              message: "Blocked {{ item }} in Cisco Umbrella (event_id={{ steps.block_domain.output.id }})."
        else:
          - name: log_block_failed
            type: console
            with:
              message: |
                Umbrella enforcement did not confirm a block for {{ item }}.
                response={{ steps.block_domain.output | json }}
