# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "Cisco Umbrella — Block Domain (Tag on Success)"
description: >
  Lightweight Umbrella domain-blocking flow. For each input domain, posts
  a security event to the Cisco Umbrella Enforcement API and — on success
  — writes a `blocked` tag back to the configured indicator index so SIEM
  rules and dashboards can recognize already-actioned IOCs. Inputs:
  `domains` (array). Side effect: appends documents to `indicator_index`.
enabled: true
tags: ["splunk-soar", "network-control", "dns-denylist", "cisco-umbrella", "translated"]

triggers:
  - type: manual

inputs:
  - name: domains
    type: array
    required: true
    description: "Domains to block via Cisco Umbrella."

consts:
  # Cisco Umbrella Enforcement API.
  # Reference: https://developer.cisco.com/docs/cloud-security/enforcement-api/
  umbrella_enforcement_endpoint: "https://s-platform.api.opendns.com/1.0/events"
  umbrella_customer_key: "CHANGEME-umbrella-customer-key"
  umbrella_source_name: "Elastic Workflows"
  umbrella_device_id: "elastic-workflow"
  # Target index for the blocked-indicator tag document.
  indicator_index: "CHANGEME-threat-indicators"

steps:
  - name: block_each_domain
    type: foreach
    foreach: "${{ inputs.domains }}"
    steps:
      # Submit the domain as a security event. Umbrella accepts the request
      # asynchronously and returns 202 with `{id, disposition}`. Destructive
      # action — no `continue: true`, but allow a few retries on transient
      # network failure.
      - name: cisco_umbrella_block_domain
        type: http
        with:
          url: "{{ consts.umbrella_enforcement_endpoint }}?customerKey={{ consts.umbrella_customer_key }}"
          method: POST
          headers:
            Content-Type: "application/json"
            Accept: "application/json"
          body:
            alertTime: "{{ now | date: '%Y-%m-%dT%H:%M:%S.000Z' }}"
            deviceId: "{{ consts.umbrella_device_id }}"
            deviceVersion: "1.0"
            dstDomain: "{{ item }}"
            eventTime: "{{ now | date: '%Y-%m-%dT%H:%M:%S.000Z' }}"
            providerName: "{{ consts.umbrella_source_name }}"
            eventSeverity: "HIGH"
            eventType: "Botnet"
            eventDescription: "Domain submitted for DNS denylisting by Elastic Workflows."
            protocolVersion: "1.0a"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"

      - name: tag_blocked_domain
        type: if
        condition: "{{ steps.cisco_umbrella_block_domain.output.id | default: '' | size }} > 0"
        steps:
          # Records a "blocked" tag against the indicator. Tag writes are
          # bookkeeping — safe to continue on failure.
          - name: write_indicator_tag
            type: elasticsearch.index
            with:
              index: "{{ consts.indicator_index }}"
              document:
                indicator: "{{ item }}"
                type: "domain"
                tags: ["blocked"]
                source: "Cisco Umbrella"
                umbrella_event_id: "{{ steps.cisco_umbrella_block_domain.output.id }}"
                disposition: "{{ steps.cisco_umbrella_block_domain.output.disposition | default: 'unknown' }}"
                workflow_run: "{{ execution.id }}"
                "@timestamp": "{{ now }}"
            on-failure:
              retry:
                max-attempts: 3
                delay: "5s"
              continue: true
          - name: log_tagged
            type: console
            with:
              message: "Domain {{ item }} blocked in Umbrella (event_id={{ steps.cisco_umbrella_block_domain.output.id }}); indicator tagged 'blocked'."
