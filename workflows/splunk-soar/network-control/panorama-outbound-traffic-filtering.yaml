# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "Palo Alto Panorama — Outbound URL Block"
description: >
  Adds one or more URLs to a custom URL category in Panorama (shared by
  default) via the XML API, then commits the candidate configuration and
  pushes it to managed firewalls. Each URL is added with
  `type=config&action=set`, followed by a `type=commit` and a `commit-all`
  to the target device group. Inputs: `urls` (array), `device_group`.
  Implements MITRE D3FEND outbound traffic filtering
  (d3f:OutboundTrafficFiltering).
enabled: true
tags: ["splunk-soar", "network-control", "outbound-filter", "panorama", "palo-alto", "translated"]

triggers:
  - type: manual

inputs:
  - name: urls
    type: array
    required: true
    description: "URLs to block via Palo Alto Panorama."
  - name: device_group
    type: string
    required: false
    default: "shared"
    description: "Panorama device group that owns the URL filter object."

consts:
  # Panorama base URL and API key (obtain via /api/?type=keygen).
  # XML API reference: https://docs.paloaltonetworks.com/pan-os/11-2/pan-os-panorama-api
  panorama_base_url: "https://CHANGEME-panorama.example.com"
  panorama_api_key: "CHANGEME-panorama-api-key"
  # Custom URL category that this workflow appends to. Must already exist in
  # Panorama (Objects > Custom Objects > URL Category).
  panorama_block_category: "elastic-workflow-block"

steps:
  - name: guard_url_input
    type: if
    condition: "{{ inputs.urls | size }} == 0"
    steps:
      - name: log_no_urls
        type: console
        with:
          message: "No URLs supplied — skipping Panorama block."

  - name: block_each_url
    type: foreach
    foreach: "${{ inputs.urls }}"
    steps:
      # Append the URL as a <member> under the custom URL category's list.
      # action=set is additive — repeated calls with the same value are
      # idempotent at the config layer. Destructive change — no
      # `continue: true`.
      - name: block_url
        type: http
        with:
          url: "{{ consts.panorama_base_url }}/api/"
          method: POST
          headers:
            Content-Type: "application/x-www-form-urlencoded"
          query:
            type: "config"
            action: "set"
            xpath: "/config/shared/profiles/custom-url-category/entry[@name={{ consts.panorama_block_category }}]/list"
            element: "<member>{{ item }}</member>"
            key: "{{ consts.panorama_api_key }}"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"

      - name: emit_observable
        # XML API responses include `response[@status='success']`. The HTTP
        # client surfaces this as `output.response.status` after parsing.
        type: if
        condition: "{{ steps.block_url.output.response.status | default: steps.block_url.output['@status'] | default: '' }} == 'success'"
        steps:
          - name: capture_blocked_url
            type: data.set
            with:
              observable:
                type: "url"
                value: "{{ item }}"
                source: "Panorama"
                status: "blocked"
                device_group: "{{ inputs.device_group }}"
                category: "{{ consts.panorama_block_category }}"
          - name: log_blocked_url
            type: console
            with:
              message: "URL {{ item }} added to Panorama custom category {{ consts.panorama_block_category }}."
        else:
          - name: log_block_failed
            type: console
            with:
              message: |
                Panorama did not confirm a successful update for {{ item }}.
                response={{ steps.block_url.output | json }}

  # Commit the candidate configuration on Panorama itself, then push to the
  # target device group so managed firewalls receive the change. Both
  # destructive — no `continue: true`.
  - name: commit_changes
    type: http
    with:
      url: "{{ consts.panorama_base_url }}/api/"
      method: POST
      headers:
        Content-Type: "application/x-www-form-urlencoded"
      query:
        type: "commit"
        cmd: "<commit><description>Elastic Workflows URL block update</description></commit>"
        key: "{{ consts.panorama_api_key }}"
    on-failure:
      retry:
        max-attempts: 3
        delay: "10s"

  - name: commit_all_to_device_group
    type: http
    with:
      url: "{{ consts.panorama_base_url }}/api/"
      method: POST
      headers:
        Content-Type: "application/x-www-form-urlencoded"
      query:
        type: "commit"
        action: "all"
        cmd: "<commit-all><shared-policy><device-group><entry name={{ inputs.device_group }}/></device-group></shared-policy></commit-all>"
        key: "{{ consts.panorama_api_key }}"
    on-failure:
      retry:
        max-attempts: 3
        delay: "10s"

  - name: create_security_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "Workflow: Palo Alto Panorama — Outbound URL Block"
        description: |
          Automated case created by the **Palo Alto Panorama — Outbound URL Block** workflow.

          Review the workflow execution and attached comments for full investigation details.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "medium"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags: ["automated", "workflow"]
    on-failure:
      continue: true
