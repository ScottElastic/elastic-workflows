# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "URL Outbound Traffic Filtering — Dispatch"
description: >
  Coordinator that fans URL indicators out to configured outbound-filtering
  vendors. Pulls URLs from the workflow input or the triggering alert's
  `threat.indicator.url.full` field, invokes `panorama-outbound-traffic-
  filtering` and `zscaler-outbound-traffic-filtering` per URL via the
  Kibana Workflows API, tags successfully dispatched URLs in the indicator
  index, and posts a summary back to the linked case. Inputs: `urls`
  (optional array), `kibana_case_id` (optional string). Implements MITRE
  D3FEND outbound traffic filtering (d3f:OutboundTrafficFiltering).
enabled: true
tags: ["splunk-soar", "network-control", "outbound-filter", "dispatch", "translated"]

triggers:
  - type: manual
  - type: alert

inputs:
  - name: urls
    type: array
    required: false
    description: >
      Optional list of URLs to block. If empty, the workflow tries to extract
      URL indicators from the triggering alert.
  - name: kibana_case_id
    type: string
    required: false
    description: "Case to update with the dispatch summary, if any."

consts:
  # Kibana Workflows API + vendor sub-workflow slugs.
  vendor_workflows_endpoint: "https://CHANGEME-kibana.example.com/api/workflows"
  vendor_workflows_auth: "ApiKey CHANGEME-kibana-api-key"
  panorama_workflow_id: "panorama-outbound-traffic-filtering"
  zscaler_workflow_id: "zscaler-outbound-traffic-filtering"
  indicator_index: "CHANGEME-threat-indicators"

steps:
  - name: gather_urls
    type: data.set
    with:
      urls: "${{ inputs.urls | default: event.alerts[0].threat.indicator.url.full | default: [] }}"

  - name: any_urls
    type: if
    condition: "{{ steps.gather_urls.output.urls | size }} > 0"
    steps:
      # In SOAR this called community/dispatch_input_playbooks with a list of
      # artifact IDs; here we invoke each vendor workflow directly per URL.
      - name: dispatch_per_url
        type: foreach
        foreach: "${{ steps.gather_urls.output.urls }}"
        steps:
          - name: invoke_panorama_block
            type: http
            with:
              url: "{{ consts.vendor_workflows_endpoint }}/{{ consts.panorama_workflow_id }}/run"
              method: POST
              headers:
                kbn-xsrf: "true"
                x-elastic-internal-origin: "Kibana"
                Content-Type: "application/json"
                Accept: "application/json"
                Authorization: "{{ consts.vendor_workflows_auth }}"
              body:
                inputs:
                  urls:
                    - "{{ item }}"
            on-failure:
              retry:
                max-attempts: 3
                delay: "5s"
              continue: true

          - name: invoke_zscaler_block
            type: http
            with:
              url: "{{ consts.vendor_workflows_endpoint }}/{{ consts.zscaler_workflow_id }}/run"
              method: POST
              headers:
                kbn-xsrf: "true"
                x-elastic-internal-origin: "Kibana"
                Content-Type: "application/json"
                Accept: "application/json"
                Authorization: "{{ consts.vendor_workflows_auth }}"
              body:
                inputs:
                  urls:
                    - "{{ item }}"
            on-failure:
              retry:
                max-attempts: 3
                delay: "5s"
              continue: true

          # Tag the URL as blocked if at least one vendor sub-workflow
          # accepted the dispatch (returned a workflow run id).
          - name: tag_indicator_blocked
            type: if
            condition: "{{ steps.invoke_panorama_block.output.workflowRunId | default: steps.invoke_panorama_block.output.id | default: '' | size }} > 0 or {{ steps.invoke_zscaler_block.output.workflowRunId | default: steps.invoke_zscaler_block.output.id | default: '' | size }} > 0"
            steps:
              - name: write_blocked_tag
                type: elasticsearch.index
                with:
                  index: "{{ consts.indicator_index }}"
                  document:
                    indicator: "{{ item }}"
                    type: "url"
                    tags: ["blocked"]
                    source: "Elastic Workflows / URL Outbound Filtering Dispatch"
                    workflow_run: "{{ execution.id }}"
                    panorama_run_id: "{{ steps.invoke_panorama_block.output.workflowRunId | default: steps.invoke_panorama_block.output.id | default: 'n/a' }}"
                    zscaler_run_id: "{{ steps.invoke_zscaler_block.output.workflowRunId | default: steps.invoke_zscaler_block.output.id | default: 'n/a' }}"
                    "@timestamp": "{{ now }}"
                on-failure:
                  retry:
                    max-attempts: 3
                    delay: "5s"
                  continue: true

      - name: build_summary
        type: data.set
        with:
          summary:
            url_count: "{{ steps.gather_urls.output.urls | size }}"
            urls: ${{ steps.gather_urls.output.urls }}
            workflow_run: "{{ execution.id }}"

      - name: log_summary
        type: console
        with:
          message: |
            URL Outbound Filtering Dispatch:
            urls={{ steps.gather_urls.output.urls | size }}
            run={{ execution.id }}

      - name: post_to_case
        type: if
        condition: "{{ inputs.kibana_case_id | size }} > 0"
        steps:
          - name: comment_on_case
            type: kibana.addCaseComment
            with:
              caseId: "{{ inputs.kibana_case_id }}"
              comment: |
                URL Outbound Filtering Dispatch completed.
                URLs processed: {{ steps.gather_urls.output.urls | size }}
                Run ID: {{ execution.id }}
    else:
      - name: log_no_urls
        type: console
        with:
          message: "No URL indicators available for outbound filtering dispatch."
