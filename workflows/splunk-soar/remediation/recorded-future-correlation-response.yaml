# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "Recorded Future — Correlation Response"
description: >
  Triggers from a specific Splunk correlation result indicating a possible
  outbound connection to a Recorded Future-flagged IP and domain. Pulls
  Recorded Future intel for the indicators, asks an analyst whether to
  block, and (on approval) blocks the IP at a perimeter firewall and the
  domain via DNS-layer enforcement.
enabled: true
tags: ["splunk-soar", "remediation", "recorded-future", "network-block", "translated"]

triggers:
  - type: manual
  - type: alert

inputs:
  - name: rule_name
    type: string
    required: true
    description: "Source correlation rule — gate so only the intended Splunk rule triggers this flow."
  - name: ip
    type: string
    required: true
    description: "Suspect destination IP."
  - name: domain
    type: string
    required: true
    description: "Suspect destination domain."

consts:
  expected_rule_name: "Threat - Cisco WSA L4TM Correlation Against Recorded Future IP Threat List - Rule"
  recorded_future_endpoint: "https://api.recordedfuture.com/v2"
  recorded_future_token: "CHANGEME"
  # Firewall API used to deny the IP — original playbook used Cisco Firepower.
  firewall_block_endpoint: "https://CHANGEME-firewall.internal/api/block-ip"
  firewall_auth_header: "Bearer CHANGEME_TOKEN"
  # DNS sinkhole — original playbook used Cisco Umbrella.
  dns_block_endpoint: "https://management.api.umbrella.com/v1/organizations/CHANGEME/policies/sinkhole/domains"
  dns_auth_header: "Bearer CHANGEME_TOKEN"

steps:
  - name: gate_on_rule_name
    type: if
    condition: '{{ inputs.rule_name }} == "{{ consts.expected_rule_name }}"'
    steps:
      - name: validate_inputs
        type: if
        condition: "{{ inputs.ip | size }} == 0 or {{ inputs.domain | size }} == 0"
        steps:
          - name: missing_inputs
            type: console
            with:
              message: "IP or domain missing — aborting."

      - name: ip_intel
        type: http
        with:
          url: "{{ consts.recorded_future_endpoint }}/ip/{{ inputs.ip }}"
          method: GET
          headers:
            X-RFToken: "{{ consts.recorded_future_token }}"
        on-failure:
          retry:
            max-attempts: 2
            delay: "3s"
          continue: true

      - name: domain_intel
        type: http
        with:
          url: "{{ consts.recorded_future_endpoint }}/domain/{{ inputs.domain }}"
          method: GET
          headers:
            X-RFToken: "{{ consts.recorded_future_token }}"
        on-failure:
          retry:
            max-attempts: 2
            delay: "3s"
          continue: true

      - name: build_prompt_context
        type: data.set
        with:
          context:
            rule: "{{ inputs.rule_name }}"
            ip: "{{ inputs.ip }}"
            ip_intel_card: "{{ steps.ip_intel.output.data.intelCard | default: 'n/a' }}"
            domain: "{{ inputs.domain }}"
            domain_intel_card: "{{ steps.domain_intel.output.data.intelCard | default: 'n/a' }}"

      # Original used an interactive analyst prompt. Re-implemented here as
      # an AI judgement step — swap to ai.agent or a manual approval if you
      # want a human in the loop.
      - name: ai_decision
        type: ai.prompt
        connector-id: "CHANGEME-llm-connector"
        with:
          prompt: |
            You are deciding whether to block a destination IP and domain
            flagged by Splunk + Recorded Future correlation.
            Context: {{ steps.build_prompt_context.output.context | json }}
            Reply with the single word YES or NO.

      - name: execute_block
        type: if
        condition: '{{ steps.ai_decision.output | strip | upcase }} == "YES"'
        steps:
          - name: block_ip
            type: http
            with:
              url: "{{ consts.firewall_block_endpoint }}"
              method: POST
              headers:
                Authorization: "{{ consts.firewall_auth_header }}"
                Content-Type: "application/json"
              body:
                ip: "{{ inputs.ip }}"
            on-failure:
              continue: true

          - name: block_domain
            type: http
            with:
              url: "{{ consts.dns_block_endpoint }}"
              method: POST
              headers:
                Authorization: "{{ consts.dns_auth_header }}"
                Content-Type: "application/json"
              body:
                domain: "{{ inputs.domain }}"
                disable_safeguards: false
            on-failure:
              continue: true

          - name: log_block
            type: console
            with:
              message: "Blocked {{ inputs.ip }} on perimeter firewall and {{ inputs.domain }} via DNS sinkhole."
        else:
          - name: log_no_block
            type: console
            with:
              message: "Analyst/AI declined blocking; leaving IP and domain in place."
    else:
      - name: rule_mismatch
        type: console
        with:
          message: "Rule name does not match expected — exiting."
