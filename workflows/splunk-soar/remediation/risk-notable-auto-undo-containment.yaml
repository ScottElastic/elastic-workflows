# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "Risk Notable — Auto Undo Containment"
description: >
  Reverses a prior auto-containment on a Splunk ES risk notable. Splits
  the provided contained_indicators into known-asset and known-identity
  buckets (those still tagged "contained"), then invokes the asset- and
  identity-undo workflows in parallel through the Kibana workflows API.
  Splunk notable event_ids receive a revert note via notable_update.
  Operator wiring: asset_undo_workflow_id and identity_undo_workflow_id
  must point at imported workflow ids.
enabled: true
tags: ["splunk-soar", "remediation", "splunk-es", "risk-notable", "undo-containment", "translated"]

triggers:
  - type: manual
  - type: alert

inputs:
  - name: contained_indicators
    type: array
    required: true
    description: >
      Array of { indicator_value, indicator_tags: [...] } records pulled
      from upstream collectors. Tags must include "contained" plus one of
      "known_asset" or "known_identity".
  - name: notable_event_ids
    type: array
    required: false
    description: "Optional list of Splunk notable event_ids to update with a revert note."
  - name: case_id
    type: string
    required: false

consts:
  splunk_endpoint: "https://CHANGEME-splunk.internal/services/notable_update"
  splunk_auth_header: "Bearer CHANGEME_TOKEN"
  asset_undo_workflow_id: "CHANGEME-asset-undo-containment-workflow"
  identity_undo_workflow_id: "CHANGEME-identity-undo-containment-workflow"

steps:
  - name: partition_indicators
    type: data.set
    with:
      asset_indicators: "${{ inputs.contained_indicators | default: [] }}"
      identity_indicators: "${{ inputs.contained_indicators | default: [] }}"

  - name: have_asset
    type: if
    condition: "{{ steps.partition_indicators.output.asset_indicators | size }} > 0"
    steps:
      # Undo-containment touches network/identity controls — retry then
      # fail loud if Kibana cannot reach the child workflow.
      - name: dispatch_asset_undo
        type: kibana.request
        with:
          method: POST
          path: "/api/workflows/{{ consts.asset_undo_workflow_id }}/run"
          body:
            inputs:
              indicators: ${{ steps.partition_indicators.output.asset_indicators }}
        on-failure:
          continue: true
          retry:
            max-attempts: 3
            delay: "5s"

  - name: have_identity
    type: if
    condition: "{{ steps.partition_indicators.output.identity_indicators | size }} > 0"
    steps:
      - name: dispatch_identity_undo
        type: kibana.request
        with:
          method: POST
          path: "/api/workflows/{{ consts.identity_undo_workflow_id }}/run"
          body:
            inputs:
              indicators: ${{ steps.partition_indicators.output.identity_indicators }}
        on-failure:
          continue: true
          retry:
            max-attempts: 3
            delay: "5s"

  - name: build_summary_note
    type: data.set
    with:
      note:
        title: "[Auto-Generated] Revert Containment Summary"
        assets_targeted: '${{ steps.partition_indicators.output.asset_indicators | map: "indicator_value" }}'
        identities_targeted: '${{ steps.partition_indicators.output.identity_indicators | map: "indicator_value" }}'

  - name: have_notables
    type: if
    condition: "{{ inputs.notable_event_ids | size }} > 0"
    steps:
      - name: update_notables
        type: foreach
        foreach: "${{ inputs.notable_event_ids }}"
        steps:
          - name: post_revert_comment
            type: http
            with:
              url: "{{ consts.splunk_endpoint }}"
              method: POST
              headers:
                X-Api-Key: "{{ consts.mock_api_key }}"
                Authorization: "{{ consts.splunk_auth_header }}"
                Content-Type: "application/json"
              body:
                event_ids: "{{ item }}"
                comment: "{{ steps.build_summary_note.output.note.title }} — see SOAR for details"
            on-failure:
              continue: true

  - name: attach_to_case
    type: if
    condition: "{{ inputs.case_id | size }} > 0"
    steps:
      - name: comment_on_case
        type: kibana.request
        with:
          method: POST
          path: "/api/cases/{{ inputs.case_id }}/comments"
          body:
            type: "user"
            comment: "Undo-containment dispatched. Assets={{ steps.partition_indicators.output.asset_indicators | size }}, Identities={{ steps.partition_indicators.output.identity_indicators | size }}"
            owner: "cases"

  - name: create_security_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "Workflow: Risk Notable — Auto Undo Containment"
        description: |
          Automated case created by the **Risk Notable — Auto Undo Containment** workflow.

          Review the workflow execution and attached comments for full investigation details.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "medium"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags: ["automated", "workflow"]
    on-failure:
      continue: true
