# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "Risk Notable — Mitigate"
description: >
  Second-phase mitigation orchestrator for a Splunk ES risk notable.
  Sequential chain of three child workflows via /api/workflows/{id}/run:
  (1) review-indicators, (2) block-indicators when the review returns
  any marked_for_block_count > 0, (3) protect-assets-and-users. Each
  stage records a case comment with the child's note_title/note_content.
  Operator wiring: the three workflow ids default to slugs that match
  the sibling files in this repo — change them to match the deployment's
  workflow uuids if your environment doesn't resolve by name.
enabled: true
tags: ["splunk-soar", "remediation", "splunk-es", "risk-notable", "mitigate", "translated"]

triggers:
  - type: manual
  - type: alert

inputs:
  - name: case_id
    type: string
    required: false
    description: "Kibana case to record per-stage progress against."
  - name: review_workflow_id
    type: string
    required: false
    default: "risk-notable-review-indicators"
  - name: block_workflow_id
    type: string
    required: false
    default: "risk-notable-block-indicators"
  - name: protect_workflow_id
    type: string
    required: false
    default: "risk-notable-protect-assets-and-users"

consts:
  workflow_runner_base: "/api/workflows/workflow"

steps:
  - name: run_review
    type: kibana.request
    with:
      method: POST
      path: "{{ consts.workflow_runner_base }}/{{ inputs.review_workflow_id }}/run"
      body:
        inputs: {}
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"
      continue: true

  - name: have_review_result
    type: if
    condition: "{{ steps.run_review.output.marked_for_block_count | default: 0 }} > 0"
    steps:
      # Block stage is destructive — retry on Kibana transient errors
      # then fail loud.
      - name: run_block
        type: kibana.request
        with:
          method: POST
          path: "{{ consts.workflow_runner_base }}/{{ inputs.block_workflow_id }}/run"
          body:
            inputs:
              indicators: '${{ steps.run_review.output.marked_indicators | default: [] }}'
        on-failure:
          continue: true
          retry:
            max-attempts: 3
            delay: "5s"

      - name: comment_after_block
        type: if
        condition: "{{ inputs.case_id | size }} > 0"
        steps:
          - name: case_block_note
            type: kibana.request
            with:
              method: POST
              path: "/api/cases/{{ inputs.case_id }}/comments"
              body:
                type: "user"
                comment: "Block stage complete. title={{ steps.run_block.output.note_title | default: 'block result' }} content={{ steps.run_block.output.note_content | default: 'see workflow output' }}"
                owner: "cases"

  - name: run_protect
    type: kibana.request
    with:
      method: POST
      path: "{{ consts.workflow_runner_base }}/{{ inputs.protect_workflow_id }}/run"
      body:
        inputs: {}
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"
      continue: true

  - name: comment_after_protect
    type: if
    condition: "{{ inputs.case_id | size }} > 0"
    steps:
      - name: case_protect_note
        type: kibana.request
        with:
          method: POST
          path: "/api/cases/{{ inputs.case_id }}/comments"
          body:
            type: "user"
            comment: "Protect stage complete. title={{ steps.run_protect.output.note_title | default: 'protect result' }} content={{ steps.run_protect.output.note_content | default: 'see workflow output' }}"
            owner: "cases"

  - name: log_done
    type: console
    with:
      message: "risk_notable_mitigate finished."

  - name: create_security_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "Workflow: Risk Notable — Mitigate"
        description: |
          Automated case created by the **Risk Notable — Mitigate** workflow.

          Review the workflow execution and attached comments for full investigation details.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "medium"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags: ["automated", "workflow"]
    on-failure:
      continue: true
