# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "Risk Notable — Protect Assets and Users"
description: >
  Auto-containment dispatcher for a Splunk ES risk notable. Looks up the
  observed user and host strings against identity_lookup_expanded and
  asset_lookup_by_str in Splunk, lets an AI step (or analyst) pick which
  entities to act on, then fans out to each registered asset and
  identity containment workflow with the chosen names. Caller supplies
  users/hosts plus arrays of containment-workflow descriptors with
  full_name and input_spec.
enabled: true
tags: ["splunk-soar", "remediation", "splunk-es", "risk-notable", "protect", "translated"]

triggers:
  - type: manual

inputs:
  - name: users
    type: array
    required: false
    description: "User/identifier strings observed in the event."
  - name: hosts
    type: array
    required: false
    description: "Host/IP strings observed in the event."
  - name: asset_workflows
    type: array
    required: false
    description: "Available asset-containment workflows with { full_name, input_spec }."
  - name: identity_workflows
    type: array
    required: false
    description: "Available identity-containment workflows with { full_name, input_spec }."

consts:
  # Splunk REST: /services/search/jobs with exec_mode=oneshot returns the
  # inputlookup rows synchronously. Token belongs in a Bearer header.
  splunk_endpoint: "https://CHANGEME-splunk.internal:8089/services/search/jobs"
  splunk_auth_header: "Bearer CHANGEME_SPLUNK_TOKEN"
  workflow_runner_base: "/api/workflows"

steps:
  - name: have_workflows
    type: if
    condition: "{{ inputs.asset_workflows | size }} == 0 and {{ inputs.identity_workflows | size }} == 0"
    steps:
      - name: no_workflows
        type: console
        with:
          message: "No protect workflows registered; nothing to dispatch."

  # Query Splunk's identity_lookup_expanded table for any matching user names.
  - name: have_users
    type: if
    condition: "{{ inputs.users | size }} > 0"
    steps:
      - name: identity_search
        type: http
        with:
          url: "{{ consts.splunk_endpoint }}"
          method: POST
          headers:
            Authorization: "{{ consts.splunk_auth_header }}"
            Content-Type: "application/x-www-form-urlencoded"
          body: "search={{ '| inputlookup identity_lookup_expanded | search identity IN (' | append: inputs.users | join: ',' | append: ') | eval category=mvjoin(category, \"; \")' | url_encode }}&exec_mode=oneshot&output_mode=json"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
            on-status: [429, 502, 503, 504]
          continue: true

  - name: have_hosts
    type: if
    condition: "{{ inputs.hosts | size }} > 0"
    steps:
      - name: asset_search
        type: http
        with:
          url: "{{ consts.splunk_endpoint }}"
          method: POST
          headers:
            Authorization: "{{ consts.splunk_auth_header }}"
            Content-Type: "application/x-www-form-urlencoded"
          body: "search={{ '| inputlookup asset_lookup_by_str | search asset IN (' | append: inputs.hosts | join: ',' | append: ') | eval category=mvjoin(category, \"; \")' | url_encode }}&exec_mode=oneshot&output_mode=json"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
            on-status: [429, 502, 503, 504]
          continue: true

  # Recommend which entities to contain based on the Splunk Asset & Identity
  # matches. Swap this for a manual approval gate if the SOC requires HITL.
  - name: ai_select_entities
    type: ai.prompt
    connector-id: "CHANGEME-llm-connector"
    with:
      prompt: |
        You are recommending which entities to auto-contain after a Splunk
        ES risk notable. The Splunk Asset & Identity tables returned the
        matches below.

        Rules:
        - Only recommend containing entities that are NOT marked as
          privileged_account, executive, or critical asset category.
        - Skip entities with category containing "service" or "test".
        - If unsure, leave the entity out — false positives are worse than
          missed contains here.

        Return exactly this JSON shape and nothing else:
          {"users_to_contain": ["..."], "hosts_to_contain": ["..."]}

        Identity matches: {{ steps.identity_search.output.results | default: [] | json }}
        Asset matches: {{ steps.asset_search.output.results | default: [] | json }}

  - name: parse_selection
    type: data.set
    with:
      selection: ${{ steps.ai_select_entities.output }}

  # Dispatch every registered identity workflow with the chosen users.
  - name: launch_identity_workflows
    type: foreach
    foreach: "${{ inputs.identity_workflows }}"
    steps:
      - name: identity_launch
        type: kibana.request
        with:
          method: POST
          path: "{{ consts.workflow_runner_base }}/{{ item.full_name }}/run"
          body:
            inputs:
              users: '${{ steps.parse_selection.output.selection.users_to_contain | default: [] }}'
              input_spec: ${{ item.input_spec }}
        on-failure:
          continue: true

  - name: launch_asset_workflows
    type: foreach
    foreach: "${{ inputs.asset_workflows }}"
    steps:
      - name: asset_launch
        type: kibana.request
        with:
          method: POST
          path: "{{ consts.workflow_runner_base }}/{{ item.full_name }}/run"
          body:
            inputs:
              hosts: '${{ steps.parse_selection.output.selection.hosts_to_contain | default: [] }}'
              input_spec: ${{ item.input_spec }}
        on-failure:
          continue: true

  - name: final_summary
    type: console
    with:
      message: |
        Protect dispatched.
        users_selected={{ steps.parse_selection.output.selection.users_to_contain | size | default: 0 }}
        hosts_selected={{ steps.parse_selection.output.selection.hosts_to_contain | size | default: 0 }}
