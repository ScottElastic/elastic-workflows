# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "Wireless — Rogue Access Point Remediate"
description: >
  Scheduled (15m) rogue-AP detector for a mobile wireless sensor
  (typically a Raspberry Pi reachable over SSH). Runs `iwlist wlan0
  scanning`, parses the output via an AI step, drops APs whose ESSID
  is in the operator-supplied allowlist (WPA2 only), fuzzy-matches the
  rest against potential_rogue_essids, and writes a case comment for
  each escalated AP plus a follow-up note asking an analyst to walk
  the floor with the sensor.
enabled: true
tags: ["splunk-soar", "remediation", "wireless", "raspberry-pi", "translated"]

triggers:
  - type: manual
  - type: scheduled
    with:
      every: "15m"

inputs:
  - name: sensor_host
    type: string
    required: false
    default: "192.168.1.100"
    description: "SSH-addressable wireless sensor (Raspberry Pi)."
  - name: essid_allowlist
    type: array
    required: false
    description: "Known-good ESSIDs to ignore (only WPA2 entries are dropped)."
  - name: potential_rogue_essids
    type: array
    required: false
    description: "List of strings used to fuzzy-match potential evil-twin networks."
  - name: wireless_case_id
    type: string
    required: false
    description: >
      Existing Wireless case id to record findings against. If omitted,
      results are only logged to the workflow execution output.

consts:
  ssh_endpoint: "https://CHANGEME-ssh-proxy.internal/api/execute"
  ssh_auth_header: "Bearer CHANGEME_TOKEN"
  edit_distance_threshold: 5

steps:
  - name: scan_wifi
    type: http
    with:
      url: "{{ consts.ssh_endpoint }}"
      method: POST
      headers:
        Authorization: "{{ consts.ssh_auth_header }}"
        Content-Type: "application/json"
      body:
        ip_hostname: "{{ inputs.sensor_host }}"
        command: "sudo /sbin/iwlist wlan0 scanning"
    on-failure:
      retry:
        max-attempts: 2
        delay: "5s"
      continue: true

  # iwlist parsing was complex custom Python. Delegate to an AI step that
  # returns structured JSON. Swap for a dedicated parser when one exists.
  - name: parse_scan
    type: ai.prompt
    connector-id: "CHANGEME-llm-connector"
    with:
      prompt: |
        You are an iwlist-output parser. Convert the raw scan below into
        a JSON array. Each element must have EXACTLY these keys, all
        strings:
          - mac_address: e.g. "AA:BB:CC:DD:EE:FF"
          - ESSID: the SSID as printed (unquoted)
          - radio_frequency: e.g. "2.412 GHz"
          - signal_strength: e.g. "-67 dBm"
          - security_protocol: one of "WPA2", "WPA", "WEP", or
            "plaintext" when no IEEE 802.11i / WPA stanza is present.

        Skip cells you cannot fully parse.

        Raw output:
        {{ steps.scan_wifi.output.output | default: '' }}

        Return ONLY the JSON array. No prose, no markdown fence.

  - name: parsed_access_points
    type: data.set
    with:
      aps: ${{ steps.parse_scan.output | parse_json }}

  - name: filter_allowlist
    type: data.set
    with:
      # Keep an AP if either its ESSID is not in the allowlist OR it isn't WPA2
      filtered: >-
        ${{ steps.parsed_access_points.output.aps
            | reject_exp: "item",
                "(inputs.essid_allowlist contains item.ESSID) and (item.security_protocol contains 'WPA2')" }}

  - name: log_allowlist_filter
    type: console
    with:
      message: |
        Allowlist filter:
        scanned={{ steps.parsed_access_points.output.aps | size }}
        suspicious_after_filter={{ steps.filter_allowlist.output.filtered | size }}

  # Fuzzy match the remaining APs to the potential-rogue list.
  - name: fuzzy_match
    type: ai.prompt
    connector-id: "CHANGEME-llm-connector"
    with:
      prompt: |
        You evaluate WiFi access points for evil-twin similarity.

        For each AP in the APs input, compare its ESSID against every
        string in Suspect patterns. Lowercase both sides, strip
        whitespace, and ignore the noise words: wifi, wireless,
        network, official, corp, corporate. Compute Levenshtein edit
        distance on the cleaned strings.

        Return a JSON array containing every input AP, augmented with
        EXACTLY these added keys:
          - is_escalated: boolean (true iff min edit distance across
            patterns is strictly less than {{ consts.edit_distance_threshold }})
          - matched_rule: the original (uncleaned) suspect pattern that
            produced the minimum distance, or null if not escalated.

        Preserve all other keys (mac_address, ESSID, radio_frequency,
        signal_strength, security_protocol) verbatim.

        APs: {{ steps.filter_allowlist.output.filtered | json }}
        Suspect patterns: {{ inputs.potential_rogue_essids | default: [] | json }}

        Output: a single JSON array. No prose, no markdown fence.

  - name: enriched_aps
    type: data.set
    with:
      aps: ${{ steps.fuzzy_match.output | parse_json }}

  - name: write_findings_to_case
    type: if
    condition: "{{ inputs.wireless_case_id | size }} > 0"
    steps:
      - name: per_escalated_ap
        type: foreach
        with:
          items: ${{ steps.enriched_aps.output.aps }}
        steps:
          - name: maybe_comment
            type: if
            condition: "{{ item.is_escalated }} == true"
            steps:
              - name: case_comment
                type: kibana.addCaseComment
                with:
                  caseId: "{{ inputs.wireless_case_id }}"
                  comment: |
                    Suspicious AP detected
                    mac={{ item.mac_address }}
                    ESSID={{ item.ESSID }}
                    signal={{ item.signal_strength }}
                    matched_rule={{ item.matched_rule }}

      # The original playbook used a manual phantom.task() for an operator
      # to physically locate the AP. Approximate that with a case comment
      # asking the assignee to walk the floor.
      - name: assign_operator_task
        type: kibana.addCaseComment
        with:
          caseId: "{{ inputs.wireless_case_id }}"
          comment: >-
            Walk the office with the wireless sensor. Use the MAC addresses
            and signal strengths above to locate each rogue access point.
            Consider performing a packet capture before unplugging, and
            bring the device to the SOC for forensics.

  - name: final_summary
    type: console
    with:
      message: |
        Wireless scan finished.
        escalated_aps={{ steps.enriched_aps.output.aps | where: "is_escalated", true | size }}
