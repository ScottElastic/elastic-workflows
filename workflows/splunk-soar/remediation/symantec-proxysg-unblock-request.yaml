# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "Symantec ProxySG — Website Unblock Request"
description: >
  Handles a user-submitted website unblock ticket. Looks up URL
  reputation in VirusTotal and Symantec WebPulse; if both come back
  clean, captures a screenshot, detonates the URL on urlscan.io, then
  asks an analyst-approver via ai.prompt. On YES the URL is allowed on
  the ProxySG, requester emailed, ticket commented. On NO (or any
  malicious finding upstream) the request is denied and the ticket
  closed with a reason. Caution: urlscan.io submissions can be made
  publicly visible — set scan visibility appropriately.
enabled: true
tags: ["splunk-soar", "remediation", "url-unblock", "symantec-proxysg", "translated"]

triggers:
  - type: manual

inputs:
  - name: from_email
    type: string
    required: true
    description: "Requester email — used for approve/deny notifications."
  - name: request_url
    type: string
    required: true
    description: "The URL the user wants unblocked."
  - name: ticket_id
    type: string
    required: false
    description: "Originating ticketing platform id (Jira / ServiceNow)."
  - name: jira_connector_id
    type: string
    required: false
    default: "CHANGEME-jira-connector"

consts:
  notify_from: "phantom-notifications@company.com"
  virustotal_endpoint: "https://www.virustotal.com/api/v3/urls"
  virustotal_api_key: "CHANGEME"
  webpulse_endpoint: "https://sitereview.bluecoat.com/resource/lookup"
  screenshot_endpoint: "https://CHANGEME-screenshot.internal/api/snap"
  screenshot_auth_header: "Bearer CHANGEME_TOKEN"
  urlscan_endpoint: "https://urlscan.io/api/v1/scan/"
  urlscan_api_key: "CHANGEME"
  bluecoat_allow_endpoint: "https://CHANGEME-proxysg.internal/api/allow-url"
  bluecoat_auth_header: "Bearer CHANGEME_TOKEN"
  smtp_endpoint: "CHANGEME-smtp-connector"

steps:
  - name: validate_inputs
    type: if
    condition: "{{ inputs.from_email | size }} == 0 or {{ inputs.request_url | size }} == 0"
    steps:
      - name: missing_inputs
        type: console
        with:
          message: "from_email or request_url missing; aborting."

  - name: virustotal_url_reputation
    type: http
    with:
      url: "{{ consts.virustotal_endpoint }}"
      method: POST
      headers:
        x-apikey: "{{ consts.virustotal_api_key }}"
        Content-Type: "application/x-www-form-urlencoded"
      body: "url={{ inputs.request_url }}"
    on-failure:
      retry:
        max-attempts: 2
        delay: "3s"
      continue: true

  - name: clean_in_vt
    type: if
    condition: "{{ steps.virustotal_url_reputation.output.data.attributes.last_analysis_stats.malicious | default: 0 }} == 0"
    steps:
      - name: webpulse_url_reputation
        type: http
        with:
          url: "{{ consts.webpulse_endpoint }}"
          method: POST
          headers:
            Content-Type: "application/x-www-form-urlencoded"
          body: "url={{ inputs.request_url }}"
        on-failure:
          retry:
            max-attempts: 2
            delay: "3s"
          continue: true

      - name: webpulse_clean
        type: if
        condition: >-
          not ("{{ steps.webpulse_url_reputation.output.categories | join: ',' | default: '' }}" contains "Malicious")
          and not ("{{ steps.webpulse_url_reputation.output.categories | join: ',' | default: '' }}" contains "Malware")
        steps:
          - name: capture_screenshot
            type: http
            with:
              url: "{{ consts.screenshot_endpoint }}"
              method: POST
              headers:
                Authorization: "{{ consts.screenshot_auth_header }}"
              body:
                url: "{{ inputs.request_url }}"
            on-failure:
              continue: true

          - name: detonate_url
            type: http
            with:
              url: "{{ consts.urlscan_endpoint }}"
              method: POST
              headers:
                API-Key: "{{ consts.urlscan_api_key }}"
                Content-Type: "application/json"
              body:
                url: "{{ inputs.request_url }}"
                visibility: "unlisted"
            on-failure:
              retry:
                max-attempts: 2
                delay: "5s"
              continue: true

          - name: ask_approver
            type: ai.prompt
            connector-id: "CHANGEME-llm-connector"
            with:
              prompt: |
                APPROVAL REQUEST — proxy URL unblock

                Requester:    {{ inputs.from_email }}
                Request URL:  {{ inputs.request_url }}
                Ticket:       {{ inputs.ticket_id | default: '(none)' }}

                Upstream reputation checks (all passed before this step):
                  - VirusTotal malicious votes: {{ steps.virustotal_url_reputation.output.data.attributes.last_analysis_stats.malicious | default: 0 }}
                  - Symantec WebPulse categories: {{ steps.webpulse_url_reputation.output.categories | default: [] | json }}
                  - urlscan.io scan UUID: {{ steps.detonate_url.output.uuid | default: '(submission failed)' }}
                  - urlscan.io report: {{ steps.detonate_url.output.result | default: '(not available)' }}

                You are the approver. Reply with ONLY one word:
                YES   to allow the URL on the ProxySG
                NO    to keep it blocked

          - name: approval_decision
            type: if
            condition: '{{ steps.ask_approver.output | strip | upcase }} == "YES"'
            steps:
              - name: allow_on_proxy
                type: http
                with:
                  url: "{{ consts.bluecoat_allow_endpoint }}"
                  method: POST
                  headers:
                    Authorization: "{{ consts.bluecoat_auth_header }}"
                    Content-Type: "application/json"
                  body:
                    url: "{{ inputs.request_url }}"
                on-failure:
                  continue: true
                  retry:
                    max-attempts: 3
                    delay: "10s"

              - name: notify_approved
                type: console
                with:
                  message: "Email would be sent to: [ | subject: Request Approved"

              - name: update_ticket_approved
                type: if
                condition: "{{ inputs.ticket_id | size }} > 0"
                steps:
                  - name: jira_comment_approved
                    type: http
                    with:
                      url: "{{ consts.jira_base | default: 'https://jira.example.com' }}/rest/api/3/issue"
                      method: POST
                      headers:
                        Content-Type: "application/json"
                      body:
                        fields:
                          summary: "{{ inputs.ticket_title | default: 'Workflow ticket' }}"
                          description:
                            type: doc
                            version: 1
                            content:
                              - type: paragraph
                                content:
                                  - type: text
                                    text: "{{ inputs.description | default: '' }}"

            else:
              - name: notify_denied_by_approver
                type: console
                with:
                  message: "Email would be sent to: [ | subject: Request Denied"

              - name: update_ticket_denied_approver
                type: if
                condition: "{{ inputs.ticket_id | size }} > 0"
                steps:
                  - name: jira_comment_denied_approver
                    type: http
                    with:
                      url: "{{ consts.jira_base | default: 'https://jira.example.com' }}/rest/api/3/issue"
                      method: POST
                      headers:
                        Content-Type: "application/json"
                      body:
                        fields:
                          summary: "{{ inputs.ticket_title | default: 'Workflow ticket' }}"
                          description:
                            type: doc
                            version: 1
                            content:
                              - type: paragraph
                                content:
                                  - type: text
                                    text: "{{ inputs.description | default: '' }}"

        else:
          # WebPulse flagged Malicious / Malware — auto-deny
          - name: notify_denied_webpulse
            type: console
            with:
              message: "Email would be sent to: [ | subject: Request Denied"

          - name: update_ticket_denied_webpulse
            type: if
            condition: "{{ inputs.ticket_id | size }} > 0"
            steps:
              - name: jira_comment_denied_webpulse
                type: http
                with:
                  url: "{{ consts.jira_base | default: 'https://jira.example.com' }}/rest/api/3/issue"
                  method: POST
                  headers:
                    Content-Type: "application/json"
                  body:
                    fields:
                      summary: "{{ inputs.ticket_title | default: 'Workflow ticket' }}"
                      description:
                        type: doc
                        version: 1
                        content:
                          - type: paragraph
                            content:
                              - type: text
                                text: "{{ inputs.description | default: '' }}"

    else:
      # VirusTotal showed positives — auto-deny
      - name: notify_denied_vt
        type: console
        with:
          message: "Email would be sent to: [ | subject: Request Denied"

      - name: update_ticket_denied_vt
        type: if
        condition: "{{ inputs.ticket_id | size }} > 0"
        steps:
          - name: jira_comment_denied_vt
            type: http
            with:
              url: "{{ consts.jira_base | default: 'https://jira.example.com' }}/rest/api/3/issue"
              method: POST
              headers:
                Content-Type: "application/json"
              body:
                fields:
                  summary: "{{ inputs.ticket_title | default: 'Workflow ticket' }}"
                  description:
                    type: doc
                    version: 1
                    content:
                      - type: paragraph
                        content:
                          - type: text
                            text: "{{ inputs.description | default: '' }}"

  - name: create_security_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "Workflow: Symantec ProxySG — Website Unblock Request"
        description: |
          Automated case created by the **Symantec ProxySG — Website Unblock Request** workflow.

          Review the workflow execution and attached comments for full investigation details.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "medium"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags: ["automated", "workflow"]
    on-failure:
      continue: true
