# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "Endpoint — Terminate Spawned Processes"
description: >
  Terminates a known-malicious process tree on one or more Windows hosts.
  For each {host, pid} pair, kills the parent via a WinRM proxy, then
  queries Splunk for any children where parent_process_id == pid and
  kills those too. Destructive: any kill failure halts the host's branch
  so the operator can intervene.
enabled: true
tags: ["splunk-soar", "remediation", "endpoint", "process-kill", "winrm", "translated"]

triggers:
  - type: manual

inputs:
  - name: parent_processes
    type: array
    required: true
    description: "Array of { host, pid } entries identifying the parent processes to terminate."

consts:
  winrm_endpoint: "https://CHANGEME-winrm-proxy.internal/api/terminate-process"
  winrm_auth_header: "Bearer CHANGEME_WINRM_TOKEN"
  # Splunk REST: /services/search/jobs returns children synchronously
  # when exec_mode=oneshot.
  splunk_search_endpoint: "https://CHANGEME-splunk.internal:8089/services/search/jobs"
  splunk_auth_header: "Bearer CHANGEME_SPLUNK_TOKEN"

steps:
  - name: terminate_parents
    type: foreach
    with:
      items: ${{ inputs.parent_processes }}
    steps:
      # Destructive: terminate the parent process. No continue:true — if the
      # kill fails, the operator needs to see it before we hunt for children.
      - name: terminate_parent
        type: http
        with:
          url: "{{ consts.winrm_endpoint }}"
          method: POST
          headers:
            Authorization: "{{ consts.winrm_auth_header }}"
            Content-Type: "application/json"
          body:
            ip_hostname: "{{ item.host }}"
            pid: "{{ item.pid }}"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
            on-status: [429, 502, 503, 504]

      # Discover any children the parent spawned, via Splunk search.
      # Enrichment step — continue:true so a Splunk outage doesn't block
      # the rest of the workflow (parent is already terminated).
      - name: find_children
        type: http
        with:
          url: "{{ consts.splunk_search_endpoint }}"
          method: POST
          headers:
            Authorization: "{{ consts.splunk_auth_header }}"
            Content-Type: "application/x-www-form-urlencoded"
          body: "search=search+index%3D*+dest%3D{{ item.host }}+parent_process_id%3D{{ item.pid }}+%7C+fields+ProcessId&exec_mode=oneshot&output_mode=json"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
            on-status: [429, 502, 503, 504]
          continue: true

      - name: terminate_children
        type: foreach
        with:
          items: '${{ steps.find_children.output.results | default: [] }}'
        steps:
          # Destructive: terminate each child. No continue:true.
          - name: terminate_child
            type: http
            with:
              url: "{{ consts.winrm_endpoint }}"
              method: POST
              headers:
                Authorization: "{{ consts.winrm_auth_header }}"
                Content-Type: "application/json"
              body:
                ip_hostname: "{{ item.host }}"
                pid: "{{ item.ProcessId }}"
            on-failure:
              retry:
                max-attempts: 3
                delay: "5s"
                on-status: [429, 502, 503, 504]

      - name: log_pair_complete
        type: console
        with:
          message: |
            Processed parent host={{ item.host }} pid={{ item.pid }}
            children_terminated={{ steps.find_children.output.results | default: [] | size }}
