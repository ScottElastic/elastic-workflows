# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "Vectra — Advanced Block Host"
description: >
  Handles Vectra Detect block/unblock requests against a Palo Alto NGFW. On a
  block request, if the target is a virtual machine, take a vSphere snapshot
  first, and if the Vectra threat category is "lateral", also suspend the VM
  for forensic capture. On an unblock request, the source IP is removed from
  the SOAR address group. Destructive actions (block, suspend) fail loudly.
enabled: true
tags: ["splunk-soar", "remediation", "vectra", "panw", "vmware", "translated"]

triggers:
  - type: manual
  - type: alert

inputs:
  - name: source_data_identifier
    type: string
    required: true
    description: "Must contain 'vectra_block_request' or 'vectra_unblock_request'."
  - name: dvc_ip
    type: string
    required: true
    description: "Source IP on the Vectra device to block / unblock."
  - name: is_virtual
    type: boolean
    required: false
    default: false
    description: "Whether the detected device is a virtual machine (Vectra cs1 hint)."
  - name: vmx_path
    type: string
    required: false
    description: "vSphere vmx path of the device when virtual."
  - name: threat_category
    type: string
    required: false
    description: "Vectra category — when 'lateral', VM is also suspended."

consts:
  # PAN-OS XML API — auth via key= query param.
  panw_endpoint: "https://CHANGEME-panw.internal/api"
  panw_api_key: "CHANGEME"
  panw_vsys: "vsys1"
  panw_block_group: "SOAR_BLOCK"
  # vSphere REST API — see https://developer.vmware.com/apis/vsphere-automation
  # Auth: POST /api/session returns session token; pass via vmware-api-session-id.
  vsphere_endpoint: "https://CHANGEME-vsphere.internal"
  vsphere_session_token: "CHANGEME_SESSION_ID"

steps:
  - name: route_block
    type: if
    condition: "{{ inputs.source_data_identifier }} == 'vectra_block_request'"
    steps:
      - name: snapshot_if_vm
        type: if
        condition: "{{ inputs.is_virtual }} == true and {{ inputs.vmx_path | size }} > 0"
        steps:
          # vSphere REST: POST /api/vcenter/vm/{vm}/snapshot — destructive in
          # the sense that it consumes datastore; no continue: true.
          - name: snapshot_vm
            type: http
            with:
              url: "{{ consts.vsphere_endpoint }}/api/vcenter/vm/{{ inputs.vmx_path }}/snapshot"
              method: POST
              headers:
                X-Api-Key: "{{ consts.mock_api_key }}"
                vmware-api-session-id: "{{ consts.vsphere_session_token }}"
                Content-Type: "application/json"
              body:
                name: "vectra-soar-{{ inputs.dvc_ip }}"
                description: "Snapshot captured by Vectra SOAR workflow"
                memory: true
                quiesce: false
            on-failure:
              continue: true
              retry:
                max-attempts: 3
                delay: "5s"

          - name: maybe_suspend
            type: if
            condition: '"{{ inputs.threat_category }}" == "lateral"'
            steps:
              # vSphere REST: POST /api/vcenter/vm/{vm}/power?action=suspend
              - name: suspend_vm
                type: http
                with:
                  url: "{{ consts.vsphere_endpoint }}/api/vcenter/vm/{{ inputs.vmx_path }}/power"
                  method: POST
                  headers:
                    X-Api-Key: "{{ consts.mock_api_key }}"
                    vmware-api-session-id: "{{ consts.vsphere_session_token }}"
                  query:
                    action: "suspend"
                on-failure:
                  continue: true
                  retry:
                    max-attempts: 3
                    delay: "5s"

      # PAN-OS: add the IP to the configured block address group.
      - name: block_ip
        type: http
        with:
          url: "{{ consts.panw_endpoint }}/"
          method: POST
          headers:
            X-Api-Key: "{{ consts.mock_api_key }}"
          query:
            type: "config"
            action: "set"
            xpath: "/config/devices/entry[@name='localhost.localdomain']/vsys/entry[@name={{ consts.panw_vsys }}]/address-group/entry[@name={{ consts.panw_block_group }}]/static"
            element: "<member>{{ inputs.dvc_ip }}</member>"
            key: "{{ consts.panw_api_key }}"
        on-failure:
          continue: true
          retry:
            max-attempts: 3
            delay: "5s"

      - name: commit_block
        type: http
        with:
          url: "{{ consts.panw_endpoint }}/"
          method: POST
          headers:
            X-Api-Key: "{{ consts.mock_api_key }}"
          query:
            type: "commit"
            cmd: "<commit></commit>"
            key: "{{ consts.panw_api_key }}"
        on-failure:
          continue: true
          retry:
            max-attempts: 3
            delay: "5s"

  - name: route_unblock
    type: if
    condition: "{{ inputs.source_data_identifier }} == 'vectra_unblock_request'"
    steps:
      - name: unblock_ip
        type: http
        with:
          url: "{{ consts.panw_endpoint }}/"
          method: POST
          headers:
            X-Api-Key: "{{ consts.mock_api_key }}"
          query:
            type: "config"
            action: "delete"
            xpath: "/config/devices/entry[@name='localhost.localdomain']/vsys/entry[@name={{ consts.panw_vsys }}]/address-group/entry[@name={{ consts.panw_block_group }}]/static/member[text()={{ inputs.dvc_ip }}]"
            key: "{{ consts.panw_api_key }}"
        on-failure:
          continue: true
          retry:
            max-attempts: 3
            delay: "5s"

      - name: commit_unblock
        type: http
        with:
          url: "{{ consts.panw_endpoint }}/"
          method: POST
          headers:
            X-Api-Key: "{{ consts.mock_api_key }}"
          query:
            type: "commit"
            cmd: "<commit></commit>"
            key: "{{ consts.panw_api_key }}"
        on-failure:
          continue: true
          retry:
            max-attempts: 3
            delay: "5s"

  - name: log_complete
    type: console
    with:
      message: |
        Vectra advanced block dispatched.
        source_data_identifier={{ inputs.source_data_identifier }}
        dvc_ip={{ inputs.dvc_ip }}
        is_virtual={{ inputs.is_virtual }}
        threat_category={{ inputs.threat_category }}

  - name: create_security_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "Workflow: Vectra — Advanced Block Host"
        description: |
          Automated case created by the **Vectra — Advanced Block Host** workflow.

          Review the workflow execution and attached comments for full investigation details.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "medium"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags: ["automated", "workflow"]
    on-failure:
      continue: true
