# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "Vectra — Basic Block Host"
description: >
  Reads a Vectra Detect block or unblock request (from the source_data_identifier
  on the artifact) and adds or removes the offending source IP from a Palo Alto
  Networks PAN-OS address group used for SOAR-driven blocking. Destructive — runs
  without continue: true so a failed PAN-OS call surfaces immediately.
enabled: true
tags: ["splunk-soar", "remediation", "vectra", "panw", "translated"]

triggers:
  - type: manual
  - type: alert

inputs:
  - name: source_data_identifier
    type: string
    required: true
    description: "Must contain 'vectra_block_request' or 'vectra_unblock_request'."
  - name: dvc_ip
    type: string
    required: true
    description: "Source IP from the Vectra detection."

consts:
  # PAN-OS XML API — see https://docs.paloaltonetworks.com/pan-os/api.
  # The API key authenticates via the `key=` query parameter; address-group
  # membership is updated with type=config + action=set | action=delete.
  panw_endpoint: "https://CHANGEME-panw.internal/api"
  panw_api_key: "CHANGEME"
  panw_vsys: "vsys1"
  # Pre-existing dynamic/static address group referenced by a deny rule.
  panw_block_group: "SOAR_BLOCK"

steps:
  - name: route_block
    type: if
    condition: "{{ inputs.source_data_identifier }} == 'vectra_block_request'"
    steps:
      - name: block_ip
        type: http
        with:
          url: "{{ consts.panw_endpoint }}/"
          method: POST
          headers:
            Content-Type: "application/x-www-form-urlencoded"
          query:
            type: "config"
            action: "set"
            xpath: "/config/devices/entry[@name='localhost.localdomain']/vsys/entry[@name={{ consts.panw_vsys }}]/address-group/entry[@name={{ consts.panw_block_group }}]/static"
            element: "<member>{{ inputs.dvc_ip }}</member>"
            key: "{{ consts.panw_api_key }}"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"

      - name: commit_block
        type: http
        with:
          url: "{{ consts.panw_endpoint }}/"
          method: POST
          query:
            type: "commit"
            cmd: "<commit></commit>"
            key: "{{ consts.panw_api_key }}"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"

  - name: route_unblock
    type: if
    condition: "{{ inputs.source_data_identifier }} == 'vectra_unblock_request'"
    steps:
      - name: unblock_ip
        type: http
        with:
          url: "{{ consts.panw_endpoint }}/"
          method: POST
          headers:
            Content-Type: "application/x-www-form-urlencoded"
          query:
            type: "config"
            action: "delete"
            xpath: "/config/devices/entry[@name='localhost.localdomain']/vsys/entry[@name={{ consts.panw_vsys }}]/address-group/entry[@name={{ consts.panw_block_group }}]/static/member[text()={{ inputs.dvc_ip }}]"
            key: "{{ consts.panw_api_key }}"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"

      - name: commit_unblock
        type: http
        with:
          url: "{{ consts.panw_endpoint }}/"
          method: POST
          query:
            type: "commit"
            cmd: "<commit></commit>"
            key: "{{ consts.panw_api_key }}"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"

  - name: log_complete
    type: console
    with:
      message: "Vectra basic block dispatched ip={{ inputs.dvc_ip }} sdi={{ inputs.source_data_identifier }}"
