# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "VMWorld — WannaCry Response"
description: >
  Ransomware response in a VMware estate. On a Vectra Cognito ransomware
  alert, immediately blocks C2 traffic via NSX, lists vSphere VMs and
  snapshots the affected ones to preserve pre-encryption state, then
  asks an approver whether to quarantine the hosts. On approval the
  hosts are quarantined via Carbon Black; on denial a ServiceNow incident
  is opened for follow-up.
enabled: true
tags: ["splunk-soar", "remediation", "vmware", "wannacry", "ransomware", "translated"]

triggers:
  - type: manual
  - type: alert

inputs:
  - name: source_addresses
    type: array
    required: true
    description: "Source IPs of suspect endpoints from the Vectra alert."
  - name: servicenow_connector_id
    type: string
    required: false
    default: "CHANGEME-servicenow-connector"

consts:
  nsx_endpoint: "https://CHANGEME-nsx.internal/api"
  nsx_auth_header: "Bearer CHANGEME_TOKEN"
  vsphere_endpoint: "https://CHANGEME-vsphere.internal/api"
  vsphere_auth_header: "Bearer CHANGEME_TOKEN"
  carbonblack_endpoint: "https://CHANGEME-carbonblack.internal/api/v1"
  carbonblack_token: "CHANGEME"

steps:
  - name: block_c2
    type: foreach
    foreach: "${{ inputs.source_addresses }}"
    steps:
      - name: nsx_block_port
        type: http
        with:
          url: "{{ consts.nsx_endpoint }}/firewall/block-ip"
          method: POST
          headers:
            X-Api-Key: "{{ consts.mock_api_key }}"
            Authorization: "{{ consts.nsx_auth_header }}"
            Content-Type: "application/json"
          body:
            ip: "{{ item }}"
        on-failure:
          retry:
            max-attempts: 2
            delay: "3s"
          continue: true

  - name: list_vms
    type: http
    with:
      url: "{{ consts.vsphere_endpoint }}/vms"
      method: GET
      headers:
        X-Api-Key: "{{ consts.mock_api_key }}"
        Authorization: "{{ consts.vsphere_auth_header }}"
    on-failure:
      continue: true

  - name: affected_vms
    type: data.set
    with:
      matches: []

  - name: snapshot_vms
    type: foreach
    foreach: "${{ steps.affected_vms.output.matches }}"
    steps:
      - name: snapshot_vm
        type: http
        with:
          url: "{{ consts.vsphere_endpoint }}/snapshot"
          method: POST
          headers:
            X-Api-Key: "{{ consts.mock_api_key }}"
            Authorization: "{{ consts.vsphere_auth_header }}"
            Content-Type: "application/json"
          body:
            vmx_path: "{{ item.vmx_path }}"
        on-failure:
          continue: true

  - name: quarantine_decision
    type: ai.prompt
    connector-id: "CHANGEME-llm-connector"
    with:
      prompt: |
        A possible WannaCry ransomware sighting (Vectra Cognito alert)
        was detected on these IPs:
        {{ inputs.source_addresses | json }}

        Containment posture so far:
          * NSX has blocked outbound traffic from each IP.
          * vSphere snapshots have been taken for each affected VM to
            preserve pre-encryption state.

        Decide whether to proceed with a full Carbon Black quarantine
        (severs all non-management traffic from those hosts).

        Respond with exactly one word, all uppercase: YES or NO.
    on-failure:
      continue: true

  - name: apply_quarantine
    type: if
    condition: "'{{ steps.quarantine_decision.output | strip | upcase }}' == 'YES'"
    steps:
      - name: quarantine_each_host
        type: foreach
        foreach: "${{ inputs.source_addresses }}"
        steps:
          - name: carbonblack_quarantine
            type: http
            with:
              url: "{{ consts.carbonblack_endpoint }}/sensor/quarantine"
              method: POST
              headers:
                X-Api-Key: "{{ consts.mock_api_key }}"
                X-Auth-Token: "{{ consts.carbonblack_token }}"
                Content-Type: "application/json"
              body:
                ip_hostname: "{{ item }}"
            on-failure:
              continue: true
    else:
      # No quarantine — file a ServiceNow incident so the team follows up.
      - name: create_ticket
        type: http
        with:
          url: "{{ consts.servicenow_base | default: 'https://CHANGEME-servicenow.service-now.com' }}/api/now/table/incident"
          method: POST
          headers:
            X-Api-Key: "{{ consts.mock_api_key }}"
            Content-Type: "application/json"
            Authorization: "{{ consts.servicenow_auth | default: 'Basic CHANGEME_SN_AUTH' }}"
          body:
            short_description: "WannaCry Endpoints Affected - No Quarantine"
        on-failure:
          continue: true

  - name: log_done
    type: console
    with:
      message: |
        WannaCry response complete.
        hosts={{ inputs.source_addresses | size }}
        snapshotted={{ steps.affected_vms.output.matches | size }}
        decision={{ steps.quarantine_decision.output | strip | upcase }}

  - name: create_security_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "Workflow: VMWorld — WannaCry Response"
        description: |
          Automated case created by the **VMWorld — WannaCry Response** workflow.

          Review the workflow execution and attached comments for full investigation details.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "medium"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags: ["automated", "workflow"]
    on-failure:
      continue: true
