# ─────────────────────────────────────────────────────────────────────
name: "PhishTank — URL Reputation Analysis"
description: >
  Looks up each input URL against PhishTank's `checkurl` endpoint
  (`POST` form-encoded `url=&format=json&app_key=`) and assigns an
  OCSF score: 10/Malicious when in_database+valid, 5/May_not_be_Safe
  when in_database but unverified, 0/Unknown otherwise. Requires a
  PhishTank developer app_key.
enabled: true
tags: ["splunk-soar", "reputation", "url", "phishtank", "translated"]

triggers:
  - type: manual

inputs:
  - name: urls
    type: array
    required: true
    description: "List of URLs to check."

consts:
  phishtank_endpoint: "https://checkurl.phishtank.com/checkurl/"
  phishtank_app_key: "CHANGEME"   # PhishTank developer key
  # OCSF reputation score reference: https://schema.ocsf.io/objects/reputation

steps:
  - name: query_each_url
    type: foreach
    foreach: "${{ inputs.urls }}"
    steps:
      # PhishTank has no first-party Elastic connector; this is the
      # canonical form-encoded POST against the public API.
      - name: url_reputation
        type: http
        with:
          url: "{{ consts.phishtank_endpoint }}"
          method: POST
          headers:
            Content-Type: "application/x-www-form-urlencoded"
            User-Agent: "phishtank/elastic-workflows"
          body: "url={{ item | url_encode }}&format=json&app_key={{ consts.phishtank_app_key }}"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
          continue: true

      - name: classify
        type: if
        condition: "{{ steps.url_reputation.output.results.in_database }}"
        steps:
          - name: score_when_verified_phish
            type: if
            condition: "{{ steps.url_reputation.output.results.valid }}"
            steps:
              - name: set_malicious
                type: data.set
                with:
                  score_id: 10
                  score: "Malicious"
          - name: score_when_unverified
            type: if
            condition: "not {{ steps.url_reputation.output.results.verified }}"
            steps:
              - name: set_caution
                type: data.set
                with:
                  score_id: 5
                  score: "May_not_be_Safe"
        else:
          - name: set_unknown
            type: data.set
            with:
              score_id: 0
              score: "Unknown"

      - name: log_observable
        type: console
        with:
          message: |
            URL={{ item }}
            in_database={{ steps.url_reputation.output.results.in_database | default: false }}
            verified={{ steps.url_reputation.output.results.verified | default: false }}
            valid={{ steps.url_reputation.output.results.valid | default: false }}
            phish_detail_page={{ steps.url_reputation.output.results.phish_detail_page | default: '' }}
