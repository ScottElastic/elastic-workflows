name: "ReversingLabs TitaniumCloud — URL Reputation"
description: >
  Queries the ReversingLabs TitaniumCloud URL Threat Intelligence
  (TCA-0403) report endpoint for each input URL and records the
  classification, categories, third-party reputation statistics, and
  first/last-seen timestamps on a per-URL observable.
enabled: true
tags: ["splunk-soar", "reputation", "url", "reversinglabs", "translated"]

triggers:
  - type: alert
  - type: manual

inputs:
  - name: urls
    type: array
    required: true
    description: "URLs to look up."

consts:
  rl_url_endpoint: "https://data.reversinglabs.com/api/networking/url/v1/report/query/json"
  rl_auth_header: "Basic CHANGEME_BASE64_CREDENTIAL"

steps:
  - name: each_url
    type: foreach
    with:
      items: ${{ inputs.urls }}
    steps:
      # TODO: replace with a native ReversingLabs connector when available.
      - name: rl_url_reputation
        type: http
        with:
          url: "{{ consts.rl_url_endpoint }}"
          method: POST
          headers:
            Authorization: "{{ consts.rl_auth_header }}"
            Content-Type: "application/json"
            Accept: "application/json"
          body:
            rl:
              query:
                url: "{{ item }}"
                response_format: "json"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
          continue: true

      - name: store_classification
        type: data.set
        with:
          observable:
            value: "{{ item }}"
            type: "url"
            source: "ReversingLabs TitaniumCloud"
            classification: "{{ steps.rl_url_reputation.output.rl.classification | default: 'UNKNOWN' }}"
            categories: "{{ steps.rl_url_reputation.output.rl.categories | default: [] }}"
            first_seen: "{{ steps.rl_url_reputation.output.rl.first_seen | default: '' }}"
            last_seen: "{{ steps.rl_url_reputation.output.rl.last_seen | default: '' }}"
            third_party_stats:
              malicious: "{{ steps.rl_url_reputation.output.rl.third_party_reputations.statistics.malicious | default: 0 }}"
              clean: "{{ steps.rl_url_reputation.output.rl.third_party_reputations.statistics.clean | default: 0 }}"
              undetected: "{{ steps.rl_url_reputation.output.rl.third_party_reputations.statistics.undetected | default: 0 }}"
              total: "{{ steps.rl_url_reputation.output.rl.third_party_reputations.statistics.total | default: 0 }}"

      - name: log_url_classification
        type: console
        with:
          message: |
            URL {{ item }} classification={{ steps.rl_url_reputation.output.rl.classification | default: 'UNKNOWN' }} malicious={{ steps.rl_url_reputation.output.rl.third_party_reputations.statistics.malicious | default: 0 }}
