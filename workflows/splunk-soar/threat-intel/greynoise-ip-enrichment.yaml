# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "GreyNoise — IP Enrichment by Severity"
description: >
  Enriches the alert source IP against the GreyNoise v3 API, choosing
  endpoint depth based on the event severity. High-severity events get
  the full noise context (classification, actor, tags); lower-severity
  events get the cheaper quick lookup. Pass source_ip / severity to
  override the alert defaults. Read-only — no remediation side effects.
enabled: true
tags: ["splunk-soar", "threat-intel", "greynoise", "translated"]

triggers:
  - type: alert
  - type: manual

inputs:
  - name: source_ip
    type: string
    required: false
    description: "Override IP to enrich. Defaults to the alert source address."
  - name: severity
    type: string
    required: false
    description: "Override severity ('high' triggers full reputation). Defaults to alert severity."

consts:
  # GreyNoise v3 API — auth: `key:` header.
  greynoise_base_url: "https://api.greynoise.io/v3"
  greynoise_api_key: "CHANGEME-greynoise-api-key"

steps:
  - name: derive_ip
    type: data.set
    with:
      ip: "{{ inputs.source_ip | default: event.alerts[0].source.ip | default: '' }}"

  - name: derive_severity
    type: data.set
    with:
      severity: "{{ inputs.severity | default: event.alerts[0].kibana.alert.severity | default: 'low' | downcase }}"

  - name: route_on_severity
    type: if
    condition: "{{ steps.derive_severity.output.severity }} == 'high'"
    steps:
      # Full noise context (classification, actor, tags, last seen, RIOT).
      - name: ip_reputation
        type: http
        with:
          url: "{{ consts.greynoise_base_url }}/noise/context/{{ steps.derive_ip.output.ip }}"
          method: GET
          headers:
            key: "{{ consts.greynoise_api_key }}"
            Accept: "application/json"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
          continue: true

      - name: log_reputation
        type: console
        with:
          message: |
            GreyNoise reputation for {{ steps.derive_ip.output.ip }}:
            classification={{ steps.ip_reputation.output.classification | default: 'unknown' }}
            actor={{ steps.ip_reputation.output.actor | default: '' }}
            tags={{ steps.ip_reputation.output.tags | default: [] | join: ',' }}
            last_seen={{ steps.ip_reputation.output.last_seen | default: '' }}
    else:
      # Quick lookup: code + noise/riot booleans only.
      - name: lookup_ip
        type: http
        with:
          url: "{{ consts.greynoise_base_url }}/noise/quick/{{ steps.derive_ip.output.ip }}"
          method: GET
          headers:
            key: "{{ consts.greynoise_api_key }}"
            Accept: "application/json"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
          continue: true

      - name: log_quick
        type: console
        with:
          message: |
            GreyNoise quick lookup for {{ steps.derive_ip.output.ip }}:
            code={{ steps.lookup_ip.output.code | default: 'unknown' }}
            noise={{ steps.lookup_ip.output.noise | default: false }}
            riot={{ steps.lookup_ip.output.riot | default: false }}
