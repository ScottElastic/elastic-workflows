# ─────────────────────────────────────────────────────────────────────
name: "GreyNoise — Severity From IP Reputation"
description: >
  Calls GreyNoise noise context for the alert source IP and maps the
  returned classification to a severity: `malicious` or `unknown` → high,
  benign noise → low. Pass source_ip to override the alert default. Sets
  workflow-local severity output only — no case or alert mutation.
enabled: true
tags: ["splunk-soar", "threat-intel", "greynoise", "translated"]

triggers:
  - type: alert
  - type: manual

inputs:
  - name: source_ip
    type: string
    required: false
    description: "Override IP to query. Defaults to the alert source address."

consts:
  # GreyNoise v3 noise context endpoint — auth: `key:` header.
  greynoise_endpoint: "https://api.greynoise.io/v3/noise/context"
  greynoise_api_key: "CHANGEME-greynoise-api-key"

steps:
  - name: derive_ip
    type: data.set
    with:
      ip: "{{ inputs.source_ip | default: event.alerts[0].source.ip | default: '' }}"

  - name: ip_reputation
    type: http
    with:
      url: "{{ consts.greynoise_endpoint }}/{{ steps.derive_ip.output.ip }}"
      method: GET
      headers:
        key: "{{ consts.greynoise_api_key }}"
        Accept: "application/json"
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"
      continue: true

  - name: classify
    type: if
    condition: "{{ steps.ip_reputation.output.classification }} == 'malicious'"
    steps:
      - name: set_high_malicious
        type: data.set
        with:
          severity: "high"
          reason: "GreyNoise marked the IP as malicious."
    else:
      - name: maybe_unknown
        type: if
        condition: "{{ steps.ip_reputation.output.classification }} == 'unknown'"
        steps:
          - name: set_high_unknown
            type: data.set
            with:
              severity: "high"
              reason: "GreyNoise has no determination for this IP — treat with caution."
        else:
          - name: set_low_benign
            type: data.set
            with:
              severity: "low"
              reason: "GreyNoise flagged the IP as common internet noise."

  - name: log_outcome
    type: console
    with:
      message: |
        IP={{ steps.derive_ip.output.ip }}
        classification={{ steps.ip_reputation.output.classification | default: 'unavailable' }}
        new_severity={{ steps.set_high_malicious.output.severity | default: steps.set_high_unknown.output.severity | default: steps.set_low_benign.output.severity }}

  - name: create_security_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "Workflow: GreyNoise — Severity From IP Reputation"
        description: |
          Automated case created by the **GreyNoise — Severity From IP Reputation** workflow.

          Review the workflow execution and attached comments for full investigation details.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "medium"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags: ["automated", "workflow"]
    on-failure:
      continue: true
