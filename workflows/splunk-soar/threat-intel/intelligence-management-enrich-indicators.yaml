# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "TruSTAR Intelligence Management — Enrich Indicators"
description: >
  Child workflow: takes a list of indicators (any type), enriches each
  via the TruSTAR / Splunk Intelligence Management metadata endpoint,
  tags indicators with priority > 0, and logs per-indicator findings
  plus Station deep-links. Note: TruSTAR APIs are being deprecated in
  favour of Splunk Mission Control — treat the http steps as stubs.
enabled: true
tags: ["splunk-soar", "threat-intel", "trustar", "intelligence-management", "translated"]

triggers:
  - type: manual

inputs:
  - name: indicators
    type: array
    required: true
    description: "List of indicator values (IPs, hashes, domains, etc.) to enrich."

consts:
  # TruSTAR / Splunk Intelligence Management v1.3 — deprecated; replace
  # with a Splunk Mission Control connector when available.
  trustar_endpoint: "https://api.trustar.co/api/1.3"
  trustar_auth_header: "Bearer CHANGEME_TRUSTAR_TOKEN"
  station_search_url: "https://station.trustar.co/browse/search"

steps:
  - name: per_indicator_enrichment
    type: foreach
    foreach: "${{ inputs.indicators }}"
    steps:
      - name: indicator_reputation
        type: http
        with:
          url: "{{ consts.trustar_endpoint }}/indicators/metadata"
          method: GET
          headers:
            Authorization: "{{ consts.trustar_auth_header }}"
            Accept: "application/json"
          query:
            value: "{{ item }}"
            limit: "10000"
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
          continue: true

      - name: capture_indicator_summary
        type: data.set
        with:
          summary:
            indicator: "{{ item }}"
            observable_type: "{{ steps.indicator_reputation.output.observable.type | default: 'unknown' }}"
            priority_score: "{{ steps.indicator_reputation.output.priorityScore | default: 0 }}"
            safelisted: "{{ steps.indicator_reputation.output.safelisted | default: false }}"
            station_link: "{{ consts.station_search_url }}?q={{ item | url_encode }}"

      - name: tag_when_found
        type: if
        condition: "{{ steps.indicator_reputation.output.priorityScore | default: 0 }} > 0"
        steps:
          - name: tag_with_priority
            type: http
            with:
              url: "{{ consts.trustar_endpoint }}/tags"
              method: POST
              headers:
                Authorization: "{{ consts.trustar_auth_header }}"
                Content-Type: "application/json"
              body:
                indicator: "{{ item }}"
                tag: "priority_{{ steps.indicator_reputation.output.priorityScore }}"
            on-failure:
              retry:
                max-attempts: 3
                delay: "5s"
              continue: true

      - name: log_indicator
        type: console
        with:
          message: |
            Indicator={{ item }}
            type={{ steps.capture_indicator_summary.output.summary.observable_type }}
            priority={{ steps.capture_indicator_summary.output.summary.priority_score }}
            safelisted={{ steps.capture_indicator_summary.output.summary.safelisted }}
            station={{ steps.capture_indicator_summary.output.summary.station_link }}

  - name: build_note
    type: data.set
    with:
      note:
        title: "TruSTAR indicator enrichment"
        content: "Enriched {{ inputs.indicators | size }} indicator(s) via TruSTAR. See workflow logs for per-indicator priority scores and Station links."
