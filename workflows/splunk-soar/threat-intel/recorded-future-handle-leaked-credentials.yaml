# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "Recorded Future — Handle Leaked Credentials"
description: >
  Hourly poller for Recorded Future leaked-credential alerts. Resolves
  the alert rule by name (default: "Leaked Credential Monitoring"),
  pulls triggered alerts in the requested timeframe, extracts and
  deduplicates EmailAddress entities, looks each one up in AD/LDAP, and
  invokes a downstream password-reset workflow for every enabled match.
  Side effects: triggers password resets for matched users.
enabled: true
tags: ["splunk-soar", "threat-intel", "recorded-future", "credentials", "translated"]

triggers:
  - type: schedule
    with:
      every: "1h"
  - type: manual

inputs:
  - name: rule_name
    type: string
    required: false
    default: "Leaked Credential Monitoring"
    description: "Recorded Future alert rule name to query."
  - name: timeframe
    type: string
    required: false
    default: "-24h to now"
    description: "Time range passed to Recorded Future alert data lookup."

consts:
  # Recorded Future v2 — auth: `X-RFToken` header.
  recorded_future_base: "https://api.recordedfuture.com/v2"
  recorded_future_token: "CHANGEME-recorded-future-token"
  # Internal AD/LDAP lookup proxy. Replace with whatever your environment exposes.
  ldap_lookup_endpoint: "https://CHANGEME-ldap-proxy.internal/api/lookup-user"
  ldap_auth_header: "Bearer CHANGEME_LDAP_TOKEN"
  # Workflow id for the password-reset child workflow.
  reset_workflow_id: "CHANGEME-ad-reset-password-workflow"

steps:
  - name: rf_lookup_rule_id
    type: http
    with:
      url: "{{ consts.recorded_future_base }}/alert/rule"
      method: GET
      headers:
        X-RFToken: "{{ consts.recorded_future_token }}"
        Accept: "application/json"
      query:
        freetext: "{{ inputs.rule_name }}"
        limit: "5"
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"

  - name: rf_pull_alert_data
    type: http
    with:
      url: "{{ consts.recorded_future_base }}/alert/search"
      method: GET
      headers:
        X-RFToken: "{{ consts.recorded_future_token }}"
        Accept: "application/json"
      query:
        alertRule: "{{ steps.rf_lookup_rule_id.output.data.results[0].id | default: '' }}"
        triggered: "{{ inputs.timeframe }}"
        limit: "100"
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"

  # Replaces the original "dedup_accounts" custom code block: pull every
  # EmailAddress entity out of the alert response and keep one of each.
  - name: dedup_emails
    type: data.set
    with:
      emails: "{{ steps.rf_pull_alert_data.output.data.results | map: 'entities' | flatten | where: 'type', 'EmailAddress' | map: 'name' | uniq }}"

  - name: announce_victim_list
    type: console
    with:
      message: |
        Recorded Future leaked-credential alert "{{ inputs.rule_name }}":
        unique emails={{ steps.dedup_emails.output.emails | size }}
        addresses={{ steps.dedup_emails.output.emails | join: ', ' }}

  - name: per_email
    type: foreach
    foreach: "${{ steps.dedup_emails.output.emails }}"
    steps:
      - name: lookup_ad_user
        type: http
        with:
          url: "{{ consts.ldap_lookup_endpoint }}"
          method: POST
          headers:
            Authorization: "{{ consts.ldap_auth_header }}"
            Content-Type: "application/json"
          body:
            attribute: "mail"
            value: "{{ item }}"
            fields: ["sAMAccountName", "userAccountControl", "pwdLastSet", "mail"]
        on-failure:
          retry:
            max-attempts: 3
            delay: "5s"
          continue: true

      - name: filter_active
        type: if
        condition: "{{ steps.lookup_ad_user.output.found | default: false }} and {{ steps.lookup_ad_user.output.state | default: '' }} == 'Enabled'"
        steps:
          - name: log_active_user
            type: console
            with:
              message: "Active AD user found for leaked address {{ item }}: {{ steps.lookup_ad_user.output.samaccountname }}"

          # Hand-off: invoke the Kibana password-reset workflow for the matched user.
          # No `continue: true` — if the reset cannot be queued we want a loud failure.
          - name: trigger_reset_workflow
            type: http
            with:
              url: "/api/workflows/{{ consts.reset_workflow_id }}/run"
              method: POST
              headers:
                kbn-xsrf: "true"
                Content-Type: "application/json"
              body:
                inputs:
                  user: "{{ steps.lookup_ad_user.output.samaccountname }}"
                  reason: "Recorded Future credential leak match: {{ item }}"
            on-failure:
              retry:
                max-attempts: 3
                delay: "5s"
