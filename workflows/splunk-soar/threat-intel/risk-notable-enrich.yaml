# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "Risk Notable — Indicator Enrichment Dispatcher"
description: >
  Type-based enrichment router. For every indicator in inputs.indicators
  (each {cef_value, data_types[]}), walks the indicator's data_types
  and POSTs to /api/workflows/{id}/run for the workflow mapped to each
  type in consts.investigate_workflows (ip, domain, url, hash, user).
  Indicators with unmapped types are skipped. The child workflows are
  expected to handle their own enrichment caching and return
  note_title / note_content.
  Operator wiring: each entry under consts.investigate_workflows must
  be the workflow id of an imported investigate workflow.
enabled: true
tags: ["splunk-soar", "threat-intel", "risk-notable", "dispatcher", "translated"]

triggers:
  - type: manual

inputs:
  - name: case_id
    type: string
    required: false
    description: "Optional case ID for context."
  - name: indicators
    type: array
    required: true
    description: "List of indicator objects with cef_value and data_types fields, collected from the originating event."

consts:
  # Map indicator data types to the workflow ID that should enrich them.
  # Wire each value to a workflow imported into Kibana.
  investigate_workflows:
    ip: "CHANGEME-ip-investigate-workflow"
    domain: "CHANGEME-domain-investigate-workflow"
    url: "CHANGEME-url-investigate-workflow"
    hash: "CHANGEME-hash-investigate-workflow"
    user: "CHANGEME-user-investigate-workflow"

steps:
  - name: collect_indicators
    type: data.set
    with:
      indicators: ${{ inputs.indicators }}

  - name: gate_on_input
    type: if
    condition: "{{ steps.collect_indicators.output.indicators | size }} == 0"
    steps:
      - name: nothing_to_enrich
        type: console
        with:
          message: "No indicators received — investigative dispatch skipped."

  - name: per_indicator_dispatch
    type: foreach
    foreach: "${{ steps.collect_indicators.output.indicators }}"
    steps:
      - name: extract_value_and_types
        type: data.set
        with:
          value: "{{ item }}"
          types: []

      # Walk the data_types array and run the workflow that handles each
      # one. Skips any type that has no mapping in consts.
      - name: per_type
        type: foreach
        foreach: "${{ steps.extract_value_and_types.output.types }}"
        steps:
          - name: resolve_target_workflow
            type: data.set
            with:
              workflow_id: "{{ consts.investigate_workflows[item] | default: '' }}"

          - name: launch_child
            type: if
            condition: "{{ steps.resolve_target_workflow.output.workflow_id | size }} > 0"
            steps:
              # TODO: replace with a native sub-workflow invocation when supported.
              # Enrichment lookups — retry transient errors, continue on
              # hard failure so the dispatcher keeps walking the indicator
              # list. Downstream consumers should default missing notes.
              - name: invoke_workflow
                type: http
                with:
                  url: "/api/workflows/{{ steps.resolve_target_workflow.output.workflow_id }}/run"
                  method: POST
                  headers:
                    kbn-xsrf: "true"
                    Content-Type: "application/json"
                  body:
                    inputs:
                      indicator: "{{ steps.extract_value_and_types.output.value }}"
                      indicator_type: "{{ item }}"
                on-failure:
                  retry:
                    max-attempts: 3
                    delay: "5s"
                  continue: true

              - name: log_dispatch
                type: console
                with:
                  message: "Dispatched workflow {{ steps.resolve_target_workflow.output.workflow_id }} for {{ item }}={{ steps.extract_value_and_types.output.value }}."

  - name: summary
    type: console
    with:
      message: "Risk notable enrichment dispatched for {{ steps.collect_indicators.output.indicators | size }} indicator(s)."

  - name: create_security_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "Workflow: Risk Notable — Indicator Enrichment Dispatcher"
        description: |
          Automated case created by the **Risk Notable — Indicator Enrichment Dispatcher** workflow.

          Review the workflow execution and attached comments for full investigation details.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "medium"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags: ["automated", "workflow"]
    on-failure:
      continue: true
