# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "ServiceNow — Create Incident from ES Finding"
description: >
  Creates a ServiceNow incident sourced from an Elastic Security finding and
  records the SNOW reference back onto the related Kibana Case so subsequent
  workflows can keep updating the same ticket. Uses the native servicenow
  connector for the create call (`pushToService`) and the Kibana Cases API
  for the linkage / audit comment. Inputs: `finding_id` (required),
  `case_id` (optional Kibana case to update), plus optional title/description
  overrides that default to the alert's rule name and reason.
enabled: true
tags: ["splunk-soar", "ticketing", "servicenow", "enterprise-security", "translated"]

triggers:
  - type: alert
  - type: manual

inputs:
  - name: finding_id
    type: string
    required: true
    description: "The Elastic Security alert/finding _id (kibana.alert.uuid) being escalated."
  - name: case_id
    type: string
    required: false
    description: "Optional Kibana case id to update with the SNOW reference and audit comment."
  - name: short_description
    type: string
    required: false
    description: "Short description for the SNOW incident. Defaults to the finding's rule name."
  - name: description
    type: string
    required: false
    description: "Long description for the SNOW incident. Defaults to the alert reason."

consts:
  servicenow_connector_id: "CHANGEME-servicenow-connector"

steps:
  - name: derive_payload
    type: data.set
    with:
      short_description: "{{ inputs.short_description | default: event.alerts[0].kibana.alert.rule.name | default: 'Elastic Security finding' }}"
      description: "{{ inputs.description | default: event.alerts[0].kibana.alert.reason | default: 'See linked finding for details.' }}"

  # Native servicenow connector → ServiceNow Table API POST /api/now/table/incident.
  # The connector handles auth (Basic or OAuth) and returns {number, sys_id, ...}.
  - name: create_snow_ticket
    type: servicenow
    connector-id: "{{ consts.servicenow_connector_id }}"
    with:
      subAction: "pushToService"
      subActionParams:
        incident:
          short_description: "{{ steps.derive_payload.output.short_description }}"
          description: "{{ steps.derive_payload.output.description }}"
          correlation_id: "{{ inputs.finding_id }}"
          correlation_display: "Elastic Security Finding"
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"

  # If a Kibana case was supplied, mirror the SNOW number into a customField
  # so subsequent workflows (e.g. servicenow-update-incident-notes) can find
  # it without re-querying SNOW.
  - name: have_case
    type: if
    condition: "{{ inputs.case_id | size }} > 0"
    steps:
      - name: patch_case_custom_field
        type: kibana.request
        with:
          method: PATCH
          path: "/api/cases"
          body:
            cases:
              - id: "{{ inputs.case_id }}"
                version: "{{ event.case.version | default: '' }}"
                customFields:
                  - key: "snow_incident"
                    type: "text"
                    value: "{{ steps.create_snow_ticket.output.number | default: '' }}"
        on-failure:
          retry:
            max-attempts: 3
            delay: "3s"
          continue: true

      - name: add_audit_comment
        type: kibana.addCaseComment
        with:
          caseId: "{{ inputs.case_id }}"
          comment: "ServiceNow incident created: {{ steps.create_snow_ticket.output.number | default: 'unknown' }} (sys_id={{ steps.create_snow_ticket.output.pushedDate | default: '' }})"
        on-failure:
          continue: true

  - name: log_outcome
    type: console
    with:
      message: "Created SNOW incident {{ steps.create_snow_ticket.output.number | default: 'unknown' }} for finding {{ inputs.finding_id }}."
