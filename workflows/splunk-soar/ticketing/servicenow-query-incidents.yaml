# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "ServiceNow — Query Incidents by Affected Entity"
description: >
  Queries the ServiceNow `incident` table for tickets whose configuration item
  (cmdb_ci) matches a given entity within the lookback window, using the Table
  API (`GET /api/now/table/incident`) with a `sysparm_query` filter. Emits a
  per-ticket console line and stores the raw result list for downstream
  workflows. Inputs: `entity` (required), `lookback_days` (default 7),
  `max_results` (default 100).
enabled: true
tags: ["splunk-soar", "ticketing", "servicenow", "query", "translated"]

triggers:
  - type: alert
  - type: manual

inputs:
  - name: entity
    type: string
    required: true
    description: "Affected entity name (host or device) to look up in the SNOW cmdb_ci.name field."
  - name: lookback_days
    type: number
    required: false
    default: 7
    description: "Number of days back to query. Default 7."
  - name: max_results
    type: number
    required: false
    default: 100
    description: "Maximum number of incidents to return."

consts:
  # Replace with your ServiceNow connector ID configured in Kibana.
  servicenow_connector_id: "CHANGEME-servicenow-connector"
  # Direct REST URL used as a fallback for the `list tickets` action.
  servicenow_instance_url: "https://CHANGEME.service-now.com"
  servicenow_auth_header: "Basic CHANGEME_BASE64_USER_PASS"

steps:
  - name: build_filter_query
    type: data.set
    with:
      # ServiceNow encoded query (sysparm_query) syntax. The http transport
      # URL-encodes the `query` map values, so pass the raw caret-delimited
      # encoded-query string here — no %20 escaping needed.
      filter: "cmdb_ci.name={{ inputs.entity }}^sys_created_onONLast {{ inputs.lookback_days | default: 7 }} days@javascript:gs.beginningOfLast{{ inputs.lookback_days | default: 7 }}Days()@javascript:gs.endOfToday()"

  # ServiceNow Table API GET /api/now/table/incident. Native servicenow
  # connector exposes pushToService/getFields but not a generic query
  # subAction, so we use http for read-only listing.
  - name: list_snow_tickets
    type: http
    with:
      url: "{{ consts.servicenow_instance_url }}/api/now/table/incident"
      method: GET
      headers:
        Authorization: "{{ consts.servicenow_auth_header }}"
        Accept: "application/json"
      query:
        sysparm_query: "{{ steps.build_filter_query.output.filter }}"
        sysparm_limit: "{{ inputs.max_results | default: 100 }}"
        sysparm_fields: "number,sys_id,short_description,severity,priority,opened_at,closed_at,state,assigned_to,caller_id"
        sysparm_display_value: "all"
    on-failure:
      retry:
        max-attempts: 3
        delay: "5s"
      continue: true

  - name: have_tickets
    type: if
    condition: "{{ steps.list_snow_tickets.output.result | size }} > 0"
    steps:
      - name: emit_tickets
        type: foreach
        foreach: "${{ steps.list_snow_tickets.output.result }}"
        steps:
          - name: log_ticket
            type: console
            with:
              message: |
                SNOW {{ item.number | default: '' }} — {{ item.short_description | default: '' }}
                sys_id={{ item.sys_id | default: '' }} severity={{ item.severity | default: '' }} priority={{ item.priority | default: '' }}
                opened={{ item.opened_at | default: '' }} closed={{ item.closed_at | default: '' }}

      - name: store_summary
        type: data.set
        with:
          snow_tickets: ${{ steps.list_snow_tickets.output.result }}
          count: "{{ steps.list_snow_tickets.output.result | size }}"
    else:
      - name: log_no_results
        type: console
        with:
          message: "No related SNOW incidents found for entity {{ inputs.entity }}."

  - name: create_security_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "Workflow: ServiceNow — Query Incidents by Affected Entity"
        description: |
          Automated case created by the **ServiceNow — Query Incidents by Affected Entity** workflow.

          Review the workflow execution and attached comments for full investigation details.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "medium"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags: ["automated", "workflow"]
    on-failure:
      continue: true
