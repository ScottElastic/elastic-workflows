# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "ServiceNow — Related Tickets Search"
description: >
  Searches a configurable list of ServiceNow tables (incident, problem, change,
  sc_request, sc_task, etc.) for tickets opened within the lookback window that
  reference the supplied indicators. Queries each table via the ServiceNow Table
  API (`GET /api/now/table/{tableName}`) with a `sysparm_query` filter and
  emits a normalized per-ticket observable record. Inputs: `search_terms`
  (required), `tables` (optional override), `lookback_days` (default 30).
enabled: true
tags: ["splunk-soar", "ticketing", "servicenow", "related-tickets", "translated"]

triggers:
  - type: manual

inputs:
  - name: search_terms
    type: array
    required: true
    description: "Indicators (user/host/etc) to look up across ServiceNow tables."
  - name: tables
    type: array
    required: false
    description: "Optional override for the SNOW tables to search."
  - name: lookback_days
    type: number
    required: false
    default: 30
    description: "How many days back to query. Default 30."

consts:
  servicenow_instance_url: "https://CHANGEME.service-now.com"
  servicenow_auth_header: "Basic CHANGEME_BASE64_USER_PASS"
  # SOAR's playbook hard-codes this list; replicate it as a default.
  default_tables:
    - "incident"
    - "change_request"
    - "change_task"
    - "problem"
    - "sc_request"
    - "sc_task"
    - "sc_req_item"

steps:
  - name: guard_inputs
    type: if
    condition: "{{ inputs.search_terms | size }} == 0"
    steps:
      - name: abort_no_terms
        type: console
        with:
          message: "No search terms provided — aborting."

  - name: resolve_tables
    type: data.set
    with:
      tables: >-
        ${{ inputs.tables | default: consts.default_tables }}

  - name: build_or_clause
    type: data.set
    with:
      # ServiceNow sysparm_query OR clause: short_descriptionLIKE<term>^ORshort_descriptionLIKE<term2>...
      # Caret-separated chains describe AND; ^OR introduces an OR'd term.
      or_clause: "short_descriptionLIKE{{ inputs.search_terms | join: '^ORshort_descriptionLIKE' }}"

  - name: iterate_tables
    type: foreach
    foreach: "${{ steps.resolve_tables.output.tables }}"
    steps:
      # Per-table loop. We capture the table name in a local var so we don't
      # collide with the inner foreach `item` (each ticket record).
      - name: capture_table
        type: data.set
        with:
          table_name: "{{ item }}"

      # ServiceNow Table API GET. `active=true` and `sys_created_onONLast N days`
      # narrow the result set; `sysparm_display_value=all` returns both the raw
      # value and human-readable label for reference fields.
      - name: run_table_query
        type: http
        with:
          url: "{{ consts.servicenow_instance_url }}/api/now/table/{{ steps.capture_table.output.table_name }}"
          method: GET
          headers:
            Authorization: "{{ consts.servicenow_auth_header }}"
            Accept: "application/json"
          query:
            sysparm_query: "active=true^sys_created_onONLast {{ inputs.lookback_days | default: 30 }} days@javascript:gs.beginningOfLast{{ inputs.lookback_days | default: 30 }}Days()@javascript:gs.endOfToday()^{{ steps.build_or_clause.output.or_clause }}"
            sysparm_display_value: "all"
            sysparm_limit: "100"
        on-failure:
          retry:
            max-attempts: 3
            delay: "3s"
          continue: true

      - name: have_table_results
        type: if
        condition: "{{ steps.run_table_query.output.result | size }} > 0"
        steps:
          - name: each_ticket
            type: foreach
            foreach: "${{ steps.run_table_query.output.result }}"
            steps:
              - name: build_observable
                type: data.set
                with:
                  observable:
                    value: "{{ inputs.search_terms | first }}"
                    ticket:
                      name: "{{ item.short_description.value | default: item.short_description | default: '' }}"
                      id: "{{ item.sys_id.value | default: item.sys_id | default: '' }}"
                      number: "{{ item.number.value | default: item.number | default: '' }}"
                      message: "{{ item.description.value | default: item.description | default: '' }}"
                      start_time: "{{ item.sys_created_on.value | default: item.sys_created_on | default: '' }}"
                      end_time: "{{ item.closed_at.value | default: item.closed_at | default: '' }}"
                      assigned_to: "{{ item.assigned_to.display_value | default: '' }}"
                      creator_name: "{{ item.caller_id.display_value | default: '' }}"
                      state: "{{ item.state.display_value | default: item.state | default: '' }}"
                      ticket_type: "{{ steps.capture_table.output.table_name }}"
                    source: "ServiceNow"
                    source_link: "{{ consts.servicenow_instance_url }}/nav_to.do?uri={{ steps.capture_table.output.table_name }}.do?sys_id={{ item.sys_id.value | default: item.sys_id }}"

              - name: log_ticket
                type: console
                with:
                  message: "Found SNOW {{ item.number.value | default: item.number | default: '?' }} in table {{ steps.capture_table.output.table_name }}: {{ item.short_description.value | default: item.short_description | default: '' }}"

  - name: emit_summary
    type: console
    with:
      message: "ServiceNow related-tickets search complete across {{ steps.resolve_tables.output.tables | size }} tables for {{ inputs.search_terms | size }} term(s)."

  - name: create_security_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "Workflow: ServiceNow — Related Tickets Search"
        description: |
          Automated case created by the **ServiceNow — Related Tickets Search** workflow.

          Review the workflow execution and attached comments for full investigation details.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "medium"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags: ["automated", "workflow"]
    on-failure:
      continue: true
