# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "ServiceNow — Update Incident with Investigation Notes"
description: >
  Runs at the end of a response plan. Pulls every comment from a Kibana Case
  (via the Cases REST API), renders them into a single HTML block, and posts
  the result to the linked ServiceNow incident through the servicenow
  connector (`pushToService` with `correlation_id`). Requires the case to
  carry a `snow_incident` reference (custom field or category) so the
  workflow knows which SNOW ticket to update. Inputs: `case_id` (required).
enabled: true
tags: ["splunk-soar", "ticketing", "servicenow", "notes", "translated"]

triggers:
  - type: alert
  - type: manual

inputs:
  - name: case_id
    type: string
    required: true
    description: "Kibana Case id (UUID) whose comments should be mirrored into SNOW."

consts:
  servicenow_connector_id: "CHANGEME-servicenow-connector"

steps:
  # Kibana Cases REST API: GET /api/cases/{caseId} returns the case incl.
  # external_service and any customFields; /comments returns the comment feed.
  - name: get_case
    type: kibana.request
    with:
      method: GET
      path: "/api/cases/{{ inputs.case_id }}"
    on-failure:
      retry:
        max-attempts: 3
        delay: "3s"
      continue: true

  - name: get_case_comments
    type: kibana.request
    with:
      method: GET
      path: "/api/cases/{{ inputs.case_id }}/comments"
    on-failure:
      retry:
        max-attempts: 3
        delay: "3s"
      continue: true

  - name: resolve_snow_incident
    type: data.set
    with:
      # Prefer the case's pushed external_service.external_id (set when the
      # case was previously pushed to SNOW). Fall back to a customFields entry
      # named `snow_incident` if operators populate it manually.
      snow_incident: "{{ steps.get_case.output.external_service.external_id | default: steps.get_case.output.customFields | where: 'key', 'snow_incident' | map: 'value' | first | default: '' }}"

  - name: have_notes_and_target
    type: if
    condition: "{{ steps.get_case_comments.output | size }} > 0 and {{ steps.resolve_snow_incident.output.snow_incident | size }} > 0"
    steps:
      # Render each comment as an HTML fragment. Kibana Case comments carry
      # `comment`, `createdBy.username`, `createdAt`, and `type` (user|alert).
      - name: render_notes_html
        type: foreach
        foreach: "${{ steps.get_case_comments.output }}"
        steps:
          - name: build_note_fragment
            type: data.set
            with:
              fragment: >-
                <b>Type</b> {{ item.type | default: 'user' }}
                <br/><b>Author</b> {{ item.createdBy.username | default: 'unknown' }}
                <br/><b>Created</b> {{ item.createdAt | default: '' }}
                <br/><b>Comment</b> {{ item.comment | default: '' }}
                <br/><br/>

      - name: assemble_payload
        type: data.set
        with:
          comments: >-
            [code]<h4>Elastic Case Notes</h4>
            {{ steps.get_case_comments.output | size }} comment(s) attached from case {{ inputs.case_id }}.
            See full content in the workflow execution output.
            [/code]

      # Native servicenow connector. correlation_id can be either a SNOW
      # number (INC...) or sys_id; pushToService upserts the comment field.
      - name: update_servicenow
        type: http
        with:
          url: "{{ consts.servicenow_base | default: 'https://CHANGEME-servicenow.service-now.com' }}/api/now/table/incident"
          method: POST
          headers:
            X-Api-Key: "{{ consts.mock_api_key }}"
            Content-Type: "application/json"
            Authorization: "{{ consts.servicenow_auth | default: 'Basic CHANGEME_SN_AUTH' }}"
          body:
            short_description: "{{ inputs.ticket_title | default: 'Workflow ticket' }}"
        on-failure:
          continue: true

      - name: log_done
        type: console
        with:
          message: "Posted {{ steps.get_case_comments.output | size }} comment(s) to SNOW incident {{ steps.resolve_snow_incident.output.snow_incident }}."
    else:
      - name: log_skip
        type: console
        with:
          message: "Skipping update — case {{ inputs.case_id }} has no comments or no linked SNOW incident."

  - name: create_security_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "Workflow: ServiceNow — Update Incident with Investigation Notes"
        description: |
          Automated case created by the **ServiceNow — Update Incident with Investigation Notes** workflow.

          Review the workflow execution and attached comments for full investigation details.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "medium"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags: ["automated", "workflow"]
    on-failure:
      continue: true
