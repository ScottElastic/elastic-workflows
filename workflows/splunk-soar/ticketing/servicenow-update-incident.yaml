# ─────────────────────────────────────────────────────────────────────
# Translated from a Splunk SOAR community playbook (Apache 2.0).
# See workflows/splunk-soar/NOTICE for attribution and details.
# ─────────────────────────────────────────────────────────────────────
name: "ServiceNow — Update Incident with Investigation Note"
description: >
  Posts a free-form analyst note as a comment on a ServiceNow incident via the
  Kibana servicenow connector (`pushToService` with `correlation_id`). When
  `snow_incident` is supplied it updates that ticket directly; otherwise it
  searches the SNOW `incident` table for recent tickets tied to `entity` and
  asks an LLM to recommend which one to update. Inputs: `note` (required),
  `snow_incident` (optional sys_id or number), `entity` (used for discovery).
enabled: true
tags: ["splunk-soar", "ticketing", "servicenow", "update", "translated"]

triggers:
  - type: alert
  - type: manual

inputs:
  - name: note
    type: string
    required: true
    description: "Free-form text to add as a comment on the SNOW incident."
  - name: snow_incident
    type: string
    required: false
    description: "Existing SNOW incident sys_id or number. If empty, the workflow searches for related incidents."
  - name: entity
    type: string
    required: false
    description: "Affected entity name used when searching for related SNOW incidents."
  - name: launching_user
    type: string
    required: false
    description: "Analyst whose decision is requested when no SNOW incident id is supplied."

consts:
  servicenow_connector_id: "CHANGEME-servicenow-connector"
  servicenow_instance_url: "https://CHANGEME.service-now.com"
  servicenow_auth_header: "Basic CHANGEME_BASE64_USER_PASS"

steps:
  - name: sanitize_note
    type: data.set
    with:
      # Strip CR/LF and pre-build the SNOW field payload. SOAR runs the note
      # through remove_crlf + uri_decode; we replicate the gist here.
      comments: "{{ inputs.note | replace: '\\r\\n', ' ' | replace: '\\n', ' ' }}"

  - name: have_target_incident
    type: if
    condition: "{{ inputs.snow_incident | size }} > 0"
    steps:
      # Direct path: caller already knows which incident to update.
      - name: update_known_incident
        type: http
        with:
          url: "{{ consts.servicenow_base | default: 'https://CHANGEME-servicenow.service-now.com' }}/api/now/table/incident"
          method: POST
          headers:
            Content-Type: "application/json"
            Authorization: "{{ consts.servicenow_auth | default: 'Basic CHANGEME_SN_AUTH' }}"
          body:
            short_description: "{{ inputs.ticket_title | default: 'Workflow ticket' }}"
        on-failure:
          continue: true

      - name: log_direct_update
        type: console
        with:
          message: "Updated SNOW incident {{ inputs.snow_incident }} with the supplied note."
    else:
      # Discovery path: query SNOW Table API for recent incidents tied to the
      # entity. servicenow connector has no generic query subAction so we go
      # direct to /api/now/table/incident.
      - name: lookup_related
        type: http
        with:
          url: "{{ consts.servicenow_instance_url }}/api/now/table/incident"
          method: GET
          headers:
            Authorization: "{{ consts.servicenow_auth_header }}"
            Accept: "application/json"
          query:
            sysparm_query: "cmdb_ci.name={{ inputs.entity }}^sys_created_onONLast 7 days@javascript:gs.beginningOfLast7Days()@javascript:gs.endOfToday()"
            sysparm_fields: "number,sys_id,short_description,state,opened_at,assigned_to,priority"
            sysparm_display_value: "all"
            sysparm_limit: "50"
        on-failure:
          retry:
            max-attempts: 3
            delay: "3s"
          continue: true

      - name: build_prompt_message
        type: data.set
        with:
          related_summary: "${{ steps.lookup_related.output.result | default: [] }}"

      # No native interactive prompt step exists yet; we use ai.prompt to
      # recommend a target, then surface candidates to the console so an
      # analyst can re-run with snow_incident set.
      - name: surface_candidates
        type: console
        with:
          message: |
            Related SNOW incidents for {{ inputs.entity }} (review and re-run with snow_incident set):
            {{ steps.build_prompt_message.output.related_summary | json | default: '[]' }}

      - name: ai_recommend_target
        type: ai.prompt
        with:
          prompt: |
            You are a SOC triage assistant. Pick the single ServiceNow incident
            from the candidate list below that best matches the analyst note,
            using these signals (in order): (1) `short_description` keyword
            overlap with the note, (2) most recent `opened_at`, (3) `state`
            still open (not Resolved/Closed/Cancelled).

            Respond with a JSON object only — no prose, no markdown fence —
            with this exact shape:
            {"incident_number": "INC0010023", "sys_id": "<32-char hex>", "confidence": "high|medium|low", "reason": "<one sentence>"}

            If the candidate list is empty or no incident is a credible match,
            return: {"incident_number": null, "sys_id": null, "confidence": "low", "reason": "no match"}

            Analyst note:
            {{ inputs.note }}

            Candidate incidents (ServiceNow Table API result objects):
            {{ steps.build_prompt_message.output.related_summary | json }}
        on-failure:
          continue: true

      - name: log_recommendation
        type: console
        with:
          message: "AI recommended SNOW incident: {{ steps.ai_recommend_target.output | default: 'no recommendation' }}"

  - name: create_security_case
    type: kibana.request
    with:
      method: POST
      path: "/api/cases"
      body:
        title: "Workflow: ServiceNow — Update Incident with Investigation Note"
        description: |
          Automated case created by the **ServiceNow — Update Incident with Investigation Note** workflow.

          Review the workflow execution and attached comments for full investigation details.
        connector:
          id: "none"
          name: "none"
          type: ".none"
          fields: null
        severity: "medium"
        settings:
          syncAlerts: false
        owner: "securitySolution"
        tags: ["automated", "workflow"]
    on-failure:
      continue: true
